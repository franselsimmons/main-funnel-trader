<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TS Admin Flush</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
      max-width: 760px;
      margin: auto;
    }
    input, button, textarea {
      width: 100%;
      box-sizing: border-box;
      margin: 8px 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #1b1b1b;
      color: #eee;
      font-size: 15px;
    }
    button {
      font-weight: 700;
      cursor: pointer;
    }
    .dry { background: #243447; }
    .real { background: #5b1f1f; }
    pre {
      white-space: pre-wrap;
      background: #000;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
    }
    .warn {
      color: #ffb3b3;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>TS Admin Flush Open Positions</h1>

  <p class="warn">
    Eerst DRY RUN. Alleen daarna REAL FLUSH.
  </p>

  <label>Admin secret</label>
  <input id="secret" type="password" placeholder="Plak hier je TS_ADMIN_SECRET" />

  <button class="dry" onclick="flushPositions(true)">
    DRY RUN — alleen tellen
  </button>

  <button class="real" onclick="flushPositions(false)">
    REAL FLUSH — open positions sluiten
  </button>

  <h3>Resultaat</h3>
  <pre id="out">Nog niets uitgevoerd.</pre>

  <script>
    const out = document.getElementById('out');

    function print(data) {
      out.textContent = typeof data === 'string'
        ? data
        : JSON.stringify(data, null, 2);
    }

    async function flushPositions(dryRun) {
      const secret = document.getElementById('secret').value.trim();

      if (!secret) {
        print('ERROR: Vul eerst je admin secret in.');
        return;
      }

      if (!dryRun) {
        const ok = confirm(
          'REAL FLUSH uitvoeren? Dit zet alle virtuele open positions dicht in je trade-system state.'
        );

        if (!ok) {
          print('REAL FLUSH geannuleerd.');
          return;
        }
      }

      print(dryRun ? 'Dry-run bezig...' : 'Real flush bezig...');

      try {
        const res = await fetch('/api/admin-flush-open-positions', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'x-admin-secret': secret
          },
          body: JSON.stringify({
            dryRun,
            reason: dryRun ? 'ADMIN_DRY_RUN' : 'MANUAL_FLUSH_CLEAR_CAP'
          })
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = text;
        }

        print({
          httpStatus: res.status,
          ok: res.ok,
          response: data
        });
      } catch (err) {
        print({
          ok: false,
          error: String(err && err.message ? err.message : err)
        });
      }
    }
  </script>
</body>
</html>
