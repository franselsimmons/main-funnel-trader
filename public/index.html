<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Trade Desk</title>
  <link rel="stylesheet" href="Globals.css"> <link rel="stylesheet" href="index.css"> </head>
<body>

  <div class="pageShell">
    
    <section class="heroCard">
      <div class="eyebrow">🐊 CRYPTOCROC</div>
      <h1 class="heroTitle">Main Trade Desk</h1>
      <p class="heroText">Real-time markt overzicht & signalen</p>
      
      <div class="statusGrid">
        <div class="statusCard">
          <span class="label">BTC Trend</span>
          <strong id="btcState" class="value">Laden...</strong>
        </div>
        <div class="statusCard">
          <span class="label">Regime</span>
          <strong id="regimeState" class="value">Laden... 🟢</strong>
        </div>
      </div>
    </section>

    <main class="dashGrid">
      
      <a href="bull.html" class="dashCard bull-card">
        <div class="cardIcon">🟢</div>
        <div class="cardContent">
          <h2>Bull Funnel</h2>
          <p>Long kansen & flow scores.</p>
        </div>
        <div class="cardStats">
          <span id="bullCount" class="statBadge">0</span>
        </div>
      </a>

      <a href="bear.html" class="dashCard bear-card">
        <div class="cardIcon">🔴</div>
        <div class="cardContent">
          <h2>Bear Funnel</h2>
          <p>Short kansen & flow scores.</p>
        </div>
        <div class="cardStats">
          <span id="bearCount" class="statBadge">0</span>
        </div>
      </a>

      <a href="signals.html" class="dashCard trade-card">
        <div class="cardIcon">⚡</div>
        <div class="cardContent">
          <h2>Trade Signals</h2>
          <p>Live posities & executies.</p>
        </div>
        <div class="cardStats">
          <span id="tradeCount" class="statBadge highlight">0</span>
        </div>
      </a>

    </main>
  </div>

  <script src="index.js"></script>
</body>
</html>
