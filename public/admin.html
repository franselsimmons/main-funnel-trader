<!-- FILE: public/admin.html -->
<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Short-Only Micro-Family Learning Admin</title>

  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --dark: #0f172a;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --blue: #2563eb;
      --purple: #7c3aed;
      --shadow: 0 2px 12px rgba(15, 23, 42, 0.07);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(220, 38, 38, 0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(15, 23, 42, 0.12), transparent 32%),
        var(--bg);
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 14px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: 0.14s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    button.primary { background: var(--dark); color: white; border-color: var(--dark); }
    button.success { background: var(--green); color: white; border-color: var(--green); }
    button.warn { background: var(--amber); color: white; border-color: var(--amber); }
    button.danger { background: var(--red); color: white; border-color: var(--red); }
    button.short-action { background: var(--red); color: white; border-color: var(--red); }
    button.small { padding: 6px 9px; border-radius: 9px; font-size: 12px; }

    select,
    input,
    textarea {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      min-height: 42px;
    }

    input[type="search"] { min-width: 340px; }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      line-height: 1.45;
    }

    header {
      background: linear-gradient(135deg, #0f172a 0%, #111827 46%, #450a0a 100%);
      color: white;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #dc2626, #fb7185);
      box-shadow: 0 12px 32px rgba(220, 38, 38, 0.30);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-title strong {
      display: block;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: #cbd5e1;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #fb7185;
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.18);
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(243, 245, 249, 0.88);
      backdrop-filter: blur(14px);
      padding: 10px 0;
    }

    .tab {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.80);
      border-color: rgba(203, 213, 225, 0.90);
    }

    .tab.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .hidden,
    .panel.hidden { display: none; }

    .message {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
    }

    .message.ok { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .message.error { color: #991b1b; background: #fee2e2; border-color: #fecaca; }
    .message.warn { color: #92400e; background: #fef3c7; border-color: #fde68a; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #334155;
    }

    .metric-card {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .metric-extra {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin: 12px 0 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .pill.active { background: #dcfce7; color: #166534; }
    .pill.short,
    .pill.danger { background: #fee2e2; color: #991b1b; }
    .pill.warn { background: #fef3c7; color: #92400e; }
    .pill.info { background: #dbeafe; color: #1d4ed8; }
    .pill.purple { background: #ede9fe; color: #5b21b6; }
    .pill.dark { background: #0f172a; color: white; }
    .pill.soft { background: #e0f2fe; color: #075985; }
    .pill.observation { background: #fef9c3; color: #854d0e; }
    .pill.raw { background: #f1f5f9; color: #475569; }

    .score-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .score-bar > span {
      display: block;
      height: 100%;
      width: var(--w);
      background: linear-gradient(90deg, #dc2626, #fb7185);
      border-radius: inherit;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1280px;
      background: white;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td { background: #f8fafc; }

    code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 3px 5px;
      border-radius: 6px;
      color: #334155;
      white-space: nowrap;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1020;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 16px;
      max-height: 520px;
      overflow: auto;
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.48;
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.70);
    }

    .coin-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .coin-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #dc2626, #fb7185);
    }

    .coin-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .coin-symbol {
      font-weight: 850;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .coin-name {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .coin-price {
      text-align: right;
    }

    .coin-price strong {
      display: block;
      font-size: 16px;
    }

    .coin-price span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .coin-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .coin-stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px;
    }

    .coin-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .coin-stat strong { font-size: 13px; }

    .coin-foot {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }

    .manual-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.96));
      box-shadow: var(--shadow);
      padding: 16px;
      max-width: 820px;
    }

    .manual-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, #dc2626, #fb7185);
    }

    .manual-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .manual-stat {
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 10px;
      background: #ffffff;
    }

    .manual-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .manual-stat strong {
      display: block;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(860px, 94vw);
      background: white;
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 42px rgba(15, 23, 42, 0.18);
      padding: 20px;
      overflow: auto;
      z-index: 30;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    @media (max-width: 1180px) {
      .grid,
      .coin-grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
      .grid-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      header { padding: 18px 14px; }
      .header-inner { flex-direction: column; }
      main { padding: 14px; }
      .grid,
      .coin-grid { grid-template-columns: 1fr; }
      .tab { flex: 1 1 auto; padding: 9px 10px; }
      input[type="search"] { min-width: 100%; }
      .manual-grid,
      .coin-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="brand-title">
        <div class="brand-logo">MF</div>
        <div>
          <strong>Short-Only Micro-Family Learning Admin</strong>
          <div class="brand-subtitle">
            Scanner → TradeSystem → Analyze → Virtual PositionEngine → Net-R outcomes → Manual Discord selection
          </div>
        </div>
      </div>

      <div class="header-actions">
        <div class="live-pill"><span class="live-dot"></span><span id="liveLabel">SHORT-only · virtual learning</span></div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="overview">Overview</button>
      <button type="button" class="tab" data-tab="scanner">Scanner</button>
      <button type="button" class="tab" data-tab="trade">TradeSystem</button>
      <button type="button" class="tab" data-tab="micros">MicroFamilies</button>
      <button type="button" class="tab" data-tab="rotation">Manual Discord Selection</button>
      <button type="button" class="tab" data-tab="discord">Discord Logs</button>
      <button type="button" class="tab" data-tab="reset">Reset</button>
    </div>

    <div id="message"></div>

    <section id="overview" class="panel"></section>
    <section id="scanner" class="panel hidden"></section>
    <section id="trade" class="panel hidden"></section>
    <section id="micros" class="panel hidden"></section>
    <section id="rotation" class="panel hidden"></section>
    <section id="discord" class="panel hidden"></section>
    <section id="reset" class="panel hidden"></section>
  </main>

  <div id="drawer" class="drawer hidden"></div>

  <script>
    const ONLY_SIDE = "SHORT";
    const OPPOSITE_SIDE = "LONG";
    const DASHBOARD_SIDE = "bear";

    const state = {
      activeTab: "overview",
      overview: null,
      scanner: null,
      trade: null,
      micros: null,
      rotation: null,
      discord: null,
      microMode: "balanced",
      microSearch: "",
      apiTimeoutMs: 22000,
      microLimit: 80,
      bestLimit: 50
    };

    const endpoints = {
      overview: "/api/admin/overview",
      scanner: "/api/admin/scanner",
      trade: "/api/admin/trade",
      micros: "/api/admin/micro-families",
      rotation: "/api/admin/rotation",
      discord: "/api/admin/discord-logs",
      microDetail: "/api/admin/micro-family",
      runScanner: "/api/scanner/run?force=true",
      runTrade: "/api/trade/run?force=true&forceProcessSnapshot=true",
      resetLearning: "/api/admin/reset-learning",
      resetRotation: "/api/admin/reset-rotation",
      factoryReset: "/api/admin/factory-reset"
    };

    const tabs = ["overview", "scanner", "trade", "micros", "rotation", "discord", "reset"];
    const validMicroModes = ["balanced", "winrate", "totalR", "avgR", "directSL", "observed"];

    const $ = (id) => document.getElementById(id);

    class ApiError extends Error {
      constructor(message, details = {}) {
        super(message);
        this.name = "ApiError";
        this.status = details.status || 0;
        this.url = details.url || "";
        this.data = details.data || null;
        this.timeout = Boolean(details.timeout);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function upper(value) {
      return String(value || "").trim().toUpperCase();
    }

    function cleanSideText(value = "") {
      return upper(value)
        .replaceAll("LONG_DISABLED", "")
        .replaceAll("LONGDISABLED", "")
        .replaceAll("BLOCK_LONG", "")
        .replaceAll("LONG_ENABLED_FALSE", "")
        .replaceAll("LONG_ONLY_FALSE", "")
        .replaceAll("SHORT_DISABLED_FALSE", "")
        .replaceAll("SHORT_ONLY", "SHORT")
        .replaceAll("SHORT-ONLY", "SHORT");
    }

    function normalizeSide(value) {
      const raw = cleanSideText(value);

      if (["SHORT", "BEAR", "BEARISH", "SELL", "DOWN", "DOWNSIDE"].includes(raw)) return ONLY_SIDE;
      if (["LONG", "BULL", "BULLISH", "BUY", "UP", "UPSIDE"].includes(raw)) return OPPOSITE_SIDE;

      return "UNKNOWN";
    }

    function hasShortSignal(value = "") {
      const text = ` ${cleanSideText(value)} `;

      return (
        text.includes("MICRO_SHORT_") ||
        text.includes("TRADESIDE=SHORT") ||
        text.includes("TRADE_SIDE=SHORT") ||
        text.includes("POSITION_SIDE=SHORT") ||
        text.includes("POSITIONSIDE=SHORT") ||
        text.includes("SIDE=SHORT") ||
        text.includes("SIDE=BEAR") ||
        text.includes("SIDE=SELL") ||
        text.includes("DIRECTION=SHORT") ||
        text.includes("DIRECTION=BEAR") ||
        text.includes("DIRECTION=SELL") ||
        text.includes(" SHORT ") ||
        text.includes(" SHORT_") ||
        text.includes("_SHORT ") ||
        text.includes("_SHORT_") ||
        text.includes("|SHORT|") ||
        text.includes(":SHORT") ||
        text.includes("=SHORT") ||
        text.includes(" BEAR ") ||
        text.includes("_BEAR") ||
        text.includes("BEAR_") ||
        text.includes("|BEAR|") ||
        text.includes(":BEAR") ||
        text.includes("=BEAR") ||
        text.includes(" SELL ") ||
        text.includes("_SELL") ||
        text.includes("SELL_") ||
        text.includes("|SELL|") ||
        text.includes(":SELL") ||
        text.includes("=SELL")
      );
    }

    function hasLongSignal(value = "") {
      const text = ` ${cleanSideText(value)} `;

      return (
        text.includes("MICRO_LONG_") ||
        text.includes("TRADESIDE=LONG") ||
        text.includes("TRADE_SIDE=LONG") ||
        text.includes("POSITION_SIDE=LONG") ||
        text.includes("POSITIONSIDE=LONG") ||
        text.includes("SIDE=LONG") ||
        text.includes("SIDE=BULL") ||
        text.includes("SIDE=BUY") ||
        text.includes("DIRECTION=LONG") ||
        text.includes("DIRECTION=BULL") ||
        text.includes("DIRECTION=BUY") ||
        text.includes(" LONG ") ||
        text.includes(" LONG_") ||
        text.includes("_LONG ") ||
        text.includes("_LONG_") ||
        text.includes("|LONG|") ||
        text.includes(":LONG") ||
        text.includes("=LONG") ||
        text.includes(" BULL ") ||
        text.includes("_BULL") ||
        text.includes("BULL_") ||
        text.includes("|BULL|") ||
        text.includes(":BULL") ||
        text.includes("=BULL") ||
        text.includes(" BUY ") ||
        text.includes("_BUY") ||
        text.includes("BUY_") ||
        text.includes("|BUY|") ||
        text.includes(":BUY") ||
        text.includes("=BUY")
      );
    }

    function inferSide(input = {}) {
      if (typeof input === "string") {
        const direct = normalizeSide(input);
        if (direct !== "UNKNOWN") return direct;

        const shortSignal = hasShortSignal(input);
        const longSignal = hasLongSignal(input);

        if (longSignal && !shortSignal) return OPPOSITE_SIDE;
        if (shortSignal) return ONLY_SIDE;

        return "UNKNOWN";
      }

      if (!input || typeof input !== "object") return "UNKNOWN";

      const directFields = [
        input.tradeSide,
        input.targetTradeSide,
        input.positionSide,
        input.direction,
        input.scannerSide,
        input.actualScannerSide,
        input.analysisSide,
        input.signalSide,
        input.entrySide,
        input.dashboardSide,
        input.side,
        input.bias,
        input.marketBias
      ];

      for (const field of directFields) {
        const direct = normalizeSide(field);

        if (direct !== "UNKNOWN") return direct;
      }

      const haystack = [
        input.familyId,
        input.family,
        input.baseFamilyId,

        input.microFamilyId,
        input.trueMicroFamilyId,
        input.liveMicroFamilyId,
        input.realMicroFamilyId,
        input.executionMicroFamilyId,
        input.id,
        input.key,

        input.macroFamilyId,
        input.parentMacroFamilyId,
        input.parentMicroFamilyId,
        input.parentFamilyId,
        input.macroId,

        input.definition,
        input.microDefinition,
        input.macroDefinition,
        input.parentDefinition,

        input.scannerReason,
        input.reason,
        input.signalReason,
        input.actionReason,
        input.exitReason,
        input.rejectionReason,

        Array.isArray(input.definitionParts) ? input.definitionParts.join("|") : "",
        Array.isArray(input.microDefinitionParts) ? input.microDefinitionParts.join("|") : "",
        Array.isArray(input.macroDefinitionParts) ? input.macroDefinitionParts.join("|") : "",
        Array.isArray(input.parentDefinitionParts) ? input.parentDefinitionParts.join("|") : "",
        Array.isArray(input.executionFingerprintParts) ? input.executionFingerprintParts.join("|") : ""
      ].join(" | ");

      const shortSignal = hasShortSignal(haystack);
      const longSignal = hasLongSignal(haystack);

      if (longSignal && !shortSignal) return OPPOSITE_SIDE;
      if (shortSignal) return ONLY_SIDE;

      if (input.longOnly === true || input.shortDisabled === true) return OPPOSITE_SIDE;

      if (
        input.shortOnly === true ||
        input.longDisabled === true ||
        input.targetTradeSide === ONLY_SIDE ||
        input.tradeSide === ONLY_SIDE ||
        input.dashboardSide === DASHBOARD_SIDE
      ) {
        return ONLY_SIDE;
      }

      return "UNKNOWN";
    }

    function isShortRow(row = {}) {
      return inferSide(row) === ONLY_SIDE;
    }

    function isLongRow(row = {}) {
      return inferSide(row) === OPPOSITE_SIDE;
    }

    function idAllowedInShortOnly(id = "") {
      const value = String(id || "").trim();

      if (!value) return false;

      const side = inferSide(value);

      return side !== OPPOSITE_SIDE;
    }

    function uniqueStrings(values = []) {
      return [...new Set(
        (Array.isArray(values) ? values : [values])
          .flatMap((value) => Array.isArray(value) ? value : [value])
          .flatMap((value) => String(value || "").split(/[\s,;\n\r]+/g))
          .map((value) => value.trim())
          .filter(Boolean)
      )];
    }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (value && typeof value === "object") return Object.values(value);

      return [];
    }

    function num(value, fallback = 0) {
      const n = Number(value);

      return Number.isFinite(n) ? n : fallback;
    }

    function fmt(value, decimals = 3) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return n.toFixed(decimals);
    }

    function fmtInt(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "0";

      return Math.round(n).toLocaleString();
    }

    function fmtPct(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return `${(n * 100).toFixed(1)}%`;
    }

    function fmtRawPct(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return `${n.toFixed(2)}%`;
    }

    function fmtPrice(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (n >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
      if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 4 });

      return n.toLocaleString(undefined, { maximumFractionDigits: 8 });
    }

    function fmtMoney(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (Math.abs(n) >= 1_000_000_000) return `${(n / 1_000_000_000).toFixed(2)}B`;
      if (Math.abs(n) >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
      if (Math.abs(n) >= 1_000) return `${(n / 1_000).toFixed(1)}K`;

      return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
    }

    function fmtTs(value) {
      if (!value) return "-";

      const n = Number(value);
      const date = Number.isFinite(n) ? new Date(n) : new Date(value);

      if (Number.isNaN(date.getTime())) return "-";

      return date.toLocaleString();
    }

    function ageText(ts) {
      const n = Number(ts);

      if (!Number.isFinite(n) || n <= 0) return "-";

      const seconds = Math.max(0, Math.floor((Date.now() - n) / 1000));

      if (seconds < 60) return `${seconds}s geleden`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m geleden`;

      return `${Math.floor(seconds / 3600)}u geleden`;
    }

    function baseSymbol(row = {}) {
      const raw = typeof row === "string"
        ? row
        : row.symbol || row.baseSymbol || row.coin || row.contractSymbol || row.instId || row.instrumentId || "";

      let symbol = String(raw).toUpperCase().replace(/[^A-Z0-9]/g, "");

      for (const suffix of ["USDTUMCBL", "USDCUMCBL", "USDTPERP", "USDCPERP", "USDT", "USDC", "BUSD", "PERP", "SWAP", "USD"]) {
        if (symbol.endsWith(suffix) && symbol.length > suffix.length) {
          symbol = symbol.slice(0, -suffix.length);
          break;
        }
      }

      return symbol || "COIN";
    }

    function microId(row = {}) {
      return row.microFamilyId || row.trueMicroFamilyId || row.liveMicroFamilyId || row.realMicroFamilyId || row.executionMicroFamilyId || row.id || row.key || "";
    }

    function macroId(row = {}) {
      return row.macroFamilyId || row.parentMacroFamilyId || row.parentMicroFamilyId || row.parentFamilyId || row.macroId || row.familyId || "";
    }

    function familyId(row = {}) {
      return row.familyId || row.family || row.baseFamilyId || "";
    }

    function completed(row = {}) {
      const outcome = Number(row.outcomeSample);
      if (Number.isFinite(outcome)) return outcome;

      const wins = num(row.wins ?? row.realWins, 0);
      const losses = num(row.losses ?? row.realLosses, 0);
      const flats = num(row.flats ?? row.realFlats, 0);
      const sum = wins + losses + flats;

      if (sum > 0) return sum;

      return num(row.completed ?? row.realCompleted, 0);
    }

    function observationSample(row = {}) {
      return Math.max(
        num(row.observationSample, 0),
        num(row.seen, 0),
        num(row.observations, 0),
        completed(row),
        0
      );
    }

    function friendlyApiMessage(error) {
      if (error?.timeout) return "API-timeout: request is afgebroken door de admin UI.";

      const status = Number(error?.status || 0);
      const raw = String(error?.message || error || "");

      if (status === 409 || raw.includes("LOCK")) return "Lock actief. Vorige run is nog bezig.";
      if (status === 504 || raw.includes("504")) return "Backend timeout op deze admin-route.";
      if (status === 500) return "Backend error op deze admin-route. Check server logs.";
      if (status === 404) return "Endpoint of micro-family detail niet gevonden.";

      return raw || "Onbekende API fout.";
    }

    function timeoutSignal(timeoutMs = state.apiTimeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      return {
        signal: controller.signal,
        clear: () => clearTimeout(timer)
      };
    }

    async function api(url, options = {}) {
      const timeout = timeoutSignal(options.timeoutMs || state.apiTimeoutMs);

      const headers = {
        accept: "application/json",
        ...(options.headers || {})
      };

      if (options.body !== undefined && !headers["content-type"]) {
        headers["content-type"] = "application/json";
      }

      try {
        const response = await fetch(url, {
          cache: "no-store",
          ...options,
          headers,
          signal: options.signal || timeout.signal
        });

        const rawText = await response.text();

        let data = {};

        try {
          data = rawText ? JSON.parse(rawText) : {};
        } catch {
          data = { raw: rawText };
        }

        if (!response.ok) {
          throw new ApiError(`${response.status} ${data.error || data.reason || response.statusText}`, {
            status: response.status,
            url,
            data
          });
        }

        return data;
      } catch (error) {
        if (error?.name === "AbortError") {
          throw new ApiError("REQUEST_ABORTED_TIMEOUT", {
            status: 0,
            url,
            timeout: true
          });
        }

        if (error instanceof ApiError) throw error;

        throw new ApiError(error?.message || String(error), {
          status: 0,
          url
        });
      } finally {
        timeout.clear();
      }
    }

    function table(rows, cols, emptyText = "Geen data.") {
      if (!Array.isArray(rows) || rows.length === 0) {
        return `<div class="empty">${escapeHtml(emptyText)}</div>`;
      }

      const head = cols.map((col) => `<th>${escapeHtml(col.label)}</th>`).join("");

      const body = rows.map((row, index) => {
        const cells = cols.map((col) => {
          const value = col.render
            ? col.render(row, index)
            : escapeHtml(row?.[col.key]);

          return `<td>${value}</td>`;
        }).join("");

        return `<tr>${cells}</tr>`;
      }).join("");

      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${head}</tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;

    function shortRows(rows = []) {
      return (Array.isArray(rows) ? rows : [])
        .filter(Boolean)
        .filter((row) => !isLongRow(row))
        .filter(isShortRow);
    }

    function extractRows(data, keys = []) {
      const rows = [];

      for (const key of keys) {
        if (Array.isArray(data?.[key])) rows.push(...data[key]);
      }

      return shortRows(rows);
    }

    function extractDeepMicroRows(data) {
      const output = [];
      const seenObjects = new Set();
      const seenIds = new Set();

      function add(row) {
        const id = microId(row);

        if (!id || seenIds.has(id)) return;
        if (!isShortRow(row)) return;

        seenIds.add(id);
        output.push(row);
      }

      function walk(value, depth = 0) {
        if (!value || typeof value !== "object" || depth > 5) return;
        if (seenObjects.has(value)) return;

        seenObjects.add(value);

        if (Array.isArray(value)) {
          value.forEach((row) => {
            if (row && typeof row === "object" && microId(row)) add(row);
            else walk(row, depth + 1);
          });
          return;
        }

        if (microId(value)) add(value);

        for (const key of [
          "best25MicroFamilies",
          "topMicroFamilies",
          "bestMicroFamilies",
          "shortRows",
          "rows",
          "microFamilies",
          "micros",
          "items",
          "data",
          "result",
          "payload",
          "balanced",
          "winrate",
          "totalR",
          "avgR",
          "directSL",
          "observed"
        ]) {
          walk(value[key], depth + 1);
        }
      }

      walk(data, 0);

      return shortRows(output);
    }

    async function fetchMicros() {
      const data = await api(microApiUrl(), {
        timeoutMs: 22000
      });

      const best = extractRows(data, ["best25MicroFamilies", "topMicroFamilies", "bestMicroFamilies"]);
      const direct = extractRows(data, ["shortRows", "rows", "microFamilies", "micros", "items"]);
      const deep = extractDeepMicroRows(data);

      const rows = best.length ? best : direct.length ? direct : deep;

      return {
        ...data,
        rows,
        bestRows: best,
        directRows: direct,
        deepRows: deep,
        activeMicroFamilyIds: uniqueStrings([
          data.activeMicroFamilyIds || [],
          data.activeRotation?.activeMicroFamilyIds || [],
          data.activeRotation?.microFamilyIds || []
        ]).filter(idAllowedInShortOnly),
        activeMacroFamilyIds: uniqueStrings([
          data.activeMacroFamilyIds || [],
          data.activeRotation?.activeMacroFamilyIds || [],
          data.activeRotation?.macroFamilyIds || []
        ]).filter(idAllowedInShortOnly)
      };
    }

            return `<span class="pill ${selected ? "active" : ""}">${selected ? "YES" : "NO"}</span>`;
          }},
          { label: "True micro", render: (row) => `<code>${escapeHtml(microId(row.payload || row) || "-")}</code>` },
          { label: "Macro", render: (row) => `<code>${escapeHtml(macroId(row.payload || row) || "-")}</code>` },
          { label: "Message", render: (row) => escapeHtml(row.message || row.content || row.result || "") }
        ], "Geen Discord logs.")}
      `;

      $("copyDiscordBtn")?.addEventListener("click", () => copyText(JSON.stringify(data, null, 2), "Discord JSON gekopieerd."));
      $("exportDiscordBtn")?.addEventListener("click", () => downloadJson("discord-logs.json", data));
    }

    function renderReset() {
      $("reset").innerHTML = `
        <div class="grid-3">
          <div class="card">
            <h3>Reset learning only</h3>
            <p class="metric-extra">
              Wist week learning. Active manual Discord selection, open virtual positions en scanner snapshots blijven staan.
            </p>
            <button type="button" class="warn" id="resetLearningBtn">Reset learning</button>
          </div>

          <div class="card">
            <h3>Reset manual selection</h3>
            <p class="metric-extra">
              Wist active/next rotation. Learning en virtual positions blijven staan.
            </p>
            <button type="button" class="warn" id="resetRotationBtn">Reset rotation</button>
          </div>

          <div class="card">
            <h3>Factory reset</h3>
            <p class="metric-extra">
              Wist scanner snapshots, trade memory, open positions, analyze stats en rotations.
            </p>
            <input id="factoryConfirm" style="width: 100%; margin-bottom: 8px;" placeholder="FACTORY_RESET_CONFIRMED" />
            <label style="display: block; margin-bottom: 8px;">
              <input id="factoryForce" type="checkbox" />
              force even with open positions
            </label>
            <button type="button" class="danger" id="factoryResetBtn">Factory reset</button>
          </div>
        </div>

        <div class="card">
          <h3>Reset result</h3>
          <pre id="resetResult">Nog geen reset uitgevoerd.</pre>
        </div>
      `;

      $("resetLearningBtn")?.addEventListener("click", postResetLearning);
      $("resetRotationBtn")?.addEventListener("click", postResetRotation);
      $("factoryResetBtn")?.addEventListener("click", postFactoryReset);
    }

    async function postResetLearning() {
      const confirmValue = prompt("Typ RESET_LEARNING om learning te wissen.");

      if (confirmValue !== "RESET_LEARNING") return;

      try {
        const data = await api(endpoints.resetLearning, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify({
            confirm: "RESET_LEARNING",
            confirmed: "RESET_LEARNING",
            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,
            shortOnly: true,
            longDisabled: true
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("Learning reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    async function postResetRotation() {
      const confirmValue = prompt("Typ RESET_ROTATION om manual Discord selection te wissen.");

      if (confirmValue !== "RESET_ROTATION") return;

      try {
        const data = await api(endpoints.resetRotation, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify({
            confirm: "RESET_ROTATION",
            confirmed: "RESET_ROTATION",
            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,
            shortOnly: true,
            longDisabled: true
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("Rotation reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    async function postFactoryReset() {
      const confirmValue = $("factoryConfirm").value.trim();
      const force = $("factoryForce").checked;

      if (confirmValue !== "FACTORY_RESET_CONFIRMED") {
        setMessage("Factory reset geblokkeerd: bevestiging is niet exact FACTORY_RESET_CONFIRMED.", "error");
        return;
      }

      if (!confirm("FACTORY RESET wist alles. Doorgaan?")) return;

      try {
        const data = await api(endpoints.factoryReset, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify({
            confirm: "FACTORY_RESET_CONFIRMED",
            confirmed: "FACTORY_RESET_CONFIRMED",
            force,
            forceClosePositions: force,

            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,

            shortOnly: true,
            longDisabled: true
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("Factory reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    function showTab(id) {
      const next = tabs.includes(id) ? id : "overview";

      state.activeTab = next;

      document.querySelectorAll(".panel").forEach((panel) => panel.classList.add("hidden"));
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));

      $(next).classList.remove("hidden");
      document.querySelector(`[data-tab="${next}"]`)?.classList.add("active");

      location.hash = next;
      refresh(next);
    }

    function renderSoftError(tab, error) {
      const message = friendlyApiMessage(error);

      setMessage(message, "warn");

      $(tab).innerHTML = `
        <div class="card">
          <h3>Niet geladen</h3>
          <div class="empty">${escapeHtml(message)}</div>
        </div>
      `;
    }

    async function refresh(tab = state.activeTab) {
      setMessage("");
      $("liveLabel").textContent = `SHORT-only virtual learning · ${new Date().toLocaleTimeString()}`;

      try {
        if (tab === "overview") return await renderOverview();
        if (tab === "scanner") return await renderScanner();
        if (tab === "trade") return await renderTrade();
        if (tab === "micros") return await renderMicros();
        if (tab === "rotation") return await renderRotation();
        if (tab === "discord") return await renderDiscord();
        if (tab === "reset") return renderReset();
      } catch (error) {
        renderSoftError(tab, error);
      }
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => showTab(button.dataset.tab));
    });

    $("refreshBtn").addEventListener("click", () => refresh(state.activeTab));

    window.addEventListener("error", (event) => {
      setMessage(event.message || "Browser error", "error");
    });

    window.addEventListener("unhandledrejection", (event) => {
      setMessage(friendlyApiMessage(event.reason), "warn");
    });

    const initialTab = location.hash.replace("#", "") || "overview";
    showTab(tabs.includes(initialTab) ? initialTab : "overview");
  </script>
</body>
</html>
