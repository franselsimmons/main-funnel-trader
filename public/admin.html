<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SHORT Micro-Micro Learning Admin</title>

  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --dark: #0f172a;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --blue: #2563eb;
      --purple: #7c3aed;
      --shadow: 0 2px 12px rgba(15, 23, 42, 0.07);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(220, 38, 38, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(15, 23, 42, 0.12), transparent 32%),
        var(--bg);
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 14px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: 0.14s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    button.primary { background: var(--dark); color: white; border-color: var(--dark); }
    button.success { background: var(--green); color: white; border-color: var(--green); }
    button.warn { background: var(--amber); color: white; border-color: var(--amber); }
    button.danger { background: var(--red); color: white; border-color: var(--red); }
    button.short-action { background: var(--red); color: white; border-color: var(--red); }
    button.small { padding: 6px 9px; border-radius: 9px; font-size: 12px; }

    select,
    input,
    textarea {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      min-height: 42px;
    }

    input[type="search"] { min-width: 360px; }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      line-height: 1.45;
    }

    header {
      background: linear-gradient(135deg, #0f172a 0%, #111827 46%, #7f1d1d 100%);
      color: white;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-inner {
      max-width: 1540px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #dc2626, #fca5a5);
      box-shadow: 0 12px 32px rgba(220, 38, 38, 0.30);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-title strong {
      display: block;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: #cbd5e1;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #fca5a5;
      box-shadow: 0 0 0 4px rgba(252, 165, 165, 0.18);
    }

    main {
      max-width: 1540px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(243, 245, 249, 0.88);
      backdrop-filter: blur(14px);
      padding: 10px 0;
    }

    .tab {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.80);
      border-color: rgba(203, 213, 225, 0.90);
    }

    .tab.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .hidden,
    .panel.hidden {
      display: none;
    }

    .message {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
    }

    .message.ok { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .message.error { color: #991b1b; background: #fee2e2; border-color: #fecaca; }
    .message.warn { color: #92400e; background: #fef3c7; border-color: #fde68a; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #334155;
    }

    .metric-card {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .metric-extra {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin: 12px 0 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .pill.active { background: #dcfce7; color: #166534; }
    .pill.short { background: #fee2e2; color: #991b1b; }
    .pill.danger { background: #fee2e2; color: #991b1b; }
    .pill.warn { background: #fef3c7; color: #92400e; }
    .pill.info { background: #dbeafe; color: #1d4ed8; }
    .pill.purple { background: #ede9fe; color: #5b21b6; }
    .pill.dark { background: #0f172a; color: white; }
    .pill.soft { background: #e0f2fe; color: #075985; }
    .pill.observation { background: #fef9c3; color: #854d0e; }
    .pill.raw { background: #f1f5f9; color: #475569; }
    .pill.fit { background: #dcfce7; color: #166534; }
    .pill.weakfit { background: #ccfbf1; color: #0f766e; }
    .pill.neutral { background: #f1f5f9; color: #475569; }
    .pill.misfit { background: #fee2e2; color: #991b1b; }
    .pill.clean { background: #dcfce7; color: #166534; }
    .pill.legacy { background: #ffedd5; color: #9a3412; }
    .pill.mm { background: #ede9fe; color: #5b21b6; }

    .score-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .score-bar > span {
      display: block;
      height: 100%;
      width: var(--w);
      background: linear-gradient(90deg, #dc2626, #fca5a5);
      border-radius: inherit;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1540px;
      background: white;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td { background: #f8fafc; }

    code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 3px 5px;
      border-radius: 6px;
      color: #334155;
      white-space: nowrap;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1020;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 16px;
      max-height: 520px;
      overflow: auto;
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.48;
    }

    .api-url-box {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .api-url-box code {
      white-space: normal;
      word-break: break-all;
    }

    .api-output-textarea {
      width: 100%;
      min-height: 360px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      background: #0b1020;
      color: #e5e7eb;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 14px;
      white-space: pre;
      user-select: all;
    }

    .api-output-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .api-output-head h3 { margin: 0; }

    .copy-big {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
      font-weight: 800;
    }

    .micro-desktop-table table { min-width: 1540px; }

    .micro-id-cell {
      max-width: 420px;
      white-space: normal;
      word-break: break-word;
    }

    .micro-id-cell code {
      white-space: normal;
      word-break: break-all;
      line-height: 1.5;
    }

    .micro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .micro-mobile-cards { display: none; }

    .micro-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .micro-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .micro-card-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .micro-id-button {
      width: 100%;
      text-align: left;
      padding: 10px;
      border-radius: 14px;
      margin: 8px 0;
      background: #f8fafc;
    }

    .micro-id-button code {
      white-space: normal;
      word-break: break-all;
      line-height: 1.55;
      font-size: 12px;
    }

    .micro-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .micro-stat-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px;
    }

    .micro-stat-box span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .micro-stat-box strong {
      display: block;
      font-size: 14px;
      word-break: break-word;
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.70);
    }

    .coin-card,
    .manual-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .coin-card::before,
    .manual-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #dc2626, #fca5a5);
    }

    .coin-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .coin-symbol {
      font-weight: 850;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .coin-name {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .coin-price { text-align: right; }
    .coin-price strong { display: block; font-size: 16px; }
    .coin-price span { display: block; color: var(--muted); font-size: 12px; margin-top: 3px; }

    .coin-stats,
    .manual-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .coin-stat,
    .manual-stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px;
    }

    .coin-stat span,
    .manual-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
      font-weight: 700;
    }

    .coin-stat strong,
    .manual-stat strong {
      font-size: 13px;
      word-break: break-word;
    }

    .coin-foot {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }

    .manual-card {
      max-width: 1180px;
      margin-bottom: 14px;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(900px, 94vw);
      background: white;
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 42px rgba(15, 23, 42, 0.18);
      padding: 20px;
      overflow: auto;
      z-index: 30;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    @media (max-width: 1180px) {
      .grid,
      .coin-grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
      .grid-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      header { padding: 18px 14px; }
      .header-inner { flex-direction: column; }
      main { padding: 14px; }
      .grid,
      .coin-grid { grid-template-columns: 1fr; }
      .tab { flex: 1 1 auto; padding: 9px 10px; }
      input[type="search"] { min-width: 100%; }
      .manual-grid,
      .coin-stats { grid-template-columns: repeat(2, 1fr); }
      .micro-desktop-table { display: none; }
      .micro-mobile-cards { display: block; }
      .api-output-textarea { min-height: 420px; font-size: 11px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="brand-title">
        <div class="brand-logo">MM</div>
        <div>
          <strong>SHORT Micro-Micro Learning Admin</strong>
          <div class="brand-subtitle">
            Parent 15 en 75-child blijven alleen context. Dashboard toont/selecteert uitsluitend micro-micro execution profiles.
          </div>
        </div>
      </div>

      <div class="header-actions">
        <div class="live-pill">
          <span class="live-dot"></span>
          <span id="liveLabel">SHORT-only · micro-micro only · clean measurement</span>
        </div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="overview">Overview</button>
      <button type="button" class="tab" data-tab="market">marketWeather.js</button>
      <button type="button" class="tab" data-tab="scanner">Scanner</button>
      <button type="button" class="tab" data-tab="trade">TradeSystem</button>
      <button type="button" class="tab" data-tab="micros">Micro-Micro</button>
      <button type="button" class="tab" data-tab="rotation">Manual Discord Selection</button>
      <button type="button" class="tab" data-tab="discord">Discord Logs</button>
      <button type="button" class="tab" data-tab="reset">Reset</button>
    </div>

    <div id="message"></div>

    <section id="overview" class="panel"></section>
    <section id="market" class="panel hidden"></section>
    <section id="scanner" class="panel hidden"></section>
    <section id="trade" class="panel hidden"></section>
    <section id="micros" class="panel hidden"></section>
    <section id="rotation" class="panel hidden"></section>
    <section id="discord" class="panel hidden"></section>
    <section id="reset" class="panel hidden"></section>
  </main>

  <div id="drawer" class="drawer hidden"></div>

  <script>
    const ONLY_SIDE = "SHORT";
    const OPPOSITE_SIDE = "LONG";
    const DASHBOARD_SIDE = "bear";
    const SHORT_NAMESPACE = "SHORT";
    const SHORT_KEY_PREFIX = "SHORT:";
    const PERSISTENT_LEARNING_KEY = "SHORT_LIVE";

    const MIN_COMPLETED_ACTIVE_LEARNING = 20;
    const MIN_COMPLETED_MICRO_MICRO_ACTIVE = 6;
    const MAX_ACTIVE_DISCORD_MICRO_FAMILIES = 2;
    const DEFAULT_POSITION_TIME_STOP_MIN = 720;

    const TRUE_MICRO_SCHEMA = "FIXED_TAXONOMY_75";
    const PARENT_TRUE_MICRO_SCHEMA = "FIXED_TAXONOMY_15";
    const MICRO_MICRO_SCHEMA = "FIXED_TAXONOMY_MICRO_MICRO_V1";
    const MICRO_MICRO_VERSION = "SHORT_PARENT_15_MICRO_75_MICRO_MICRO_ONLY_SELECTION_V1";

    const MICRO_SHORT_PREFIX = "MICRO_SHORT_";
    const MICRO_MICRO_PREFIX = "MM_SHORT_";
    const MICRO_MICRO_MARKER = "_MM_";

    const LEARNING_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_X_CONFIRMATION_V1";
    const PARENT_LEARNING_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_V1";
    const MICRO_MICRO_LEARNING_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_X_CONFIRMATION_X_EXECUTION_CONTEXT_V1";

    const SHORT_RISK_PLAN_VERSION = "SHORT_ADAPTIVE_RR_TP_SL_V2";
    const POSITION_COST_MODEL_VERSION = "POSITION_ENGINE_SHORT_NET_COST_V11";
    const MEASUREMENT_FIX_VERSION = "SHORT_MEASUREMENT_FIX_CANDLE_FIRST_TOUCH_MICRO_MICRO_V1";
    const OBSERVATION_DEDUPE_VERSION = "SHORT_OBS_DEDUPE_SNAPSHOT_SYMBOL_MICRO_ENTRY_V2";
    const OUTCOME_DEDUPE_VERSION = "SHORT_OUTCOME_DEDUPE_CLOSED_POSITION_V3";
    const ADAPTIVE_UI_VERSION = "SHORT_ADAPTIVE_UI_MARKETWEATHER_CURRENTFIT_MICRO_MICRO_ONLY_V3";

    const SHORT_FIXED_SETUP_TYPES = [
      "BREAKOUT",
      "RETEST",
      "SWEEP_REVERSAL",
      "CONTINUATION",
      "COMPRESSION"
    ];

    const SHORT_FIXED_REGIME_BUCKETS = [
      "TREND",
      "CHOP",
      "SQUEEZE"
    ];

    const SHORT_FIXED_CONFIRMATION_PROFILES = [
      "A_STRONG_ALIGN",
      "B_FLOW_ALIGN",
      "C_VOLUME_ALIGN",
      "D_MIXED_OK",
      "E_WEAK_CONTRA"
    ];

    const SHORT_FIXED_SETUP_SET = new Set(SHORT_FIXED_SETUP_TYPES);
    const SHORT_FIXED_REGIME_SET = new Set(SHORT_FIXED_REGIME_BUCKETS);
    const SHORT_FIXED_CONFIRMATION_SET = new Set(SHORT_FIXED_CONFIRMATION_PROFILES);

    const state = {
      activeTab: "overview",
      overview: null,
      market: null,
      scanner: null,
      trade: null,
      micros: null,
      rotation: null,
      discord: null,
      microMode: "adaptive",
      microSearch: "",
      apiTimeoutMs: 22000,
      microLimit: 260,
      bestLimit: 200
    };

    const endpoints = {
      overview: "/api/admin/overview",
      market: "/api/admin/market-weather",
      scanner: "/api/admin/scanner",
      trade: "/api/admin/trade",
      micros: "/api/admin/micro-families",
      rotation: "/api/admin/rotation",
      discord: "/api/admin/discord-logs",
      microDetail: "/api/admin/micro-family",
      runScanner: "/api/scanner/run?force=true",
      runTrade: "/api/trade/run?force=true&forceProcessSnapshot=true",
      resetLearning: "/api/admin/reset-learning",
      resetRotation: "/api/admin/reset-rotation",
      factoryReset: "/api/admin/factory-reset"
    };

    const tabs = ["overview", "market", "scanner", "trade", "micros", "rotation", "discord", "reset"];

    const validMicroModes = [
      "adaptive",
      "clean",
      "winrate",
      "totalR",
      "avgR",
      "directSL",
      "observed",
      "cost",
      "currentFit"
    ];

    const $ = (id) => document.getElementById(id);

    class ApiError extends Error {
      constructor(message, details = {}) {
        super(message);
        this.name = "ApiError";
        this.status = details.status || 0;
        this.url = details.url || "";
        this.data = details.data || null;
        this.timeout = Boolean(details.timeout);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function upper(value) {
      return String(value || "").trim().toUpperCase();
    }

    function lower(value) {
      return String(value || "").trim().toLowerCase();
    }

    function num(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function firstFinite(...values) {
      for (const value of values) {
        const n = Number(value);
        if (Number.isFinite(n)) return n;
      }
      return null;
    }

    function clamp(value, min, max) {
      const n = Number(value);
      if (!Number.isFinite(n)) return min;
      return Math.max(min, Math.min(max, n));
    }

    function normalizePctFraction(value, fallback = 0) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      if (Math.abs(n) > 1.5) return n / 100;
      return n;
    }

    function fmt(value, decimals = 3) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return n.toFixed(decimals);
    }

    function fmtInt(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "0";
      return Math.round(n).toLocaleString();
    }

    function fmtPct(value) {
      const n = normalizePctFraction(value, NaN);
      if (!Number.isFinite(n)) return "-";
      return `${(n * 100).toFixed(1)}%`;
    }

    function fmtRawPct(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return `${n.toFixed(2)}%`;
    }

    function fmtPrice(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      if (n >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
      if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 4 });
      return n.toLocaleString(undefined, { maximumFractionDigits: 8 });
    }

    function fmtMoney(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      if (Math.abs(n) >= 1_000_000_000) return `${(n / 1_000_000_000).toFixed(2)}B`;
      if (Math.abs(n) >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
      if (Math.abs(n) >= 1_000) return `${(n / 1_000).toFixed(1)}K`;
      return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
    }

    function fmtTs(value) {
      if (!value) return "-";
      const n = Number(value);
      const date = Number.isFinite(n) ? new Date(n) : new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString();
    }

    function ageText(ts) {
      const n = Number(ts);
      if (!Number.isFinite(n) || n <= 0) return "-";

      const seconds = Math.max(0, Math.floor((Date.now() - n) / 1000));
      if (seconds < 60) return `${seconds}s geleden`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m geleden`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}u geleden`;
      return `${Math.floor(seconds / 86400)}d geleden`;
    }

    function jsonBlock(data) {
      return `<pre>${escapeHtml(JSON.stringify(data ?? null, null, 2))}</pre>`;
    }

    function setMessage(message = "", type = "") {
      $("message").innerHTML = message
        ? `<div class="message ${escapeAttr(type)}">${escapeHtml(message)}</div>`
        : "";
    }

    function showLoading(tabId, label = "Laden...") {
      $(tabId).innerHTML = `
        <div class="card">
          <h3>${escapeHtml(label)}</h3>
          <div class="empty">Data ophalen voor ${escapeHtml(tabId)}...</div>
        </div>
      `;
    }

    function metricCard(label, value, extra = "") {
      return `
        <div class="card metric-card">
          <div class="metric-label">${escapeHtml(label)}</div>
          <div>
            <div class="metric-value">${escapeHtml(value)}</div>
            ${extra ? `<div class="metric-extra">${escapeHtml(extra)}</div>` : ""}
          </div>
        </div>
      `;
    }

    function scoreBar(value, min = 0, max = 100) {
      const n = Number(value);
      const width = Number.isFinite(n)
        ? Math.max(0, Math.min(100, ((n - min) / (max - min)) * 100))
        : 0;

      return `<div class="score-bar"><span style="--w:${width.toFixed(1)}%"></span></div>`;
    }

    function cleanSideText(value = "") {
      return upper(value)
        .replaceAll("LONG_DISABLED_TRUE", "SHORT")
        .replaceAll("LONGDISABLED_TRUE", "SHORT")
        .replaceAll("BLOCK_LONG_TRUE", "SHORT")
        .replaceAll("LONG_DISABLED_FALSE", "")
        .replaceAll("LONGDISABLED_FALSE", "")
        .replaceAll("BLOCK_LONG_FALSE", "")
        .replaceAll("LONG_ENABLED_FALSE", "")
        .replaceAll("LONG_ONLY_FALSE", "")
        .replaceAll("SHORT_DISABLED_FALSE", "")
        .replaceAll("SHORTDISABLED_FALSE", "")
        .replaceAll("BLOCK_SHORT_FALSE", "")
        .replaceAll("SHORT_ENABLED_FALSE", "")
        .replaceAll("SHORT_ONLY_FALSE", "")
        .replaceAll("LONG_DISABLED_SHORT_ONLY", "SHORT")
        .replaceAll("LONGDISABLED_SHORT_ONLY", "SHORT")
        .replaceAll("BLOCK_LONG", "SHORT")
        .replaceAll("LONG_DISABLED", "SHORT")
        .replaceAll("LONGDISABLED", "SHORT")
        .replaceAll("SHORT_DISABLED_LONG_ONLY", "LONG")
        .replaceAll("SHORTDISABLED_LONG_ONLY", "LONG")
        .replaceAll("BLOCK_SHORT", "LONG")
        .replaceAll("SHORT_DISABLED", "LONG")
        .replaceAll("SHORTDISABLED", "LONG")
        .replaceAll("SHORT_ONLY_MODE", "SHORT")
        .replaceAll("SHORT_ONLY", "SHORT")
        .replaceAll("SHORT-ONLY", "SHORT")
        .replaceAll("LONG_ONLY_MODE", "LONG")
        .replaceAll("LONG_ONLY", "LONG")
        .replaceAll("LONG-ONLY", "LONG");
    }

    function normalizeSide(value) {
      const raw = cleanSideText(value);
      if (["SHORT", "BEAR", "BEARISH", "SELL", "DOWN", "DOWNSIDE"].includes(raw)) return ONLY_SIDE;
      if (["LONG", "BULL", "BULLISH", "BUY", "UP", "UPSIDE"].includes(raw)) return OPPOSITE_SIDE;
      return "UNKNOWN";
    }

    function hasShortSignal(value = "") {
      const text = ` ${cleanSideText(value)} `;
      return (
        text.includes("MICRO_SHORT_") ||
        text.includes("MM_SHORT_") ||
        text.includes("TRADESIDE=SHORT") ||
        text.includes("TRADE_SIDE=SHORT") ||
        text.includes("POSITION_SIDE=SHORT") ||
        text.includes("POSITIONSIDE=SHORT") ||
        text.includes("SIDE=SHORT") ||
        text.includes("SIDE=BEAR") ||
        text.includes("SIDE=SELL") ||
        text.includes("DIRECTION=SHORT") ||
        text.includes("DIRECTION=BEAR") ||
        text.includes("DIRECTION=SELL") ||
        text.includes(" SHORT ") ||
        text.includes("_SHORT_") ||
        text.includes("|SHORT|") ||
        text.includes(":SHORT") ||
        text.includes("=SHORT")
      );
    }

    function hasLongSignal(value = "") {
      const text = ` ${cleanSideText(value)} `;
      return (
        text.includes("MICRO_LONG_") ||
        text.includes("MM_LONG_") ||
        text.includes("TRADESIDE=LONG") ||
        text.includes("TRADE_SIDE=LONG") ||
        text.includes("POSITION_SIDE=LONG") ||
        text.includes("POSITIONSIDE=LONG") ||
        text.includes("SIDE=LONG") ||
        text.includes("SIDE=BULL") ||
        text.includes("SIDE=BUY") ||
        text.includes("DIRECTION=LONG") ||
        text.includes("DIRECTION=BULL") ||
        text.includes("DIRECTION=BUY") ||
        text.includes(" LONG ") ||
        text.includes("_LONG_") ||
        text.includes("|LONG|") ||
        text.includes(":LONG") ||
        text.includes("=LONG")
      );
    }

    function isScannerFingerprintId(id = "") {
      const value = upper(id);
      return (
        value.startsWith("MICRO_SHORT_SCANNER__") ||
        value.includes("MICRO_SHORT_SCANNER__") ||
        value.startsWith("SHORT_SCANNER_") ||
        value.includes("SHORT_SCANNER_") ||
        value.startsWith("MICRO_LONG_SCANNER__") ||
        value.includes("MICRO_LONG_SCANNER__") ||
        value.startsWith("LONG_SCANNER_") ||
        value.includes("LONG_SCANNER_") ||
        value.includes("__SCANNER__") ||
        value.includes("SCANNER_GATE_PASS") ||
        value.includes("SCANNER_GATE_FAIL")
      );
    }

    function isExecutionFingerprintId(id = "") {
      const value = upper(id);

      if (value.startsWith(MICRO_MICRO_PREFIX)) return false;
      if (value.startsWith(MICRO_SHORT_PREFIX) && value.includes(MICRO_MICRO_MARKER)) return false;

      return (
        value.includes("_XR_") ||
        value.includes("__XR__") ||
        value.includes("|XR|") ||
        value.includes("EXECUTION_FINGERPRINT") ||
        value.includes("EXECUTION_MICRO") ||
        value.includes("EXECUTIONMICRO") ||
        value.includes("REFINED_EXECUTION")
      );
    }

    function parseBodySetupRegimeConfirmation(body = "") {
      const cleanBody = upper(body).replace(/^_+|_+$/g, "");

      for (const regime of SHORT_FIXED_REGIME_BUCKETS) {
        const marker = `_${regime}`;
        const idx = cleanBody.indexOf(marker);

        if (idx < 0) continue;

        const setup = cleanBody.slice(0, idx);
        let rest = cleanBody.slice(idx + marker.length).replace(/^_+/, "");

        if (!SHORT_FIXED_SETUP_SET.has(setup)) continue;

        if (!rest) {
          return {
            ok: true,
            setup,
            regime,
            confirmation: null,
            rest: ""
          };
        }

        for (const profile of SHORT_FIXED_CONFIRMATION_PROFILES) {
          if (rest === profile) {
            return {
              ok: true,
              setup,
              regime,
              confirmation: profile,
              rest: ""
            };
          }

          if (rest.startsWith(`${profile}_`)) {
            return {
              ok: true,
              setup,
              regime,
              confirmation: profile,
              rest: rest.slice(profile.length + 1)
            };
          }
        }
      }

      return {
        ok: false,
        setup: null,
        regime: null,
        confirmation: null,
        rest: ""
      };
    }

    function parseExactShortId(id = "") {
      const raw = upper(id);
      if (!raw) return null;
      if (isScannerFingerprintId(raw)) return null;
      if (isExecutionFingerprintId(raw)) return null;

      let body = "";
      let microMicroContext = "";
      let explicitMicroMicro = false;
      let mode = "UNKNOWN";

      if (raw.startsWith(MICRO_MICRO_PREFIX)) {
        mode = "MM_SHORT_PREFIX";
        explicitMicroMicro = true;
        body = raw.slice(MICRO_MICRO_PREFIX.length);
      } else if (raw.startsWith(MICRO_SHORT_PREFIX)) {
        mode = "MICRO_SHORT_BASE";
        body = raw.slice(MICRO_SHORT_PREFIX.length);

        const mmIndex = body.lastIndexOf(MICRO_MICRO_MARKER);

        if (mmIndex > -1) {
          mode = "MICRO_SHORT_SUFFIX_MM";
          explicitMicroMicro = true;

          const baseBody = body.slice(0, mmIndex);
          microMicroContext = body.slice(mmIndex + MICRO_MICRO_MARKER.length);

          body = microMicroContext
            ? `${baseBody}_${microMicroContext}`
            : baseBody;
        }
      } else {
        return null;
      }

      const parsed = parseBodySetupRegimeConfirmation(body);
      if (!parsed.ok) return null;

      const parentTrueMicroFamilyId = `MICRO_SHORT_${parsed.setup}_${parsed.regime}`;
      const childTrueMicroFamilyId = parsed.confirmation
        ? `${parentTrueMicroFamilyId}_${parsed.confirmation}`
        : "";

      const isParent = Boolean(!parsed.confirmation && mode === "MICRO_SHORT_BASE");
      const isChild75 = Boolean(parsed.confirmation && mode === "MICRO_SHORT_BASE" && !parsed.rest);
      const isMicroMicro = Boolean(parsed.confirmation && (explicitMicroMicro || parsed.rest));

      const microMicroFamilyId = isMicroMicro ? raw : "";
      const context = parsed.rest || microMicroContext || "";

      return {
        valid: true,
        rawId: raw,
        setup: parsed.setup,
        regime: parsed.regime,
        confirmation: parsed.confirmation,
        confirmationProfile: parsed.confirmation,
        context,
        parentTrueMicroFamilyId,
        childTrueMicroFamilyId,
        base75ChildTrueMicroFamilyId: childTrueMicroFamilyId,
        microMicroFamilyId,
        isParent,
        isChild75,
        isChild: isChild75,
        isMicroMicro,
        selectionLayer: isMicroMicro ? "MICRO_MICRO" : isChild75 ? "CHILD_75" : isParent ? "PARENT_15" : "UNKNOWN",
        schema: isMicroMicro ? MICRO_MICRO_SCHEMA : isChild75 ? TRUE_MICRO_SCHEMA : PARENT_TRUE_MICRO_SCHEMA
      };
    }

    function isParent15Id(id = "") {
      return parseExactShortId(id)?.isParent === true;
    }

    function isChild75Id(id = "") {
      return parseExactShortId(id)?.isChild75 === true;
    }

    function isMicroMicroId(id = "") {
      return parseExactShortId(id)?.isMicroMicro === true;
    }

    function validLearningId(id = "") {
      const value = String(id || "").trim();
      if (!value) return false;
      if (isScannerFingerprintId(value)) return false;
      if (isExecutionFingerprintId(value)) return false;
      return Boolean(parseExactShortId(value));
    }

    function idAllowedInShortOnly(id = "") {
      return validLearningId(id) && isMicroMicroId(id);
    }

    function parentIdAllowedInShortOnly(id = "") {
      return validLearningId(id) && isParent15Id(id);
    }

    function parentFromAnyMicroId(id = "") {
      return parseExactShortId(id)?.parentTrueMicroFamilyId || "";
    }

    function base75FromAnyMicroId(id = "") {
      return parseExactShortId(id)?.base75ChildTrueMicroFamilyId || "";
    }

    function inferSide(input = {}) {
      if (typeof input === "string") {
        const direct = normalizeSide(input);
        if (direct !== "UNKNOWN") return direct;

        const parsed = parseExactShortId(input);
        if (parsed?.valid && !upper(input).includes("MICRO_LONG_")) return ONLY_SIDE;

        const shortSignal = hasShortSignal(input);
        const longSignal = hasLongSignal(input);

        if (shortSignal && !longSignal) return ONLY_SIDE;
        if (longSignal) return OPPOSITE_SIDE;

        return "UNKNOWN";
      }

      if (!input || typeof input !== "object") return "UNKNOWN";

      const directFields = [
        input.tradeSide,
        input.targetTradeSide,
        input.positionSide,
        input.direction,
        input.scannerSide,
        input.actualScannerSide,
        input.analysisSide,
        input.signalSide,
        input.entrySide,
        input.dashboardSide,
        input.side,
        input.bias,
        input.marketBias
      ];

      for (const field of directFields) {
        const direct = normalizeSide(field);
        if (direct !== "UNKNOWN") return direct;
      }

      const haystack = [
        input.familyId,
        input.family,
        input.baseFamilyId,
        input.parentTrueMicroFamilyId,
        input.microFamilyId,
        input.trueMicroFamilyId,
        input.childTrueMicroFamilyId,
        input.base75ChildTrueMicroFamilyId,
        input.microMicroFamilyId,
        input.trueMicroMicroFamilyId,
        input.selectedMicroMicroFamilyId,
        input.exactMicroMicroFamilyId,
        input.executionMicroMicroFamilyId,
        input.coarseMicroFamilyId,
        input.liveMicroFamilyId,
        input.realMicroFamilyId,
        input.executionMicroFamilyId,
        input.analyzeMicroFamilyId,
        input.learningMicroFamilyId,
        input.id,
        input.key,
        input.macroFamilyId,
        input.parentMacroFamilyId,
        input.parentMicroFamilyId,
        input.parentFamilyId,
        input.macroId,
        input.definition,
        input.microDefinition,
        input.microMicroDefinition,
        input.macroDefinition,
        input.parentDefinition,
        input.scannerReason,
        input.reason,
        input.signalReason,
        input.actionReason,
        input.exitReason,
        input.rejectionReason,
        Array.isArray(input.definitionParts) ? input.definitionParts.join("|") : "",
        Array.isArray(input.microDefinitionParts) ? input.microDefinitionParts.join("|") : "",
        Array.isArray(input.microMicroDefinitionParts) ? input.microMicroDefinitionParts.join("|") : "",
        Array.isArray(input.macroDefinitionParts) ? input.macroDefinitionParts.join("|") : "",
        Array.isArray(input.parentDefinitionParts) ? input.parentDefinitionParts.join("|") : "",
        Array.isArray(input.microMicroContextParts) ? input.microMicroContextParts.join("|") : ""
      ].join(" | ");

      const parsedAny = parseExactShortId(haystack);
      if (parsedAny?.valid && !haystack.includes("MICRO_LONG_")) return ONLY_SIDE;

      const shortSignal = hasShortSignal(haystack);
      const longSignal = hasLongSignal(haystack);

      if (shortSignal && !longSignal) return ONLY_SIDE;
      if (longSignal) return OPPOSITE_SIDE;

      if (
        input.shortOnly === true ||
        input.longDisabled === true ||
        input.targetTradeSide === ONLY_SIDE ||
        input.tradeSide === ONLY_SIDE ||
        input.dashboardSide === DASHBOARD_SIDE
      ) {
        return ONLY_SIDE;
      }

      if (input.longOnly === true || input.shortDisabled === true) {
        return OPPOSITE_SIDE;
      }

      return "UNKNOWN";
    }

    function microId(row = {}) {
      if (typeof row === "string") return upper(row);

      const candidates = [
        row.microMicroFamilyId,
        row.trueMicroMicroFamilyId,
        row.selectedMicroMicroFamilyId,
        row.exactMicroMicroFamilyId,
        row.executionMicroMicroFamilyId,
        row.microMicroId,
        row.trueMicroFamilyId,
        row.learningMicroFamilyId,
        row.analyzeMicroFamilyId,
        row.microFamilyId,
        row.id,
        row.key
      ];

      for (const value of candidates) {
        const id = upper(value);
        if (id && isMicroMicroId(id)) return id;
      }

      for (const value of candidates) {
        const id = upper(value);
        if (id) return id;
      }

      return "";
    }

    function fallbackAnyMicroId(row = {}) {
      return String(
        microId(row) ||
        row.trueMicroFamilyId ||
        row.childTrueMicroFamilyId ||
        row.microFamilyId ||
        row.analyzeMicroFamilyId ||
        row.learningMicroFamilyId ||
        row.liveMicroFamilyId ||
        row.realMicroFamilyId ||
        ""
      ).trim().toUpperCase();
    }

    function base75MicroId(row = {}) {
      const id = microId(row);
      return String(
        row.base75ChildTrueMicroFamilyId ||
        row.childTrueMicroFamilyId ||
        row.baseTrueMicroFamilyId ||
        row.parentChildTrueMicroFamilyId ||
        base75FromAnyMicroId(id) ||
        base75FromAnyMicroId(fallbackAnyMicroId(row)) ||
        ""
      ).trim().toUpperCase();
    }

    function parentMicroId(row = {}) {
      const id = microId(row);
      return String(
        row.parentTrueMicroFamilyId ||
        row.parentMicroFamilyId ||
        row.parentMacroFamilyId ||
        row.coarseMicroFamilyId ||
        row.baseMicroFamilyId ||
        row.legacyMicroFamilyId ||
        parentFromAnyMicroId(id) ||
        parentFromAnyMicroId(base75MicroId(row)) ||
        parentFromAnyMicroId(fallbackAnyMicroId(row)) ||
        ""
      ).trim().toUpperCase();
    }

    function microLayer(row = {}) {
      return isMicroMicroId(microId(row)) ? "MICRO_MICRO" : "HIDDEN_NON_MICRO_MICRO";
    }

    function microLayerPill(row = {}) {
      return isMicroMicroId(microId(row))
        ? '<span class="pill mm">MICRO-MICRO</span>'
        : '<span class="pill raw">HIDDEN</span>';
    }

    function rowMeasurementFixVersion(row = {}) {
      return String(
        row.measurementFixVersion ||
        row.measurementVersion ||
        row.positionMeasurementFixVersion ||
        row.measurementProfile ||
        ""
      ).trim();
    }

    function rowRiskPlanVersion(row = {}) {
      return String(
        row.riskPlanVersion ||
        row.shortRiskPlanVersion ||
        row.riskVersion ||
        ""
      ).trim();
    }

    function rowCostModelVersion(row = {}) {
      return String(
        row.costModelVersion ||
        row.positionCostModelVersion ||
        row.costVersion ||
        ""
      ).trim();
    }

    function rowObservationDedupeVersion(row = {}) {
      return String(
        row.observationDedupeVersion ||
        row.obsDedupeVersion ||
        row.dedupeVersion ||
        ""
      ).trim();
    }

    function rowOutcomeDedupeVersion(row = {}) {
      return String(
        row.outcomeDedupeVersion ||
        row.outcomeDeduplicationVersion ||
        ""
      ).trim();
    }

    function isCleanMeasurementRow(row = {}) {
      const fix = rowMeasurementFixVersion(row);
      const risk = rowRiskPlanVersion(row);
      const cost = rowCostModelVersion(row);
      const obs = rowObservationDedupeVersion(row);
      const out = rowOutcomeDedupeVersion(row);

      const explicitClean =
        row.measurementClean === true ||
        row.cleanMeasurement === true ||
        row.cleanLearningRow === true;

      const fixOk = !fix || fix === MEASUREMENT_FIX_VERSION || fix.includes("CANDLE_FIRST_TOUCH");
      const riskOk = !risk || risk === SHORT_RISK_PLAN_VERSION;
      const costOk = !cost || cost === POSITION_COST_MODEL_VERSION;
      const obsOk = !obs || obs === OBSERVATION_DEDUPE_VERSION || obs.includes("OBS_DEDUPE");
      const outOk = !out || out === OUTCOME_DEDUPE_VERSION || out.includes("OUTCOME_DEDUPE");

      return explicitClean || (fixOk && riskOk && costOk && obsOk && outOk);
    }

    function measurementPill(row = {}) {
      return isCleanMeasurementRow(row)
        ? '<span class="pill clean">CLEAN</span>'
        : '<span class="pill legacy">LEGACY</span>';
    }

    function isRealMicroMicroRow(row = {}) {
      const id = microId(row);

      if (!id) return false;
      if (!idAllowedInShortOnly(id)) return false;
      if (row.legacyScannerFamilyFallback === true) return false;

      const side = inferSide(row);
      if (side === OPPOSITE_SIDE) return false;

      return true;
    }

    function uniqueStrings(values = []) {
      const stack = Array.isArray(values) ? [...values] : [values];
      const out = [];

      while (stack.length) {
        const value = stack.shift();

        if (Array.isArray(value)) {
          stack.unshift(...value);
          continue;
        }

        if (typeof value === "string") {
          out.push(...value.split(/[\s,;\n\r]+/g));
          continue;
        }

        if (value !== undefined && value !== null) out.push(value);
      }

      return [...new Set(
        out
          .map((value) => String(value || "").trim().toUpperCase())
          .filter(Boolean)
      )];
    }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (value && typeof value === "object") return Object.values(value);
      return [];
    }

    function baseSymbol(row = {}) {
      const raw = typeof row === "string"
        ? row
        : row.symbol || row.baseSymbol || row.coin || row.contractSymbol || row.instId || row.instrumentId || "";

      let symbol = String(raw).toUpperCase().replace(/[^A-Z0-9]/g, "");

      for (const suffix of ["USDTUMCBL", "USDCUMCBL", "USDTPERP", "USDCPERP", "USDT", "USDC", "BUSD", "PERP", "SWAP", "USD"]) {
        if (symbol.endsWith(suffix) && symbol.length > suffix.length) {
          symbol = symbol.slice(0, -suffix.length);
          break;
        }
      }

      return symbol || "COIN";
    }

    function completed(row = {}) {
      const explicitVirtual = num(row.virtualCompleted, 0);
      const explicitShadow = num(row.shadowCompleted, 0);
      const closed = explicitVirtual + explicitShadow;

      if (closed > 0) return closed;

      const outcome = Number(row.outcomeSample);
      if (Number.isFinite(outcome) && outcome > 0) return outcome;

      const explicit = Number(row.completed);
      if (Number.isFinite(explicit) && explicit > 0) return explicit;

      const wins = num(row.wins, 0);
      const losses = num(row.losses, 0);
      const flats = num(row.flats, 0);
      const sum = wins + losses + flats;

      return sum > 0 ? sum : 0;
    }

    function observationSample(row = {}) {
      return Math.max(
        num(row.observationSample, 0),
        num(row.seen, 0),
        num(row.observations, 0),

      return "MICRO_MICRO_OBSERVING";

      if (done > 0) return "MICRO_MICRO_SOFT";

      return String(row.selectedTier || row.rotationEligibilityTier || row.eligibilityTier || row.tier || "RAW").toUpperCase();

    function currentMarketRegimeForFit() {

        state.market?.raw?.currentTrendSide ||

      if (["LONG", "BULL", "BULLISH", "BUY", "UP", "UPSIDE"].includes(raw)) return "LONG";
      if (["NEUTRAL", "MIXED", "CHOP", "SIDEWAYS", "FLAT"].includes(raw)) return "NEUTRAL";

    function fallbackCurrentFitScore(row = {}) {
      const parsed = parseExactShortId(microId(row)) || parseExactShortId(base75MicroId(row));
      if (!parsed?.confirmation) return 0;

      const marketRegime = currentMarketRegimeForFit();
      const marketTrend = currentMarketTrendForFit();

      let score = 0;
      let hasSignal = false;

      if (marketTrend === "SHORT") {
        score += 30;
        hasSignal = true;
      } else if (marketTrend === "NEUTRAL") {
        score += 8;
        hasSignal = true;
      } else if (marketTrend === "LONG") {
        score -= 35;
        hasSignal = true;
      }

      if (marketRegime && marketRegime !== "UNKNOWN") {
        hasSignal = true;

        if (marketRegime === parsed.regime) score += 40;
        else if (
          (marketRegime === "TREND" && parsed.regime === "SQUEEZE") ||
          (marketRegime === "SQUEEZE" && parsed.regime === "TREND")

        else score -= 10;

      if (parsed.confirmation === "C_VOLUME_ALIGN") score += 10;
      if (parsed.confirmation === "D_MIXED_OK") score += 4;
      if (parsed.confirmation === "E_WEAK_CONTRA") score -= 8;

      score += 4;

      if (!hasSignal) return 0;

      return clamp(score, -80, 100);

        row.currentFitBull,

      const direct = firstFinite(

        row.fitScore

      if (direct !== null) {
        const definition = upper(row.currentFitDefinition || "");

        const haystack = marketBiasHaystack(row);

        if (
          haystack.includes("BEAR") ||
          haystack.includes("BEARISH") ||
          haystack.includes("SHORT") ||
          haystack.includes("SELL") ||
          haystack.includes("DOWNSIDE")
        ) {
          return Math.abs(direct);
        }

        if (
          haystack.includes("BULL") ||
          haystack.includes("BULLISH") ||
          haystack.includes("LONG") ||
          haystack.includes("BUY") ||
          haystack.includes("UPSIDE")
        ) {
          return -Math.abs(direct);
        }

        return direct;
      }

      return fallbackCurrentFitScore(row);

      const direct = firstFinite(

      }, 0);

      const directSLPenalty = recentRows.filter((outcome) => outcome.directSL || outcome.directToSL).length * 6;
      const costPenalty = recentRows.reduce((sum, outcome) => sum + Math.max(0, num(outcome.costR, 0)), 0) * 2;

      return clamp(netR * 8 - directSLPenalty - costPenalty, -80, 80);

    function timeoutSignal(timeoutMs = state.apiTimeoutMs) {

      };
    }

    function noCacheUrl(url) {
      const join = String(url).includes("?") ? "&" : "?";
      return `${url}${join}_ts=${Date.now()}`;
    }

    async function api(url, options = {}) {
      const timeout = timeoutSignal(options.timeoutMs || state.apiTimeoutMs);

      const headers = {
        accept: "application/json",
        ...(options.headers || {})
      };

      if (options.body !== undefined && !headers["content-type"]) {
        headers["content-type"] = "application/json";
      }

      try {
        const response = await fetch(noCacheUrl(url), {
          cache: "no-store",
          ...options,
          headers,
          signal: options.signal || timeout.signal
        });

        const rawText = await response.text();

        let data = {};

        try {
          data = rawText ? JSON.parse(rawText) : {};
        } catch {
          data = { raw: rawText };
        }

        if (!response.ok) {
          throw new ApiError(`${response.status} ${data.error || data.reason || response.statusText}`, {
            status: response.status,
            url,
            data
          });
        }

        return data;
      } catch (error) {
        if (error?.name === "AbortError") {
          throw new ApiError("REQUEST_ABORTED_TIMEOUT", {
            status: 0,
            url,
            timeout: true
          });
        }

        if (error instanceof ApiError) throw error;

        throw new ApiError(error?.message || String(error), {
          status: 0,
          url
        });
      } finally {
        timeout.clear();
      }
    }

          return `<td>${value}</td>`;

        return `<tr>${cells}</tr>`;

      return `

        const normalized = normalizeMicroMicroRowFromBase(row);
        if (!normalized) return;

        const id = microId(normalized);
        if (!id || seenIds.has(id)) return;
        if (!isRealMicroMicroRow(normalized)) return;

        seenIds.add(id);
        output.push(normalized);
      }

      function walk(value, depth = 0) {
        if (!value || typeof value !== "object" || depth > 10) return;
        if (seenObjects.has(value)) return;

        seenObjects.add(value);

        if (Array.isArray(value)) {
          for (const item of value) {
            if (item && typeof item === "object") add(item);
            walk(item, depth + 1);
          }
          return;
        }

        add(value);

        for (const key of [
          "bestMicroMicroFamilies",
          "topMicroMicroFamilies",
          "microMicroRows",
          "microMicroFamilies",
          "selectedMicroMicroFamilyRows",
          "activeMicroMicroFamilyRows",

          "short",
          "balanced",
          "adaptive",
          "winrate",
          "totalR",
          "avgR",
          "directSL",
          "observed"
        ]) {
          if (Object.prototype.hasOwnProperty.call(value, key)) {
            walk(value[key], depth + 1);
          }
        }
      }

      walk(data, 0);

      return output;

        ...extractObjectArrays(data.payload || {}, ["bestMicroMicroFamilies", "topMicroMicroFamilies", "microMicroRows", "microMicroFamilies", "rows"]),
        ...extractObjectArrays(data.activeRotation || {}, ["microMicroFamilies", "activeMicroMicroFamilyRows", "microFamilies"]),
        ...extractObjectArrays(data.active || {}, ["microMicroFamilies", "activeMicroMicroFamilyRows", "microFamilies"])
      ];

      const deep = extractDeepMicroMicroRows(data);

      const source = [
        ...preferred,
        ...nestedPreferred,
        ...deep
      ];

      const byId = new Map();

      for (const row of source) {
        const normalized = normalizeMicroMicroRowFromBase(row);
        if (!normalized) continue;

        const id = microId(normalized);
        if (!id || byId.has(id)) continue;

        byId.set(id, normalized);
      }

      return [...byId.values()];
    }

    function compareNumberDesc(a, b) {
      return num(b, 0) - num(a, 0);
    }

    function compareNumberAsc(a, b) {
      return num(a, 0) - num(b, 0);
    }

    function compareMicroIds(a = {}, b = {}) {
      return String(microId(a) || "").localeCompare(String(microId(b) || ""));
    }

    function compareCleanFirst(a, b) {
      return compareNumberDesc(cleanMeasurementScore(a), cleanMeasurementScore(b));
    }

    function compareBestDataFirst(a, b) {
      return (
        compareCleanFirst(a, b) ||
        compareNumberDesc(completed(a) >= MIN_COMPLETED_MICRO_MICRO_ACTIVE ? 1 : 0, completed(b) >= MIN_COMPLETED_MICRO_MICRO_ACTIVE ? 1 : 0) ||
        compareNumberDesc(balancedScore(a), balancedScore(b)) ||
        compareNumberDesc(netTotalR(a), netTotalR(b)) ||
        compareNumberDesc(netAvgR(a), netAvgR(b)) ||
        compareNumberDesc(sampleReliability(a), sampleReliability(b)) ||
        compareNumberDesc(fairWinrate(a), fairWinrate(b)) ||
        compareNumberAsc(avgCostR(a), avgCostR(b)) ||
        compareNumberAsc(directSLPct(a), directSLPct(b)) ||
        compareNumberDesc(observationSample(a), observationSample(b)) ||
        compareNumberDesc(completed(a), completed(b)) ||
        compareMicroIds(a, b)
      );
    }

    function compareMicroRows(a, b, mode = state.microMode) {
      if (mode === "clean") return compareCleanFirst(a, b) || compareBestDataFirst(a, b);

      if (mode === "adaptive") {
        return compareNumberDesc(adaptiveScore(a), adaptiveScore(b)) || compareBestDataFirst(a, b);
      }

      if (mode === "currentFit") {
        return (
          compareNumberDesc(currentFitScore(a), currentFitScore(b)) ||
          compareNumberDesc(currentFitConfidence(a), currentFitConfidence(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      if (mode === "cost") return compareNumberAsc(avgCostR(a), avgCostR(b)) || compareBestDataFirst(a, b);
      if (mode === "observed") return compareNumberDesc(observationSample(a), observationSample(b)) || compareBestDataFirst(a, b);
      if (mode === "directSL") return compareNumberAsc(directSLPct(a), directSLPct(b)) || compareBestDataFirst(a, b);
      if (mode === "totalR") return compareNumberDesc(netTotalR(a), netTotalR(b)) || compareBestDataFirst(a, b);
      if (mode === "avgR") return compareNumberDesc(netAvgR(a), netAvgR(b)) || compareBestDataFirst(a, b);

      if (mode === "winrate") {
        return (
          compareCleanFirst(a, b) ||
          compareNumberDesc(fairWinrate(a), fairWinrate(b)) ||
          compareNumberDesc(normalizePctFraction(a.sampleWilsonLowerBound ?? a.wilsonLowerBound), normalizePctFraction(b.sampleWilsonLowerBound ?? b.wilsonLowerBound)) ||
          compareNumberDesc(normalizePctFraction(a.sampleBayesianWinrate ?? a.bayesianWinrate), normalizePctFraction(b.sampleBayesianWinrate ?? b.bayesianWinrate)) ||
          compareNumberDesc(completed(a), completed(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      return compareBestDataFirst(a, b);
    }

    function rankMicroRows(rows = [], mode = state.microMode) {
      return rows
        .map(normalizeMicroMicroRowFromBase)
        .filter(Boolean)
        .filter(isRealMicroMicroRow)
        .sort((a, b) => compareMicroRows(a, b, mode))
        .map((row, index) => ({
          ...row,
          rank: index + 1
        }));
    }

    function extractMarketData(data = {}) {
      const source =
        data.marketWeather ||
        data.weather ||
        data.currentMarketWeather ||
        data.latest ||
        data.snapshot ||
        data;

      const universe =
        data.marketUniverse ||
        data.universe ||
        source.universe ||
        source.marketUniverse ||
        {};

      const createdAt = num(
        source.createdAt ||
        source.completedAt ||
        source.updatedAt ||
        source.ts ||
        universe.createdAt ||
        universe.updatedAt,
        0
      );

      const regime = upper(
        source.currentRegime ||
        source.regime ||
        source.marketRegime ||
        source.breadthRegime ||
        universe.currentRegime ||
        universe.regime ||
        "UNKNOWN"
      );

      const trendSide = upper(
        source.currentTrendSide ||
        source.trendSide ||
        source.marketSide ||
        source.side ||
        source.direction ||
        source.breadthSide ||
        universe.currentTrendSide ||
        universe.trendSide ||
        "UNKNOWN"
      );

      const bullishPct = firstFinite(
        source.bullishPct,
        source.longPct,
        source.upPct,
        source.breadthBullishPct,
        source.universeBullishPct,
        universe.bullishPct,
        universe.longPct,
        universe.upPct
      );

      const bearishPct = firstFinite(
        source.bearishPct,
        source.shortPct,
        source.downPct,
        source.breadthBearishPct,
        source.universeBearishPct,
        universe.bearishPct,
        universe.shortPct,
        universe.downPct
      );

      const squeezePct = firstFinite(
        source.squeezePct,
        source.compressionPct,
        source.breadthSqueezePct,
        universe.squeezePct,
        universe.compressionPct
      );

      const confidence = firstFinite(
        source.confidence,
        source.weatherConfidence,
        source.currentTrendConfidence,
        source.breadthConfidence,
        universe.confidence
      );

      return {
        raw: data,
        source,
        universe,
        ok: Boolean(data && Object.keys(data).length && data.ok !== false),
        createdAt,
        ageText: ageText(createdAt),
        regime,
        trendSide,
        bullishPct,
        bearishPct,
        squeezePct,
        confidence
      };
    }

    function currentManualSelectionSlots() {
      const active = activeMicroMicroIds()
        .map((id) => String(id || "").trim().toUpperCase())
        .filter(idAllowedInShortOnly)
        .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);

      while (active.length < MAX_ACTIVE_DISCORD_MICRO_FAMILIES) active.push("");

      return active;
    }

    function buildManualSelectionForSlot(slotNumber, id) {
      const slots = currentManualSelectionSlots();
      const cleanId = String(id || "").trim().toUpperCase();
      const index = Number(slotNumber) === 2 ? 1 : 0;

      if (!idAllowedInShortOnly(cleanId)) return slots.filter(Boolean);

      slots[index] = cleanId;

      return uniqueStrings(slots)
        .filter(idAllowedInShortOnly)
        .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);
    }

    function clearManualSelectionSlot(slotNumber) {
      const slots = currentManualSelectionSlots();
      const index = Number(slotNumber) === 2 ? 1 : 0;

      slots[index] = "";

      return uniqueStrings(slots)
        .filter(idAllowedInShortOnly)
        .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);
    }

    function bindMicroEvents() {
      document.querySelectorAll("[data-activate-slot]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const slotNumber = Number(btn.dataset.activateSlot || 1);
          const id = btn.dataset.activateId || "";
          const ids = buildManualSelectionForSlot(slotNumber, id);
          activateSelectedMicroFamilies(ids);
        });
      });

      document.querySelectorAll("[data-clear-slot]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const slotNumber = Number(btn.dataset.clearSlot || 2);
          const ids = clearManualSelectionSlot(slotNumber);
          activateSelectedMicroFamilies(ids);
        });
      });

      document.querySelectorAll("[data-copy]").forEach((btn) => {
        btn.addEventListener("click", () => copyText(btn.dataset.copy, "Micro-micro ID gekopieerd."));
      });

      document.querySelectorAll("[data-open-micro]").forEach((btn) => {
        btn.addEventListener("click", () => openMicro(btn.dataset.openMicro));
      });
    }

    async function copyText(text, message = "Gekopieerd.") {
      try {
        await navigator.clipboard.writeText(String(text || ""));
        setMessage(message, "ok");
      } catch {
        const area = document.createElement("textarea");
        area.value = String(text || "");
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        setMessage(message, "ok");
      }
    }

    function downloadJson(filename, data) {
      const blob = new Blob([JSON.stringify(data ?? {}, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = filename;
      link.click();

      URL.revokeObjectURL(url);
    }

    function scannerWarnings(data = {}) {
      if (Array.isArray(data.runtimeWarnings)) return data.runtimeWarnings;
      if (Array.isArray(data.warnings)) return data.warnings;
      if (data.warning) return [data.warning];
      return [];
    }

    function scannerErrors(data = {}) {
      if (Array.isArray(data.errors)) return data.errors;
      if (data.error) return [data.error];
      if (data.reason && data.ok === false) return [data.reason];
      return [];
    }

    function scannerHealthStatus({ data = {}, snapshot = {}, candidates = [] } = {}) {
      const warnings = scannerWarnings(data);
      const errors = scannerErrors(data);
      const snapshotId = snapshot.snapshotId || data.snapshotId || null;
      const createdAt = Number(snapshot.createdAt || data.createdAt || snapshot.completedAt || data.completedAt || 0);
      const ageSec = createdAt > 0 ? Math.round((Date.now() - createdAt) / 1000) : null;

      if (errors.length) return "ERROR";
      if (data.ok === false) return "ERROR";
      if (!snapshotId && !candidates.length) return "NO_SNAPSHOT";
      if (Number.isFinite(ageSec) && ageSec > 15 * 60) return "STALE";

    async function activateSelectedMicroFamilies(ids = []) {
      const allRequestedIds = uniqueStrings(ids);
      const microMicroIds = allRequestedIds
        .filter(idAllowedInShortOnly)
        .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);

      const rejectedIds = allRequestedIds.filter((id) => !idAllowedInShortOnly(id));
      const ignoredExtraIds = allRequestedIds.filter(idAllowedInShortOnly).slice(MAX_ACTIVE_DISCORD_MICRO_FAMILIES);

      if (!microMicroIds.length) {
        setMessage(
          rejectedIds.length
            ? `Geen geldige SHORT micro-micro ID geselecteerd.\nGeweigerd: ${rejectedIds.join(", ")}`
            : "Geen geldige SHORT micro-micro ID geselecteerd.",
          "warn"
        );
        return;
      }

      if (!confirm(
        `Activeer Discord alerts voor ${microMicroIds.length} van maximaal ${MAX_ACTIVE_DISCORD_MICRO_FAMILIES} exacte SHORT micro-micro ID(s)?\n\n` +
        `${microMicroIds.join("\n")}` +
        `${ignoredExtraIds.length ? `\n\nGenegeerd boven limiet:\n${ignoredExtraIds.join("\n")}` : ""}` +
        `${rejectedIds.length ? `\n\nGeweigerd, geen micro-micro:\n${rejectedIds.join("\n")}` : ""}\n\n` +
        "Virtual/shadow learning blijft breed doorlopen. 75-child/parent context selecteert geen Discord."
      )) {
        return;
      }

      const base75Ids = uniqueStrings(microMicroIds.map(base75FromAnyMicroId)).filter(isChild75Id);
      const parentIds = uniqueStrings(microMicroIds.map(parentFromAnyMicroId)).filter(parentIdAllowedInShortOnly);

      const data = await api(endpoints.rotation, {
        method: "POST",
        timeoutMs: 28000,
        body: JSON.stringify({
          action: "activateSelectedMicroFamilies",

          microFamilyIds: microMicroIds,
          activeMicroFamilyIds: microMicroIds,
          selectedMicroFamilyIds: microMicroIds,
          trueMicroFamilyIds: microMicroIds,

          microMicroFamilyIds: microMicroIds,
          activeMicroMicroFamilyIds: microMicroIds,
          selectedMicroMicroFamilyIds: microMicroIds,
          trueMicroMicroFamilyIds: microMicroIds,

          child75FamilyIds: [],
          active75ChildFamilyIds: [],
          selected75ChildFamilyIds: [],
          childTrueMicroFamilyIds: base75Ids,
          base75ChildTrueMicroFamilyIds: base75Ids,

          macroFamilyIds: [],
          activeMacroFamilyIds: [],
          parentTrueMicroFamilyIds: parentIds,

          maxActiveMicroFamilies: MAX_ACTIVE_DISCORD_MICRO_FAMILIES,
          maxManualMicroFamilies: MAX_ACTIVE_DISCORD_MICRO_FAMILIES,
          maxSelectedMicroFamilies: MAX_ACTIVE_DISCORD_MICRO_FAMILIES,

          side: DASHBOARD_SIDE,
          tradeSide: ONLY_SIDE,
          positionSide: ONLY_SIDE,
          direction: ONLY_SIDE,
          targetTradeSide: ONLY_SIDE,
          dashboardSide: DASHBOARD_SIDE,
          shortOnly: true,
          longDisabled: true,
          disableLong: true,
          manualOnly: true,
          adminSelected: true,
          autoRotation: false,

          trueMicroFamilySchema: TRUE_MICRO_SCHEMA,
          parentTrueMicroFamilySchema: PARENT_TRUE_MICRO_SCHEMA,
          microMicroFamilySchema: MICRO_MICRO_SCHEMA,
          microMicroVersion: MICRO_MICRO_VERSION,
          microMicroEnabled: true,

          learningGranularity: LEARNING_GRANULARITY,
          parentLearningGranularity: PARENT_LEARNING_GRANULARITY,
          microMicroLearningGranularity: MICRO_MICRO_LEARNING_GRANULARITY,

          selectionGranularity: "EXACT_MICRO_MICRO_ONLY",
          adminSelectionLayer: "MICRO_MICRO_ONLY",

          currentFitPolarity: "BEARISH_POSITIVE_BULLISH_NEGATIVE",
          currentFitDefinition: "SHORT_MIRRORED_CURRENT_FIT",
          currentFitSoftOnly: true,
          currentFitBlocksLearning: false,
          selectionIsAdaptive: true,

          child75RemainsPrimaryLearningLayer: true,
          parent15RemainsRollupLayer: true,
          microMicroActsAsExecutionPreference: true,
          microMicroDoesNotReplace75ChildLearning: true,

          riskPlanVersion: SHORT_RISK_PLAN_VERSION,
          costModelVersion: POSITION_COST_MODEL_VERSION,
          measurementFixVersion: MEASUREMENT_FIX_VERSION,
          observationDedupeVersion: OBSERVATION_DEDUPE_VERSION,
          outcomeDedupeVersion: OUTCOME_DEDUPE_VERSION,

          riskGeometryRule: "SHORT: tp < entry < sl",
          tpHitRule: "SHORT: candle.low <= tp",
          slHitRule: "SHORT: candle.high >= sl",
          sameCandleBothHitRule: "CONSERVATIVE_SL_FIRST",
          grossRFormula: "(entry - exitPrice) / (initialSl - entry)",
          currentRFormula: "(entry - currentPrice) / (initialSl - entry)",

          discordOnlyForSelectedMicroFamilies: true,
          discordOnlyForExactMicroMicroMatch: true,
          discordOnlyForExactTrueMicroMatch: false,
          discordRequiresCurrentFit: true,
          child75MatchDoesNotTriggerDiscord: true,
          macroMatchDoesNotTriggerDiscord: true,
          parentMacroMatchDoesNotTriggerDiscord: true
        })
      });

      const active = data.active || data.activeRotation || {};
      const activeIds = uniqueStrings([
        active.activeMicroMicroFamilyIds || [],
        active.selectedMicroMicroFamilyIds || [],
        active.microMicroFamilyIds || [],
        active.activeMicroFamilyIds || [],
        active.microFamilyIds || [],

        data.activeMicroMicroFamilyIds || [],
        data.selectedMicroMicroFamilyIds || [],
        data.microMicroFamilyIds || [],
        data.activeMicroFamilyIds || []
      ]).filter(idAllowedInShortOnly).slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);

      state.rotation = {
        ...(state.rotation || {}),
        ...data,
        active,
        activeRotation: active,
        activeMicroFamilyIds: activeIds,
        activeMicroMicroFamilyIds: activeIds,
        selectedMicroMicroFamilyIds: activeIds
      };

      state.micros = state.micros
        ? {
          ...state.micros,
          activeMicroFamilyIds: activeIds,
          activeMicroMicroFamilyIds: activeIds,
          selectedMicroMicroFamilyIds: activeIds
        }
        : state.micros;

      setMessage(
        `Manual Discord selection opgeslagen.\nActive micro-micro IDs: ${activeIds.length}/${MAX_ACTIVE_DISCORD_MICRO_FAMILIES}\nVirtual/shadow learning blijft breed doorlopen.`,
        "ok"

      if (state.activeTab === "rotation") await renderRotation();
      if (state.activeTab === "micros") await renderMicros();

        </div>

        ${table(logs, [
          { label: "TS", render: (row) => fmtTs(row.ts || row.createdAt) },
          { label: "Type", render: (row) => escapeHtml(row.type || row.level || row.event || "-") },
          { label: "Symbol", render: (row) => escapeHtml(baseSymbol(row.payload || row)) },
          { label: "Side", render: () => '<span class="pill short">SHORT</span>' },
          { label: "Layer", render: (row) => microLayerPill(row.payload || row) },
          { label: "Selected MM", render: (row) => {
            const payload = row.payload || row;
            const id = microId(payload);
            const selected = Boolean(
              payload.selectedMicroMicroFamilyAlert ||
              payload.selectedMicroFamilyAlert ||
              payload.discordAlertEligible ||
              payload.selectedForDiscord ||
              payload.wasSelected ||
              row.selectedOnly
            ) && idAllowedInShortOnly(id);

            return `<span class="pill ${selected ? "active" : ""}">${selected ? "YES" : "NO"}</span>`;
          }},
          { label: "CurrentFit", render: (row) => currentFitPill(row.payload || row) },
          { label: "Micro-micro", render: (row) => `<code>${escapeHtml(microId(row.payload || row) || "-")}</code>` },
          { label: "Base 75", render: (row) => `<code>${escapeHtml(base75MicroId(row.payload || row) || "-")}</code>` },
          { label: "Parent 15", render: (row) => `<code>${escapeHtml(parentMicroId(row.payload || row) || "-")}</code>` },
          { label: "Message", render: (row) => escapeHtml(row.message || row.content || row.result || row.reason || "") }
        ], "Geen Discord logs.")}
      `;

      $("copyDiscordBtn")?.addEventListener("click", () => copyText(JSON.stringify(data, null, 2), "Discord JSON gekopieerd."));
      $("exportDiscordBtn")?.addEventListener("click", () => downloadJson("discord-logs-short-micro-micro-only.json", data));
    }

    function renderReset() {
      $("reset").innerHTML = `
        <div class="grid-3">
          <div class="card">
            <h3>Reset learning only</h3>
            <p class="metric-extra">
              Wist SHORT learning data onder ${SHORT_KEY_PREFIX}. Manual Discord selection, open virtual positions en scanner snapshots blijven staan.
              Gebruik dit na meetlat-fixes als oude data vervuild is.
            </p>
            <button type="button" class="warn" id="resetLearningBtn">Reset learning</button>
          </div>

          <div class="card">
            <h3>Reset manual selection</h3>
            <p class="metric-extra">
              Wist active/next SHORT micro-micro selection. Learning en virtual positions blijven staan.
            </p>
            <button type="button" class="warn" id="resetRotationBtn">Reset rotation</button>
          </div>

          <div class="card">
            <h3>Factory reset</h3>
            <p class="metric-extra">
              Wist SHORT scanner snapshots, trade memory, open positions, analyze stats en rotations.
            </p>
            <input id="factoryConfirm" style="width: 100%; margin-bottom: 8px;" placeholder="SHORT_FACTORY_RESET_CONFIRMED" />
            <label style="display: block; margin-bottom: 8px;">
              <input id="factoryForce" type="checkbox" />
              force even with open positions
            </label>
            <button type="button" class="danger" id="factoryResetBtn">Factory reset</button>
          </div>
        </div>

        <div class="card">
          <h3>Actieve versies</h3>
          ${jsonBlock({
            versions: identityVersions(),
            riskPolicy: riskPolicyObject()
          })}
        </div>

        <div class="card">
          <h3>Reset result</h3>
          <pre id="resetResult">Nog geen reset uitgevoerd.</pre>
        </div>
      `;

      $("resetLearningBtn")?.addEventListener("click", postResetLearning);
      $("resetRotationBtn")?.addEventListener("click", postResetRotation);
      $("factoryResetBtn")?.addEventListener("click", postFactoryReset);
    }

    function resetPayload(confirmText, extra = {}) {
      return {
        confirm: confirmText,
        confirmed: confirmText,
        confirmation: confirmText,
        side: DASHBOARD_SIDE,
        tradeSide: ONLY_SIDE,
        targetTradeSide: ONLY_SIDE,
        shortOnly: true,
        longDisabled: true,
        trueMicroFamilySchema: TRUE_MICRO_SCHEMA,
        parentTrueMicroFamilySchema: PARENT_TRUE_MICRO_SCHEMA,
        microMicroFamilySchema: MICRO_MICRO_SCHEMA,
        microMicroVersion: MICRO_MICRO_VERSION,
        microMicroEnabled: true,
        microMicroOnlySelection: true,
        selectionGranularity: "EXACT_MICRO_MICRO_ONLY",
        persistentLearningKey: PERSISTENT_LEARNING_KEY,
        redisNamespace: SHORT_NAMESPACE,
        redisKeyPrefix: SHORT_KEY_PREFIX,
        riskPlanVersion: SHORT_RISK_PLAN_VERSION,
        costModelVersion: POSITION_COST_MODEL_VERSION,
        measurementFixVersion: MEASUREMENT_FIX_VERSION,
        observationDedupeVersion: OBSERVATION_DEDUPE_VERSION,
        outcomeDedupeVersion: OUTCOME_DEDUPE_VERSION,
        ...extra
      };
    }

    async function postResetLearning() {
      const confirmValue = prompt("Typ RESET_LEARNING_SHORT om SHORT learning te wissen.");

      if (confirmValue !== "RESET_LEARNING_SHORT") return;

      try {
        const data = await api(endpoints.resetLearning, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify(resetPayload("RESET_LEARNING_SHORT"))
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("SHORT learning reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    async function postResetRotation() {
      const confirmValue = prompt("Typ RESET_ROTATION_SHORT om manual Discord selection te wissen.");

      if (confirmValue !== "RESET_ROTATION_SHORT") return;

      try {
        const data = await api(endpoints.resetRotation, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify(resetPayload("RESET_ROTATION_SHORT"))
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("SHORT rotation reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    async function postFactoryReset() {
      const confirmValue = $("factoryConfirm").value.trim();
      const force = $("factoryForce").checked;

      if (confirmValue !== "SHORT_FACTORY_RESET_CONFIRMED") {
        setMessage("Factory reset geblokkeerd: bevestiging is niet exact SHORT_FACTORY_RESET_CONFIRMED.", "error");
        return;
      }

      if (!confirm("SHORT FACTORY RESET wist alles in de SHORT namespace. Doorgaan?")) return;

      try {
        const data = await api(endpoints.factoryReset, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify(resetPayload("SHORT_FACTORY_RESET_CONFIRMED", {
            force,
            forceClosePositions: force
          }))
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("SHORT factory reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    function showTab(id) {
      const next = tabs.includes(id) ? id : "overview";

      state.activeTab = next;

      document.querySelectorAll(".panel").forEach((panel) => panel.classList.add("hidden"));
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));

      $(next).classList.remove("hidden");
      document.querySelector(`[data-tab="${next}"]`)?.classList.add("active");

      location.hash = next;
      refresh(next);
    }

    function renderSoftError(tab, error) {
      const message = friendlyApiMessage(error);

      setMessage(message, "warn");

      $(tab).innerHTML = `
        <div class="card">
          <h3>Niet geladen</h3>
          <div class="empty">${escapeHtml(message)}</div>
        </div>
      `;
    }

    async function refresh(tab = state.activeTab) {
      setMessage("");
      $("liveLabel").textContent = `SHORT-only · micro-micro only · ${new Date().toLocaleTimeString()}`;

      try {
        if (tab === "overview") return await renderOverview();
        if (tab === "market") return await renderMarket();
        if (tab === "scanner") return await renderScanner();
        if (tab === "trade") return await renderTrade();
        if (tab === "micros") return await renderMicros();
        if (tab === "rotation") return await renderRotation();
        if (tab === "discord") return await renderDiscord();
        if (tab === "reset") return renderReset();
      } catch (error) {
        renderSoftError(tab, error);
      }
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => showTab(button.dataset.tab));
    });

    $("refreshBtn").addEventListener("click", () => refresh(state.activeTab));

    window.addEventListener("error", (event) => {
      setMessage(event.message || "Browser error", "error");
    });

    window.addEventListener("unhandledrejection", (event) => {
      setMessage(friendlyApiMessage(event.reason), "warn");
    });

    const initialTab = location.hash.replace("#", "") || "overview";
    showTab(tabs.includes(initialTab) ? initialTab : "overview");
  </script>
</body>
</html>
