<!-- FILE: public/admin.html -->
<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Short-Only Micro-Family Learning Admin</title>

  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --dark: #0f172a;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --blue: #2563eb;
      --purple: #7c3aed;
      --shadow-soft: 0 2px 10px rgba(15, 23, 42, 0.06);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(220, 38, 38, 0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(15, 23, 42, 0.12), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 14px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: 0.14s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.10);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    button.primary { background: var(--dark); color: white; border-color: var(--dark); }
    button.success { background: var(--green); color: white; border-color: var(--green); }
    button.warn { background: var(--amber); color: white; border-color: var(--amber); }
    button.danger { background: var(--red); color: white; border-color: var(--red); }
    button.short-action { background: var(--red); color: white; border-color: var(--red); }

    button.small {
      padding: 6px 9px;
      border-radius: 9px;
      font-size: 12px;
    }

    select,
    input,
    textarea {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      min-height: 42px;
    }

    textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="search"] { min-width: 340px; }

    header {
      background: linear-gradient(135deg, #0f172a 0%, #111827 46%, #450a0a 100%);
      color: white;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #dc2626, #fb7185);
      box-shadow: 0 12px 32px rgba(220, 38, 38, 0.30);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-title strong {
      display: block;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: #cbd5e1;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #fb7185;
      box-shadow: 0 0 0 4px rgba(251, 113, 133, 0.18);
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(243, 245, 249, 0.88);
      backdrop-filter: blur(14px);
      padding: 10px 0;
    }

    .tab {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.80);
      border-color: rgba(203, 213, 225, 0.90);
    }

    .tab.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .hidden,
    .panel.hidden { display: none; }

    .message {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow-soft);
      white-space: pre-wrap;
    }

    .message.ok { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .message.error { color: #991b1b; background: #fee2e2; border-color: #fecaca; }
    .message.warn { color: #92400e; background: #fef3c7; border-color: #fde68a; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .single-wide {
      display: grid;
      grid-template-columns: minmax(280px, 780px);
      gap: 12px;
      margin: 12px 0 14px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #334155;
    }

    .metric-card {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .metric-extra {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin: 12px 0 14px;
    }

    .micro-connect-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.96));
      box-shadow: var(--shadow-soft);
      padding: 16px;
    }

    .micro-connect-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: linear-gradient(90deg, #dc2626, #fb7185);
    }

    .micro-connect-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .micro-connect-title { min-width: 0; }

    .micro-connect-title h3 {
      margin: 0 0 5px;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .micro-connect-title p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .micro-connect-score {
      text-align: right;
      min-width: 88px;
    }

    .micro-connect-score strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .micro-connect-score span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .micro-connect-id {
      display: grid;
      gap: 6px;
      margin: 12px 0;
    }

    .micro-connect-id code {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .micro-performance-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .micro-performance-stat {
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 10px;
      background: #ffffff;
    }

    .micro-performance-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .micro-performance-stat strong {
      display: block;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .micro-connect-narrative {
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 16px;
      padding: 11px;
      color: #334155;
      font-size: 12px;
      line-height: 1.5;
      margin: 12px 0;
    }

    .micro-connect-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .micro-connect-route {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .coin-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .coin-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #dc2626, #fb7185);
    }

    .coin-head {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .coin-logo-wrap {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 999px;
      overflow: hidden;
      background: linear-gradient(135deg, #e2e8f0, #f8fafc);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      position: relative;
    }

    .coin-logo-wrap.lg { width: 52px; height: 52px; min-width: 52px; }
    .coin-logo-wrap.sm { width: 30px; height: 30px; min-width: 30px; }

    .coin-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .coin-logo-wrap.fallback::after {
      content: attr(data-initial);
      font-weight: 900;
      font-size: 14px;
      color: #334155;
    }

    .coin-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .coin-symbol {
      font-weight: 850;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .coin-name {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }

    .coin-price {
      margin-left: auto;
      text-align: right;
    }

    .coin-price strong {
      display: block;
      font-size: 15px;
    }

    .coin-price span {
      display: block;
      font-size: 12px;
      color: var(--muted);
    }

    .coin-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .coin-stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px;
    }

    .coin-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .coin-stat strong { font-size: 13px; }

    .coin-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      overflow: hidden;
    }

    .coin-mini {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 190px;
    }

    .coin-mini .coin-symbol { font-size: 14px; }
    .coin-mini .coin-name { font-size: 11px; max-width: 140px; }

    .id-stack {
      display: grid;
      gap: 4px;
      min-width: 360px;
    }

    .id-stack code {
      display: inline-block;
      max-width: 520px;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .id-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .pill.active { background: #dcfce7; color: #166534; }
    .pill.short,
    .pill.bear,
    .pill.danger { background: #fee2e2; color: #991b1b; }
    .pill.warn { background: #fef3c7; color: #92400e; }
    .pill.info { background: #dbeafe; color: #1d4ed8; }
    .pill.purple { background: #ede9fe; color: #5b21b6; }
    .pill.dark { background: #0f172a; color: white; }
    .pill.soft { background: #e0f2fe; color: #075985; }
    .pill.observation { background: #fef9c3; color: #854d0e; }
    .pill.raw { background: #f1f5f9; color: #475569; }

    .score-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .score-bar > span {
      display: block;
      height: 100%;
      width: var(--w);
      background: linear-gradient(90deg, #dc2626, #fb7185);
      border-radius: inherit;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 14px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1320px;
      background: white;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td { background: #f8fafc; }

    code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 3px 5px;
      border-radius: 6px;
      color: #334155;
      white-space: nowrap;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1020;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 16px;
      max-height: 520px;
      overflow: auto;
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.48;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(860px, 94vw);
      background: white;
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 42px rgba(15, 23, 42, 0.18);
      padding: 20px;
      overflow: auto;
      z-index: 30;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.70);
    }

    @media (max-width: 1180px) {
      .grid,
      .coin-grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }

      .grid-3,
      .single-wide { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      header { padding: 18px 14px; }

      .header-inner { flex-direction: column; }

      main { padding: 14px; }

      .grid,
      .coin-grid,
      .two-col { grid-template-columns: 1fr; }

      .tabs { gap: 7px; }

      .tab {
        flex: 1 1 auto;
        padding: 9px 10px;
      }

      .brand-title strong { font-size: 20px; }

      input[type="search"] { min-width: 100%; }

      .coin-stats,
      .micro-performance-grid { grid-template-columns: repeat(2, 1fr); }

      .id-stack { min-width: 260px; }

      .micro-connect-head { flex-direction: column; }

      .micro-connect-score { text-align: left; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">
          <div class="brand-logo">MF</div>
          <div>
            <strong>Short-Only Micro-Family Learning Admin</strong>
            <div class="brand-subtitle">
              Scanner → TradeSystem → Analyze → Virtual PositionEngine → Net-R outcomes → Manual Discord selection
            </div>
          </div>
        </div>
      </div>

      <div class="header-actions">
        <div class="live-pill"><span class="live-dot"></span><span id="liveLabel">SHORT-only · virtual learning</span></div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="overview">Overview</button>
      <button type="button" class="tab" data-tab="scanner">Scanner</button>
      <button type="button" class="tab" data-tab="trade">TradeSystem</button>
      <button type="button" class="tab" data-tab="micros">MicroFamilies</button>
      <button type="button" class="tab" data-tab="rotation">Manual Discord Selection</button>
      <button type="button" class="tab" data-tab="discord">Discord Logs</button>
      <button type="button" class="tab" data-tab="reset">Reset</button>
    </div>

    <div id="message"></div>

    <section id="overview" class="panel"></section>
    <section id="scanner" class="panel hidden"></section>
    <section id="trade" class="panel hidden"></section>
    <section id="micros" class="panel hidden"></section>
    <section id="rotation" class="panel hidden"></section>
    <section id="discord" class="panel hidden"></section>
    <section id="reset" class="panel hidden"></section>
  </main>

  <div id="drawer" class="drawer hidden"></div>

  <script>
    const ONLY_SIDE = "SHORT";
    const DASHBOARD_SIDE = "bear";

    const state = {
      activeTab: "overview",
      overview: null,
      scanner: null,
      trade: null,
      micros: null,
      rotation: null,
      discord: null,
      microMode: "balanced",
      microSearch: "",
      microFetchLimit: 50,
      microBestLimit: 50,
      microSideLimit: 50,
      apiTimeoutMs: 22000
    };

    const endpoints = {
      overview: "/api/admin/overview",
      scanner: "/api/admin/scanner",
      trade: "/api/admin/trade",
      micros: "/api/admin/micro-families",
      rotation: "/api/admin/rotation",
      discord: "/api/admin/discord-logs",
      microDetail: "/api/admin/micro-family",
      runScanner: "/api/scanner/run?force=true",
      runTrade: "/api/trade/run?force=true&forceProcessSnapshot=true",
      resetLearning: "/api/admin/reset-learning",
      resetRotation: "/api/admin/reset-rotation",
      factoryReset: "/api/admin/factory-reset"
    };

    const tabs = ["overview", "scanner", "trade", "micros", "rotation", "discord", "reset"];
    const validMicroModes = ["balanced", "winrate", "totalR", "avgR", "directSL", "observed"];

    const COIN_NAMES = {
      BTC: "Bitcoin",
      ETH: "Ethereum",
      SOL: "Solana",
      XRP: "XRP",
      BNB: "BNB",
      DOGE: "Dogecoin",
      ADA: "Cardano",
      AVAX: "Avalanche",
      LINK: "Chainlink",
      DOT: "Polkadot",
      TON: "Toncoin",
      TRX: "TRON",
      LTC: "Litecoin",
      BCH: "Bitcoin Cash",
      NEAR: "NEAR Protocol",
      APT: "Aptos",
      SUI: "Sui",
      ARB: "Arbitrum",
      OP: "Optimism",
      INJ: "Injective",
      ATOM: "Cosmos",
      FIL: "Filecoin",
      RUNE: "THORChain",
      FET: "Fetch.ai",
      RENDER: "Render",
      RNDR: "Render",
      PEPE: "Pepe",
      SHIB: "Shiba Inu",
      WIF: "dogwifhat",
      BONK: "Bonk",
      SEI: "Sei",
      TIA: "Celestia",
      JUP: "Jupiter",
      PYTH: "Pyth Network",
      UNI: "Uniswap",
      AAVE: "Aave",
      MKR: "Maker",
      CRV: "Curve DAO",
      LDO: "Lido DAO"
    };

    const $ = (id) => document.getElementById(id);

    class ApiError extends Error {
      constructor(message, details = {}) {
        super(message);
        this.name = "ApiError";
        this.status = details.status || 0;
        this.url = details.url || "";
        this.data = details.data || null;
        this.raw = details.raw || "";
        this.timeout = Boolean(details.timeout);

    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function upper(value) {
      return String(value || "").trim().toUpperCase();
    }

    function cleanSideHaystack(value = "") {
      return upper(value)
        .replaceAll("LONG_DISABLED", "")
        .replaceAll("LONGDISABLED", "")
        .replaceAll("BLOCK_LONG", "")
        .replaceAll("LONG_ENABLED_FALSE", "")
        .replaceAll("SHORT_ONLY", "SHORT")
        .replaceAll("SHORT-ONLY", "SHORT")
        .replaceAll("SHORT_ONLY_MODE", "SHORT");
    }

    function normalizeSide(side) {
      const s = cleanSideHaystack(side);

      if (["LONG", "BULL", "BULLISH", "BUY"].includes(s)) return "LONG";
      if (["SHORT", "BEAR", "BEARISH", "SELL"].includes(s)) return "SHORT";

      return s || "NA";
    }

    function shortIdHit(text = "") {
      const value = ` ${cleanSideHaystack(text)} `;

      return (
        value.includes("MICRO_SHORT_") ||
        value.includes("TRADESIDE=SHORT") ||
        value.includes("TRADE_SIDE=SHORT") ||
        value.includes("SIDE=SHORT") ||
        value.includes("SIDE=BEAR") ||
        value.includes("DIRECTION=SHORT") ||
        value.includes("DIRECTION=BEAR") ||
        value.includes("POSITION_SIDE=SHORT") ||
        value.includes("POSITIONSIDE=SHORT") ||
        value.includes("SIDE=SELL") ||
        value.includes("DIRECTION=SELL") ||
        value.includes(" SHORT ") ||
        value.includes(" SHORT_") ||
        value.includes("_SHORT ") ||
        value.includes("_SHORT_") ||
        value.includes("|SHORT|") ||
        value.includes(":SHORT") ||
        value.includes("=SHORT") ||
        value.includes(" BEAR ") ||
        value.includes("_BEAR") ||
        value.includes("BEAR_") ||
        value.includes("|BEAR|") ||
        value.includes(":BEAR") ||
        value.includes("=BEAR") ||
        value.includes(" SELL ") ||
        value.includes("_SELL") ||
        value.includes("SELL_") ||
        value.includes("|SELL|") ||
        value.includes(":SELL") ||
        value.includes("=SELL")
      );
    }

    function longIdHit(text = "") {
      const value = ` ${cleanSideHaystack(text)} `;

      return (
        value.includes("MICRO_LONG_") ||
        value.includes("TRADESIDE=LONG") ||
        value.includes("TRADE_SIDE=LONG") ||
        value.includes("SIDE=LONG") ||
        value.includes("SIDE=BULL") ||
        value.includes("DIRECTION=LONG") ||
        value.includes("DIRECTION=BULL") ||
        value.includes("POSITION_SIDE=LONG") ||
        value.includes("POSITIONSIDE=LONG") ||
        value.includes("SIDE=BUY") ||
        value.includes("DIRECTION=BUY") ||
        value.includes(" LONG ") ||
        value.includes(" LONG_") ||
        value.includes("_LONG ") ||
        value.includes("_LONG_") ||
        value.includes("|LONG|") ||
        value.includes(":LONG") ||
        value.includes("=LONG") ||
        value.includes(" BULL ") ||
        value.includes("_BULL") ||
        value.includes("BULL_") ||
        value.includes("|BULL|") ||
        value.includes(":BULL") ||
        value.includes("=BULL") ||
        value.includes(" BUY ") ||
        value.includes("_BUY") ||
        value.includes("BUY_") ||
        value.includes("|BUY|") ||
        value.includes(":BUY") ||
        value.includes("=BUY")
      );
    }

    function idAllowedInShortOnly(id = "") {
      const value = String(id || "").trim();

      if (!value) return false;

      const shortHit = shortIdHit(value);
      const longHit = longIdHit(value);

      if (longHit && !shortHit) return false;

      return true;
    }

    function rowSide(row = {}) {
      if (typeof row === "string") {
        const direct = normalizeSide(row);

        if (direct === "SHORT" || direct === "LONG") return direct;

        const shortHit = shortIdHit(row);
        const longHit = longIdHit(row);

        if (longHit && !shortHit) return "LONG";
        if (shortHit) return "SHORT";

        return "NA";
      }

      const directFields = [
        row.tradeSide,
        row.targetTradeSide,
        row.positionSide,
        row.direction,
        row.scannerSide,
        row.actualScannerSide,
        row.analysisSide,
        row.signalSide,
        row.entrySide,
        row.dashboardSide,
        row.side,
        row.bias,
        row.marketBias
      ];

      for (const value of directFields) {
        const normalized = normalizeSide(value);

        if (normalized === "SHORT") return "SHORT";
        if (normalized === "LONG") return "LONG";
      }

      const probe = [
        row.microFamilyId,
        row.trueMicroFamilyId,
        row.liveMicroFamilyId,
        row.realMicroFamilyId,
        row.executionMicroFamilyId,
        row.id,
        row.key,
        row.coarseMicroFamilyId,
        row.baseMicroFamilyId,
        row.legacyMicroFamilyId,

        row.macroFamilyId,
        row.parentMacroFamilyId,
        row.parentMicroFamilyId,
        row.parentFamilyId,
        row.macroId,

        row.familyId,
        row.family,
        row.baseFamilyId,

        row.definition,
        row.microDefinition,
        row.macroDefinition,
        row.parentDefinition,
        row.scannerReason,
        row.reason,
        row.signalReason,
        row.actionReason,
        row.exitReason,

        Array.isArray(row.definitionParts) ? row.definitionParts.join("|") : "",
        Array.isArray(row.microDefinitionParts) ? row.microDefinitionParts.join("|") : "",
        Array.isArray(row.macroDefinitionParts) ? row.macroDefinitionParts.join("|") : "",
        Array.isArray(row.parentDefinitionParts) ? row.parentDefinitionParts.join("|") : "",
        Array.isArray(row.executionFingerprintParts) ? row.executionFingerprintParts.join("|") : ""
      ].join(" | ");

      const hasShort = shortIdHit(probe);
      const hasLong = longIdHit(probe);

      if (hasLong && !hasShort) return "LONG";
      if (hasShort) return "SHORT";

      if (
        row.shortOnly === true ||
        row.longDisabled === true ||
        row.targetTradeSide === "SHORT" ||
        row.dashboardSide === "bear"
      ) {
        return "SHORT";
      }

      return "NA";
    }

    function isShortRow(row = {}) {
      return rowSide(row) === ONLY_SIDE;
    }

    function sideClass(side) {
      const s = normalizeSide(side);

      if (s === "SHORT") return "short";

      return "neutral";
    }

    function rowSideClass(row = {}) {
      return sideClass(rowSide(row));
    }

    function rowSideLabel(row = {}) {
      return rowSide(row);
    }

    function baseSymbol(input) {
      const raw = typeof input === "string"
        ? input
        : input?.symbol || input?.baseSymbol || input?.coin || input?.contractSymbol || "";

      let symbol = String(raw).toUpperCase().replace(/[^A-Z0-9]/g, "");

      const suffixes = [
        "USDTUMCBL",
        "USDCUMCBL",
        "USDTPERP",
        "USDCPERP",
        "USDT",
        "USDC",
        "BUSD",
        "PERP",
        "SWAP",
        "USD"
      ];

      for (const suffix of suffixes) {
        if (symbol.endsWith(suffix) && symbol.length > suffix.length) {
          symbol = symbol.slice(0, -suffix.length);
          break;
        }
      }

      return symbol || "COIN";
    }

    function coinName(row) {
      const symbol = baseSymbol(row);

      return row?.name ||
        row?.coinName ||
        row?.fullName ||
        row?.assetName ||
        COIN_NAMES[symbol] ||
        symbol;
    }

    function coinLogo(row) {
      const direct =
        row?.logo ||
        row?.image ||
        row?.icon ||
        row?.iconUrl ||
        row?.logoUrl ||
        row?.coinLogo ||
        row?.marketData?.image ||
        row?.market?.image;

      if (direct) return direct;

      const symbol = baseSymbol(row).toLowerCase();

      return `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${symbol}.png`;
    }

    function handleCoinLogoError(img) {

      if (!parent) return;

      parent.classList.add("fallback");

    }

    window.handleCoinLogoError = handleCoinLogoError;

    function coinAvatar(row, size = "") {
      const symbol = baseSymbol(row);
      const name = coinName(row);

        <div class="coin-mini">

    }

    function fmt(value, decimals = 3) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return n.toFixed(decimals);
    }

    function fmtInt(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "0";

      return Math.round(n).toLocaleString();
    }

    function fmtPctRatio(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return `${(n * 100).toFixed(1)}%`;
    }

    function fmtPctRaw(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return `${n.toFixed(2)}%`;
    }

    function fmtPrice(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (n >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
      if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 4 });

      return n.toLocaleString(undefined, { maximumFractionDigits: 8 });
    }

    function fmtMoneyLike(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (Math.abs(n) >= 1_000_000_000) return `${(n / 1_000_000_000).toFixed(2)}B`;
      if (Math.abs(n) >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
      if (Math.abs(n) >= 1_000) return `${(n / 1_000).toFixed(1)}K`;

      return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
    }

    function fmtTs(value) {
      if (!value) return "-";

      const n = Number(value);
      const date = Number.isFinite(n) ? new Date(n) : new Date(value);

      if (Number.isNaN(date.getTime())) return "-";

      return date.toLocaleString();
    }

    function ageText(ts) {
      if (!ts) return "-";

      const n = Number(ts);

      if (!Number.isFinite(n)) return "-";

      const sec = Math.max(0, Math.floor((Date.now() - n) / 1000));

      if (sec < 60) return `${sec}s geleden`;
      if (sec < 3600) return `${Math.floor(sec / 60)}m geleden`;

      return `${Math.floor(sec / 3600)}u geleden`;
    }

    function boolText(value) {
      return value ? "YES" : "NO";
    }

    function jsonBlock(data) {
      return `<pre>${escapeHtml(JSON.stringify(data ?? null, null, 2))}</pre>`;
    }

    function setMessage(message = "", type = "") {
      if (!message) {
        $("message").innerHTML = "";

      $("message").innerHTML = `<div class="message ${escapeAttr(type)}">${escapeHtml(message)}</div>`;
    }

    function showLoading(tabId, label = "Laden...") {
      $(tabId).innerHTML = `
        <div class="card">

        </div>
      `;
    }

    function getArrayRows(data, keys = []) {
      if (Array.isArray(data)) return data;

      for (const key of keys) {
        if (Array.isArray(data?.[key])) return data[key];
      }

      if (Array.isArray(data?.rows)) return data.rows;
      if (Array.isArray(data?.items)) return data.items;
      if (Array.isArray(data?.data)) return data.data;

      return [];
    }

    function errorReason(data, fallback = "REQUEST_FAILED") {
      const raw = data?.error || data?.reason || data?.message || fallback;

      if (typeof raw === "string") return raw;
      if (raw && typeof raw === "object") return JSON.stringify(raw);

      return String(raw || fallback);
    }

    function friendlyApiMessage(error) {
      const status = Number(error?.status || 0);
      const raw = String(error?.message || error || "");

      if (error?.timeout) {
        return "API-timeout: request is afgebroken door de admin UI.";
      }

      if (status === 504 || raw.includes("504") || raw.toLowerCase().includes("deployment")) {
        return "Backend timeout op deze admin-route.";
      }

      if (status === 500) {
        return "Backend error op deze admin-route. Check server logs voor stacktrace.";
      }

      if (status === 404) {
        return "Admin endpoint niet gevonden of gevraagde SHORT family bestaat niet.";
      }

      return raw || "Onbekende API fout.";
    }

    function timeoutSignal(timeoutMs = state.apiTimeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      return {
        signal: controller.signal,
        clear: () => clearTimeout(timer)
      };
    }

    async function api(url, options = {}) {
      const headers = {
        accept: "application/json",
        ...(options.headers || {})
      };

      if (options.body !== undefined && options.body !== null && !headers["content-type"]) {
        headers["content-type"] = "application/json";
      }

      const timeout = timeoutSignal(options.timeoutMs || state.apiTimeoutMs);

      try {
        const response = await fetch(url, {
          cache: "no-store",
          ...options,
          headers,
          signal: options.signal || timeout.signal
        });

        const rawText = await response.text();

        let data = {};

        try {
          data = rawText ? JSON.parse(rawText) : {};
        } catch {
          data = { raw: rawText };
        }

        if (!response.ok) {
          throw new ApiError(
            `${response.status} ${errorReason(data, response.statusText)}`,
            {
              status: response.status,
              url,
              data,
              raw: rawText
            }
          );
        }

        return data;
      } catch (error) {
        if (error?.name === "AbortError") {
          throw new ApiError("REQUEST_ABORTED_TIMEOUT", {
            status: 0,
            url,
            timeout: true
          });
        }

        if (error instanceof ApiError) throw error;

        throw new ApiError(error?.message || String(error), {
          status: 0,
          url
        });
      } finally {
        timeout.clear();
      }
    }

    function table(rows, cols, emptyText = "Geen data.") {
      if (!Array.isArray(rows) || rows.length === 0) {
        return `<div class="empty">${escapeHtml(emptyText)}</div>`;
      }

      const head = cols
        .map((column) => `<th>${escapeHtml(column.label)}</th>`)
        .join("");

      const body = rows.map((row, index) => {
        const cells = cols.map((column) => {
          const value = column.render
            ? column.render(row, index)
            : escapeHtml(row?.[column.key]);

          return `<td>${value}</td>`;
        }).join("");

        return `<tr>${cells}</tr>`;
      }).join("");

      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${head}</tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function metricCard(label, value, extra = "") {
      return `
        <div class="card metric-card">
          <div class="metric-label">${escapeHtml(label)}</div>
          <div>
            <div class="metric-value">${escapeHtml(value)}</div>
            ${extra ? `<div class="metric-extra">${escapeHtml(extra)}</div>` : ""}
          </div>
        </div>
      `;
    }

    function scoreBar(value, max = 100) {
      const n = Math.max(0, Math.min(100, (Number(value) / max) * 100 || 0));

      return `<div class="score-bar"><span style="--w:${n.toFixed(1)}%"></span></div>`;
    }

    function uniqueStrings(values = []) {
      return [...new Set(
        (Array.isArray(values) ? values : [values])
          .flatMap((value) => {
            if (Array.isArray(value)) return value;

            return String(value || "")
              .split(/[\s,;\n\r]+/g)
              .map((part) => part.trim());
          })
          .map((value) => String(value || "").trim())
          .filter(Boolean)
      )];
    }

    function microId(row = {}) {
      return row?.microFamilyId || row?.trueMicroFamilyId || row?.id || row?.key || "";
    }

    function macroId(row = {}) {
      return (
        row?.macroFamilyId ||
        row?.parentMacroFamilyId ||
        row?.parentMicroFamilyId ||
        row?.parentFamilyId ||
        row?.macroId ||
        row?.legacyMicroFamilyId ||
        row?.coarseMicroFamilyId ||
        row?.familyMacroId ||
        row?.familyId ||
        ""
      );
    }

    function familyId(row = {}) {
      return row?.familyId || row?.family || row?.baseFamilyId || "";
    }

    function microCompleted(row = {}) {
      const explicitOutcome = Number(row.outcomeSample);

      if (Number.isFinite(explicitOutcome)) return explicitOutcome;

      const real = Number(row.realCompleted || 0);
      const shadow = Number(row.shadowCompleted || 0);
      const explicit = real + shadow;

      if (explicit > 0) return explicit;

      const completed = Number(row.completed);

      return Number.isFinite(completed) ? completed : 0;
    }

    function microObservationSample(row = {}) {
      const values = [
        row.observationSample,
        row.seen,
        row.observations,
        row.winrateSample,
        microCompleted(row)
      ].map(Number).filter(Number.isFinite);

      return values.length ? Math.max(...values, 0) : 0;
    }

    function looksLikeMicroRow(row = {}) {
      if (!row || typeof row !== "object" || Array.isArray(row)) return false;

      const id = upper(
        row.microFamilyId ||
        row.trueMicroFamilyId ||
        row.id ||
        row.key ||
        ""
      );

      const macro = upper(
        row.parentMacroFamilyId ||
        row.parentMicroFamilyId ||
        row.macroFamilyId ||
        row.parentFamilyId ||
        ""
      );

      const family = upper(row.familyId || row.family || "");

      if (id && (id.includes("MICRO_") || shortIdHit(id) || longIdHit(id))) return true;
      if (macro && (macro.includes("MICRO_") || shortIdHit(macro) || longIdHit(macro))) return true;
      if (family && (family.startsWith("SHORT_") || family.startsWith("LONG_"))) return true;

      return (
        row.definition !== undefined ||
        row.definitionParts !== undefined ||
        row.microDefinitionParts !== undefined ||
        row.completed !== undefined ||
        row.outcomeSample !== undefined ||
        row.observationSample !== undefined ||
        row.seen !== undefined ||
        row.observations !== undefined ||
        row.winrate !== undefined ||
        row.fairWinrate !== undefined ||
        row.balancedScore !== undefined ||
        row.dashboardBalancedScore !== undefined
      );
    }

    function rowsFromMicroContainer(value) {
      if (!value) return [];

      if (Array.isArray(value)) {
        return value.filter(looksLikeMicroRow);
      }

      if (typeof value !== "object") return [];

      if (looksLikeMicroRow(value)) {
        return [value];
      }

      const rows = [];

      for (const [key, row] of Object.entries(value)) {
        if (!row || typeof row !== "object" || Array.isArray(row)) continue;

        const normalized = {
          ...row,
          microFamilyId: row.microFamilyId || row.trueMicroFamilyId || key,
          trueMicroFamilyId: row.trueMicroFamilyId || row.microFamilyId || key
        };

        if (looksLikeMicroRow(normalized)) rows.push(normalized);
      }

      return rows;
    }

    function pushUniqueRows(target, rows = []) {
      const seen = new Set(target.map((row) => (
        microId(row) ||
        `${macroId(row)}:${familyId(row)}:${row.rank || ""}`
      )));

      for (const row of rows) {
        const key = microId(row) || `${macroId(row)}:${familyId(row)}:${row.rank || target.length}`;

        if (!key || seen.has(key)) continue;

        seen.add(key);
        target.push(row);
      }

      return target;
    }

    function sanitizeShortRows(rows = []) {
      return (Array.isArray(rows) ? rows : [])
        .filter(Boolean)
        .filter((row) => {
          const id = microId(row);
          if (id && longIdHit(id) && !shortIdHit(id)) return false;

          return isShortRow(row);
        });
    }

    function extractMicroRowsByKeys(data = {}, keys = []) {
      const rows = [];

      if (!data || typeof data !== "object") return rows;

      for (const key of keys) {
        pushUniqueRows(rows, rowsFromMicroContainer(data[key]));
      }

      const nestedObjects = [
        data.data,
        data.result,
        data.payload,
        data.current,
        data.currentWeek,
        data.week,
        data.dashboard,
        data.summary,
        data.rankings,
        data.allRankings,
        data.byMode,
        data.modes
      ];

      for (const nested of nestedObjects) {
        if (!nested || typeof nested !== "object") continue;

        for (const key of keys) {
          pushUniqueRows(rows, rowsFromMicroContainer(nested[key]));
        }

        pushUniqueRows(rows, rowsFromMicroContainer(nested[state.microMode]));
        pushUniqueRows(rows, rowsFromMicroContainer(nested.balanced));
        pushUniqueRows(rows, rowsFromMicroContainer(nested.rows));
        pushUniqueRows(rows, rowsFromMicroContainer(nested.microFamilies));
        pushUniqueRows(rows, rowsFromMicroContainer(nested.micros));
      }

      return rows;
    }

    function extractMicroRowsDeep(data = {}, maxDepth = 5) {
      const rows = [];
      const visited = new Set();

      function walk(value, depth = 0) {
        if (!value || typeof value !== "object") return;
        if (depth > maxDepth) return;
        if (visited.has(value)) return;

        visited.add(value);

        if (looksLikeMicroRow(value)) {
          pushUniqueRows(rows, [value]);
          return;
        }

        pushUniqueRows(rows, rowsFromMicroContainer(value));

        const preferredKeys = [
          "best25MicroFamilies",
          "topMicroFamilies",
          "bestMicroFamilies",
          "shortRows",
          "rows",
          "microFamilies",
          "micros",
          "items",
          "data",
          "result",
          "payload",
          "rankings",
          "allRankings",
          "byMode",
          "modes",
          "balanced",
          "winrate",
          "totalR",
          "avgR",
          "directSL",
          "observed"
        ];

        for (const key of preferredKeys) {
          if (value[key] !== undefined) walk(value[key], depth + 1);
        }
      }

      walk(data, 0);

      return rows;
    }

    function preferredMicroRowsFromPayload(data = {}) {
      const bestRows = sanitizeShortRows(extractMicroRowsByKeys(data, [
        "best25MicroFamilies",
        "topMicroFamilies",
        "bestMicroFamilies"
      ]));

      if (bestRows.length > 0) return bestRows;

      const fallbackRows = sanitizeShortRows(extractMicroRowsByKeys(data, [
        "shortRows",
        "rows",
        "microFamilies",
        "micros",
        "items",
        "data"
      ]));

      if (fallbackRows.length > 0) return fallbackRows;

      return sanitizeShortRows(extractMicroRowsDeep(data));
    }

    function extractIdsFromRotation(rotation = {}) {
      return uniqueStrings([
        rotation?.microFamilyIds || [],
        rotation?.activeMicroFamilyIds || [],
        rotation?.trueMicroFamilyIds || [],
        rotation?.ids || [],
        (
          Array.isArray(rotation?.microFamilies)
            ? rotation.microFamilies.map((row) => microId(row))
            : []

      if (tier === "OBSERVATION") return '<span class="pill observation">OBSERVATION</span>';

      if (tier === "MANUAL") return '<span class="pill purple">MANUAL</span>';
      if (tier.includes("FALLBACK")) return `<span class="pill raw">${escapeHtml(tier)}</span>`;

      return `<span class="pill">${escapeHtml(tier || "NA")}</span>`;

    function missingSidesArray(...sources) {
      const values = sources
        .flatMap((source) => {
          if (!source) return [];
          if (Array.isArray(source)) return source;
          if (Array.isArray(source.missingSides)) return source.missingSides;
          return [];
        })
        .map(normalizeSide)
        .filter((side) => side === ONLY_SIDE);

      return uniqueStrings(values);
    }

    async function copyText(text, label = "Gekopieerd.") {
      try {
        await navigator.clipboard.writeText(String(text || ""));
        setMessage(label, "ok");
        return;
      } catch {
        const area = document.createElement("textarea");
        area.value = String(text || "");
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        setMessage(label, "ok");
      }
    }

    function downloadJson(filename, data) {
      const blob = new Blob([JSON.stringify(data ?? {}, null, 2)], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = filename;
      a.click();

      URL.revokeObjectURL(url);
    }

    function microUrl(extra = {}) {
      const params = new URLSearchParams();

      params.set("mode", validMicroModes.includes(extra.mode || state.microMode) ? (extra.mode || state.microMode) : "balanced");
      params.set("side", ONLY_SIDE);
      params.set("tradeSide", ONLY_SIDE);
      params.set("targetTradeSide", ONLY_SIDE);
      params.set("dashboardSide", DASHBOARD_SIDE);
      params.set("limit", String(extra.limit || state.microFetchLimit));
      params.set("bestLimit", String(extra.bestLimit || state.microBestLimit));
      params.set("sideLimit", String(extra.sideLimit || state.microSideLimit));
      params.set("sideEnsureLimit", String(extra.sideLimit || state.microSideLimit));
      params.set("includeActiveRotation", "1");
      params.set("compact", "1");
      params.set("fast", "1");

      if (extra.q) params.set("q", extra.q);

      return `${endpoints.micros}?${params.toString()}`;
    }

    function rotationUrl(extra = {}) {
      const params = new URLSearchParams();

      params.set("activeRowsLimit", String(extra.activeRowsLimit || 80));
      params.set("nextRowsLimit", String(extra.nextRowsLimit || 0));
      params.set("side", ONLY_SIDE);
      params.set("tradeSide", ONLY_SIDE);
      params.set("targetTradeSide", ONLY_SIDE);
      params.set("dashboardSide", DASHBOARD_SIDE);
      params.set("compact", "1");

      return `${endpoints.rotation}?${params.toString()}`;
    }

    async function fetchMicroRows(mode = state.microMode) {
      try {
        const data = await api(microUrl({
          mode,
          limit: state.microFetchLimit,
          bestLimit: state.microBestLimit,
          sideLimit: state.microSideLimit
        }), {
          timeoutMs: 18000
        });

        const bestRows = sanitizeShortRows(extractMicroRowsByKeys(data, [
          "best25MicroFamilies",
          "topMicroFamilies",
          "bestMicroFamilies"
        ]));

        const fallbackRows = sanitizeShortRows(extractMicroRowsByKeys(data, [
          "shortRows",
          "rows",
          "microFamilies",
          "micros",
          "items",
          "data"
        ]));

        const deepRows = sanitizeShortRows(extractMicroRowsDeep(data));

        const rows = bestRows.length > 0
          ? bestRows
          : fallbackRows.length > 0
            ? fallbackRows
            : deepRows;

        const activeRotation =
          data.activeRotation ||
          data.active ||
          data.rotation?.active ||
          data.result?.activeRotation ||
          null;

        return {
          ok: true,
          mode,
          targetTradeSide: ONLY_SIDE,
          dashboardSide: DASHBOARD_SIDE,
          shortOnly: true,
          longDisabled: true,

          raw: data,

          best25MicroFamilies: bestRows,
          topMicroFamilies: bestRows,
          bestMicroFamilies: bestRows,

          shortRows: rows,
          rows,

          fallbackRows,
          deepRows,

          errors: [],
          activeRotation,
          activeMicroFamilyIds: uniqueStrings([
            data.activeMicroFamilyIds || [],
            extractIdsFromRotation(activeRotation || {})
          ]).filter(idAllowedInShortOnly),
          activeMacroFamilyIds: uniqueStrings([
            data.activeMacroFamilyIds || [],
            extractMacroIdsFromRotation(activeRotation || {})
          ]).filter(idAllowedInShortOnly),
          summary: data.summary || null,
          perf: data.perf || null,
          serverTs: Date.now()
        };
      } catch (error) {
        return {
          ok: false,
          mode,
          targetTradeSide: ONLY_SIDE,
          dashboardSide: DASHBOARD_SIDE,
          shortOnly: true,
          longDisabled: true,
          raw: null,
          best25MicroFamilies: [],
          topMicroFamilies: [],
          bestMicroFamilies: [],
          shortRows: [],
          rows: [],
          fallbackRows: [],
          deepRows: [],
          errors: [friendlyApiMessage(error)],
          activeRotation: null,
          activeMicroFamilyIds: [],
          activeMacroFamilyIds: [],
          summary: null,
          perf: null,
          serverTs: Date.now()
        };
      }
    }

    function currentMicroRows() {
      return sanitizeShortRows(preferredMicroRowsFromPayload(state.micros || {}));
    }

    function filterMicroRows(rows = []) {
      const search = state.microSearch.trim().toLowerCase();
      const sideRows = sanitizeShortRows(rows);

      if (!search) return sideRows;

      return sideRows.filter((row) => JSON.stringify(row).toLowerCase().includes(search));
    }

    function splitTopMicroRows(rows = []) {
      const allShortRows = sanitizeShortRows(rows);
      const shortRows = allShortRows.slice(0, state.microSideLimit);

      return {
        shortRows,
        visibleRows: shortRows,
        totalShortRows: allShortRows.length
      };
    }

    function topMicroRow(rows = []) {
      return sanitizeShortRows(rows)
        .filter((row) => microId(row))[0] || null;
    }

    async function ensureMicroRows({ force = false } = {}) {
      const rows = currentMicroRows();

      if (!force && rows.length > 0) return rows;

      const data = await fetchMicroRows(state.microMode);
      state.micros = data;

      return data.rows || [];
    }

    function currentVisibleMicroRows() {
      const rows = filterMicroRows(currentMicroRows());

      return splitTopMicroRows(rows).visibleRows;
    }

    function microWinrateText(row = {}) {

    function microFairWinrateText(row = {}) {
      return fmtPctRatio(row.fairWinrate ?? row.sampleAdjustedWinrate ?? row.bayesianWinrate ?? row.wilsonLowerBound);
    }

    function microPnlText(row = {}) {
      const r = Number(row.totalR);

      if (!Number.isFinite(r)) return "-";

      return `${r >= 0 ? "+" : ""}${r.toFixed(2)}R`;
    }

    function microNarrative(row = {}) {
      const completed = microCompleted(row);
      const seen = microObservationSample(row);
      const winrate = Number(row.winrate);
      const totalR = Number(row.totalR);
      const avgR = Number(row.avgR);
      const directSL = Number(row.directSLPct);

      if (completed <= 0 && seen > 0) {
        return `Deze SHORT micro-family heeft observations maar nog geen gesloten virtual outcome. Completed/winrate/AvgR/TotalR blijven 0 tot PositionEngine exits netto terugschrijft. Seen=${seen}.`;
      }

      const sampleText = completed < 5
        ? "lage sample, observation/early outcome"
        : completed < 15
          ? "bruikbare sample, nog niet zwaar bewezen"
          : "sterkere sample met genoeg outcomes";

      const winrateText = Number.isFinite(winrate)
        ? `winrate ${(winrate * 100).toFixed(1)}%`
        : "winrate onbekend";

      const pnlText = Number.isFinite(totalR)
        ? `netto ${totalR >= 0 ? "+" : ""}${totalR.toFixed(2)}R`
        : "netto R onbekend";

      const avgText = Number.isFinite(avgR)
        ? `gemiddeld ${avgR.toFixed(2)}R`
        : "avgR onbekend";

      const slText = Number.isFinite(directSL)
        ? `direct SL ${(directSL * 100).toFixed(1)}%`
        : "direct SL onbekend";

      return `SHORT execution fingerprint met ${sampleText}: ${winrateText}, ${pnlText}, ${avgText}, ${slText}.`;
    }

    async function activateSelectedMicroFamilies(ids = []) {
      const microFamilyIds = uniqueStrings(ids).filter(idAllowedInShortOnly);

      if (!microFamilyIds.length) {
        setMessage("Geen geldige SHORT microFamilyId geselecteerd.", "warn");
        return;
      }

      if (!confirm(
        `Activeer Discord alerts voor ${microFamilyIds.length} exacte SHORT micro-family ID(s)?\n\n` +
        `${microFamilyIds.slice(0, 8).join("\n")}` +
        `${microFamilyIds.length > 8 ? "\n..." : ""}\n\n` +
        `Virtual learning blijft alle risk-valide SHORT candidates volgen.`
      )) {
        return;
      }

      const data = await api(endpoints.rotation, {
        method: "POST",
        timeoutMs: 28000,
        body: JSON.stringify({
          action: "activateSelectedMicroFamilies",
          microFamilyIds,
          activeMicroFamilyIds: microFamilyIds,

          side: DASHBOARD_SIDE,
          tradeSide: ONLY_SIDE,
          positionSide: ONLY_SIDE,
          direction: ONLY_SIDE,

          targetTradeSide: ONLY_SIDE,
          dashboardSide: DASHBOARD_SIDE,

          shortOnly: true,
          longDisabled: true,
          manualOnly: true,
          discordOnly: true
        })
      });

      const active = data.activeRotation || data.active || {};
      const activeMicroIds = extractIdsFromRotation(active);
      const activeMacroIds = extractMacroIdsFromRotation(active);

      state.rotation = {
        ...(state.rotation || {}),
        active,
        activeRotation: active,
        activeMicroFamilyIds: activeMicroIds,
        activeMacroFamilyIds: activeMacroIds
      };

      if (state.micros) {
        state.micros = {
          ...state.micros,
          activeRotation: active,
          activeMicroFamilyIds: activeMicroIds,
          activeMacroFamilyIds: activeMacroIds
        };
      }

      setMessage(
        `Manual Discord selection opgeslagen.\n` +
        `Active true micro IDs: ${activeMicroIds.length}\n` +
        `Virtual learning blijft breed doorlopen; alleen Discord alerts zijn geselecteerd.`,
        "ok"
      );

      if (state.activeTab === "rotation") {
        await renderRotation();
        return;
      }

      if (state.activeTab === "micros") {
        await renderMicros(state.microMode);
      }
    }

        </div>

        <div class="section-title">
          <div>
            <h2>Active selected SHORT micro-families</h2>
            <p>Deze IDs worden exact gebruikt voor Discord entry/exit alerts. Niet-geselecteerde families blijven stil leren.</p>
          </div>
        </div>

        ${microRowsTable(activeRows, activeIds, activeMacroIds)}

        <div class="card">
          <h3>Copy block</h3>
          <pre>${escapeHtml(JSON.stringify(activeIds, null, 2))}</pre>
          <pre>${escapeHtml(`ACTIVE_MICRO_FAMILY_IDS=${activeIds.join(",")}`)}</pre>
        </div>

        <div class="card">
          <h3>Raw rotation dashboard</h3>
          ${jsonBlock(data)}
        </div>
      `;

      $("activateManualMicroIdsBtn")?.addEventListener("click", () => {
        const raw = $("manualMicroIds")?.value || "";
        const ids = uniqueStrings(raw.split(/[\n,;\r]+/g));

        activateSelectedMicroFamilies(ids);
      });

      $("clearManualMicroIdsBtn")?.addEventListener("click", () => {
        $("manualMicroIds").value = "";
      });

      $("copyActiveMicroIdsBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeIds, null, 2), `Copied ${activeIds.length} true micro IDs.`));
      $("copyActiveMacroIdsBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeMacroIds, null, 2), `Copied ${activeMacroIds.length} macro IDs.`));
      $("downloadRotationBtn")?.addEventListener("click", () => downloadJson("manual-discord-selection.json", data));

      bindMicroTableEvents();
    }

    async function renderDiscord() {
      showLoading("discord");

      const data = await api(`${endpoints.discord}?limit=60`, {
        timeoutMs: 18000
      });

      state.discord = data;

      const logs = getArrayRows(data, ["logs", "items"]);

      $("discord").innerHTML = `
        <div class="toolbar">
          <button type="button" id="copyDiscordJsonBtn">Copy Discord JSON</button>
          <button type="button" id="downloadDiscordBtn">Export JSON</button>
        </div>

        <div class="grid">
          ${metricCard("Logs", fmtInt(logs.length))}
          ${metricCard("Last log", fmtTs(logs[0]?.ts || logs[0]?.createdAt))}
          ${metricCard("Entry alerts", fmtInt(logs.filter((row) => upper(row.type || row.event).includes("ENTRY")).length))}
          ${metricCard("Exit alerts", fmtInt(logs.filter((row) => upper(row.type || row.event).includes("EXIT")).length))}
        </div>

        ${table(logs, [
          { label: "TS", render: (row) => fmtTs(row.ts || row.createdAt) },
          { label: "Type", render: (row) => escapeHtml(row.type || row.level || row.event || "-") },
          { label: "Coin", render: (row) => coinAvatar(row.payload || row, "sm") },
          { label: "Side", render: () => `<span class="pill short">SHORT</span>` },
          { label: "Selected", render: (row) => {
            const payload = row.payload || row;
            const selected = Boolean(payload.discordAlertEligible || payload.selectedForDiscord || payload.wasSelected);
            return `<span class="pill ${selected ? "active" : ""}">${selected ? "YES" : "NO"}</span>`;
          }},
          { label: "True Micro", render: (row) => `<code>${escapeHtml(microId(row.payload || row))}</code>` },
          { label: "Macro", render: (row) => `<code>${escapeHtml(macroId(row.payload || row))}</code>` },
          { label: "Result", render: (row) => escapeHtml(row.result ? JSON.stringify(row.result) : row.message || row.content || "") }
        ], "Geen Discord logs.")}
      `;

      $("copyDiscordJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(data, null, 2), "Discord JSON gekopieerd."));
      $("downloadDiscordBtn")?.addEventListener("click", () => downloadJson("discord-logs.json", data));
    }

    function renderReset() {
      $("reset").innerHTML = `
        <div class="grid-3">
          <div class="card">
            <h3>Reset learning only</h3>
            <p class="metric-extra">
              Wist week learning. Active manual Discord selection, open virtual positions en scanner snapshots blijven staan.
            </p>
            <button type="button" class="warn" id="resetLearningBtn">Reset learning</button>
          </div>

          <div class="card">
            <h3>Reset manual selection</h3>
            <p class="metric-extra">
              Wist active/next rotation. Learning en virtual positions blijven staan.
            </p>
            <button type="button" class="warn" id="resetRotationBtn">Reset rotation</button>
          </div>

          <div class="card">
            <h3>Factory reset</h3>
            <p class="metric-extra">
              Wist scanner snapshots, trade memory, open positions, analyze stats en rotations.
            </p>
            <input id="factoryConfirm" style="width: 100%; margin-bottom: 8px;" placeholder="FACTORY_RESET_CONFIRMED" />
            <label style="display: block; margin-bottom: 8px;">
              <input id="factoryForce" type="checkbox" />
              force even with open positions
            </label>
            <button type="button" class="danger" id="factoryResetBtn">Factory reset</button>
          </div>
        </div>

        <div class="card">
          <h3>Reset result</h3>
          <pre id="resetResult">Nog geen reset uitgevoerd.</pre>
        </div>
      `;

      $("resetLearningBtn")?.addEventListener("click", postResetLearning);
      $("resetRotationBtn")?.addEventListener("click", postResetRotation);
      $("factoryResetBtn")?.addEventListener("click", postFactoryReset);
    }

    async function postResetLearning() {
      const confirmValue = prompt("Typ RESET_LEARNING om learning te wissen.");

      if (confirmValue !== "RESET_LEARNING") return;

      try {
        const data = await api(endpoints.resetLearning, {
          method: "POST",
          timeoutMs: 25000,
          body: JSON.stringify({
            confirm: "RESET_LEARNING",
            confirmed: "RESET_LEARNING",
            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,
            shortOnly: true,
            longDisabled: true
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("Learning reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    async function postResetRotation() {
      const confirmValue = prompt("Typ RESET_ROTATION om manual Discord selection te wissen.");

      if (confirmValue !== "RESET_ROTATION") return;

      try {
        const data = await api(endpoints.resetRotation, {
          method: "POST",
          timeoutMs: 25000,
          body: JSON.stringify({
            confirm: "RESET_ROTATION",
            confirmed: "RESET_ROTATION",
            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,
            shortOnly: true,
            longDisabled: true
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("Rotation reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    async function postFactoryReset() {
      const confirmValue = $("factoryConfirm").value.trim();
      const forceValue = $("factoryForce").checked;

      if (confirmValue !== "FACTORY_RESET_CONFIRMED") {
        setMessage("Factory reset geblokkeerd: bevestiging is niet exact FACTORY_RESET_CONFIRMED.", "error");
        return;
      }

      if (!confirm("FACTORY RESET wist alles. Doorgaan?")) return;

      try {
        const data = await api(endpoints.factoryReset, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify({
            confirm: "FACTORY_RESET_CONFIRMED",
            confirmed: "FACTORY_RESET_CONFIRMED",
            force: forceValue,
            forceClosePositions: forceValue,
            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,
            shortOnly: true,
            longDisabled: true
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("Factory reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    function showTab(id) {
      if (!tabs.includes(id)) id = "overview";

      state.activeTab = id;

      document.querySelectorAll(".panel").forEach((panel) => panel.classList.add("hidden"));
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));

      $(id).classList.remove("hidden");
      document.querySelector(`[data-tab="${id}"]`)?.classList.add("active");

      location.hash = id;
      refresh(id);
    }

    function renderSoftError(tab, error) {
      const message = friendlyApiMessage(error);

      setMessage(message, "warn");

      $(tab).innerHTML = `
        <div class="card">
          <h3>Niet geladen</h3>
          <div class="empty">
            ${escapeHtml(message)}
          </div>
        </div>
      `;
    }

    async function refresh(tab = state.activeTab) {
      setMessage("");
      $("liveLabel").textContent = `SHORT-only virtual learning · ${new Date().toLocaleTimeString()}`;

      try {
        if (tab === "overview") return await renderOverview();
        if (tab === "scanner") return await renderScanner();
        if (tab === "trade") return await renderTrade();
        if (tab === "micros") return await renderMicros();
        if (tab === "rotation") return await renderRotation();
        if (tab === "discord") return await renderDiscord();
        if (tab === "reset") return renderReset();
      } catch (error) {
        renderSoftError(tab, error);
      }
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => showTab(button.dataset.tab));
    });

    $("refreshBtn").addEventListener("click", () => refresh(state.activeTab));

    window.addEventListener("error", (event) => {
      setMessage(event.message || "Browser error", "error");
    });

    window.addEventListener("unhandledrejection", (event) => {
      setMessage(friendlyApiMessage(event.reason), "warn");
    });

    const initialTab = location.hash.replace("#", "") || "overview";
    showTab(tabs.includes(initialTab) ? initialTab : "overview");
  </script>
</body>
</html>
