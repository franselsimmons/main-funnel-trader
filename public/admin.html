            trueMicroFamilyId: id,
            childTrueMicroFamilyId: id,
            parentTrueMicroFamilyId: parentFromChildTrueMicroFamilyId(id),
            tradeSide: ONLY_SIDE,
            side: DASHBOARD_SIDE,
            selectedTier: "MANUAL",
            shortOnly: true,
            longDisabled: true
          }))
        )
        .filter((row, index, arr) => arr.findIndex((candidate) => microId(candidate) === microId(row)) === index);

      $("rotation").innerHTML = `
        <div class="section-title">
          <div>
            <h2>Manual Discord selection</h2>
            <p>Geen auto-rotatie. Alleen exact geselecteerde SHORT 75-child trueMicroFamilyIds. CurrentFit maakt Discord strenger.</p>
          </div>
        </div>

        <div class="grid">
          ${metricCard("Active 75-child IDs", fmtInt(activeIds.length))}
          ${metricCard("Parent 15 context IDs", fmtInt(parentIds.length))}
          ${metricCard("Rotation ID", active.rotationId || "-")}
          ${metricCard("Mode", active.mode || "manual")}
          ${metricCard("Source", active.source || "-")}
          ${metricCard("Discord alerts", activeIds.length > 0 ? "STRICT" : "OFF")}
          ${metricCard("Virtual learning", "UNCHANGED")}
          ${metricCard("Auto rotation", "DISABLED")}
        </div>

        <div class="card">
          <h3>Manual exact 75-child IDs</h3>
          <p class="metric-extra">
            Plak maximaal 2 trueMicroFamilyIds zoals MICRO_SHORT_BREAKOUT_TREND_A_STRONG_ALIGN.
            Parent IDs zoals MICRO_SHORT_BREAKOUT_TREND worden geweigerd voor Discord selectie.
          </p>

          <textarea id="manualMicroIds" placeholder="MICRO_SHORT_..._A_STRONG_ALIGN">${escapeHtml(activeIds.join("\n"))}</textarea>

          <div class="toolbar">
            <button type="button" class="short-action" id="activateManualBtn">Save max 2 exact Discord IDs</button>
            <button type="button" class="primary" id="activateTopTwoRotationBtn">Select top 2 adaptief</button>
            <button type="button" id="clearManualBtn">Clear input</button>
            <button type="button" class="success" id="copyActiveBtn">Copy active 75-child IDs</button>
            <button type="button" id="exportRotationBtn">Export JSON</button>
          </div>
        </div>

        <div class="section-title">
          <div>
            <h2>Active selected SHORT 75-child micro-families</h2>
            <p>Deze IDs bepalen Discord eligibility. Niet-geselecteerde setups blijven stil leren.</p>
          </div>
        </div>

        ${microTable(rows)}

        <div class="card">
          <h3>Raw rotation dashboard</h3>
          ${jsonBlock(data)}
        </div>
      `;

      $("activateManualBtn")?.addEventListener("click", () => {
        const ids = uniqueStrings(($("manualMicroIds")?.value || "").split(/[\n,;\r]+/g));
        activateSelectedMicroFamilies(ids);
      });

      $("activateTopTwoRotationBtn")?.addEventListener("click", () => {
        activateTopN(2);
      });

      $("clearManualBtn")?.addEventListener("click", () => {
        $("manualMicroIds").value = "";
      });

      $("copyActiveBtn")?.addEventListener("click", () => {
        copyText(JSON.stringify(activeIds, null, 2), "Active 75-child IDs gekopieerd.");
      });

      $("exportRotationBtn")?.addEventListener("click", () => {
        downloadJson("manual-discord-selection-short-75-child.json", data);
      });

      bindMicroEvents();
    }

    async function activateSelectedMicroFamilies(ids = []) {
      const allRequestedIds = uniqueStrings(ids);
      const validIds = allRequestedIds.filter(idAllowedInShortOnly);
      const microFamilyIds = validIds.slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);
      const rejectedIds = allRequestedIds.filter((id) => !idAllowedInShortOnly(id));
      const ignoredExtraIds = validIds.slice(MAX_ACTIVE_DISCORD_MICRO_FAMILIES);

      if (!microFamilyIds.length) {
        setMessage(
          rejectedIds.length
            ? `Geen geldige SHORT 75-child trueMicroFamilyId geselecteerd.\nGeweigerd: ${rejectedIds.join(", ")}`
            : "Geen geldige SHORT 75-child trueMicroFamilyId geselecteerd.",
          "warn"
        );
        return;
      }

      if (!confirm(
        `Activeer Discord alerts voor ${microFamilyIds.length} van maximaal ${MAX_ACTIVE_DISCORD_MICRO_FAMILIES} exacte SHORT 75-child ID(s)?\n\n` +
        `${microFamilyIds.join("\n")}` +
        `${ignoredExtraIds.length ? `\n\nGenegeerd boven limiet:\n${ignoredExtraIds.join("\n")}` : ""}\n\n` +
        "Virtual/shadow learning blijft breed doorlopen. CurrentFit mag Discord blokkeren."
      )) {
        return;
      }

      const data = await api(endpoints.rotation, {
        method: "POST",
        timeoutMs: 28000,
        body: JSON.stringify({
          action: "activateSelectedMicroFamilies",

          microFamilyIds,
          activeMicroFamilyIds: microFamilyIds,
          trueMicroFamilyIds: microFamilyIds,
          childTrueMicroFamilyIds: microFamilyIds,

          maxActiveMicroFamilies: MAX_ACTIVE_DISCORD_MICRO_FAMILIES, // <<< toegevoegd
          maxManualMicroFamilies: MAX_ACTIVE_DISCORD_MICRO_FAMILIES, // <<< toegevoegd
          maxSelectedMicroFamilies: MAX_ACTIVE_DISCORD_MICRO_FAMILIES, // <<< toegevoegd

          macroFamilyIds: [],
          activeMacroFamilyIds: [],

          side: DASHBOARD_SIDE,
          tradeSide: ONLY_SIDE,
          positionSide: ONLY_SIDE,
          direction: ONLY_SIDE,
          targetTradeSide: ONLY_SIDE,
          dashboardSide: DASHBOARD_SIDE,

          shortOnly: true,
          longDisabled: true,
          disableLong: true,

          manualOnly: true,
          adminSelected: true,
          autoRotation: false,

          trueMicroFamilySchema: TRUE_MICRO_SCHEMA,
          parentTrueMicroFamilySchema: PARENT_TRUE_MICRO_SCHEMA,
          learningGranularity: LEARNING_GRANULARITY,
          parentLearningGranularity: PARENT_LEARNING_GRANULARITY,
          selectionGranularity: "EXACT_75_CHILD",

          currentFitPolarity: "BEARISH_POSITIVE_BULLISH_NEGATIVE",
          currentFitDefinition: "SHORT_MIRRORED_CURRENT_FIT",
          currentFitSoftOnly: true,
          currentFitBlocksLearning: false,
          selectionIsAdaptive: true,

          riskGeometryRule: "SHORT: tp < entry < sl",
          tpHitRule: "SHORT: price <= tp",
          slHitRule: "SHORT: price >= sl",
          grossRFormula: "(entry - exitPrice) / (initialSl - entry)",
          currentRFormula: "(entry - currentPrice) / (initialSl - entry)",

          discordOnlyForSelectedMicroFamilies: true,
          discordOnlyForExactTrueMicroMatch: true,
          discordRequiresCurrentFit: true,
          macroMatchDoesNotTriggerDiscord: true,
          parentMacroMatchDoesNotTriggerDiscord: true
        })
      });

      const active = data.active || data.activeRotation || {};
      const activeIds = uniqueStrings([
        active.activeMicroFamilyIds || [],
        active.microFamilyIds || [],
        active.trueMicroFamilyIds || [],
        data.activeMicroFamilyIds || []
      ])
        .filter(idAllowedInShortOnly)
        .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES); // <<< gewijzigd

      state.rotation = {
        ...(state.rotation || {}),
        ...data,
        active,
        activeRotation: active,
        activeMicroFamilyIds: activeIds
      };

      setMessage(
        `Manual Discord selection opgeslagen.\nActive SHORT 75-child IDs: ${activeIds.length}/${MAX_ACTIVE_DISCORD_MICRO_FAMILIES}\nVirtual/shadow learning blijft breed doorlopen.`,
        "ok"
      );

      if (state.activeTab === "rotation") await renderRotation();
      if (state.activeTab === "micros") await renderMicros();
    }

    async function openMicro(id) {
      if (!id) return;

      const drawer = $("drawer");

      drawer.classList.remove("hidden");
      drawer.innerHTML = `
        <div class="drawer-head">
          <div>
            <h2>${escapeHtml(id)}</h2>
            <div class="metric-extra">Detail wordt geladen...</div>
          </div>
          <button type="button" id="closeDrawerBtn">Close</button>
        </div>
      `;

      $("closeDrawerBtn")?.addEventListener("click", closeDrawer);

      try {
        const data = await api(`${endpoints.microDetail}/${encodeURIComponent(id)}`, {
          timeoutMs: 18000
        });

        const row = normalizeMicroRowForUi(data.row || data.microFamily || data);

        drawer.innerHTML = `
          <div class="drawer-head">
            <div>
              <h2>${escapeHtml(id)}</h2>
              <div class="metric-extra">75-child=${escapeHtml(microId(row))} · parent=${escapeHtml(parentMicroId(row))}</div>
            </div>
            <button type="button" id="closeDrawerBtn">Close</button>
          </div>

          <div class="toolbar">
            <span class="pill short">SHORT</span>
            <span class="pill dark">75-child exact</span>
            ${statusPill(row)}
            ${currentFitPill(row)}
            ${tooEarly(row) ? `<span class="pill warn">${escapeHtml(fmt(completed(row), 0))}/${MIN_COMPLETED_ACTIVE_LEARNING}</span>` : ""}
            <button type="button" class="short-action" data-activate-slot="1" data-activate-id="${escapeAttr(microId(row))}" ${isSelectableTrueMicroId(microId(row)) ? "" : "disabled"}>Zet als #1</button>
            <button type="button" class="short-action" data-activate-slot="2" data-activate-id="${escapeAttr(microId(row))}" ${isSelectableTrueMicroId(microId(row)) ? "" : "disabled"}>Zet als #2</button>
            <button type="button" class="warn" data-clear-slot="2">Maak #2 leeg</button>
          </div>

          <div class="grid">
            ${metricCard("Seen", fmtInt(observationSample(row)))}
            ${metricCard("Observations", fmtInt(observationSample(row)))}
            ${metricCard("Obs dedupe skipped", fmtInt(row.observationDuplicateSkippedCount))}
            ${metricCard("Completed", fmt(completed(row), 2), tooEarly(row) ? `minimum ${MIN_COMPLETED_ACTIVE_LEARNING}` : "active learning")}
            ${metricCard("Winrate raw", fmtPct(row.winrate))}
            ${metricCard("Fair WR", fmtPct(row.fairWinrate ?? row.sampleAdjustedWinrate))}
            ${metricCard("AvgR net", fmt(row.avgR, 3))}
            ${metricCard("TotalR net", fmt(row.totalR, 3))}
            ${metricCard("AvgCostR", fmt(avgCostR(row), 3))}
            ${metricCard("DirectSL", fmtPct(directSLPct(row)))}
            ${metricCard("CurrentFit", currentFit(row))}
            ${metricCard("Adaptive", fmt(adaptiveScore(row), 2))}
          </div>

          <div class="card">
            <h3>Raw detail JSON</h3>
            ${jsonBlock(data)}
          </div>
        `;

        $("closeDrawerBtn")?.addEventListener("click", closeDrawer);
        bindMicroEvents();
        $("copyDrawerBtn")?.addEventListener("click", () => copyText(microId(row), "75-child trueMicroFamilyId gekopieerd."));
      } catch (error) {
        drawer.innerHTML = `
          <div class="drawer-head">
            <div>
              <h2>${escapeHtml(id)}</h2>
              <div class="metric-extra">Detail API niet geladen.</div>
            </div>
            <button type="button" id="closeDrawerBtn">Close</button>
          </div>

          <div class="message warn">${escapeHtml(friendlyApiMessage(error))}</div>
        `;

        $("closeDrawerBtn")?.addEventListener("click", closeDrawer);
      }
    }

    function closeDrawer() {
      $("drawer").classList.add("hidden");
      $("drawer").innerHTML = "";
    }

    async function renderDiscord() {
      showLoading("discord");

      const data = await api(`${endpoints.discord}?limit=60`, {
        timeoutMs: 18000
      });

      state.discord = data;

      const logs = asArray(data.logs || data.items || data.data);

      $("discord").innerHTML = `
        <div class="toolbar">
          <button type="button" id="copyDiscordBtn">Copy JSON</button>
          <button type="button" id="exportDiscordBtn">Export JSON</button>
        </div>

        <div class="grid">
          ${metricCard("Logs", fmtInt(logs.length))}
          ${metricCard("Last log", fmtTs(logs[0]?.ts || logs[0]?.createdAt))}
          ${metricCard("Entry alerts", fmtInt(logs.filter((row) => upper(row.type || row.event).includes("ENTRY")).length))}
          ${metricCard("Exit alerts", fmtInt(logs.filter((row) => upper(row.type || row.event).includes("EXIT")).length))}
          ${metricCard("Match mode", "EXACT 75-child")}
          ${metricCard("CurrentFit", "STRICT")}
          ${metricCard("Parent match", "OFF")}
          ${metricCard("Scanner match", "OFF")}
        </div>

        ${table(logs, [
          { label: "TS", render: (row) => fmtTs(row.ts || row.createdAt) },
          { label: "Type", render: (row) => escapeHtml(row.type || row.level || row.event || "-") },
          { label: "Symbol", render: (row) => escapeHtml(baseSymbol(row.payload || row)) },
          { label: "Side", render: () => '<span class="pill short">SHORT</span>' },
          { label: "Selected exact", render: (row) => {
            const payload = row.payload || row;
            const id = microId(payload);
            const selected = Boolean(
              payload.selectedMicroFamilyAlert ||
              payload.discordAlertEligible ||
              payload.selectedForDiscord ||
              payload.wasSelected ||
              row.selectedOnly
            ) && isSelectableTrueMicroId(id);

            return `<span class="pill ${selected ? "active" : ""}">${selected ? "YES" : "NO"}</span>`;
          }},
          { label: "CurrentFit", render: (row) => currentFitPill(row.payload || row) },
          { label: "75-child true micro", render: (row) => `<code>${escapeHtml(microId(row.payload || row) || "-")}</code>` },
          { label: "Parent 15", render: (row) => `<code>${escapeHtml(parentMicroId(row.payload || row) || "-")}</code>` },
          { label: "Message", render: (row) => escapeHtml(row.message || row.content || row.result || row.reason || "") }
        ], "Geen Discord logs.")}
      `;

      $("copyDiscordBtn")?.addEventListener("click", () => copyText(JSON.stringify(data, null, 2), "Discord JSON gekopieerd."));
      $("exportDiscordBtn")?.addEventListener("click", () => downloadJson("discord-logs-short-75-child.json", data));
    }

    function renderReset() {
      $("reset").innerHTML = `
        <div class="grid-3">
          <div class="card">
            <h3>Reset learning only</h3>
            <p class="metric-extra">
              Wist SHORT learning data onder ${SHORT_KEY_PREFIX}. Manual Discord selection, open virtual positions en scanner snapshots blijven staan.
            </p>
            <button type="button" class="warn" id="resetLearningBtn">Reset learning</button>
          </div>

          <div class="card">
            <h3>Reset manual selection</h3>
            <p class="metric-extra">
              Wist active/next SHORT rotation. Learning en virtual positions blijven staan.
            </p>
            <button type="button" class="warn" id="resetRotationBtn">Reset rotation</button>
          </div>

          <div class="card">
            <h3>Factory reset</h3>
            <p class="metric-extra">
              Wist SHORT scanner snapshots, trade memory, open positions, analyze stats en rotations.
            </p>
            <input id="factoryConfirm" style="width: 100%; margin-bottom: 8px;" placeholder="SHORT_FACTORY_RESET_CONFIRMED" />
            <label style="display: block; margin-bottom: 8px;">
              <input id="factoryForce" type="checkbox" />
              force even with open positions
            </label>
            <button type="button" class="danger" id="factoryResetBtn">Factory reset</button>
          </div>
        </div>

        <div class="card">
          <h3>Reset result</h3>
          <pre id="resetResult">Nog geen reset uitgevoerd.</pre>
        </div>
      `;

      $("resetLearningBtn")?.addEventListener("click", postResetLearning);
      $("resetRotationBtn")?.addEventListener("click", postResetRotation);
      $("factoryResetBtn")?.addEventListener("click", postFactoryReset);
    }

    async function postResetLearning() {
      const confirmValue = prompt("Typ RESET_LEARNING_SHORT om SHORT learning te wissen.");

      if (confirmValue !== "RESET_LEARNING_SHORT") return;

      try {
        const data = await api(endpoints.resetLearning, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify({
            confirm: "RESET_LEARNING_SHORT",
            confirmed: "RESET_LEARNING_SHORT",
            confirmation: "RESET_LEARNING_SHORT",
            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,
            shortOnly: true,
            longDisabled: true,
            trueMicroFamilySchema: TRUE_MICRO_SCHEMA,
            parentTrueMicroFamilySchema: PARENT_TRUE_MICRO_SCHEMA,
            persistentLearningKey: PERSISTENT_LEARNING_KEY,
            redisNamespace: SHORT_NAMESPACE,
            redisKeyPrefix: SHORT_KEY_PREFIX
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("SHORT learning reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    async function postResetRotation() {
      const confirmValue = prompt("Typ RESET_ROTATION_SHORT om manual Discord selection te wissen.");

      if (confirmValue !== "RESET_ROTATION_SHORT") return;

      try {
        const data = await api(endpoints.resetRotation, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify({
            confirm: "RESET_ROTATION_SHORT",
            confirmed: "RESET_ROTATION_SHORT",
            confirmation: "RESET_ROTATION_SHORT",
            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,
            shortOnly: true,
            longDisabled: true,
            trueMicroFamilySchema: TRUE_MICRO_SCHEMA,
            parentTrueMicroFamilySchema: PARENT_TRUE_MICRO_SCHEMA,
            persistentLearningKey: PERSISTENT_LEARNING_KEY,
            redisNamespace: SHORT_NAMESPACE,
            redisKeyPrefix: SHORT_KEY_PREFIX
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("SHORT rotation reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    async function postFactoryReset() {
      const confirmValue = $("factoryConfirm").value.trim();
      const force = $("factoryForce").checked;

      if (confirmValue !== "SHORT_FACTORY_RESET_CONFIRMED") {
        setMessage("Factory reset geblokkeerd: bevestiging is niet exact SHORT_FACTORY_RESET_CONFIRMED.", "error");
        return;
      }

      if (!confirm("SHORT FACTORY RESET wist alles in de SHORT namespace. Doorgaan?")) return;

      try {
        const data = await api(endpoints.factoryReset, {
          method: "POST",
          timeoutMs: 30000,
          body: JSON.stringify({
            confirm: "SHORT_FACTORY_RESET_CONFIRMED",
            confirmed: "SHORT_FACTORY_RESET_CONFIRMED",
            confirmation: "SHORT_FACTORY_RESET_CONFIRMED",
            force,
            forceClosePositions: force,

            side: DASHBOARD_SIDE,
            tradeSide: ONLY_SIDE,
            targetTradeSide: ONLY_SIDE,

            shortOnly: true,
            longDisabled: true,
            trueMicroFamilySchema: TRUE_MICRO_SCHEMA,
            parentTrueMicroFamilySchema: PARENT_TRUE_MICRO_SCHEMA,
            persistentLearningKey: PERSISTENT_LEARNING_KEY,
            redisNamespace: SHORT_NAMESPACE,
            redisKeyPrefix: SHORT_KEY_PREFIX
          })
        });

        $("resetResult").textContent = JSON.stringify(data, null, 2);
        setMessage("SHORT factory reset uitgevoerd.", "ok");
      } catch (error) {
        setMessage(friendlyApiMessage(error), "warn");
      }
    }

    function showTab(id) {
      const next = tabs.includes(id) ? id : "overview";

      state.activeTab = next;

      document.querySelectorAll(".panel").forEach((panel) => panel.classList.add("hidden"));
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));

      $(next).classList.remove("hidden");
      document.querySelector(`[data-tab="${next}"]`)?.classList.add("active");

      location.hash = next;
      refresh(next);
    }

    function renderSoftError(tab, error) {
      const message = friendlyApiMessage(error);

      setMessage(message, "warn");

      $(tab).innerHTML = `
        <div class="card">
          <h3>Niet geladen</h3>
          <div class="empty">${escapeHtml(message)}</div>
        </div>
      `;
    }

    async function refresh(tab = state.activeTab) {
      setMessage("");
      $("liveLabel").textContent = `SHORT-only · broad learning · adaptive selection · ${new Date().toLocaleTimeString()}`;

      try {
        if (tab === "overview") return await renderOverview();
        if (tab === "market") return await renderMarket();
        if (tab === "scanner") return await renderScanner();
        if (tab === "trade") return await renderTrade();
        if (tab === "micros") return await renderMicros();
        if (tab === "rotation") return await renderRotation();
        if (tab === "discord") return await renderDiscord();
        if (tab === "reset") return renderReset();
      } catch (error) {
        renderSoftError(tab, error);
      }
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => showTab(button.dataset.tab));
    });

    $("refreshBtn").addEventListener("click", () => refresh(state.activeTab));

    window.addEventListener("error", (event) => {
      setMessage(event.message || "Browser error", "error");
    });

    window.addEventListener("unhandledrejection", (event) => {
      setMessage(friendlyApiMessage(event.reason), "warn");
    });

    const initialTab = location.hash.replace("#", "") || "overview";
    showTab(tabs.includes(initialTab) ? initialTab : "overview");
  </script>
</body>
</html>
