<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SHORT Micro-Micro MarketWeather Admin</title>

  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --dark: #0f172a;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --blue: #2563eb;
      --purple: #7c3aed;
      --shadow: 0 2px 12px rgba(15, 23, 42, 0.07);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(220, 38, 38, 0.13), transparent 32%),
        radial-gradient(circle at top right, rgba(15, 23, 42, 0.12), transparent 34%),
        var(--bg);
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 14px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: 0.14s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    button.primary { background: var(--dark); color: white; border-color: var(--dark); }
    button.success { background: var(--green); color: white; border-color: var(--green); }
    button.warn { background: var(--amber); color: white; border-color: var(--amber); }
    button.danger { background: var(--red); color: white; border-color: var(--red); }
    button.short-action { background: var(--red); color: white; border-color: var(--red); }
    button.small { padding: 6px 9px; border-radius: 9px; font-size: 12px; }

    select,
    input,
    textarea {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      min-height: 42px;
    }

    input[type="search"] { min-width: 360px; }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      line-height: 1.45;
    }

    header {
      background: linear-gradient(135deg, #0f172a 0%, #111827 46%, #7f1d1d 100%);
      color: white;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-inner {
      max-width: 1540px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #dc2626, #fca5a5);
      box-shadow: 0 12px 32px rgba(220, 38, 38, 0.30);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-title strong {
      display: block;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: #cbd5e1;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #fca5a5;
      box-shadow: 0 0 0 4px rgba(252, 165, 165, 0.18);
    }

    main {
      max-width: 1540px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(243, 245, 249, 0.88);
      backdrop-filter: blur(14px);
      padding: 10px 0;
    }

    .tab {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.80);
      border-color: rgba(203, 213, 225, 0.90);
    }

    .tab.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .hidden,
    .panel.hidden {
      display: none;
    }

    .message {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
    }

    .message.ok { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .message.error { color: #991b1b; background: #fee2e2; border-color: #fecaca; }
    .message.warn { color: #92400e; background: #fef3c7; border-color: #fde68a; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #334155;
    }

    .metric-card {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .metric-extra {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin: 12px 0 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .pill.active { background: #dcfce7; color: #166534; }
    .pill.short { background: #fee2e2; color: #991b1b; }
    .pill.danger { background: #fee2e2; color: #991b1b; }
    .pill.warn { background: #fef3c7; color: #92400e; }
    .pill.info { background: #dbeafe; color: #1d4ed8; }
    .pill.purple { background: #ede9fe; color: #5b21b6; }
    .pill.dark { background: #0f172a; color: white; }
    .pill.soft { background: #e0f2fe; color: #075985; }
    .pill.observation { background: #fef9c3; color: #854d0e; }
    .pill.raw { background: #f1f5f9; color: #475569; }
    .pill.fit { background: #dcfce7; color: #166534; }
    .pill.neutral { background: #f1f5f9; color: #475569; }
    .pill.misfit { background: #fee2e2; color: #991b1b; }
    .pill.clean { background: #dcfce7; color: #166534; }
    .pill.legacy { background: #ffedd5; color: #9a3412; }
    .pill.mm { background: #ede9fe; color: #5b21b6; }
    .pill.passed { background: #dcfce7; color: #166534; }
    .pill.rejected { background: #fee2e2; color: #991b1b; }
    .pill.veto { background: #fef2f2; color: #7f1d1d; border: 1px solid #fca5a5; }
    .pill.blocked { background: #fecaca; color: #7f1d1d; }
    .pill.best { background: #0f172a; color: white; }
    .pill.trade-ready { background: #dcfce7; color: #166534; }
    .pill.watch { background: #dbeafe; color: #1d4ed8; }
    .pill.observe { background: #fef9c3; color: #854d0e; }
    .pill.weather { background: #e0f2fe; color: #075985; }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1300px;
      background: white;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td { background: #f8fafc; }

    code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 3px 5px;
      border-radius: 6px;
      color: #334155;
      white-space: nowrap;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1020;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 16px;
      max-height: 520px;
      overflow: auto;
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.48;
    }

    .api-url-box {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .api-url-box code {
      white-space: normal;
      word-break: break-all;
    }

    .api-output-textarea {
      width: 100%;
      min-height: 360px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      background: #0b1020;
      color: #e5e7eb;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 14px;
      white-space: pre;
      user-select: all;
    }

    .audit-output-textarea {
      min-height: 620px;
      font-size: 12px;
    }

    .micro-id-cell {
      max-width: 460px;
      white-space: normal;
      word-break: break-word;
    }

    .micro-id-cell code {
      white-space: normal;
      word-break: break-all;
      line-height: 1.5;
    }

    .reason-cell {
      max-width: 500px;
      white-space: normal;
      word-break: break-word;
      line-height: 1.4;
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.70);
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(920px, 94vw);
      background: white;
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 42px rgba(15, 23, 42, 0.18);
      padding: 20px;
      overflow: auto;
      z-index: 30;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .boot-error {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 14px;
      white-space: pre-wrap;
    }

    @media (max-width: 1180px) {
      .grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
      .grid-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      header { padding: 18px 14px; }
      .header-inner { flex-direction: column; }
      main { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
      .tab { flex: 1 1 auto; padding: 9px 10px; }
      input[type="search"] { min-width: 100%; }
      .api-output-textarea { min-height: 420px; font-size: 11px; }
      .audit-output-textarea { min-height: 600px; font-size: 11px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="brand-title">
        <div class="brand-logo">MW</div>
        <div>
          <strong>SHORT Micro-Micro MarketWeather Admin</strong>
          <div class="brand-subtitle">
            Exact micro-micro learning · MarketWeather capture live · selector/sizing/FDR observe · compact API-audit voor controle.
          </div>
        </div>
      </div>

      <div class="header-actions">
        <div class="live-pill">
          <span class="live-dot"></span>
          <span id="liveLabel">SHORT-only · MarketWeather V1 · empirical veto</span>
        </div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="overview">Overview</button>
      <button type="button" class="tab" data-tab="market">MarketWeather</button>
      <button type="button" class="tab" data-tab="scanner">Scanner</button>
      <button type="button" class="tab" data-tab="trade">TradeSystem</button>
      <button type="button" class="tab" data-tab="micros">Micro-Micro</button>
      <button type="button" class="tab" data-tab="rotation">Manual Discord Selection</button>
      <button type="button" class="tab" data-tab="discord">Discord Logs</button>
      <button type="button" class="tab" data-tab="reset">Reset</button>
    </div>

    <div id="message"></div>

    <section id="overview" class="panel"></section>
    <section id="market" class="panel hidden"></section>
    <section id="scanner" class="panel hidden"></section>
    <section id="trade" class="panel hidden"></section>
    <section id="micros" class="panel hidden"></section>
    <section id="rotation" class="panel hidden"></section>
    <section id="discord" class="panel hidden"></section>
    <section id="reset" class="panel hidden"></section>
  </main>

  <div id="drawer" class="drawer hidden"></div>

  <script>
    (() => {
      "use strict";

      const ONLY_SIDE = "SHORT";
      const OPPOSITE_SIDE = "LONG";
      const DASHBOARD_SIDE = "bear";
      const SHORT_NAMESPACE = "SHORT";
      const SHORT_KEY_PREFIX = "SHORT:";
      const PERSISTENT_LEARNING_KEY = "SHORT_LIVE";

      const MIN_COMPLETED_MICRO_MICRO_ACTIVE = 35;
      const MAX_ACTIVE_DISCORD_MICRO_FAMILIES = 2;
      const PLAYBOOK_MAX_AGE_MIN = 240;
      const DEFAULT_POSITION_TIME_STOP_MIN = 720;

      const MARKET_WEATHER_KEY_VERSION = "SHORT_MARKET_WEATHER_KEY_V1";
      const MARKET_WEATHER_AGGREGATION_VERSION = "SHORT_MARKET_WEATHER_AGGREGATION_V1_REGIME_REGIMETREND";
      const MARKET_WEATHER_SELECTOR_VERSION = "SHORT_CURRENT_MARKET_PLAYBOOK_SELECTOR_V1_OBSERVE";
      const MARKET_WEATHER_FDR_VERSION = "SHORT_MARKET_WEATHER_PLAYBOOK_FDR_FINAL_SLOTS_V1_OBSERVE";
      const MARKET_WEATHER_FEATURE_FLAGS_VERSION = "SHORT_MARKET_WEATHER_FEATURE_FLAGS_V1_OBSERVE";

      const EMPIRICAL_VETO_VERSION = "SHORT_EXACT_MICRO_MICRO_EMPIRICAL_VETO_LCB95_V1";

      const MICRO_MICRO_RUNTIME_GATE_VERSION = "SHORT_MM_RUNTIME_GATE_OBSERVING_PASSED_REJECTED_EMPIRICAL_VETO_POLICY_BLOCKED_V4_FRONTEND";
      const MICRO_MICRO_BEST_SELECTOR_VERSION = "SHORT_MM_BEST_SELECTOR_CURRENT_MARKET_WEATHER_NET_EDGE_V4_FRONTEND";

      const MICRO_MICRO_STATUS_OBSERVING = "OBSERVING";
      const MICRO_MICRO_STATUS_PASSED = "PASSED";
      const MICRO_MICRO_STATUS_REJECTED = "REJECTED";
      const MICRO_MICRO_STATUS_EMPIRICAL_VETO = "EMPIRICAL_VETO";
      const MICRO_MICRO_STATUS_POLICY_BLOCKED = "POLICY_BLOCKED";

      const SIGNAL_TYPE_TRADE_READY = "TRADE_READY";
      const SIGNAL_TYPE_WATCH_ONLY = "WATCH_ONLY";
      const SIGNAL_TYPE_OBSERVE_ONLY = "OBSERVE_ONLY";
      const SIGNAL_TYPE_BLOCKED = "BLOCKED";

      const PROOF_TIER_MICRO_MICRO_MARKET = "MICRO_MICRO_MARKET_PROOF";
      const PROOF_TIER_MICRO_MICRO_LIFETIME = "MICRO_MICRO_LIFETIME_PROOF";
      const PROOF_TIER_OBSERVATION_ONLY = "OBSERVATION_ONLY";
      const PROOF_TIER_EMPIRICAL_VETO = "EMPIRICAL_VETO";
      const PROOF_TIER_POLICY_BLOCKED = "POLICY_BLOCKED";

      const PARENT_TRUE_MICRO_SCHEMA = "FIXED_TAXONOMY_15";
      const CHILD_TRUE_MICRO_SCHEMA = "FIXED_TAXONOMY_75";
      const TRUE_MICRO_SCHEMA = CHILD_TRUE_MICRO_SCHEMA;
      const MICRO_MICRO_SCHEMA = "FIXED_TAXONOMY_MICRO_MICRO_V1";
      const MICRO_MICRO_VERSION = "SHORT_PARENT_15_MICRO_75_MICRO_MICRO_ONLY_SELECTION_V2_MARKET_WEATHER";

      const PARENT_LEARNING_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_V1";
      const CHILD75_LEARNING_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_X_CONFIRMATION_V1";
      const MICRO_MICRO_LEARNING_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_X_CONFIRMATION_X_EXECUTION_CONTEXT_V1";

      const SHORT_RISK_PLAN_VERSION = "SHORT_ADAPTIVE_RR_TP_SL_V2";
      const POSITION_COST_MODEL_VERSION = "POSITION_ENGINE_SHORT_NET_COST_V14_WEATHER_AWARE";
      const MEASUREMENT_FIX_VERSION = "SHORT_MEASUREMENT_FIX_CANDLE_FIRST_TOUCH_MICRO_MICRO_V1";
      const OBSERVATION_DEDUPE_VERSION = "SHORT_OBS_DEDUPE_SNAPSHOT_SYMBOL_MICRO_ENTRY_V2";
      const OUTCOME_DEDUPE_VERSION = "SHORT_OUTCOME_DEDUPE_CLOSED_POSITION_V6_WEATHER_AWARE";
      const ADAPTIVE_UI_VERSION = "SHORT_ADAPTIVE_UI_MARKETWEATHER_EMPIRICAL_VETO_FRONTEND_V2";
      const DISCORD_ACTIVATION_GATE_VERSION = "SHORT_MM_DISCORD_ACTIVATION_GATE_EMPIRICAL_VETO_RISK_ZERO_V5_FRONTEND";

      const MICRO_SHORT_PREFIX = "MICRO_SHORT_";
      const MM_SHORT_PREFIX = "MM_SHORT_";
      const MICRO_MICRO_MARKER = "_MM_";
      const MICRO_MICRO_HASH_LEN = 10;

      const SETUPS = ["BREAKOUT", "RETEST", "SWEEP_REVERSAL", "CONTINUATION", "COMPRESSION"];
      const REGIMES = ["TREND", "CHOP", "SQUEEZE"];
      const CONFIRMATIONS = ["A_STRONG_ALIGN", "B_FLOW_ALIGN", "C_VOLUME_ALIGN", "D_MIXED_OK", "E_WEAK_CONTRA"];

      const MICRO_MICRO_STATUS_RANK = Object.freeze({
        [MICRO_MICRO_STATUS_PASSED]: 0,
        [MICRO_MICRO_STATUS_OBSERVING]: 1,
        [MICRO_MICRO_STATUS_REJECTED]: 2,
        [MICRO_MICRO_STATUS_EMPIRICAL_VETO]: 3,
        [MICRO_MICRO_STATUS_POLICY_BLOCKED]: 4,
        UNKNOWN: 99
      });

      const SIGNAL_RANK = Object.freeze({
        [SIGNAL_TYPE_TRADE_READY]: 0,
        [SIGNAL_TYPE_WATCH_ONLY]: 1,
        [SIGNAL_TYPE_OBSERVE_ONLY]: 2,
        [SIGNAL_TYPE_BLOCKED]: 3,
        UNKNOWN: 99
      });

      const endpoints = {
        overview: "/api/admin/overview",
        market: "/api/admin/market-weather",
        scanner: "/api/admin/scanner",
        trade: "/api/admin/trade",
        micros: "/api/admin/micro-families",
        rotation: "/api/admin/rotation",
        discord: "/api/admin/discord-logs",
        microDetail: "/api/admin/micro-family",
        runScanner: "/api/scanner/run?force=true",
        runTrade: "/api/trade/run?force=true&forceProcessSnapshot=true",
        resetLearning: "/api/admin/reset-learning",
        resetRotation: "/api/admin/reset-rotation",
        factoryReset: "/api/admin/factory-reset"
      };

      const tabs = ["overview", "market", "scanner", "trade", "micros", "rotation", "discord", "reset"];
      const microModes = ["currentMarket", "tradeReady", "watch", "observe", "passed", "diagnose", "best", "winrate", "totalR", "avgR", "directSL", "cost", "currentFit", "observed", "clean"];

      const state = {
        activeTab: "overview",
        overview: null,
        market: null,
        scanner: null,
        trade: null,
        micros: null,
        rotation: null,
        discord: null,
        apiAudit: null,
        microMode: "currentMarket",
        microSearch: "",
        apiTimeoutMs: 22000,
        microLimit: 260,
        bestLimit: 220,
        currentMarketWeatherRegime: "",
        currentMarketWeatherTrendSide: "",
        currentMarketWeatherKey: ""
      };

      const $ = (id) => document.getElementById(id);

      class ApiError extends Error {
        constructor(message, details = {}) {
          super(message);

      }

      function normalizeMarketWeatherRegime(value = "") {
        const raw = upper(value);
        if (raw.includes("SQUEEZE") || raw.includes("COMPRESS") || raw.includes("COIL") || raw.includes("LOW_VOL")) return "SQUEEZE";
        if (raw.includes("CHOP") || raw.includes("RANGE") || raw.includes("SIDEWAYS") || raw.includes("MIXED")) return "CHOP";
        if (raw.includes("TREND") || raw.includes("FLOW") || raw.includes("MOMENTUM") || raw.includes("DIRECTION")) return "TREND";
        return raw || "UNKNOWN";
      }

      function normalizeMarketWeatherTrendSide(value = "") {
        const raw = upper(value);
        if (raw.includes("BEAR") || raw.includes("SHORT") || raw.includes("SELL") || raw.includes("DOWN") || raw.includes("RISK_OFF")) return "BEARISH";
        if (raw.includes("BULL") || raw.includes("LONG") || raw.includes("BUY") || raw.includes("UP") || raw.includes("RISK_ON")) return "BULLISH";
        if (raw.includes("NEUTRAL") || raw.includes("MIXED") || raw.includes("FLAT")) return "NEUTRAL";
        return raw || "UNKNOWN";
      }

      function buildMarketWeatherKey(regime, trendSide) {
        return `${normalizeMarketWeatherRegime(regime)}|${normalizeMarketWeatherTrendSide(trendSide)}`;
      }

      function parseWeatherKey(key = "") {
        const raw = upper(key);
        if (!raw.includes("|")) {
          return {
            key: "UNKNOWN|UNKNOWN",
            regime: "UNKNOWN",
            trendSide: "UNKNOWN",
            known: false
          };
        }

        const [regimeRaw, trendRaw] = raw.split("|");

        const regime = normalizeMarketWeatherRegime(regimeRaw);
        const trendSide = normalizeMarketWeatherTrendSide(trendRaw);
        const normalizedKey = `${regime}|${trendSide}`;

        return {
          key: normalizedKey,
          regime,
          trendSide,
          known: regime !== "UNKNOWN" && trendSide !== "UNKNOWN"
        };
      }

      function currentMarketWeather() {
        const explicitKey = upper(state.currentMarketWeatherKey);

        if (explicitKey && explicitKey.includes("|")) {
          const parsed = parseWeatherKey(explicitKey);
          return {
            confirmedMarketWeatherKey: parsed.key,
            currentMarketWeatherKey: parsed.key,
            currentMarketWeatherRegime: parsed.regime,
            currentMarketWeatherTrendSide: parsed.trendSide,
            currentMarketWeatherKnown: parsed.known
          };
        }

        const regime = normalizeMarketWeatherRegime(state.currentMarketWeatherRegime);
        const trendSide = normalizeMarketWeatherTrendSide(state.currentMarketWeatherTrendSide);
        const key = buildMarketWeatherKey(regime, trendSide);

        return {
          confirmedMarketWeatherKey: key,
          currentMarketWeatherKey: key,
          currentMarketWeatherRegime: regime,
          currentMarketWeatherTrendSide: trendSide,
          currentMarketWeatherKnown: regime !== "UNKNOWN" && trendSide !== "UNKNOWN"
        };
      }

      function entryMarketWeather(row = {}) {
        const directKey = upper(row.entryMarketWeatherKey || row.currentMarketWeatherKey || row.marketWeatherKey || row.currentMarketCandidate?.currentMarketWeatherKey || "");
        const directRegime = normalizeMarketWeatherRegime(row.entryMarketWeatherRegime || row.currentMarketWeatherRegime || row.marketWeatherRegime || row.currentMarketCandidate?.currentMarketWeatherRegime || "");
        const directTrend = normalizeMarketWeatherTrendSide(row.entryMarketWeatherTrendSide || row.currentMarketWeatherTrendSide || row.marketWeatherTrendSide || row.currentMarketCandidate?.currentMarketWeatherTrendSide || "");

        if (directKey && directKey.includes("|")) {
          const parsed = parseWeatherKey(directKey);

          return {
            entryMarketWeatherKey: parsed.key,
            entryMarketWeatherRegime: parsed.regime,
            entryMarketWeatherTrendSide: parsed.trendSide,
            entryMarketWeatherKnown: parsed.known,
            entryMarketWeatherKeyVersion: row.entryMarketWeatherKeyVersion || MARKET_WEATHER_KEY_VERSION,
            entryMarketWeatherCapturedAt: row.entryMarketWeatherCapturedAt || null,
            entryMarketWeatherRaw: row.entryMarketWeatherRaw || null,
            entryMarketWeatherRawAvailableFields: Array.isArray(row.entryMarketWeatherRawAvailableFields) ? row.entryMarketWeatherRawAvailableFields : []
          };
        }

        const key = buildMarketWeatherKey(directRegime, directTrend);
        const parsed = parseWeatherKey(key);

        return {
          entryMarketWeatherKey: parsed.key,
          entryMarketWeatherRegime: parsed.regime,
          entryMarketWeatherTrendSide: parsed.trendSide,
          entryMarketWeatherKnown: parsed.known,
          entryMarketWeatherKeyVersion: row.entryMarketWeatherKeyVersion || MARKET_WEATHER_KEY_VERSION,
          entryMarketWeatherCapturedAt: row.entryMarketWeatherCapturedAt || null,
          entryMarketWeatherRaw: row.entryMarketWeatherRaw || null,
          entryMarketWeatherRawAvailableFields: Array.isArray(row.entryMarketWeatherRawAvailableFields) ? row.entryMarketWeatherRawAvailableFields : []
        };
      }

      function marketWeatherPill(row = {}) {
        const mw = entryMarketWeather(row);
        const cls = mw.entryMarketWeatherKnown ? "weather" : "raw";
        return `<span class="pill ${cls}">${escapeHtml(mw.entryMarketWeatherKey || "UNKNOWN|UNKNOWN")}</span>`;
      }

      function currentWeatherKnown() {
        return currentMarketWeather().currentMarketWeatherKnown;
      }

      function currentWeatherMatched(row = {}) {
        const mw = entryMarketWeather(row);
        const current = currentMarketWeather();
        return current.currentMarketWeatherKnown && mw.entryMarketWeatherKey === current.currentMarketWeatherKey;
      }

      function playbookFresh(row = {}) {
        if (row.playbookFresh === true || row.currentMarketCandidate?.playbookFresh === true) return true;
        if (row.playbookFresh === false || row.currentMarketCandidate?.playbookFresh === false) return false;

        const ts = row.playbookUpdatedAt ||
          row.currentMarketPlaybookUpdatedAt ||
          row.currentMarketCandidate?.playbookUpdatedAt ||
          row.updatedAt;

        if (!ts) return currentWeatherMatched(row) && marketResolution(row) === "REGIME_TREND";
        return ageMin(ts) <= PLAYBOOK_MAX_AGE_MIN;
      }

      function normalizeRuntimeStatus(value = "") {
        const raw = upper(value);
        if (raw === MICRO_MICRO_STATUS_PASSED || raw === "GATE_OK" || raw === "APPROVED" || raw === "ELIGIBLE") return MICRO_MICRO_STATUS_PASSED;
        if (raw === MICRO_MICRO_STATUS_OBSERVING || raw === "MICRO_MICRO_OBSERVING" || raw === "EARLY" || raw === "MICRO_MICRO_EARLY") return MICRO_MICRO_STATUS_OBSERVING;
        if (raw === MICRO_MICRO_STATUS_REJECTED || raw === "FAILED" || raw === "BAD" || raw === "BLOCKED_BY_NET_EDGE") return MICRO_MICRO_STATUS_REJECTED;
        if (raw === MICRO_MICRO_STATUS_EMPIRICAL_VETO || raw === "MICRO_MICRO_EMPIRICAL_VETO" || raw === "EXACT_MICRO_MICRO_LCB95_NEGATIVE") return MICRO_MICRO_STATUS_EMPIRICAL_VETO;
        if (raw === MICRO_MICRO_STATUS_POLICY_BLOCKED || raw === "POLICY_BLOCKED") return MICRO_MICRO_STATUS_POLICY_BLOCKED;
        return "";
      }

      function knownForbiddenFamily(row = {}) {
        const text = upper([
          row.familyId,
          row.trueMicroFamilyId,
          row.microFamilyId,
          row.microMicroFamilyId,
          row.definition,
          row.microDefinition,
          row.microMicroDefinition,
          row.policyBlockedReason,
          row.reason
        ].filter(Boolean).join("|"));

        return text.includes("KNOWN_FORBIDDEN_FAMILY") || text.includes("FORBIDDEN_FAMILY") || text.includes("BLACKLISTED_FAMILY");
      }

      function policyBlocked(row = {}) {
        const confirmation = upper(row.confirmationProfile || parseShortTaxonomyId(microId(row))?.confirmationProfile || "");
        const explicitReason = upper(row.policyBlockedReason || row.microMicroRuntimeGate?.policyBlockedReason || "");
        const explicitPolicy = row.policyBlocked === true || row.microMicroRuntimeGate?.policyBlocked === true;

        return (
          !rowIsExactShortMicroMicro(row) ||
          inferSide(row) === OPPOSITE_SIDE ||
          confirmation === "E_WEAK_CONTRA" ||
          !validShortGeometry(row) ||
          knownForbiddenFamily(row) ||
          explicitPolicy ||
          Boolean(explicitReason)
        );
      }

      function empiricalVeto(row = {}) {
        if (row.empiricalVeto === true || row.microMicroRuntimeGate?.empiricalVeto === true) return true;

        const directStatus = normalizeRuntimeStatus(
          row.microMicroRuntimeGateStatus ||
          row.microMicroStatus ||
          row.status ||
          row.currentMarketCandidate?.microMicroRuntimeStatus ||
          row.microMicroRuntimeGate?.status
        );

        if (directStatus === MICRO_MICRO_STATUS_EMPIRICAL_VETO) return true;

        const lcb = lcb95AvgR(row);

        return rowIsExactShortMicroMicro(row) &&
          completed(row) >= MIN_COMPLETED_MICRO_MICRO_ACTIVE &&
          lcb !== null &&
          lcb < 0;
      }

      function empiricalVetoReason(row = {}) {
        if (!empiricalVeto(row)) return "";
        return row.empiricalVetoReason ||
          row.microMicroRuntimeGate?.empiricalVetoReason ||
          row.microMicroRuntimeGate?.reason ||
          "EXACT_MICRO_MICRO_LIFETIME_LCB95_NEGATIVE";
      }

      function positiveNetEdge(row = {}) {
        const lcb = lcb95AvgR(row);

        return (
          completed(row) >= MIN_COMPLETED_MICRO_MICRO_ACTIVE &&
          netAvgR(row) > 0 &&
          netTotalR(row) > 0 &&
          profitFactor(row) > 1 &&
          (lcb === null || lcb > 0) &&
          avgCostR(row) <= 0.35 &&
          directSLPct(row) <= 0.25 &&
          !policyBlocked(row) &&
          !empiricalVeto(row)
        );
      }

      function runtimeStatus(row = {}) {
        const direct = normalizeRuntimeStatus(
          row.microMicroRuntimeGateStatus ||
          row.microMicroStatus ||
          row.runtimeStatus ||
          row.runtimeGateStatus ||
          row.discordActivationGate?.status ||
          row.microMicroRuntimeGate?.status ||
          row.activationGate?.status ||
          row.status
        );

        if (direct === MICRO_MICRO_STATUS_POLICY_BLOCKED && !policyBlocked(row)) {
          if (empiricalVeto(row)) return MICRO_MICRO_STATUS_EMPIRICAL_VETO;
          if (completed(row) < MIN_COMPLETED_MICRO_MICRO_ACTIVE) return MICRO_MICRO_STATUS_OBSERVING;
          if (positiveNetEdge(row)) return MICRO_MICRO_STATUS_PASSED;
          return MICRO_MICRO_STATUS_REJECTED;
        }

        if (direct) return direct;
        if (policyBlocked(row)) return MICRO_MICRO_STATUS_POLICY_BLOCKED;
        if (empiricalVeto(row)) return MICRO_MICRO_STATUS_EMPIRICAL_VETO;
        if (completed(row) < MIN_COMPLETED_MICRO_MICRO_ACTIVE) return MICRO_MICRO_STATUS_OBSERVING;
        if (positiveNetEdge(row)) return MICRO_MICRO_STATUS_PASSED;

        return MICRO_MICRO_STATUS_REJECTED;
      }

      function proofTier(row = {}) {
        const direct = upper(row.proofTier || row.currentMarketCandidate?.proofTier || "");
        if (direct) return direct;

        const status = runtimeStatus(row);
        if (status === MICRO_MICRO_STATUS_POLICY_BLOCKED) return PROOF_TIER_POLICY_BLOCKED;
        if (status === MICRO_MICRO_STATUS_EMPIRICAL_VETO) return PROOF_TIER_EMPIRICAL_VETO;
        if (status !== MICRO_MICRO_STATUS_PASSED) return PROOF_TIER_OBSERVATION_ONLY;

        const resolution = marketResolution(row);
        if (resolution === "REGIME_TREND" || resolution === "REGIME") return PROOF_TIER_MICRO_MICRO_MARKET;

        return PROOF_TIER_MICRO_MICRO_LIFETIME;
      }

      function marketResolution(row = {}) {
        const direct = upper(row.marketResolution || row.currentMarketCandidate?.marketResolution || "");
        if (direct) return direct;
        if (currentWeatherMatched(row)) return "REGIME_TREND";
        return "LIFETIME";
      }

      function proofSource(row = {}) {
        const direct = row.proofSource || row.currentMarketCandidate?.proofSource;
        if (direct) return direct;
        if (marketResolution(row) === "REGIME_TREND") return "MICRO_MICRO_REGIME_TREND";
        if (marketResolution(row) === "REGIME") return "MICRO_MICRO_REGIME";
        return "MICRO_MICRO_LIFETIME";
      }

      function backendRiskFraction(row = {}) {
        return num(
          row.riskFractionForEntry ??
          row.riskFraction ??
          row.currentMarketCandidate?.riskFractionForEntry ??
          row.currentMarketCandidate?.riskFraction ??
          row.riskDecision?.riskFractionForEntry ??
          row.riskDecision?.riskFraction,
          0
        );
      }

      function derivedSignalTypeBeforeRisk(row = {}) {
        const status = runtimeStatus(row);

        if (!currentWeatherKnown()) return SIGNAL_TYPE_OBSERVE_ONLY;
        if (policyBlocked(row)) return SIGNAL_TYPE_BLOCKED;
        if (empiricalVeto(row)) return SIGNAL_TYPE_BLOCKED;
        if (status === MICRO_MICRO_STATUS_REJECTED) return SIGNAL_TYPE_BLOCKED;
        if (status === MICRO_MICRO_STATUS_OBSERVING) return SIGNAL_TYPE_OBSERVE_ONLY;

        if (shrunkLCB95AvgR(row) <= 0) return SIGNAL_TYPE_OBSERVE_ONLY;

        if (!currentWeatherMatched(row)) return SIGNAL_TYPE_WATCH_ONLY;
        if (!playbookFresh(row)) return SIGNAL_TYPE_WATCH_ONLY;

        return SIGNAL_TYPE_TRADE_READY;
      }

      function riskFractionForEntry(row = {}) {
        const beforeRiskSignal = derivedSignalTypeBeforeRisk(row);

        if (policyBlocked(row)) return 0;
        if (empiricalVeto(row)) return 0;
        if (beforeRiskSignal === SIGNAL_TYPE_OBSERVE_ONLY) return 0;
        if (beforeRiskSignal === SIGNAL_TYPE_WATCH_ONLY) return 0;
        if (beforeRiskSignal === SIGNAL_TYPE_BLOCKED) return 0;

        const backendRisk = backendRiskFraction(row);

        if (backendRisk > 0) return backendRisk;

        if (
          beforeRiskSignal === SIGNAL_TYPE_TRADE_READY &&
          runtimeStatus(row) === MICRO_MICRO_STATUS_PASSED &&
          shrunkLCB95AvgR(row) > 0 &&
          currentWeatherMatched(row) &&
          playbookFresh(row)
        ) {
          return 0.001;
        }

        return 0;
      }

      function signalType(row = {}) {
        const derivedBeforeRisk = derivedSignalTypeBeforeRisk(row);

        if (derivedBeforeRisk !== SIGNAL_TYPE_TRADE_READY) return derivedBeforeRisk;

        const risk = riskFractionForEntry(row);
        return risk > 0 ? SIGNAL_TYPE_TRADE_READY : SIGNAL_TYPE_OBSERVE_ONLY;
      }

      function maxAllowedRiskBand(row = {}) {
        const direct = upper(row.maxAllowedRiskBand || row.currentMarketCandidate?.maxAllowedRiskBand || "");
        if (direct && signalType(row) === SIGNAL_TYPE_TRADE_READY) return direct;
        if (signalType(row) === SIGNAL_TYPE_TRADE_READY) return "HIGH";
        return "ZERO";
      }

      function whyBlocked(row = {}) {
        if (policyBlocked(row)) {
          if (!rowIsExactShortMicroMicro(row)) return "EXACT_MICRO_MICRO_ID_REQUIRED";
          if (inferSide(row) === OPPOSITE_SIDE) return "NON_SHORT_POLICY_BLOCK";
          if (upper(row.confirmationProfile) === "E_WEAK_CONTRA") return "E_WEAK_CONTRA_POLICY_BLOCK";
          if (!validShortGeometry(row)) return "INVALID_SHORT_GEOMETRY_POLICY_BLOCK";
          if (knownForbiddenFamily(row)) return "KNOWN_FORBIDDEN_FAMILY_POLICY_BLOCK";
          return row.policyBlockedReason || row.microMicroRuntimeGate?.policyBlockedReason || "POLICY_BLOCKED";
        }

        if (empiricalVeto(row)) return empiricalVetoReason(row);
        if (!currentWeatherKnown()) return "MARKET_WEATHER_UNKNOWN";
        if (runtimeStatus(row) === MICRO_MICRO_STATUS_REJECTED) return row.microMicroRuntimeReason || row.currentMarketReason || row.reason || "REJECTED_NET_EDGE";
        if (signalType(row) === SIGNAL_TYPE_WATCH_ONLY && !currentWeatherMatched(row)) return "PLAYBOOK_MISSING_FOR_CONFIRMED_WEATHER";
        if (signalType(row) === SIGNAL_TYPE_WATCH_ONLY && !playbookFresh(row)) return "PLAYBOOK_STALE_FOR_CONFIRMED_WEATHER";
        if (signalType(row) === SIGNAL_TYPE_OBSERVE_ONLY && completed(row) < MIN_COMPLETED_MICRO_MICRO_ACTIVE) return `COMPLETED_BELOW_${MIN_COMPLETED_MICRO_MICRO_ACTIVE}`;
        if (signalType(row) === SIGNAL_TYPE_OBSERVE_ONLY && shrunkLCB95AvgR(row) <= 0) return "SHRUNK_LCB95_AVG_R_NOT_POSITIVE";

        return "";
      }

      function whySelected(row = {}) {
        return row.currentMarketReason ||
          row.reason ||
          row.currentMarketCandidate?.reason ||
          `${signalType(row)}_${proofTier(row)}_${marketResolution(row)}`;
      }

      function netEdgeScore(row = {}) {
        const pf = Math.max(0, Math.min(20, profitFactor(row)));
        const pfScore = pf > 1 ? Math.log1p(pf - 1) * 16 : -18;
        const avg = netAvgR(row);
        const total = netTotalR(row);
        const wr = fairWinrate(row);
        const fit = currentFitScore(row);
        const cost = avgCostR(row);
        const dsl = directSLPct(row);
        const clean = cleanMeasurementScore(row) === 1 ? 2 : -6;
        const lcb = lcb95AvgR(row) ?? 0;

        return (
          avg * 120 +
          lcb * 150 +
          total * 3.5 +
          wr * 22 +
          pfScore +
          fit * 0.08 +
          sampleReliability(row) * 4 +
          clean -
          cost * 38 -
          dsl * 85
        );
      }

      function currentMarketScore(row = {}) {
        const direct = firstFinite(row.currentMarketScore, row.currentMarketCandidate?.currentMarketScore);
        if (direct !== null) return direct;

        const weatherBoost = currentWeatherMatched(row) ? 1000 : 0;
        const freshBoost = playbookFresh(row) ? 250 : 0;

        return weatherBoost + freshBoost + netEdgeScore(row);
      }

      function statusRank(row = {}) {
        const status = runtimeStatus(row);
        return MICRO_MICRO_STATUS_RANK[status] ?? MICRO_MICRO_STATUS_RANK.UNKNOWN;
      }

      function signalRank(row = {}) {
        return SIGNAL_RANK[signalType(row)] ?? SIGNAL_RANK.UNKNOWN;
      }

      function compareNumberDesc(a, b) {
        return num(b, 0) - num(a, 0);
      }

      function compareNumberAsc(a, b) {
        return num(a, 0) - num(b, 0);
      }

      function compareIdAsc(a, b) {
        return String(a || "").localeCompare(String(b || ""));
      }

      function compareBestDataFirst(a, b) {
        return (
          compareNumberAsc(statusRank(a), statusRank(b)) ||
          compareNumberDesc(netEdgeScore(a), netEdgeScore(b)) ||
          compareNumberDesc(lcb95AvgR(a) ?? -999, lcb95AvgR(b) ?? -999) ||
          compareNumberDesc(netAvgR(a), netAvgR(b)) ||
          compareNumberDesc(profitFactor(a), profitFactor(b)) ||
          compareNumberDesc(netTotalR(a), netTotalR(b)) ||
          compareNumberDesc(fairWinrate(a), fairWinrate(b)) ||
          compareNumberAsc(directSLPct(a), directSLPct(b)) ||
          compareNumberAsc(avgCostR(a), avgCostR(b)) ||
          compareNumberDesc(currentFitScore(a), currentFitScore(b)) ||
          compareNumberDesc(cleanMeasurementScore(a), cleanMeasurementScore(b)) ||
          compareNumberDesc(sampleReliability(a), sampleReliability(b)) ||
          compareNumberDesc(completed(a), completed(b)) ||
          compareNumberDesc(observationSample(a), observationSample(b)) ||
          compareIdAsc(microId(a), microId(b))
        );
      }

      function compareCurrentMarketFirst(a, b) {
        return (
          compareNumberAsc(signalRank(a), signalRank(b)) ||
          compareNumberDesc(currentWeatherMatched(a) ? 1 : 0, currentWeatherMatched(b) ? 1 : 0) ||
          compareNumberDesc(playbookFresh(a) ? 1 : 0, playbookFresh(b) ? 1 : 0) ||
          compareNumberAsc(statusRank(a), statusRank(b)) ||
          compareNumberDesc(shrunkLCB95AvgR(a), shrunkLCB95AvgR(b)) ||
          compareNumberDesc(shrunkAvgR(a), shrunkAvgR(b)) ||
          compareNumberDesc(currentMarketScore(a), currentMarketScore(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      function compareMicroRows(a, b, mode = state.microMode) {
        if (mode === "currentMarket") return compareCurrentMarketFirst(a, b);
        if (mode === "best") return compareBestDataFirst(a, b);
        if (mode === "tradeReady") return compareNumberAsc(signalRank(a), signalRank(b)) || compareCurrentMarketFirst(a, b);
        if (mode === "watch") return compareNumberDesc(signalType(a) === SIGNAL_TYPE_WATCH_ONLY ? 1 : 0, signalType(b) === SIGNAL_TYPE_WATCH_ONLY ? 1 : 0) || compareCurrentMarketFirst(a, b);
        if (mode === "observe") return compareNumberDesc(signalType(a) === SIGNAL_TYPE_OBSERVE_ONLY ? 1 : 0, signalType(b) === SIGNAL_TYPE_OBSERVE_ONLY ? 1 : 0) || compareCurrentMarketFirst(a, b);
        if (mode === "passed") return compareBestDataFirst(a, b);
        if (mode === "clean") return compareNumberDesc(cleanMeasurementScore(a), cleanMeasurementScore(b)) || compareBestDataFirst(a, b);
        if (mode === "currentFit") return compareNumberDesc(currentFitScore(a), currentFitScore(b)) || compareBestDataFirst(a, b);
        if (mode === "cost") return compareNumberAsc(avgCostR(a), avgCostR(b)) || compareBestDataFirst(a, b);
        if (mode === "observed") return compareNumberDesc(observationSample(a), observationSample(b)) || compareBestDataFirst(a, b);
        if (mode === "directSL") return compareNumberAsc(directSLPct(a), directSLPct(b)) || compareBestDataFirst(a, b);
        if (mode === "totalR") return compareNumberDesc(netTotalR(a), netTotalR(b)) || compareBestDataFirst(a, b);
        if (mode === "avgR") return compareNumberDesc(netAvgR(a), netAvgR(b)) || compareBestDataFirst(a, b);
        if (mode === "winrate") return compareNumberDesc(fairWinrate(a), fairWinrate(b)) || compareBestDataFirst(a, b);
        return compareBestDataFirst(a, b);
      }

      function signalTypePill(row = {}) {
        const type = signalType(row);
        if (type === SIGNAL_TYPE_TRADE_READY) return '<span class="pill trade-ready">TRADE READY</span>';
        if (type === SIGNAL_TYPE_WATCH_ONLY) return '<span class="pill watch">WATCH</span>';
        if (type === SIGNAL_TYPE_OBSERVE_ONLY) return '<span class="pill observe">OBSERVE</span>';
        if (type === SIGNAL_TYPE_BLOCKED) return '<span class="pill blocked">BLOCKED</span>';
        return `<span class="pill raw">${escapeHtml(type || "UNKNOWN")}</span>`;
      }

      function runtimeStatusPill(row = {}) {
        const status = runtimeStatus(row);
        if (status === MICRO_MICRO_STATUS_PASSED) return '<span class="pill passed">PASSED</span>';
        if (status === MICRO_MICRO_STATUS_OBSERVING) return `<span class="pill observation">OBSERVING · ${escapeHtml(fmt(completed(row), 0))}/${MIN_COMPLETED_MICRO_MICRO_ACTIVE}</span>`;
        if (status === MICRO_MICRO_STATUS_REJECTED) return '<span class="pill rejected">REJECTED</span>';
        if (status === MICRO_MICRO_STATUS_EMPIRICAL_VETO) return '<span class="pill veto">EMPIRICAL VETO</span>';
        if (status === MICRO_MICRO_STATUS_POLICY_BLOCKED) return '<span class="pill blocked">POLICY BLOCKED</span>';
        return '<span class="pill raw">UNKNOWN</span>';
      }

      function measurementPill(row = {}) {
        return cleanMeasurementScore(row) === 1
          ? '<span class="pill clean">CLEAN</span>'
          : '<span class="pill legacy">LEGACY</span>';
      }

      function microLayerPill(row = {}) {
        return rowIsExactShortMicroMicro(row)
          ? '<span class="pill mm">MICRO-MICRO</span>'
          : '<span class="pill raw">HIDDEN</span>';
      }

      function discordActivationEligible(row = {}) {
        return signalType(row) === SIGNAL_TYPE_TRADE_READY &&
          runtimeStatus(row) === MICRO_MICRO_STATUS_PASSED &&
          riskFractionForEntry(row) > 0 &&
          !policyBlocked(row) &&
          !empiricalVeto(row) &&
          currentWeatherMatched(row) &&
          playbookFresh(row);
      }

      function discordGatePill(row = {}) {
        if (discordActivationEligible(row)) return '<span class="pill active">GATE OK</span>';
        if (runtimeStatus(row) === MICRO_MICRO_STATUS_PASSED && signalType(row) === SIGNAL_TYPE_WATCH_ONLY) return '<span class="pill watch">WATCH ONLY</span>';
        if (runtimeStatus(row) === MICRO_MICRO_STATUS_PASSED) return '<span class="pill observe">PASSED OBSERVE</span>';
        if (runtimeStatus(row) === MICRO_MICRO_STATUS_OBSERVING) return '<span class="pill observation">OBSERVING</span>';
        if (runtimeStatus(row) === MICRO_MICRO_STATUS_EMPIRICAL_VETO) return `<span class="pill veto">${escapeHtml(empiricalVetoReason(row))}</span>`;
        if (runtimeStatus(row) === MICRO_MICRO_STATUS_POLICY_BLOCKED) return `<span class="pill blocked">${escapeHtml(whyBlocked(row))}</span>`;

      function extractObjectArrays(data, keys = []) {
        const rows = [];
        for (const key of keys) {
          const value = data?.[key];
          if (Array.isArray(value)) rows.push(...value);
          else if (value && typeof value === "object") rows.push(...Object.values(value));
        }
        return rows;
      }

      function extractMicroRowsFromPayload(data = {}) {
        const preferred = extractObjectArrays(data, [
          "rows",
          "microRows",
          "microFamilies",
          "availableRows",
          "availableMicroFamilies",
          "availableMicroMicroRows",
          "availableMicroMicroFamilies",
          "microMicroRows",
          "microMicroFamilies",
          "bestRows",
          "best",
          "bestMicroFamilies",
          "bestMicroMicroRows",
          "bestMicroMicroFamilies",
          "shortRows"
        ]);

        const playbookRows = [
          data.currentMarketPlaybook?.selected,
          data.currentMarketPlaybook?.bestForCurrentMarket,
          data.currentMarketPlaybook?.bestTradeReady,
          data.currentMarketPlaybook?.bestWatch,
          data.currentMarketPlaybook?.bestObserveOnly,
          ...(Array.isArray(data.currentMarketPlaybook?.candidates) ? data.currentMarketPlaybook.candidates : [])
        ].filter(Boolean);

        const nested = [
          ...playbookRows,
          ...extractObjectArrays(data.result || {}, ["rows", "microMicroRows", "microMicroFamilies", "bestMicroMicroFamilies"]),
          ...extractObjectArrays(data.payload || {}, ["rows", "microMicroRows", "microMicroFamilies", "bestMicroMicroFamilies"]),
          ...extractObjectArrays(data.activeRotation || {}, ["microFamilies", "rows", "activeRows"]),
          ...extractObjectArrays(data.active || {}, ["microFamilies", "rows", "activeRows"])
        ];

        const byId = new Map();

        for (const sourceRow of [...preferred, ...nested]) {
          const row = normalizeMicroRow(sourceRow);
          if (!row) continue;
          if (!rowIsExactShortMicroMicro(row)) continue;

          const id = microId(row);
          if (!id) continue;

          const existing = byId.get(id);
          byId.set(id, existing ? { ...existing, ...row } : row);
        }

        return [...byId.values()];
      }

      function rankMicroRows(rows = [], mode = state.microMode) {
        const normalized = (Array.isArray(rows) ? rows : [])
          .map(normalizeMicroRow)
          .filter(Boolean)
          .filter(rowIsExactShortMicroMicro);

        let filtered = normalized;

        if (mode === "currentMarket") {
          filtered = normalized.filter((row) => {
            return signalType(row) !== SIGNAL_TYPE_BLOCKED ||
              runtimeStatus(row) === MICRO_MICRO_STATUS_EMPIRICAL_VETO ||
              runtimeStatus(row) === MICRO_MICRO_STATUS_POLICY_BLOCKED;
          });
        }

        if (mode === "tradeReady") filtered = normalized.filter((row) => signalType(row) === SIGNAL_TYPE_TRADE_READY);
        if (mode === "watch") filtered = normalized.filter((row) => signalType(row) === SIGNAL_TYPE_WATCH_ONLY);
        if (mode === "observe") filtered = normalized.filter((row) => signalType(row) === SIGNAL_TYPE_OBSERVE_ONLY);
        if (mode === "passed") filtered = normalized.filter((row) => runtimeStatus(row) === MICRO_MICRO_STATUS_PASSED);
        if (mode !== "diagnose" && mode !== "currentMarket") {
          filtered = filtered.filter((row) => {
            const status = runtimeStatus(row);
            return status !== MICRO_MICRO_STATUS_REJECTED &&
              status !== MICRO_MICRO_STATUS_POLICY_BLOCKED &&
              status !== MICRO_MICRO_STATUS_EMPIRICAL_VETO;
          });
        }

        return filtered
          .sort((a, b) => compareMicroRows(a, b, mode))
          .map((row, index) => ({ ...row, rank: index + 1 }));
      }

      function timeoutSignal(timeoutMs = state.apiTimeoutMs) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), timeoutMs);
        return {
          signal: controller.signal,
          clear: () => clearTimeout(timer)
        };
      }

      function noCacheUrl(url) {
        const join = String(url).includes("?") ? "&" : "?";
        return `${url}${join}_ts=${Date.now()}`;
      }

      async function api(url, options = {}) {
        const timeout = timeoutSignal(options.timeoutMs || state.apiTimeoutMs);

        const headers = {
          accept: "application/json",
          ...(options.headers || {})
        };

        if (options.body !== undefined && !headers["content-type"]) {
          headers["content-type"] = "application/json";
        }

        try {
          const response = await fetch(noCacheUrl(url), {
            cache: "no-store",
            ...options,
            headers,
            signal: options.signal || timeout.signal
          });

          const rawText = await response.text();
          let data = {};

          try {
            data = rawText ? JSON.parse(rawText) : {};
          } catch {
            data = { raw: rawText };
          }

          if (!response.ok) {
            throw new ApiError(`${response.status} ${data.error || data.reason || response.statusText}`, {
              status: response.status,
              url,
              data
            });
          }

          return data;
        } catch (error) {
          if (error?.name === "AbortError") {
            throw new ApiError("REQUEST_ABORTED_TIMEOUT", { status: 0, url, timeout: true });
          }

          if (error instanceof ApiError) throw error;
          throw new ApiError(error?.message || String(error), { status: 0, url });
        } finally {
          timeout.clear();
        }
      }

      async function safeApi(url, fallback = {}, options = {}) {
        try {
          return await api(url, options);
        } catch (error) {
          return {
            ...fallback,
            ok: false,
            error: friendlyApiMessage(error),
            apiError: error?.message || String(error),
            status: error?.status || 0,
            url,
            data: error?.data || null
          };
        }
      }

      function friendlyApiMessage(error) {
        if (error?.timeout) return "API-timeout: request is afgebroken door de admin UI.";

        const status = Number(error?.status || 0);
        const raw = String(error?.message || error || "");

        if (status === 400 && error?.data?.reason) return `${error.data.reason}`;
        if (status === 409 || raw.includes("LOCK")) return "Lock actief. Vorige run is nog bezig.";
        if (status === 504 || raw.includes("504")) return "Backend timeout op deze admin-route.";
        if (status === 500) return "Backend error op deze admin-route. Check Vercel logs.";
        if (status === 404) return "Endpoint niet gevonden.";
        return raw || "Onbekende API fout.";
      }

            const value = col.render ? col.render(row, index) : escapeHtml(row?.[col.key]);

          }).join("");

          return `<tr>${cells}</tr>`;

        return `

            error: data.error || data.reason || null
          }) || {};
        }

        if (lower.includes("discord")) {
          const logs = asArray(data.logs || data.items || data.data);
          return compactClean({
            ok: data.ok !== false,
            count: logs.length,
            lastLogAt: logs[0]?.ts || logs[0]?.createdAt || null,
            entryLogs: logs.filter((row) => upper(row.type || row.event).includes("ENTRY")).length,
            exitLogs: logs.filter((row) => upper(row.type || row.event).includes("EXIT")).length,
            recentLogs: logs.slice(0, 20).map(compactAuditLog),
            warnings: asArray(data.warnings).slice(0, 8),
            error: data.error || data.reason || null
          }) || {};
        }

        return compactClean({
          ok: data.ok !== false,
          error: data.error || data.reason || null
        }) || {};
      }

        return [

      async function fetchAuditEndpoint(definition) {
        const startedAt = Date.now();
        const timeout = timeoutSignal(26000);

        try {
          const response = await fetch(noCacheUrl(definition.url), {
            method: "GET",
            cache: "no-store",
            headers: { accept: "application/json" },
            signal: timeout.signal
          });

          const rawText = await response.text();
          let body = {};
          let parseError = "";

          try {
            body = rawText ? JSON.parse(rawText) : {};
          } catch (error) {
            body = { raw: rawText.slice(0, 2000) };
            parseError = error?.message || String(error);
          }

          return {
            name: definition.name,
            url: definition.url,
            ok: response.ok,
            status: response.status,
            elapsedMs: Date.now() - startedAt,
            parseError,
            important: compactEndpointImportant(definition.name, body),
            body
          };
        } catch (error) {
          return {
            name: definition.name,
            url: definition.url,
            ok: false,
            status: 0,
            elapsedMs: Date.now() - startedAt,
            error: error?.name === "AbortError" ? "REQUEST_ABORTED_TIMEOUT" : error?.message || String(error),
            important: {
              error: error?.name === "AbortError" ? "REQUEST_ABORTED_TIMEOUT" : error?.message || String(error)
            },
            body: null
          };
        } finally {
          timeout.clear();
        }
      }

      function buildAuditMessage(results = []) {
        const endpointsStatus = {};
        const importantByApi = {};

        for (const result of results) {
          endpointsStatus[result.name] = compactClean({
            ok: result.ok,
            status: result.status,
            elapsedMs: result.elapsedMs,
            error: result.error || result.important?.error || null,
            parseError: result.parseError || null,
            url: result.url
          }) || {};

          importantByApi[result.name] = result.important;
        }

        const audit = compactClean({
          title: "SHORT_ADMIN_COMPACT_API_AUDIT",
          generatedAt: new Date().toISOString(),
          side: ONLY_SIDE,
          dashboardSide: DASHBOARD_SIDE,
          namespace: SHORT_NAMESPACE,
          redisKeyPrefix: SHORT_KEY_PREFIX,
          persistentLearningKey: PERSISTENT_LEARNING_KEY,
          currentMarketWeather: currentMarketWeather(),
          versions: identityVersions(),
          featureFlags: featureFlagsObject(),
          riskPolicy: riskPolicyObject(),
          activationGate: activationGateObject(),
          endpointStatus: endpointsStatus,
          importantByApi,
          auditNote: "Dit is bewust compact: alleen belangrijke API-stukken, geen volledige ruwe payloads."
        }) || {};

        return [
          "SHORT ADMIN API AUDIT — PLAK DIT VOLLEDIG IN CHATGPT",
          "Controleer of MarketWeather, micro-micro learning, policy/veto, risk en Discord selection correct staan.",
          "",
          JSON.stringify(audit, null, 2)
        ].join("\n");
      }

      async function runCompactApiAudit() {
        const output = $("allApisAuditOutput");
        if (output) {
          output.value = "API audit wordt opgehaald...\nDit kan 10-30 seconden duren.";
        }

        setMessage("Compact API-audit wordt opgehaald...", "warn");

        const definitions = apiAuditDefinitions();
        const results = await Promise.all(definitions.map(fetchAuditEndpoint));
        const message = buildAuditMessage(results);

        state.apiAudit = {
          generatedAt: Date.now(),
          results,
          message
        };

        if (output) output.value = message;

        const failed = results.filter((row) => !row.ok);
        setMessage(
          failed.length
            ? `API audit klaar met ${failed.length} fout(en). Kopieer alsnog de output.`
            : "API audit klaar. Kopieer de output en stuur die naar mij.",
          failed.length ? "warn" : "ok"
        );

        return state.apiAudit;
      }

        const active = activeMicroMicroIds().slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);

        return active;

      function buildManualSelectionForSlot(slotNumber, id) {
        const slots = currentManualSelectionSlots();
        const cleanId = normalizeMicroMicroId(id);
        const index = Number(slotNumber) === 2 ? 1 : 0;

        if (!cleanId) return slots.filter(Boolean);

        slots[index] = cleanId;

        return uniqueStrings(slots)
          .map(normalizeMicroMicroId)
          .filter(Boolean)
          .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);
      }

          confirmed: confirmText,
          confirmation: confirmText,
          side: DASHBOARD_SIDE,
          tradeSide: ONLY_SIDE,
          targetTradeSide: ONLY_SIDE,
          shortOnly: true,
          longDisabled: true,
          parentTrueMicroFamilySchema: PARENT_TRUE_MICRO_SCHEMA,
          childTrueMicroFamilySchema: CHILD_TRUE_MICRO_SCHEMA,
          trueMicroFamilySchema: TRUE_MICRO_SCHEMA,
          microMicroFamilySchema: MICRO_MICRO_SCHEMA,
          microMicroVersion: MICRO_MICRO_VERSION,
          microMicroEnabled: true,
          selectionGranularity: "EXACT_MICRO_MICRO_ONLY",
          entryMarketWeatherKeyVersion: MARKET_WEATHER_KEY_VERSION,
          currentMarketWeatherKey: mw.currentMarketWeatherKey,
          confirmedMarketWeatherKey: mw.confirmedMarketWeatherKey,
          currentMarketWeatherRegime: mw.currentMarketWeatherRegime,
          currentMarketWeatherTrendSide: mw.currentMarketWeatherTrendSide,
          empiricalVetoVersion: EMPIRICAL_VETO_VERSION,
          microMicroRuntimeGateVersion: MICRO_MICRO_RUNTIME_GATE_VERSION,
          microMicroBestSelectorVersion: MICRO_MICRO_BEST_SELECTOR_VERSION,
          persistentLearningKey: PERSISTENT_LEARNING_KEY,
          redisNamespace: SHORT_NAMESPACE,
          redisKeyPrefix: SHORT_KEY_PREFIX,
          riskPlanVersion: SHORT_RISK_PLAN_VERSION,
          costModelVersion: POSITION_COST_MODEL_VERSION,
          measurementFixVersion: MEASUREMENT_FIX_VERSION,
          observationDedupeVersion: OBSERVATION_DEDUPE_VERSION,
          outcomeDedupeVersion: OUTCOME_DEDUPE_VERSION,
          ...extra
        };
      }

      function renderReset() {
        $("reset").innerHTML = `
          <div class="grid-3">
            <div class="card">
              <h3>Reset learning only</h3>
              <p class="metric-extra">Wist SHORT learning data onder ${SHORT_KEY_PREFIX}. Rotation/open positions blijven staan als backend dat zo uitvoert.</p>
              <button type="button" class="warn" data-action="reset-learning">Reset learning</button>
            </div>

            <div class="card">
              <h3>Reset manual selection</h3>
              <p class="metric-extra">Wist active/next SHORT micro-micro selection. Learning blijft staan.</p>
              <button type="button" class="warn" data-action="reset-rotation">Reset rotation</button>
            </div>

            <div class="card">
              <h3>Factory reset</h3>
              <p class="metric-extra">Wist SHORT scanner snapshots, trade memory, open positions, analyze stats en rotations.</p>
              <input id="factoryConfirm" style="width: 100%; margin-bottom: 8px;" placeholder="SHORT_FACTORY_RESET_CONFIRMED" />
              <label style="display: block; margin-bottom: 8px;">
                <input id="factoryForce" type="checkbox" />
                force even with open positions
              </label>
              <button type="button" class="danger" data-action="factory-reset">Factory reset</button>
            </div>
          </div>

          <div class="card">
            <h3>Actieve versies</h3>
            ${jsonBlock({
              versions: identityVersions(),
              featureFlags: featureFlagsObject(),
              riskPolicy: riskPolicyObject(),
              activationGate: activationGateObject()
            })}
          </div>

          <div class="card">
            <h3>Reset result</h3>
            <pre id="resetResult">Nog geen reset uitgevoerd.</pre>
          </div>
        `;
      }

      async function postResetLearning() {
        const confirmValue = prompt("Typ RESET_LEARNING_SHORT om SHORT learning te wissen.");
        if (confirmValue !== "RESET_LEARNING_SHORT") return;

        try {
          const data = await api(endpoints.resetLearning, {
            method: "POST",
            timeoutMs: 30000,
            body: JSON.stringify(resetPayload("RESET_LEARNING_SHORT"))
          });

          $("resetResult").textContent = JSON.stringify(data, null, 2);
          setMessage("SHORT learning reset uitgevoerd.", "ok");
        } catch (error) {
          setMessage(friendlyApiMessage(error), "warn");
        }
      }

      async function postResetRotation() {
        const confirmValue = prompt("Typ RESET_ROTATION_SHORT om manual Discord selection te wissen.");
        if (confirmValue !== "RESET_ROTATION_SHORT") return;

        try {
          const data = await api(endpoints.resetRotation, {
            method: "POST",
            timeoutMs: 30000,
            body: JSON.stringify(resetPayload("RESET_ROTATION_SHORT"))
          });

          $("resetResult").textContent = JSON.stringify(data, null, 2);
          setMessage("SHORT rotation reset uitgevoerd.", "ok");
        } catch (error) {
          setMessage(friendlyApiMessage(error), "warn");
        }
      }

      async function postFactoryReset() {
        const confirmValue = $("factoryConfirm")?.value?.trim() || "";
        const force = Boolean($("factoryForce")?.checked);

        if (confirmValue !== "SHORT_FACTORY_RESET_CONFIRMED") {
          setMessage("Factory reset geblokkeerd: bevestiging is niet exact SHORT_FACTORY_RESET_CONFIRMED.", "error");
          return;
        }

        if (!confirm("SHORT FACTORY RESET wist alles in de SHORT namespace. Doorgaan?")) return;

        try {
          const data = await api(endpoints.factoryReset, {
            method: "POST",
            timeoutMs: 30000,
            body: JSON.stringify(resetPayload("SHORT_FACTORY_RESET_CONFIRMED", {
              force,
              forceClosePositions: force
            }))
          });

          $("resetResult").textContent = JSON.stringify(data, null, 2);
          setMessage("SHORT factory reset uitgevoerd.", "ok");
        } catch (error) {
          setMessage(friendlyApiMessage(error), "warn");
        }
      }

      async function openMicro(id) {
        const cleanId = normalizeMicroMicroId(id);
        if (!cleanId) return;

        const drawer = $("drawer");
        drawer.classList.remove("hidden");
        drawer.innerHTML = `
          <div class="drawer-head">
            <div>
              <h2>${escapeHtml(cleanId)}</h2>
              <div class="metric-extra">Detail wordt geladen...</div>
            </div>
            <button type="button" data-action="close-drawer">Close</button>
          </div>
        `;

        try {
          const params = commonParams();
          const data = await api(`${endpoints.microDetail}/${encodeURIComponent(cleanId)}?${params.toString()}`, { timeoutMs: 18000 });
          const row = normalizeMicroRow(data.row || data.microFamily || data) || normalizeMicroRow({ microMicroFamilyId: cleanId });

          drawer.innerHTML = `
            <div class="drawer-head">
              <div>
                <h2>${escapeHtml(cleanId)}</h2>
                <div class="metric-extra">75-child=${escapeHtml(base75MicroId(row))} · parent=${escapeHtml(parentMicroId(row))}</div>
              </div>
              <button type="button" data-action="close-drawer">Close</button>
            </div>

            <div class="toolbar">
              <span class="pill short">SHORT</span>
              ${signalTypePill(row)}
              ${microLayerPill(row)}
              ${measurementPill(row)}
              ${runtimeStatusPill(row)}
              ${discordGatePill(row)}
              ${currentFitPill(row)}
              ${marketWeatherPill(row)}
              <button type="button" class="short-action" data-activate-slot="1" data-activate-id="${escapeAttr(cleanId)}" ${discordActivationEligible(row) ? "" : "disabled"}>Zet als #1</button>
              <button type="button" class="short-action" data-activate-slot="2" data-activate-id="${escapeAttr(cleanId)}" ${discordActivationEligible(row) ? "" : "disabled"}>Zet als #2</button>
              <button type="button" data-copy="${escapeAttr(cleanId)}">Copy</button>
            </div>

            <div class="grid">
              ${metricCard("SignalType", signalType(row))}
              ${metricCard("ProofTier", proofTier(row))}
              ${metricCard("ProofSource", proofSource(row))}
              ${metricCard("MarketRes", marketResolution(row))}
              ${metricCard("WeatherMatched", currentWeatherMatched(row) ? "YES" : "NO")}
              ${metricCard("PlaybookFresh", playbookFresh(row) ? "YES" : "NO")}
              ${metricCard("NetEdge", fmt(netEdgeScore(row), 2))}
              ${metricCard("Seen", fmtInt(observationSample(row)))}
              ${metricCard("Completed", fmt(completed(row), 2))}
              ${metricCard("AvgR net", fmt(netAvgR(row), 3))}
              ${metricCard("LCB95", lcb95AvgR(row) === null ? "-" : fmt(lcb95AvgR(row), 4))}
              ${metricCard("ShrunkLCB95", fmt(shrunkLCB95AvgR(row), 4))}
              ${metricCard("Risk", fmt(riskFractionForEntry(row), 6))}
              ${metricCard("EmpiricalVeto", empiricalVeto(row) ? "YES" : "NO")}
              ${metricCard("PolicyBlocked", policyBlocked(row) ? "YES" : "NO")}
            </div>

            <div class="card">
              <h3>Runtime diagnose</h3>
              ${jsonBlock({
                status: runtimeStatus(row),
                signalType: signalType(row),
                policyBlocked: policyBlocked(row),
                policyBlockedReason: policyBlocked(row) ? whyBlocked(row) : null,
                empiricalVeto: empiricalVeto(row),
                empiricalVetoReason: empiricalVetoReason(row),
                currentFit: currentFit(row),
                currentFitMisfitIsPolicyBlock: false,
                weatherMatched: currentWeatherMatched(row),
                playbookFresh: playbookFresh(row),
                shrunkLCB95AvgR: shrunkLCB95AvgR(row),
                riskFractionForEntry: riskFractionForEntry(row),
                why: whyBlocked(row) || whySelected(row)
              })}
            </div>

            <div class="card">
              <h3>MarketWeather</h3>
              ${jsonBlock(entryMarketWeather(row))}
            </div>

            <div class="card">
              <h3>Raw detail JSON</h3>
              ${jsonBlock(data)}
            </div>
          `;
        } catch (error) {
          drawer.innerHTML = `
            <div class="drawer-head">
              <div>
                <h2>${escapeHtml(cleanId)}</h2>
                <div class="metric-extra">Detail API niet geladen.</div>
              </div>
              <button type="button" data-action="close-drawer">Close</button>
            </div>
            <div class="message warn">${escapeHtml(friendlyApiMessage(error))}</div>
          `;
        }
      }

      function closeDrawer() {
        $("drawer").classList.add("hidden");
        $("drawer").innerHTML = "";
      }

      function activateTopN(n) {
        const rows = currentMicroRows();
        const ids = rows
          .filter(discordActivationEligible)
          .slice(0, Math.min(n, MAX_ACTIVE_DISCORD_MICRO_FAMILIES))
          .map(microId)
          .filter(Boolean);

        if (!ids.length) {
          setMessage("Geen TRADE_READY micro-micro rows gevonden. Runtime/weather/playbook/risk/veto gate blokkeert selectie.", "warn");
          return;
        }

        activateSelectedMicroFamilies(ids);
      }

      async function copyText(text, message = "Gekopieerd.") {
        try {
          await navigator.clipboard.writeText(String(text || ""));
          setMessage(message, "ok");
        } catch {
          const area = document.createElement("textarea");
          area.value = String(text || "");
          document.body.appendChild(area);
          area.select();
          document.execCommand("copy");
          area.remove();
          setMessage(message, "ok");
        }
      }

      function downloadJson(filename, data) {
        const blob = new Blob([JSON.stringify(data ?? {}, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      function getPanelExportPayload(name) {
        const panel = $(name);
        if (!panel?.dataset?.exportPayload) return {};
        try {
          return JSON.parse(panel.dataset.exportPayload);
        } catch {
          return { raw: panel.dataset.exportPayload };
        }
      }

      function renderSoftError(tab, error) {
        const message = friendlyApiMessage(error);
        setMessage(message, "warn");

        const panel = $(tab);
        if (!panel) return;

        panel.innerHTML = `
          <div class="card">
            <h3>Niet geladen</h3>
            <div class="empty">${escapeHtml(message)}</div>
          </div>
        `;
      }

      async function refresh(tab = state.activeTab) {
        setMessage("");

        const liveLabel = $("liveLabel");
        if (liveLabel) {
          liveLabel.textContent = `SHORT-only · ${currentMarketWeather().currentMarketWeatherKey} · ${new Date().toLocaleTimeString()}`;
        }

        try {
          if (tab === "overview") return await renderOverview();
          if (tab === "market") return await renderMarket();
          if (tab === "scanner") return await renderScanner();
          if (tab === "trade") return await renderTrade();
          if (tab === "micros") return await renderMicros();
          if (tab === "rotation") return await renderRotation();
          if (tab === "discord") return await renderDiscord();
          if (tab === "reset") return renderReset();
        } catch (error) {
          renderSoftError(tab, error);
        }
      }

      function showTab(id) {
        const next = tabs.includes(id) ? id : "overview";
        state.activeTab = next;

        document.querySelectorAll(".panel").forEach((panel) => panel.classList.add("hidden"));
        document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));

        const panel = $(next);
        if (panel) panel.classList.remove("hidden");

        const tabButton = document.querySelector(`[data-tab="${next}"]`);
        if (tabButton) tabButton.classList.add("active");

        if (location.hash.replace("#", "") !== next) {
          history.replaceState(null, "", `#${next}`);
        }

        refresh(next);
      }

      function bindEvents() {
        document.querySelectorAll(".tab").forEach((button) => {
          button.addEventListener("click", () => showTab(button.dataset.tab));
        });

        $("refreshBtn")?.addEventListener("click", () => refresh(state.activeTab));

        document.addEventListener("click", async (event) => {
          const target = event.target.closest("button");
          if (!target) return;

          const action = target.dataset.action;

          if (target.dataset.copyTarget) {
            const el = $(target.dataset.copyTarget);
            await copyText(el?.value || el?.textContent || "", "Gekopieerd.");
            return;
          }

          if (target.dataset.copyValue) {
            await copyText(target.dataset.copyValue, "Gekopieerd.");
            return;
          }

          if (target.dataset.selectTarget) {
            const el = $(target.dataset.selectTarget);
            if (el && typeof el.select === "function") {
              el.focus();
              el.select();
              if (typeof el.setSelectionRange === "function") el.setSelectionRange(0, el.value.length);
              setMessage("Output geselecteerd. Je kunt nu kopiëren.", "ok");
            }
            return;
          }

          if (target.dataset.openUrl) {
            window.open(target.dataset.openUrl, "_blank", "noopener,noreferrer");
            return;
          }

          if (target.dataset.exportJson) {
            downloadJson(
              target.dataset.filename || "export.json",
              getPanelExportPayload(target.dataset.exportJson)
            );
            return;
          }

          if (target.dataset.copy) {
            await copyText(target.dataset.copy, "Micro-micro ID gekopieerd.");
            return;
          }

          if (target.dataset.openMicro) {
            await openMicro(target.dataset.openMicro);
            return;
          }

          if (target.dataset.activateSlot) {
            const ids = buildManualSelectionForSlot(Number(target.dataset.activateSlot || 1), target.dataset.activateId || "");
            await activateSelectedMicroFamilies(ids);
            return;
          }

          if (action === "run-api-audit") {
            await runCompactApiAudit();
            return;
          }

          if (action === "run-api-audit-copy") {
            await runCompactApiAuditAndCopy();
            return;
          }

          if (action === "apply-market-weather") {
            state.currentMarketWeatherRegime = $("marketWeatherRegimeInput")?.value || "";
            state.currentMarketWeatherTrendSide = $("marketWeatherTrendSideInput")?.value || "";
            state.currentMarketWeatherKey = $("marketWeatherKeyInput")?.value || "";
            state.micros = null;
            setMessage(`MarketWeather toegepast: ${currentMarketWeather().currentMarketWeatherKey}`, "ok");
            await refresh(state.activeTab);
            return;
          }

          if (action === "clear-market-weather") {
            state.currentMarketWeatherRegime = "";
            state.currentMarketWeatherTrendSide = "";
            state.currentMarketWeatherKey = "";
            state.micros = null;
            setMessage("MarketWeather override gewist.", "ok");
            await refresh(state.activeTab);
            return;
          }

          if (action === "run-scanner") return runScannerNow();
          if (action === "run-trade") return runTradeNow();
          if (action === "activate-top-two") return activateTopN(2);

          if (action === "copy-visible-ids") {
            const ids = currentMicroRows().map(microId).filter(Boolean);
            return copyText(JSON.stringify(ids, null, 2), `Visible ${ids.length} micro-micro IDs gekopieerd.`);
          }

          if (action === "activate-visible-ids") {
            const ids = currentMicroRows()
              .filter(discordActivationEligible)
              .map(microId)
              .filter(Boolean)
              .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);

            if (!ids.length) {
              setMessage("Geen visible TRADE_READY micro-micro IDs. Runtime/weather/playbook/risk/veto gate blokkeert selectie.", "warn");
              return;
            }

            return activateSelectedMicroFamilies(ids);
          }

          if (action === "activate-manual") {
            const ids = uniqueStrings(($("manualMicroIds")?.value || "").split(/[\n,;\r]+/g));
            return activateSelectedMicroFamilies(ids);
          }

          if (action === "clear-manual-input") {
            const el = $("manualMicroIds");
            if (el) el.value = "";
            return;
          }

          if (action === "close-drawer") return closeDrawer();
          if (action === "reset-learning") return postResetLearning();
          if (action === "reset-rotation") return postResetRotation();
          if (action === "factory-reset") return postFactoryReset();
        });

        window.addEventListener("error", (event) => {
          setMessage(event.message || "Browser error", "error");
        });

        window.addEventListener("unhandledrejection", (event) => {
          setMessage(friendlyApiMessage(event.reason), "warn");
        });
      }

      function bootFallback() {
        const overview = $("overview");
        if (!overview) return;

        overview.innerHTML = `
          <div class="grid">
            ${metricCard("Status", "BOOTED", "frontend script is geladen")}
            ${metricCard("Learning key", PERSISTENT_LEARNING_KEY)}
            ${metricCard("MarketWeather", currentMarketWeather().currentMarketWeatherKey)}
            ${metricCard("Veto", "EMPIRICAL", "LCB95(avgR)<0")}
          </div>

          <div class="card">
            <h3>Frontend actief</h3>
            <div class="metric-extra">
              Als data ontbreekt, ligt het aan een API-route of backend-output. De pagina blijft niet leeg bij API-fouten.
            </div>
          </div>
        `;
      }

      function boot() {
        try {
          bindEvents();
          bootFallback();

          const initialTab = location.hash.replace("#", "") || "overview";
          showTab(tabs.includes(initialTab) ? initialTab : "overview");
        } catch (error) {
          const main = document.querySelector("main");
          if (main) {
            main.insertAdjacentHTML(
              "afterbegin",
              `<div class="boot-error">BOOT ERROR\n${escapeHtml(error?.stack || error?.message || String(error))}</div>`
            );
          }
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
