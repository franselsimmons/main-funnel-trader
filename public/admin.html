<!-- FILE: public/admin.html -->
<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Micro-Family Trading Admin</title>

  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --dark: #0f172a;
      --dark-2: #111827;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --purple: #7c3aed;
      --shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 2px 10px rgba(15, 23, 42, 0.06);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.10), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    button,
    select,
    input {
      font: inherit;
    }

    button {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 14px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: 0.14s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.10);
    }

    button.primary {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    button.success {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    button.warn {
      background: var(--amber);
      color: white;
      border-color: var(--amber);
    }

    button.danger {
      background: var(--red);
      color: white;
      border-color: var(--red);
    }

    button.small {
      padding: 6px 9px;
      border-radius: 9px;
      font-size: 12px;
    }

    select,
    input {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      min-height: 42px;
    }

    input[type="search"] {
      min-width: 320px;
    }

    header {
      background: linear-gradient(135deg, #0f172a 0%, #111827 48%, #1e1b4b 100%);
      color: white;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.35);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-title strong {
      display: block;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: #94a3b8;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(243, 245, 249, 0.86);
      backdrop-filter: blur(14px);
      padding: 10px 0;
    }

    .tab {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border-color: rgba(203, 213, 225, 0.9);
    }

    .tab.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .hidden,
    .panel.hidden {
      display: none;
    }

    .message {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow-soft);
      white-space: pre-wrap;
    }

    .message.ok {
      color: #166534;
      background: #dcfce7;
      border-color: #bbf7d0;
    }

    .message.error {
      color: #991b1b;
      background: #fee2e2;
      border-color: #fecaca;
    }

    .message.warn {
      color: #92400e;
      background: #fef3c7;
      border-color: #fde68a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #334155;
    }

    .metric-card {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .metric-extra {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin: 12px 0 14px;
    }

    .coin-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .coin-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: #94a3b8;
    }

    .coin-card.long::before,
    .coin-card.bull::before {
      background: linear-gradient(90deg, #16a34a, #22c55e);
    }

    .coin-card.short::before,
    .coin-card.bear::before {
      background: linear-gradient(90deg, #dc2626, #fb7185);
    }

    .coin-card.neutral::before {
      background: linear-gradient(90deg, #64748b, #94a3b8);
    }

    .coin-head {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .coin-logo-wrap {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 999px;
      overflow: hidden;
      background: linear-gradient(135deg, #e2e8f0, #f8fafc);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      position: relative;
    }

    .coin-logo-wrap.lg {
      width: 52px;
      height: 52px;
      min-width: 52px;
    }

    .coin-logo-wrap.sm {
      width: 30px;
      height: 30px;
      min-width: 30px;
    }

    .coin-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .coin-logo-wrap.fallback::after {
      content: attr(data-initial);
      font-weight: 900;
      font-size: 14px;
      color: #334155;
    }

    .coin-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .coin-symbol {
      font-weight: 850;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .coin-name {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }

    .coin-price {
      margin-left: auto;
      text-align: right;
    }

    .coin-price strong {
      display: block;
      font-size: 15px;
    }

    .coin-price span {
      display: block;
      font-size: 12px;
      color: var(--muted);
    }

    .coin-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .coin-stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px;
    }

    .coin-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .coin-stat strong {
      font-size: 13px;
    }

    .coin-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      overflow: hidden;
    }

    .coin-mini {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 190px;
    }

    .coin-mini .coin-symbol {
      font-size: 14px;
    }

    .coin-mini .coin-name {
      font-size: 11px;
      max-width: 140px;
    }

    .id-stack {
      display: grid;
      gap: 4px;
      min-width: 360px;
    }

    .id-stack code {
      display: inline-block;
      max-width: 520px;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .id-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .pill.active,
    .pill.long,
    .pill.bull {
      background: #dcfce7;
      color: #166534;
    }

    .pill.short,
    .pill.bear,
    .pill.danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .pill.warn {
      background: #fef3c7;
      color: #92400e;
    }

    .pill.info {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .pill.purple {
      background: #ede9fe;
      color: #5b21b6;
    }

    .pill.dark {
      background: #0f172a;
      color: white;
    }

    .score-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .score-bar > span {
      display: block;
      height: 100%;
      width: var(--w);
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      border-radius: inherit;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 14px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1250px;
      background: white;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td {
      background: #f8fafc;
    }

    code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 3px 5px;
      border-radius: 6px;
      color: #334155;
      white-space: nowrap;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1020;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 16px;
      max-height: 520px;
      overflow: auto;
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.48;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(860px, 94vw);
      background: white;
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 42px rgba(15, 23, 42, 0.18);
      padding: 20px;
      overflow: auto;
      z-index: 30;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
    }

    @media (max-width: 1180px) {
      .grid,
      .coin-grid {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }

      .grid-3 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      header {
        padding: 18px 14px;
      }

      .header-inner {
        flex-direction: column;
      }

      main {
        padding: 14px;
      }

      .grid,
      .coin-grid,
      .two-col {
        grid-template-columns: 1fr;
      }

      .tabs {
        gap: 7px;
      }

      .tab {
        flex: 1 1 auto;
        padding: 9px 10px;
      }

      .brand-title strong {
        font-size: 20px;
      }

      input[type="search"] {
        min-width: 100%;
      }

      .coin-stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .id-stack {
        min-width: 260px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">
          <div class="brand-logo">MF</div>
          <div>
            <strong>Micro-Family Trading Admin</strong>
            <div class="brand-subtitle">Scanner → TradeSystem → Analyze → Macro/Micro Rotation → Discord</div>
          </div>
        </div>
      </div>

      <div class="header-actions">
        <div class="live-pill"><span class="live-dot"></span><span id="liveLabel">Live dashboard</span></div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="overview">Overview</button>
      <button type="button" class="tab" data-tab="scanner">Scanner</button>
      <button type="button" class="tab" data-tab="trade">TradeSystem</button>
      <button type="button" class="tab" data-tab="micros">MicroFamilies</button>
      <button type="button" class="tab" data-tab="rotation">Rotation</button>
      <button type="button" class="tab" data-tab="discord">Discord Logs</button>
      <button type="button" class="tab" data-tab="reset">Reset</button>
    </div>

    <div id="message"></div>

    <section id="overview" class="panel"></section>
    <section id="scanner" class="panel hidden"></section>
    <section id="trade" class="panel hidden"></section>
    <section id="micros" class="panel hidden"></section>
    <section id="rotation" class="panel hidden"></section>
    <section id="discord" class="panel hidden"></section>
    <section id="reset" class="panel hidden"></section>
  </main>

  <div id="drawer" class="drawer hidden"></div>

  <script>
    const state = {
      activeTab: "overview",
      overview: null,
      scanner: null,
      trade: null,
      micros: null,
      rotation: null,
      discord: null,
      microMode: "balanced",
      microSearch: ""
    };

    const endpoints = {
      overview: "/api/admin/overview",
      scanner: "/api/admin/scanner",
      trade: "/api/admin/trade",
      micros: "/api/admin/micro-families",
      rotation: "/api/admin/rotation",
      discord: "/api/admin/discord-logs",
      microDetail: "/api/admin/micro-family",
      runScanner: "/api/scanner/run?force=true",
      runTrade: "/api/trade/run?force=true",
      weeklyFreeze: "/api/analyze/weekly-freeze?force=true",
      activateNextRotation: "/api/analyze/activate-rotation?force=true",
      resetLearning: "/api/admin/reset-learning",
      resetRotation: "/api/admin/reset-rotation",
      factoryReset: "/api/admin/factory-reset"
    };

    const tabs = ["overview", "scanner", "trade", "micros", "rotation", "discord", "reset"];

    const COIN_NAMES = {
      BTC: "Bitcoin",
      ETH: "Ethereum",
      SOL: "Solana",
      XRP: "XRP",
      BNB: "BNB",
      DOGE: "Dogecoin",
      ADA: "Cardano",
      AVAX: "Avalanche",
      LINK: "Chainlink",
      DOT: "Polkadot",
      TON: "Toncoin",
      TRX: "TRON",
      LTC: "Litecoin",
      BCH: "Bitcoin Cash",
      NEAR: "NEAR Protocol",
      APT: "Aptos",
      SUI: "Sui",
      ARB: "Arbitrum",
      OP: "Optimism",
      INJ: "Injective",
      ATOM: "Cosmos",
      FIL: "Filecoin",
      RUNE: "THORChain",
      FET: "Fetch.ai",
      RENDER: "Render",
      RNDR: "Render",
      PEPE: "Pepe",
      SHIB: "Shiba Inu",
      WIF: "dogwifhat",
      BONK: "Bonk",
      SEI: "Sei",
      TIA: "Celestia",
      JUP: "Jupiter",
      PYTH: "Pyth Network",
      UNI: "Uniswap",
      AAVE: "Aave",
      MKR: "Maker",
      CRV: "Curve DAO",
      LDO: "Lido DAO",
      ICP: "Internet Computer",
      ETC: "Ethereum Classic",
      XLM: "Stellar",
      HBAR: "Hedera",
      MATIC: "Polygon",
      POL: "Polygon",
      ALGO: "Algorand",
      GALA: "Gala",
      SAND: "The Sandbox",
      MANA: "Decentraland",
      ENS: "Ethereum Name Service"
    };

    const $ = (id) => document.getElementById(id);

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function baseSymbol(input) {
      const raw = typeof input === "string"
        ? input
        : input?.symbol || input?.baseSymbol || input?.coin || input?.contractSymbol || "";

      let symbol = String(raw).toUpperCase().replace(/[^A-Z0-9]/g, "");

      const suffixes = [
        "USDTUMCBL",
        "USDCUMCBL",
        "USDTPERP",
        "USDCPERP",
        "USDT",
        "USDC",
        "BUSD",
        "PERP",
        "SWAP",
        "USD"
      ];

      for (const suffix of suffixes) {
        if (symbol.endsWith(suffix) && symbol.length > suffix.length) {
          symbol = symbol.slice(0, -suffix.length);
          break;
        }
      }

      return symbol || "COIN";
    }

    function coinName(row) {
      const symbol = baseSymbol(row);

      return row?.name ||
        row?.coinName ||
        row?.fullName ||
        row?.assetName ||
        COIN_NAMES[symbol] ||
        symbol;
    }

    function coinLogo(row) {
      const direct =
        row?.logo ||
        row?.image ||
        row?.icon ||
        row?.iconUrl ||
        row?.logoUrl ||
        row?.coinLogo ||
        row?.marketData?.image ||
        row?.market?.image;

      if (direct) return direct;

      const symbol = baseSymbol(row).toLowerCase();

      return `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${symbol}.png`;
    }

    function handleCoinLogoError(img) {
      const parent = img?.parentElement;

      if (!parent) return;

      parent.classList.add("fallback");
      img.remove();
    }

    function sideClass(side) {
      const s = String(side || "").toLowerCase();

      if (s === "bull" || s === "long" || s === "buy") return "bull";
      if (s === "bear" || s === "short" || s === "sell") return "bear";

      return "neutral";
    }

    function sideLabel(side) {
      const s = String(side || "").toLowerCase();

      if (s === "bull" || s === "long" || s === "buy") return "LONG";
      if (s === "bear" || s === "short" || s === "sell") return "SHORT";

      return String(side || "NA").toUpperCase();

    function fmt(value, decimals = 3) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return n.toFixed(decimals);
    }

    function fmtInt(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "0";

      return Math.round(n).toLocaleString();
    }

    function fmtPctRatio(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return `${(n * 100).toFixed(1)}%`;
    }

    function fmtPctRaw(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return `${n.toFixed(2)}%`;
    }

    function fmtPrice(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (n >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
      if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 4 });

      return n.toLocaleString(undefined, { maximumFractionDigits: 8 });
    }

    function fmtMoneyLike(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (Math.abs(n) >= 1_000_000_000) return `${(n / 1_000_000_000).toFixed(2)}B`;
      if (Math.abs(n) >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
      if (Math.abs(n) >= 1_000) return `${(n / 1_000).toFixed(1)}K`;

      return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
    }

    function fmtTs(value) {
      if (!value) return "-";

      const n = Number(value);
      const date = Number.isFinite(n) ? new Date(n) : new Date(value);

      if (Number.isNaN(date.getTime())) return "-";

      return date.toLocaleString();
    }

    function ageText(ts) {
      if (!ts) return "-";

      const n = Number(ts);

      if (!Number.isFinite(n)) return "-";

      const sec = Math.max(0, Math.floor((Date.now() - n) / 1000));

      if (sec < 60) return `${sec}s geleden`;
      if (sec < 3600) return `${Math.floor(sec / 60)}m geleden`;

      return `${Math.floor(sec / 3600)}u geleden`;
    }

    function jsonBlock(data) {
      return `<pre>${escapeHtml(JSON.stringify(data ?? null, null, 2))}</pre>`;
    }

    function setMessage(message = "", type = "") {
      if (!message) {
        $("message").innerHTML = "";
        return;
      }

      $("message").innerHTML = `<div class="message ${escapeAttr(type)}">${escapeHtml(message)}</div>`;

    function showLoading(tabId, label = "Laden...") {
      $(tabId).innerHTML = `

          <div class="empty">Data ophalen voor ${escapeHtml(tabId)}...</div>
        </div>
      `;
    }

    function getRows(data, keys = []) {
      if (Array.isArray(data)) return data;

      for (const key of keys) {
        if (Array.isArray(data?.[key])) return data[key];
      }

      if (Array.isArray(data?.rows)) return data.rows;
      if (Array.isArray(data?.items)) return data.items;
      if (Array.isArray(data?.data)) return data.data;

      return [];
    }

    async function api(url, options = {}) {
      const headers = {
        accept: "application/json",
        ...(options.headers || {})
      };

      if (options.body !== undefined && options.body !== null && !headers["content-type"]) {
        headers["content-type"] = "application/json";
      }

      const response = await fetch(url, {
        cache: "no-store",
        ...options,
        headers
      });

      const rawText = await response.text();

      let data = {};

      try {
        data = rawText ? JSON.parse(rawText) : {};
      } catch {
        data = { raw: rawText };
      }

      if (!response.ok) {
        const reason = data.error || data.reason || data.message || response.statusText;
        throw new Error(`${response.status} ${reason}\n${JSON.stringify(data, null, 2)}`);
      }

      return data;
    }

    function table(rows, cols, emptyText = "Geen data.") {
      if (!Array.isArray(rows) || rows.length === 0) {
        return `<div class="empty">${escapeHtml(emptyText)}</div>`;
      }

      const head = cols
        .map((column) => `<th>${escapeHtml(column.label)}</th>`)
        .join("");

      const body = rows.map((row, index) => {
        const cells = cols.map((column) => {
          const value = column.render
            ? column.render(row, index)
            : escapeHtml(row?.[column.key]);

          return `<td>${value}</td>`;
        }).join("");

        return `<tr>${cells}</tr>`;
      }).join("");

      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${head}</tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function metricCard(label, value, extra = "") {
      return `
        <div class="card metric-card">
          <div class="metric-label">${escapeHtml(label)}</div>
          <div>
            <div class="metric-value">${escapeHtml(value)}</div>
            ${extra ? `<div class="metric-extra">${escapeHtml(extra)}</div>` : ""}
          </div>

    }

    function scoreBar(value, max = 100) {
      const n = Math.max(0, Math.min(100, (Number(value) / max) * 100 || 0));

      return `<div class="score-bar"><span style="--w:${n.toFixed(1)}%"></span></div>`;
    }

    function uniqueStrings(values = []) {
      return [...new Set(
        (Array.isArray(values) ? values : [])
          .map((value) => String(value || "").trim())
          .filter(Boolean)
      )];
    }

    function microId(row = {}) {
      return row?.microFamilyId || row?.trueMicroFamilyId || row?.id || row?.key || "";

    function macroId(row = {}) {
      return (
        row?.macroFamilyId ||
        row?.parentMicroFamilyId ||
        row?.legacyMicroFamilyId ||
        row?.coarseMicroFamilyId ||
        row?.familyMacroId ||
        row?.familyId ||

    function familyId(row = {}) {

    function extractIdsFromRotation(rotation = {}) {

    function extractMacroIdsFromRotation(rotation = {}) {
      return uniqueStrings(

        rotation?.activeMacroFamilyIds ||

            ? rotation.microFamilies.map((row) => macroId(row))
            : []

    }

    async function copyText(text, label = "Gekopieerd.") {
      try {
        await navigator.clipboard.writeText(text);
        setMessage(label, "ok");
        return;
      } catch {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        setMessage(label, "ok");
      }
    }

    function downloadJson(filename, data) {
      const blob = new Blob([JSON.stringify(data ?? {}, null, 2)], {
        type: "application/json"

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = filename;
      a.click();

      URL.revokeObjectURL(url);
    }

            <h2>Position table</h2>
            <p>Exacte waardes voor execution/debug.</p>
          </div>
        </div>

        ${table(positions, [
          { label: "Coin", render: (row) => coinAvatar(row, "sm") },
          { label: "Side", render: (row) => `<span class="pill ${escapeAttr(sideClass(row.side))}">${escapeHtml(sideLabel(row.side))}</span>` },
          { label: "Entry", render: (row) => fmtPrice(row.entry) },
          { label: "SL", render: (row) => fmtPrice(row.sl) },
          { label: "TP", render: (row) => fmtPrice(row.tp) },
          { label: "RR", render: (row) => fmt(row.rr, 2) },
          { label: "CurR", render: (row) => fmt(row.currentR, 3) },
          { label: "MFE", render: (row) => fmt(row.mfeR, 3) },
          { label: "MAE", render: (row) => fmt(row.maeR, 3) },
          { label: "True Micro", render: (row) => `<code>${escapeHtml(microId(row))}</code>` },
          { label: "Macro", render: (row) => `<code>${escapeHtml(macroId(row))}</code>` },
          { label: "Opened", render: (row) => fmtTs(row.openedAt || row.createdAt) }
        ])}

        <div class="card">
          <h3>Run meta</h3>
          ${jsonBlock(data.runMeta)}
        </div>
      `;

      $("runTradeBtn")?.addEventListener("click", async () => {
        const result = await api(endpoints.runTrade);
        const counts = result.counts || {};
        setMessage(`TradeSystem run klaar. Entries=${counts.entries || 0}, waits=${counts.waits || 0}, liveRows=${counts.liveRows || 0}.`, "ok");
        await renderTrade();
      });

      $("copyTradeJsonBtn")?.addEventListener("click", () => {
        copyText(JSON.stringify(data, null, 2), "Trade JSON gekopieerd.");
      });
    }

    async function renderMicros(mode = state.microMode) {
      state.microMode = mode || "balanced";
      showLoading("micros");

      const data = await api(`${endpoints.micros}?mode=${encodeURIComponent(state.microMode)}&limit=300`);
      state.micros = data;

      const rows = getRows(data, ["rows", "microFamilies", "micros"]);

      const activeIds = new Set(
        data.activeMicroFamilyIds ||
        extractIdsFromRotation(data.activeRotation || {}) ||
        activeIdsFromState()
      );

      const activeMacroIds = new Set(
        data.activeMacroFamilyIds ||
        extractMacroIdsFromRotation(data.activeRotation || {}) ||
        activeMacroIdsFromState()
      );

      const filteredRows = filterMicroRows(rows);

      $("micros").innerHTML = `
        <div class="toolbar">
          <select id="microMode">
            ${["balanced", "winrate", "totalR", "avgR", "directSL", "observed"].map((modeName) => `
              <option value="${escapeAttr(modeName)}" ${modeName === state.microMode ? "selected" : ""}>${escapeHtml(modeName)}</option>
            `).join("")}
          </select>

          <input id="microSearch" type="search" placeholder="Zoek true micro, macro, family, side, bucket..." value="${escapeAttr(state.microSearch)}" />

          <button type="button" class="primary" id="activateBestBalancedBtn">Activate best balanced</button>
          <button type="button" class="success" id="copyTopMicroIdsBtn">Copy top true micro IDs</button>
          <button type="button" class="success" id="copyTopMacroIdsBtn">Copy top macro IDs</button>
          <button type="button" id="downloadMicrosBtn">Export JSON</button>
        </div>

        <div class="grid">
          ${metricCard("Rows", fmtInt(rows.length))}
          ${metricCard("Filtered", fmtInt(filteredRows.length))}
          ${metricCard("Mode", state.microMode)}
          ${metricCard("Active true micro", fmtInt(activeIds.size))}
          ${metricCard("Active macro", fmtInt(activeMacroIds.size))}
          ${metricCard("Completed", fmt(data.summary?.completed, 2))}
          ${metricCard("Total R", fmt(data.summary?.totalR, 2))}
          ${metricCard("Tradable", fmtInt(data.summary?.tradableMicroFamilies || 0))}
        </div>

        <div class="section-title">
          <div>
            <h2>True micro families</h2>
            <p>Macro = oude micro-family bucket. True micro = extra strakke execution fingerprint binnen de macro.</p>
          </div>
        </div>

        <div id="microsTable">
          ${microRowsTable(filteredRows, activeIds, activeMacroIds)}
        </div>
      `;

      $("microMode")?.addEventListener("change", (event) => {
        renderMicros(event.target.value);
      });

      $("microSearch")?.addEventListener("input", (event) => {
        state.microSearch = event.target.value;

        const currentRows = getRows(state.micros, ["rows", "microFamilies", "micros"]);
        const currentFilteredRows = filterMicroRows(currentRows);
        const filteredMetric = document.querySelector("#micros .grid .metric-card:nth-child(2) .metric-value");

        if (filteredMetric) {
          filteredMetric.textContent = fmtInt(currentFilteredRows.length);
        }

        renderMicrosTableOnly(currentFilteredRows);
      });

      $("activateBestBalancedBtn")?.addEventListener("click", activateBestBalanced);

      $("copyTopMicroIdsBtn")?.addEventListener("click", () => {
        const currentRows = getRows(state.micros, ["rows", "microFamilies", "micros"]);
        const currentFilteredRows = filterMicroRows(currentRows);
        const ids = uniqueStrings(currentFilteredRows.map(microId)).slice(0, 50);

        copyText(JSON.stringify(ids, null, 2), `Top ${ids.length} true microFamilyIds gekopieerd.`);
      });

      $("copyTopMacroIdsBtn")?.addEventListener("click", () => {
        const currentRows = getRows(state.micros, ["rows", "microFamilies", "micros"]);
        const currentFilteredRows = filterMicroRows(currentRows);
        const ids = uniqueStrings(currentFilteredRows.map(macroId)).slice(0, 50);

        copyText(JSON.stringify(ids, null, 2), `Top ${ids.length} macroFamilyIds gekopieerd.`);
      });

      $("downloadMicrosBtn")?.addEventListener("click", () => {
        downloadJson("micro-families.json", data);
      });

      bindMicroTableEvents();
    }

    async function openMicro(id) {
      if (!id) return;

      const drawer = $("drawer");

      drawer.classList.remove("hidden");
      drawer.innerHTML = `
        <div class="drawer-head">
          <div>
            <h2>${escapeHtml(id)}</h2>
            <div class="metric-extra">Detail wordt geladen...</div>
          </div>
          <button type="button" id="closeDrawerBtn">Close</button>
        </div>
      `;

      $("closeDrawerBtn")?.addEventListener("click", closeDrawer);

      try {
        const data = await api(`${endpoints.microDetail}/${encodeURIComponent(id)}`);
        const row = data.row || data.microFamily || data;

        drawer.innerHTML = `
          <div class="drawer-head">
            <div>
              <h2>${escapeHtml(id)}</h2>
              <div class="metric-extra">
                true micro=${escapeHtml(microId(row))} · macro=${escapeHtml(macroId(row))} · family=${escapeHtml(familyId(row))}
              </div>
            </div>
            <button type="button" id="closeDrawerBtn">Close</button>
          </div>

          <div class="toolbar">
            <button type="button" class="success" id="copyDrawerIdBtn">Copy true micro ID</button>
            <button type="button" class="success" id="copyDrawerMacroBtn">Copy macro ID</button>
            <button type="button" id="copyDrawerJsonBtn">Copy JSON</button>
          </div>

          <div class="grid">
            ${metricCard("Seen", fmtInt(row.seen))}
            ${metricCard("Completed", fmt(row.completed, 2))}
            ${metricCard("Fair WR", fmtPctRatio(row.fairWinrate))}
            ${metricCard("Balanced", fmt(row.dashboardBalancedScore ?? row.balancedScore, 2))}
            ${metricCard("AvgR", fmt(row.avgR, 3))}
            ${metricCard("TotalR", fmt(row.totalR, 3))}
            ${metricCard("DirectSL", fmtPctRatio(row.directSLPct))}
            ${metricCard("CostR", fmt(row.avgCostR, 3))}
          </div>

          <div class="two-col">
            <div class="card">
              <h3>IDs</h3>
              ${jsonBlock({
                microFamilyId: microId(row),
                macroFamilyId: macroId(row),
                familyId: familyId(row),
                active: row.active
              })}
            </div>

            <div class="card">
              <h3>Stats</h3>
              ${jsonBlock({
                seen: row.seen,
                completed: row.completed,
                realCompleted: row.realCompleted,
                shadowCompleted: row.shadowCompleted,
                winrate: row.winrate,
                fairWinrate: row.fairWinrate,
                avgR: row.avgR,
                totalR: row.totalR,
                profitFactor: row.profitFactor,
                directSLPct: row.directSLPct,
                balancedScore: row.balancedScore,
                dashboardBalancedScore: row.dashboardBalancedScore
              })}
            </div>
          </div>

          <div class="two-col">
            <div class="card">
              <h3>True micro definition</h3>
              ${jsonBlock(row.definitionParts || row.microDefinitionParts || row.definition || [])}
            </div>

            <div class="card">
              <h3>Macro definition</h3>
              ${jsonBlock(row.macroDefinitionParts || row.macroDefinition || row.parentDefinitionParts || [])}
            </div>
          </div>

          <div class="card">
            <h3>Raw detail JSON</h3>
            ${jsonBlock(data)}
          </div>
        `;

        $("closeDrawerBtn")?.addEventListener("click", closeDrawer);
        $("copyDrawerIdBtn")?.addEventListener("click", () => copyText(microId(row), "True microFamilyId gekopieerd."));
        $("copyDrawerMacroBtn")?.addEventListener("click", () => copyText(macroId(row), "MacroFamilyId gekopieerd."));
        $("copyDrawerJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(data, null, 2), "MicroFamily JSON gekopieerd."));
      } catch (error) {
        drawer.innerHTML = `
          <div class="drawer-head">
            <div>
              <h2>${escapeHtml(id)}</h2>
              <div class="metric-extra">Detail API error</div>
            </div>
            <button type="button" id="closeDrawerBtn">Close</button>
          </div>
          <div class="message error">${escapeHtml(error.message)}</div>
        `;

        $("closeDrawerBtn")?.addEventListener("click", closeDrawer);
      }
    }

    function closeDrawer() {
      $("drawer").classList.add("hidden");
      $("drawer").innerHTML = "";
    }

    async function renderRotation() {
      showLoading("rotation");

      const data = await api(endpoints.rotation);
      state.rotation = data;

      const active = data.active || data.activeRotation || {};
      const next = data.next || data.nextRotation || {};

      const activeIds = extractIdsFromRotation(active);
      const nextIds = extractIdsFromRotation(next);

      const activeMacroIds = extractMacroIdsFromRotation(active);
      const nextMacroIds = extractMacroIdsFromRotation(next);

      const activeRowsRaw = getRows(data, ["activeRows", "rows", "activeMicroFamilies"]);
      const activeRows = activeRowsRaw.length
        ? activeRowsRaw
        : activeIds.map((id, index) => ({ rank: index + 1, microFamilyId: id }));

      $("rotation").innerHTML = `
        <div class="toolbar">
          <button type="button" class="primary" id="activateBestBalancedNowBtn">Activate best balanced now</button>
          <button type="button" class="warn" id="freezeWeeklyBtn">Freeze next rotation</button>
          <button type="button" class="warn" id="activateNextBtn">Activate next rotation</button>
          <button type="button" class="success" id="copyActiveMicroIdsBtn">Copy active true micro IDs</button>
          <button type="button" class="success" id="copyActiveMacroIdsBtn">Copy active macro IDs</button>
          <button type="button" id="downloadRotationBtn">Export rotation JSON</button>
        </div>

        <div class="grid">
          ${metricCard("Active true micro", fmtInt(activeIds.length))}
          ${metricCard("Active macro", fmtInt(activeMacroIds.length))}
          ${metricCard("Next true micro", fmtInt(nextIds.length))}
          ${metricCard("Next macro", fmtInt(nextMacroIds.length))}
          ${metricCard("Active source week", active.sourceWeekKey || data.sourceWeekKey || "NA")}
          ${metricCard("Mode", active.mode || data.mode || "NA")}
          ${metricCard("Eligible", fmtInt(active.eligibleCount || 0))}
          ${metricCard("Rotation ID", active.rotationId || "NA")}
        </div>

        <div class="section-title">
          <div>
            <h2>Active rotation</h2>
            <p>Deze true micro-families worden nu door TradeSystem toegestaan. Macro blijft beschikbaar als parent-context.</p>
          </div>
        </div>

        ${table(activeRows, [
          { label: "Rank", render: (row, index) => escapeHtml(row.rank ?? index + 1) },
          { label: "IDs", render: idStack },
          { label: "Side", render: (row) => `<span class="pill ${escapeAttr(sideClass(row.side))}">${escapeHtml(sideLabel(row.side))}</span>` },
          { label: "Completed", render: (row) => fmt(row.completed, 2) },
          { label: "Fair WR", render: (row) => fmtPctRatio(row.fairWinrate ?? row.bayesianWinrate ?? row.wilsonLowerBound) },
          { label: "AvgR", render: (row) => fmt(row.avgR, 3) },
          { label: "TotalR", render: (row) => fmt(row.totalR, 3) },
          { label: "DirectSL", render: (row) => fmtPctRatio(row.directSLPct) },
          { label: "Balanced", render: (row) => fmt(row.dashboardBalancedScore ?? row.balancedScore, 2) }
        ], "Geen actieve rotation gevonden.")}

        <div class="card">
          <h3>Copy block voor TradeSystem</h3>
          <div class="toolbar">
            <button type="button" class="success" id="copyActiveMicroJsonBtn">Copy true micro JSON array</button>
            <button type="button" class="success" id="copyActiveMicroEnvBtn">Copy true micro ENV</button>
            <button type="button" class="success" id="copyActiveMacroJsonBtn">Copy macro JSON array</button>
            <button type="button" class="success" id="copyActiveMacroEnvBtn">Copy macro ENV</button>
          </div>
          <pre>${escapeHtml(JSON.stringify(activeIds, null, 2))}</pre>
          <pre>${escapeHtml(`ACTIVE_MICRO_FAMILY_IDS=${activeIds.join(",")}`)}</pre>
          <pre>${escapeHtml(`ACTIVE_MACRO_FAMILY_IDS=${activeMacroIds.join(",")}`)}</pre>
        </div>

        <div class="card">
          <h3>Next rotation raw</h3>
          ${jsonBlock(next)}
        </div>
      `;

      $("activateBestBalancedNowBtn")?.addEventListener("click", activateBestBalanced);

      $("freezeWeeklyBtn")?.addEventListener("click", async () => {
        const result = await api(endpoints.weeklyFreeze, {
          method: "POST",
          body: JSON.stringify({ force: true, mode: "balanced" })
        });

        setMessage(`Next rotation frozen. rotationId=${result.rotationId || result.result?.result?.rotationId || "NA"}`, "ok");
        await renderRotation();
      });

      $("activateNextBtn")?.addEventListener("click", async () => {
        const result = await api(endpoints.activateNextRotation, {
          method: "POST",
          body: JSON.stringify({ force: true })
        });

        setMessage(`Next rotation activated. count=${result.activatedCount || 0}`, "ok");
        await renderRotation();
      });

      $("copyActiveMicroIdsBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeIds, null, 2), `Copied ${activeIds.length} true micro IDs.`));
      $("copyActiveMacroIdsBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeMacroIds, null, 2), `Copied ${activeMacroIds.length} macro IDs.`));

      $("copyActiveMicroJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeIds, null, 2), `Copied ${activeIds.length} true micro IDs.`));
      $("copyActiveMicroEnvBtn")?.addEventListener("click", () => copyText(`ACTIVE_MICRO_FAMILY_IDS=${activeIds.join(",")}`, "True micro ENV line gekopieerd."));

      $("copyActiveMacroJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeMacroIds, null, 2), `Copied ${activeMacroIds.length} macro IDs.`));
      $("copyActiveMacroEnvBtn")?.addEventListener("click", () => copyText(`ACTIVE_MACRO_FAMILY_IDS=${activeMacroIds.join(",")}`, "Macro ENV line gekopieerd."));

      $("downloadRotationBtn")?.addEventListener("click", () => downloadJson("active-rotation.json", data));

      bindMicroTableEvents();
    }

    async function renderDiscord() {
      showLoading("discord");

      const data = await api(`${endpoints.discord}?limit=100`);
      state.discord = data;

      const logs = getRows(data, ["logs", "items"]);

      $("discord").innerHTML = `
        <div class="toolbar">
          <button type="button" id="copyDiscordJsonBtn">Copy Discord JSON</button>
          <button type="button" id="downloadDiscordBtn">Export JSON</button>
        </div>

        <div class="grid">
          ${metricCard("Logs", fmtInt(logs.length))}
          ${metricCard("Last log", fmtTs(logs[0]?.ts || logs[0]?.createdAt))}
        </div>

        ${table(logs, [
          { label: "TS", render: (row) => fmtTs(row.ts || row.createdAt) },
          { label: "Type", render: (row) => escapeHtml(row.type || row.level || "-") },
          { label: "Coin", render: (row) => coinAvatar(row.payload || row, "sm") },
          { label: "Side", render: (row) => `<span class="pill ${escapeAttr(sideClass(row.side || row.payload?.side))}">${escapeHtml(sideLabel(row.side || row.payload?.side))}</span>` },
          { label: "True Micro", render: (row) => `<code>${escapeHtml(microId(row.payload || row))}</code>` },
          { label: "Macro", render: (row) => `<code>${escapeHtml(macroId(row.payload || row))}</code>` },
          { label: "Result", render: (row) => escapeHtml(row.result ? JSON.stringify(row.result) : row.message || row.content || "") }
        ])}
      `;

      $("copyDiscordJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(data, null, 2), "Discord JSON gekopieerd."));
      $("downloadDiscordBtn")?.addEventListener("click", () => downloadJson("discord-logs.json", data));
    }

    function renderReset() {
      $("reset").innerHTML = `
        <div class="grid-3">
          <div class="card">
            <h3>Reset learning only</h3>
            <p class="metric-extra">Wist observations, outcomes, weekly macro/micro stats en shadow data. Open positions blijven staan.</p>
            <button type="button" class="warn" id="resetLearningBtn">Reset learning</button>
          </div>

          <div class="card">
            <h3>Reset rotation only</h3>
            <p class="metric-extra">Wist active/next rotation. Learning blijft staan.</p>
            <button type="button" class="warn" id="resetRotationBtn">Reset rotation</button>
          </div>

          <div class="card">
            <h3>Factory reset</h3>
            <p class="metric-extra">Wist scanner snapshots, trade memory, open positions, analyze stats, rotations en live cache.</p>
            <input id="factoryConfirm" style="width: 100%; margin-bottom: 8px;" placeholder="FACTORY_RESET_CONFIRMED" />
            <label style="display: block; margin-bottom: 8px;">
              <input id="factoryForce" type="checkbox" />
              force even with open positions
            </label>
            <button type="button" class="danger" id="factoryResetBtn">Factory reset</button>
          </div>
        </div>

        <div class="card">
          <h3>Reset result</h3>
          <pre id="resetResult">Nog geen reset uitgevoerd.</pre>
        </div>
      `;

      $("resetLearningBtn")?.addEventListener("click", postResetLearning);
      $("resetRotationBtn")?.addEventListener("click", postResetRotation);
      $("factoryResetBtn")?.addEventListener("click", postFactoryReset);
    }

    async function postResetLearning() {
      const confirmValue = prompt("Typ RESET_LEARNING om learning te wissen.");

      if (confirmValue !== "RESET_LEARNING") return;

      const data = await api(endpoints.resetLearning, {
        method: "POST",
        body: JSON.stringify({
          confirm: "RESET_LEARNING",
          confirmed: "RESET_LEARNING"
        })
      });

      $("resetResult").textContent = JSON.stringify(data, null, 2);
      setMessage("Learning reset uitgevoerd.", "ok");
    }

    async function postResetRotation() {
      if (!confirm("Reset active/next rotation?")) return;

      const data = await api(endpoints.resetRotation, {
        method: "POST",
        body: JSON.stringify({
          confirm: true,
          confirmed: true
        })
      });

      $("resetResult").textContent = JSON.stringify(data, null, 2);
      setMessage("Rotation reset uitgevoerd.", "ok");
    }

    async function postFactoryReset() {
      const confirmValue = $("factoryConfirm").value.trim();
      const forceValue = $("factoryForce").checked;

      if (confirmValue !== "FACTORY_RESET_CONFIRMED") {
        setMessage("Factory reset geblokkeerd: bevestiging is niet exact FACTORY_RESET_CONFIRMED.", "error");
        return;
      }

      if (!confirm("FACTORY RESET wist alles. Doorgaan?")) return;

      const data = await api(endpoints.factoryReset, {
        method: "POST",
        body: JSON.stringify({
          confirm: "FACTORY_RESET_CONFIRMED",
          confirmed: "FACTORY_RESET_CONFIRMED",
          force: forceValue,
          forceClosePositions: forceValue
        })
      });

      $("resetResult").textContent = JSON.stringify(data, null, 2);
      setMessage("Factory reset uitgevoerd.", "ok");
    }

    async function activateBestBalanced() {
      if (!confirm("Activate best balanced true microFamilies als active rotation?")) return;

      const data = await api(endpoints.rotation, {
        method: "POST",
        body: JSON.stringify({
          action: "activateBestBalanced",
          mode: "balanced"
        })
      });

      const active = data.activeRotation || data.active || {};
      const microCount = extractIdsFromRotation(active).length;
      const macroCount = extractMacroIdsFromRotation(active).length;

      setMessage(`Activated ${microCount} true microFamilies binnen ${macroCount} macroFamilies.`, "ok");

      if (state.activeTab === "micros") {
        await renderMicros(state.microMode);
        return;
      }

      if (state.activeTab === "rotation") {
        await renderRotation();
        return;
      }

      await refresh(state.activeTab);
    }

    function showTab(id) {
      if (!tabs.includes(id)) id = "overview";

      state.activeTab = id;

      document.querySelectorAll(".panel").forEach((panel) => panel.classList.add("hidden"));
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));

      $(id).classList.remove("hidden");
      document.querySelector(`[data-tab="${id}"]`)?.classList.add("active");

      location.hash = id;
      refresh(id);
    }

    async function refresh(tab = state.activeTab) {
      setMessage("");
      $("liveLabel").textContent = `Last refresh ${new Date().toLocaleTimeString()}`;

      try {
        if (tab === "overview") return await renderOverview();
        if (tab === "scanner") return await renderScanner();
        if (tab === "trade") return await renderTrade();
        if (tab === "micros") return await renderMicros();
        if (tab === "rotation") return await renderRotation();
        if (tab === "discord") return await renderDiscord();
        if (tab === "reset") return renderReset();
      } catch (error) {
        const message = error?.message || String(error);

        setMessage(message, "error");

        $(tab).innerHTML = `<div class="card"><h3>Error</h3>${jsonBlock({ message })}</div>`;
      }
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => showTab(button.dataset.tab));
    });

    $("refreshBtn").addEventListener("click", () => refresh(state.activeTab));

    window.addEventListener("error", (event) => {
      setMessage(event.message || "Browser error", "error");
    });

    window.addEventListener("unhandledrejection", (event) => {
      setMessage(event.reason?.message || String(event.reason || "Unhandled promise rejection"), "error");
    });

    const initialTab = location.hash.replace("#", "") || "overview";
    showTab(tabs.includes(initialTab) ? initialTab : "overview");
  </script>
