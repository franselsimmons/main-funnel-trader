<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SHORT 75 Micro-Family Learning Admin</title>

  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --dark: #0f172a;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --blue: #2563eb;
      --purple: #7c3aed;
      --cyan: #0891b2;
      --shadow: 0 2px 12px rgba(15, 23, 42, 0.07);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(220, 38, 38, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(15, 23, 42, 0.12), transparent 32%),
        var(--bg);
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 14px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: 0.14s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    button.primary { background: var(--dark); color: white; border-color: var(--dark); }
    button.success { background: var(--green); color: white; border-color: var(--green); }
    button.warn { background: var(--amber); color: white; border-color: var(--amber); }
    button.danger { background: var(--red); color: white; border-color: var(--red); }
    button.short-action { background: var(--red); color: white; border-color: var(--red); }
    button.small { padding: 6px 9px; border-radius: 9px; font-size: 12px; }

    select,
    input,
    textarea {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      min-height: 42px;
    }

    input[type="search"] { min-width: 340px; }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      line-height: 1.45;
    }

    header {
      background: linear-gradient(135deg, #0f172a 0%, #111827 46%, #7f1d1d 100%);
      color: white;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-inner {
      max-width: 1540px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #dc2626, #fca5a5);
      box-shadow: 0 12px 32px rgba(220, 38, 38, 0.30);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-title strong {
      display: block;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: #cbd5e1;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #fca5a5;
      box-shadow: 0 0 0 4px rgba(252, 165, 165, 0.18);
    }

    main {
      max-width: 1540px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(243, 245, 249, 0.88);
      backdrop-filter: blur(14px);
      padding: 10px 0;
    }

    .tab {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.80);
      border-color: rgba(203, 213, 225, 0.90);
    }

    .tab.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .hidden,
    .panel.hidden { display: none; }

    .message {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
    }

    .message.ok { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .message.error { color: #991b1b; background: #fee2e2; border-color: #fecaca; }
    .message.warn { color: #92400e; background: #fef3c7; border-color: #fde68a; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #334155;
    }

    .metric-card {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .metric-extra {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin: 12px 0 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .pill.active { background: #dcfce7; color: #166534; }
    .pill.short { background: #fee2e2; color: #991b1b; }
    .pill.danger { background: #fee2e2; color: #991b1b; }
    .pill.warn { background: #fef3c7; color: #92400e; }
    .pill.info { background: #dbeafe; color: #1d4ed8; }
    .pill.purple { background: #ede9fe; color: #5b21b6; }
    .pill.dark { background: #0f172a; color: white; }
    .pill.soft { background: #e0f2fe; color: #075985; }
    .pill.observation { background: #fef9c3; color: #854d0e; }
    .pill.raw { background: #f1f5f9; color: #475569; }
    .pill.fit { background: #dcfce7; color: #166534; }
    .pill.weakfit { background: #ccfbf1; color: #0f766e; }
    .pill.neutral { background: #f1f5f9; color: #475569; }
    .pill.misfit { background: #fee2e2; color: #991b1b; }

    .score-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .score-bar > span {
      display: block;
      height: 100%;
      width: var(--w);
      background: linear-gradient(90deg, #dc2626, #fca5a5);
      border-radius: inherit;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1560px;
      background: white;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td { background: #f8fafc; }

    code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 3px 5px;
      border-radius: 6px;
      color: #334155;
      white-space: nowrap;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1020;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 16px;
      max-height: 520px;
      overflow: auto;
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.48;
    }

    .api-url-box {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .api-url-box code {
      white-space: normal;
      word-break: break-all;
    }

    .api-output-textarea {
      width: 100%;
      min-height: 360px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
      background: #0b1020;
      color: #e5e7eb;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 14px;
      white-space: pre;
      user-select: all;
    }

    .api-output-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .api-output-head h3 {
      margin: 0;
    }

    .copy-big {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
      font-weight: 800;
    }

    .micro-desktop-table table {
      min-width: 1180px;
    }

    .micro-id-cell {
      max-width: 360px;
      white-space: normal;
      word-break: break-word;
    }

    .micro-id-cell code {
      white-space: normal;
      word-break: break-all;
      line-height: 1.5;
    }

    .micro-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .micro-mobile-cards {
      display: none;
    }

    .micro-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    .micro-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .micro-card-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    .micro-id-button {
      width: 100%;
      text-align: left;
      padding: 10px;
      border-radius: 14px;
      margin: 8px 0;
      background: #f8fafc;
    }

    .micro-id-button code {
      white-space: normal;
      word-break: break-all;
      line-height: 1.55;
      font-size: 12px;
    }

    .micro-stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .micro-stat-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px;
    }

    .micro-stat-box span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .micro-stat-box strong {
      display: block;
      font-size: 14px;
      word-break: break-word;
    }

    @media (max-width: 720px) {
      .micro-desktop-table {
        display: none;
      }

      .micro-mobile-cards {
        display: block;
      }

      .api-output-textarea {
        min-height: 420px;
        font-size: 11px;
      }
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.70);
    }

    .coin-card,
    .manual-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .coin-card::before,
    .manual-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, #dc2626, #fca5a5);
    }

    .coin-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .coin-symbol {
      font-weight: 850;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .coin-name {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .coin-price {
      text-align: right;
    }

    .coin-price strong {
      display: block;
      font-size: 16px;
    }

    .coin-price span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
    }

    .coin-stats,
    .manual-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .coin-stat,
    .manual-stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px;
    }

    .coin-stat span,
    .manual-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
      font-weight: 700;
    }

    .coin-stat strong,
    .manual-stat strong {
      font-size: 13px;
      word-break: break-word;
    }

    .coin-foot {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }

    .manual-card {
      max-width: 1100px;
      margin-bottom: 14px;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(900px, 94vw);
      background: white;
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 42px rgba(15, 23, 42, 0.18);
      padding: 20px;
      overflow: auto;
      z-index: 30;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    @media (max-width: 1180px) {
      .grid,
      .coin-grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }
      .grid-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      header { padding: 18px 14px; }
      .header-inner { flex-direction: column; }
      main { padding: 14px; }
      .grid,
      .coin-grid { grid-template-columns: 1fr; }
      .tab { flex: 1 1 auto; padding: 9px 10px; }
      input[type="search"] { min-width: 100%; }
      .manual-grid,
      .coin-stats { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="brand-title">
        <div class="brand-logo">75</div>
        <div>
          <strong>SHORT 75 Micro-Family Learning Admin</strong>
          <div class="brand-subtitle">
            Scanner → Analyze 75-child trueMicroFamilyId → virtual/shadow outcomes → netR scoring → adaptive selection → strict Discord
          </div>
        </div>
      </div>

      <div class="header-actions">
        <div class="live-pill"><span class="live-dot"></span><span id="liveLabel">SHORT-only · broad learning · adaptive selection</span></div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="overview">Overview</button>
      <button type="button" class="tab" data-tab="market">marketWeather.js</button>
      <button type="button" class="tab" data-tab="scanner">Scanner</button>
      <button type="button" class="tab" data-tab="trade">TradeSystem</button>
      <button type="button" class="tab" data-tab="micros">75 MicroFamilies</button>
      <button type="button" class="tab" data-tab="rotation">Manual Discord Selection</button>
      <button type="button" class="tab" data-tab="discord">Discord Logs</button>
      <button type="button" class="tab" data-tab="reset">Reset</button>
    </div>

    <div id="message"></div>

    <section id="overview" class="panel"></section>
    <section id="market" class="panel hidden"></section>
    <section id="scanner" class="panel hidden"></section>
    <section id="trade" class="panel hidden"></section>
    <section id="micros" class="panel hidden"></section>
    <section id="rotation" class="panel hidden"></section>
    <section id="discord" class="panel hidden"></section>
    <section id="reset" class="panel hidden"></section>
  </main>

  <div id="drawer" class="drawer hidden"></div>

  <script>
    const ONLY_SIDE = "SHORT";
    const OPPOSITE_SIDE = "LONG";
    const DASHBOARD_SIDE = "bear";
    const SHORT_NAMESPACE = "SHORT";
    const SHORT_KEY_PREFIX = "SHORT:";
    const PERSISTENT_LEARNING_KEY = "SHORT_LIVE";

    const MIN_COMPLETED_ACTIVE_LEARNING = 20;
    const MAX_ACTIVE_DISCORD_MICRO_FAMILIES = 2;
    const DEFAULT_POSITION_TIME_STOP_MIN = 720;

    const TRUE_MICRO_SCHEMA = "FIXED_TAXONOMY_75";
    const PARENT_TRUE_MICRO_SCHEMA = "FIXED_TAXONOMY_15";
    const LEARNING_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_X_CONFIRMATION_V1";
    const PARENT_LEARNING_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_V1";

    const MEASUREMENT_FIX_VERSION = "SHORT_MEASUREMENT_FIX_AVGCOST_DIRECTSL_SEEN_DEDUPE_V1";
    const ADAPTIVE_UI_VERSION = "SHORT_ADAPTIVE_UI_MARKETWEATHER_CURRENTFIT_V1";

    const SHORT_FIXED_SETUP_TYPES = new Set([
      "BREAKOUT",
      "RETEST",
      "SWEEP_REVERSAL",
      "CONTINUATION",
      "COMPRESSION"
    ]);

    const SHORT_FIXED_REGIME_BUCKETS = new Set([
      "TREND",
      "CHOP",
      "SQUEEZE"
    ]);

    const SHORT_FIXED_CONFIRMATION_PROFILES = new Set([
      "A_STRONG_ALIGN",
      "B_FLOW_ALIGN",
      "C_VOLUME_ALIGN",
      "D_MIXED_OK",
      "E_WEAK_CONTRA"
    ]);

    const state = {
      activeTab: "overview",
      overview: null,
      market: null,
      scanner: null,
      trade: null,
      micros: null,
      rotation: null,
      discord: null,
      microMode: "adaptive",
      microSearch: "",
      apiTimeoutMs: 22000,
      microLimit: 180,
      bestLimit: 140
    };

    const endpoints = {
      overview: "/api/admin/overview",
      market: "/api/admin/market-weather",
      scanner: "/api/admin/scanner",
      trade: "/api/admin/trade",
      micros: "/api/admin/micro-families",
      rotation: "/api/admin/rotation",
      discord: "/api/admin/discord-logs",
      microDetail: "/api/admin/micro-family",
      runScanner: "/api/scanner/run?force=true",
      runTrade: "/api/trade/run?force=true&forceProcessSnapshot=true",
      resetLearning: "/api/admin/reset-learning",
      resetRotation: "/api/admin/reset-rotation",
      factoryReset: "/api/admin/factory-reset"
    };

    const tabs = ["overview", "market", "scanner", "trade", "micros", "rotation", "discord", "reset"];
    const validMicroModes = ["adaptive", "balanced", "winrate", "totalR", "avgR", "directSL", "observed", "cost", "currentFit"];

    const $ = (id) => document.getElementById(id);

    class ApiError extends Error {
      constructor(message, details = {}) {
        super(message);
        this.name = "ApiError";
        this.status = details.status || 0;
        this.url = details.url || "";
        this.data = details.data || null;
        this.timeout = Boolean(details.timeout);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function upper(value) {
      return String(value || "").trim().toUpperCase();
    }

    function cleanSideText(value = "") {
      return upper(value)
        .replaceAll("LONG_DISABLED_TRUE", "SHORT")
        .replaceAll("LONGDISABLED_TRUE", "SHORT")
        .replaceAll("BLOCK_LONG_TRUE", "SHORT")
        .replaceAll("LONG_DISABLED_FALSE", "")
        .replaceAll("LONGDISABLED_FALSE", "")
        .replaceAll("BLOCK_LONG_FALSE", "")
        .replaceAll("LONG_ENABLED_FALSE", "")
        .replaceAll("LONG_ONLY_FALSE", "")
        .replaceAll("SHORT_DISABLED_FALSE", "")
        .replaceAll("SHORTDISABLED_FALSE", "")
        .replaceAll("BLOCK_SHORT_FALSE", "")
        .replaceAll("SHORT_ENABLED_FALSE", "")
        .replaceAll("SHORT_ONLY_FALSE", "")
        .replaceAll("LONG_DISABLED_SHORT_ONLY", "SHORT")
        .replaceAll("LONGDISABLED_SHORT_ONLY", "SHORT")
        .replaceAll("BLOCK_LONG", "SHORT")
        .replaceAll("LONG_DISABLED", "SHORT")
        .replaceAll("LONGDISABLED", "SHORT")
        .replaceAll("SHORT_DISABLED_LONG_ONLY", "LONG")
        .replaceAll("SHORTDISABLED_LONG_ONLY", "LONG")
        .replaceAll("BLOCK_SHORT", "LONG")
        .replaceAll("SHORT_DISABLED", "LONG")
        .replaceAll("SHORTDISABLED", "LONG")
        .replaceAll("SHORT_ONLY_MODE", "SHORT")
        .replaceAll("SHORT_ONLY", "SHORT")
        .replaceAll("SHORT-ONLY", "SHORT")
        .replaceAll("LONG_ONLY_MODE", "LONG")
        .replaceAll("LONG_ONLY", "LONG")
        .replaceAll("LONG-ONLY", "LONG");
    }

    function parseFixedShortTaxonomyId(id = "") {
      const value = upper(id);
      const match = /^MICRO_SHORT_([A-Z_]+)_(TREND|CHOP|SQUEEZE)(?:_(A_STRONG_ALIGN|B_FLOW_ALIGN|C_VOLUME_ALIGN|D_MIXED_OK|E_WEAK_CONTRA))?$/.exec(value);

      if (!match) return null;

      const setup = match[1];
      const regime = match[2];
      const confirmation = match[3] || null;

      if (!SHORT_FIXED_SETUP_TYPES.has(setup)) return null;
      if (!SHORT_FIXED_REGIME_BUCKETS.has(regime)) return null;
      if (confirmation && !SHORT_FIXED_CONFIRMATION_PROFILES.has(confirmation)) return null;

      const parentTrueMicroFamilyId = `MICRO_SHORT_${setup}_${regime}`;
      const childTrueMicroFamilyId = confirmation
        ? `${parentTrueMicroFamilyId}_${confirmation}`
        : null;

      return {
        setup,
        regime,
        confirmation,
        parentTrueMicroFamilyId,
        childTrueMicroFamilyId,
        isParent: !confirmation,
        isChild: Boolean(confirmation)
      };
    }

    function isFixedShortTaxonomyParentId(id = "") {
      return parseFixedShortTaxonomyId(id)?.isParent === true;
    }

    function isFixedShortTaxonomyChildId(id = "") {
      return parseFixedShortTaxonomyId(id)?.isChild === true;
    }

    function parentFromChildTrueMicroFamilyId(id = "") {
      const parsed = parseFixedShortTaxonomyId(id);

      if (!parsed?.isChild) return "";

      return parsed.parentTrueMicroFamilyId;
    }

    function normalizeSide(value) {
      const raw = cleanSideText(value);

      if (["SHORT", "BEAR", "BEARISH", "SELL", "DOWN", "DOWNSIDE"].includes(raw)) return ONLY_SIDE;
      if (["LONG", "BULL", "BULLISH", "BUY", "UP", "UPSIDE"].includes(raw)) return OPPOSITE_SIDE;

      return "UNKNOWN";
    }

    function hasShortSignal(value = "") {
      const text = ` ${cleanSideText(value)} `;

      return (
        text.includes("MICRO_SHORT_") ||
        text.includes("TRADESIDE=SHORT") ||
        text.includes("TRADE_SIDE=SHORT") ||
        text.includes("POSITION_SIDE=SHORT") ||
        text.includes("POSITIONSIDE=SHORT") ||
        text.includes("SIDE=SHORT") ||
        text.includes("SIDE=BEAR") ||
        text.includes("SIDE=SELL") ||
        text.includes("DIRECTION=SHORT") ||
        text.includes("DIRECTION=BEAR") ||
        text.includes("DIRECTION=SELL") ||
        text.includes(" SHORT ") ||
        text.includes(" SHORT_") ||
        text.includes("_SHORT ") ||
        text.includes("_SHORT_") ||
        text.includes("|SHORT|") ||
        text.includes(":SHORT") ||
        text.includes("=SHORT") ||
        text.includes(" BEAR ") ||
        text.includes("_BEAR") ||
        text.includes("BEAR_") ||
        text.includes("|BEAR|") ||
        text.includes(":BEAR") ||
        text.includes("=BEAR") ||
        text.includes(" SELL ") ||
        text.includes("_SELL") ||
        text.includes("SELL_") ||
        text.includes("|SELL|") ||
        text.includes(":SELL") ||
        text.includes("=SELL")
      );
    }

    function hasLongSignal(value = "") {
      const text = ` ${cleanSideText(value)} `;

      return (
        text.includes("MICRO_LONG_") ||
        text.includes("TRADESIDE=LONG") ||
        text.includes("TRADE_SIDE=LONG") ||
        text.includes("POSITION_SIDE=LONG") ||
        text.includes("POSITIONSIDE=LONG") ||
        text.includes("SIDE=LONG") ||
        text.includes("SIDE=BULL") ||
        text.includes("SIDE=BUY") ||
        text.includes("DIRECTION=LONG") ||
        text.includes("DIRECTION=BULL") ||
        text.includes("DIRECTION=BUY") ||
        text.includes(" LONG ") ||
        text.includes(" LONG_") ||
        text.includes("_LONG ") ||
        text.includes("_LONG_") ||
        text.includes("|LONG|") ||
        text.includes(":LONG") ||
        text.includes("=LONG") ||
        text.includes(" BULL ") ||
        text.includes("_BULL") ||
        text.includes("BULL_") ||
        text.includes("|BULL|") ||
        text.includes(":BULL") ||
        text.includes("=BULL") ||
        text.includes(" BUY ") ||
        text.includes("_BUY") ||
        text.includes("BUY_") ||
        text.includes("|BUY|") ||
        text.includes(":BUY")
      );
    }

    function isScannerFingerprintId(id = "") {
      const value = upper(id);

      return (
        value.startsWith("MICRO_SHORT_SCANNER__") ||
        value.includes("MICRO_SHORT_SCANNER__") ||
        value.startsWith("SHORT_SCANNER_") ||
        value.includes("SHORT_SCANNER_") ||
        value.startsWith("MICRO_LONG_SCANNER__") ||
        value.includes("MICRO_LONG_SCANNER__") ||
        value.startsWith("LONG_SCANNER_") ||
        value.includes("LONG_SCANNER_") ||
        value.includes("__SCANNER__") ||
        value.includes("SCANNER_GATE_PASS") ||
        value.includes("SCANNER_GATE_FAIL")
      );
    }

    function isExecutionFingerprintId(id = "") {
      const value = upper(id);

      return (
        value.includes("_XR_") ||
        value.includes("__XR__") ||
        value.includes("|XR|") ||
        value.includes("EXECUTION_FINGERPRINT") ||
        value.includes("EXECUTION_MICRO") ||
        value.includes("EXECUTIONMICRO") ||
        value.includes("REFINED_EXECUTION")
      );
    }

    function validLearningId(id = "") {
      const value = String(id || "").trim();

      if (!value) return false;
      if (isScannerFingerprintId(value)) return false;
      if (isExecutionFingerprintId(value)) return false;

      return true;
    }

    function isSelectableTrueMicroId(id = "") {
      const value = String(id || "").trim();

      if (!validLearningId(value)) return false;
      if (!isFixedShortTaxonomyChildId(value)) return false;

      return true;
    }

    function isSelectableParentMicroId(id = "") {
      const value = String(id || "").trim();

      if (!validLearningId(value)) return false;
      if (!isFixedShortTaxonomyParentId(value)) return false;

      return true;
    }

    function inferSide(input = {}) {
      if (typeof input === "string") {
        const direct = normalizeSide(input);
        if (direct !== "UNKNOWN") return direct;

        const text = cleanSideText(input);
        const shortSignal = hasShortSignal(text);
        const longSignal = hasLongSignal(text);

        if (shortSignal && !longSignal) return ONLY_SIDE;
        if (longSignal) return OPPOSITE_SIDE;

        return "UNKNOWN";
      }

      if (!input || typeof input !== "object") return "UNKNOWN";

      const directFields = [
        input.tradeSide,
        input.targetTradeSide,
        input.positionSide,
        input.direction,
        input.scannerSide,
        input.actualScannerSide,
        input.analysisSide,
        input.signalSide,
        input.entrySide,
        input.dashboardSide,
        input.side,
        input.bias,
        input.marketBias
      ];

      for (const field of directFields) {
        const direct = normalizeSide(field);
        if (direct !== "UNKNOWN") return direct;
      }

      const haystack = [
        input.familyId,
        input.family,
        input.baseFamilyId,

        input.parentTrueMicroFamilyId,
        input.microFamilyId,
        input.trueMicroFamilyId,
        input.childTrueMicroFamilyId,
        input.coarseMicroFamilyId,
        input.liveMicroFamilyId,
        input.realMicroFamilyId,
        input.executionMicroFamilyId,
        input.analyzeMicroFamilyId,
        input.learningMicroFamilyId,
        input.id,
        input.key,

        input.macroFamilyId,
        input.parentMacroFamilyId,
        input.parentMicroFamilyId,
        input.parentFamilyId,
        input.macroId,

        input.definition,
        input.microDefinition,
        input.macroDefinition,
        input.parentDefinition,

        input.scannerReason,
        input.reason,
        input.signalReason,
        input.actionReason,
        input.exitReason,
        input.rejectionReason,

        Array.isArray(input.definitionParts) ? input.definitionParts.join("|") : "",
        Array.isArray(input.microDefinitionParts) ? input.microDefinitionParts.join("|") : "",
        Array.isArray(input.macroDefinitionParts) ? input.macroDefinitionParts.join("|") : "",
        Array.isArray(input.parentDefinitionParts) ? input.parentDefinitionParts.join("|") : "",
        Array.isArray(input.executionFingerprintParts) ? input.executionFingerprintParts.join("|") : ""
      ].join(" | ");

      const shortSignal = hasShortSignal(haystack);
      const longSignal = hasLongSignal(haystack);

      if (shortSignal && !longSignal) return ONLY_SIDE;
      if (longSignal) return OPPOSITE_SIDE;

      if (
        input.shortOnly === true ||
        input.longDisabled === true ||
        input.targetTradeSide === ONLY_SIDE ||
        input.tradeSide === ONLY_SIDE ||
        input.dashboardSide === DASHBOARD_SIDE
      ) {
        return ONLY_SIDE;
      }

      if (input.longOnly === true || input.shortDisabled === true) {
        return OPPOSITE_SIDE;
      }

      return "UNKNOWN";
    }

    function microId(row = {}) {
      return String(
        row.trueMicroFamilyId ||
        row.childTrueMicroFamilyId ||
        row.microFamilyId ||
        row.analyzeMicroFamilyId ||
        row.learningMicroFamilyId ||
        row.liveMicroFamilyId ||
        row.realMicroFamilyId ||
        row.executionMicroFamilyId ||
        row.id ||
        row.key ||
        ""
      ).trim().toUpperCase();
    }

    function parentMicroId(row = {}) {
      const id = microId(row);

      return String(
        row.parentTrueMicroFamilyId ||
        row.parentMicroFamilyId ||
        row.parentMacroFamilyId ||
        row.coarseMicroFamilyId ||
        row.baseMicroFamilyId ||
        row.legacyMicroFamilyId ||
        parentFromChildTrueMicroFamilyId(id) ||
        ""
      ).trim().toUpperCase();
    }

    function macroId(row = {}) {
      return parentMicroId(row);
    }

    function familyId(row = {}) {
      return String(row.familyId || row.family || row.baseFamilyId || "").trim();
    }

    function isRealAnalyzeMicroRow(row = {}) {
      const id = microId(row);
      const parentId = parentMicroId(row);

      if (!id) return false;
      if (!isSelectableTrueMicroId(id)) return false;
      if (parentId && !isSelectableParentMicroId(parentId)) return false;
      if (row.legacyScannerFamilyFallback === true) return false;

      const side = inferSide(row);
      if (side === OPPOSITE_SIDE) return false;

      return true;
    }

    function idAllowedInShortOnly(id = "") {
      return isSelectableTrueMicroId(id);
    }

    function parentIdAllowedInShortOnly(id = "") {
      return isSelectableParentMicroId(id);
    }

    function uniqueStrings(values = []) {
      const stack = Array.isArray(values) ? [...values] : [values];
      const out = [];

      while (stack.length) {
        const value = stack.shift();

        if (Array.isArray(value)) {
          stack.unshift(...value);
          continue;
        }

        if (typeof value === "string") {
          out.push(...value.split(/[\s,;\n\r]+/g));
          continue;
        }

        if (value !== undefined && value !== null) out.push(value);
      }

      return [...new Set(
        out
          .map((value) => String(value || "").trim().toUpperCase())
          .filter(Boolean)
      )];
    }

    function asArray(value) {
      if (Array.isArray(value)) return value;
      if (value && typeof value === "object") return Object.values(value);

      return [];
    }

    function num(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function firstFinite(...values) {
      for (const value of values) {
        const n = Number(value);
        if (Number.isFinite(n)) return n;
      }

      return null;
    }

    function clamp(value, min, max) {
      const n = Number(value);
      if (!Number.isFinite(n)) return min;
      return Math.max(min, Math.min(max, n));
    }

    function fmt(value, decimals = 3) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return n.toFixed(decimals);
    }

    function fmtInt(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "0";
      return Math.round(n).toLocaleString();
    }

    function fmtPct(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return `${(n * 100).toFixed(1)}%`;
    }

    function fmtRawPct(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "-";
      return `${n.toFixed(2)}%`;
    }

    function fmtPrice(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (n >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
      if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 4 });

      return n.toLocaleString(undefined, { maximumFractionDigits: 8 });
    }

    function fmtMoney(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (Math.abs(n) >= 1_000_000_000) return `${(n / 1_000_000_000).toFixed(2)}B`;
      if (Math.abs(n) >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
      if (Math.abs(n) >= 1_000) return `${(n / 1_000).toFixed(1)}K`;

      return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
    }

    function fmtTs(value) {
      if (!value) return "-";

      const n = Number(value);
      const date = Number.isFinite(n) ? new Date(n) : new Date(value);

      if (Number.isNaN(date.getTime())) return "-";

      return date.toLocaleString();
    }

    function ageText(ts) {
      const n = Number(ts);

      if (!Number.isFinite(n) || n <= 0) return "-";

      const seconds = Math.max(0, Math.floor((Date.now() - n) / 1000));

      if (seconds < 60) return `${seconds}s geleden`;
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m geleden`;

      return `${Math.floor(seconds / 3600)}u geleden`;
    }

    function baseSymbol(row = {}) {
      const raw = typeof row === "string"
        ? row
        : row.symbol || row.baseSymbol || row.coin || row.contractSymbol || row.instId || row.instrumentId || "";

      let symbol = String(raw).toUpperCase().replace(/[^A-Z0-9]/g, "");

      for (const suffix of ["USDTUMCBL", "USDCUMCBL", "USDTPERP", "USDCPERP", "USDT", "USDC", "BUSD", "PERP", "SWAP", "USD"]) {
        if (symbol.endsWith(suffix) && symbol.length > suffix.length) {
          symbol = symbol.slice(0, -suffix.length);
          break;
        }
      }

      return symbol || "COIN";
    }

    function completed(row = {}) {
      const explicitVirtual = num(row.virtualCompleted, 0);
      const explicitShadow = num(row.shadowCompleted, 0);
      const closed = explicitVirtual + explicitShadow;

      if (closed > 0) return closed;

      const outcome = Number(row.outcomeSample);
      if (Number.isFinite(outcome)) return outcome;

      const explicit = Number(row.completed);
      if (Number.isFinite(explicit) && explicit > 0) return explicit;

      const wins = num(row.wins, 0);
      const losses = num(row.losses, 0);
      const flats = num(row.flats, 0);
      const sum = wins + losses + flats;

      return sum > 0 ? sum : 0;
    }

    function observationSample(row = {}) {
      return Math.max(
        num(row.observationSample, 0),
        num(row.seen, 0),
        num(row.observations, 0),
        completed(row),
        0
      );
    }

    function learningStatus(row = {}) {
      const done = completed(row);

      if (done >= MIN_COMPLETED_ACTIVE_LEARNING) return "ACTIVE_LEARNING";
      if (done > 0) return "EARLY_OUTCOMES";

      return "OBSERVING";
    }

    function tooEarly(row = {}) {
      return completed(row) < MIN_COMPLETED_ACTIVE_LEARNING;
    }

    function tier(row = {}) {
      const done = completed(row);
      const obs = observationSample(row);

      if (done >= MIN_COMPLETED_ACTIVE_LEARNING) return "HARD";
      if (done > 0) return "SOFT";
      if (obs > 0) return "OBSERVATION";

      return String(row.selectedTier || row.rotationEligibilityTier || row.eligibilityTier || row.tier || "RAW").toUpperCase();
    }

    function currentMarketRegimeForFit() {
      return upper(
        state.market?.regime ||
        state.market?.currentRegime ||
        state.market?.source?.currentRegime ||
        state.market?.source?.regime ||
        state.market?.raw?.currentRegime ||
        state.market?.raw?.regime ||
        ""
      );
    }

    function currentMarketTrendForFit() {
      const raw = upper(
        state.market?.trendSide ||
        state.market?.currentTrendSide ||
        state.market?.source?.currentTrendSide ||
        state.market?.source?.trendSide ||
        state.market?.raw?.currentTrendSide ||
        state.market?.raw?.trendSide ||
        ""
      );

      if (["SHORT", "BEAR", "BEARISH", "SELL", "DOWN", "DOWNSIDE"].includes(raw)) return "SHORT";
      if (["LONG", "BULL", "BULLISH", "BUY", "UP", "UPSIDE"].includes(raw)) return "LONG";
      if (["NEUTRAL", "MIXED", "CHOP", "SIDEWAYS", "FLAT"].includes(raw)) return "NEUTRAL";

      return raw || "UNKNOWN";
    }

    function fallbackCurrentFitScore(row = {}) {
      const parsed = parseFixedShortTaxonomyId(microId(row));
      if (!parsed?.isChild) return 0;

      const marketRegime = currentMarketRegimeForFit();
      const marketTrend = currentMarketTrendForFit();

      let score = 0;
      let hasSignal = false;

      if (marketTrend === "SHORT") {
        score += 30;
        hasSignal = true;
      } else if (marketTrend === "NEUTRAL") {
        score += 8;
        hasSignal = true;
      } else if (marketTrend === "LONG") {
        score -= 35;
        hasSignal = true;
      }

      if (marketRegime && marketRegime !== "UNKNOWN") {
        hasSignal = true;

        if (marketRegime === parsed.regime) {
          score += 40;
        } else if (
          (marketRegime === "TREND" && parsed.regime === "SQUEEZE") ||
          (marketRegime === "SQUEEZE" && parsed.regime === "TREND")
        ) {
          score += 12;
        } else {
          score -= 10;
        }
      }

      if (parsed.confirmation === "A_STRONG_ALIGN") score += 18;
      if (parsed.confirmation === "B_FLOW_ALIGN") score += 14;
      if (parsed.confirmation === "C_VOLUME_ALIGN") score += 10;
      if (parsed.confirmation === "D_MIXED_OK") score += 4;
      if (parsed.confirmation === "E_WEAK_CONTRA") score -= 8;

      if (!hasSignal) return 0;

      return clamp(score, -80, 100);
    }

    function currentFit(row = {}) {
      const label = upper(
        row.currentFitLabel ||
        row.entryCurrentFitLabel ||
        row.currentMarketFitLabel ||
        row.fitLabel ||
        row.marketFitLabel ||
        ""
      );

      if (["MATCH", "GOOD", "FIT", "ALIGNED", "STRONG_MATCH"].includes(label)) return "MATCH";
      if (["WEAK_MATCH", "PARTIAL_MATCH", "SOFT_MATCH"].includes(label)) return "WEAK_MATCH";
      if (["MISFIT", "BAD", "AGAINST", "CONTRA", "NO_FIT"].includes(label)) return "MISFIT";
      if (["NEUTRAL", "MIXED"].includes(label)) return "NEUTRAL";

      const raw = upper(
        row.currentFit ||
        row.entryCurrentFit ||
        row.currentMarketFit ||
        row.fit ||
        row.marketFit ||
        ""
      );

      if (["MATCH", "GOOD", "FIT", "ALIGNED", "STRONG_MATCH"].includes(raw)) return "MATCH";
      if (["WEAK_MATCH", "PARTIAL_MATCH", "SOFT_MATCH"].includes(raw)) return "WEAK_MATCH";
      if (["MISFIT", "BAD", "AGAINST", "CONTRA", "NO_FIT"].includes(raw)) return "MISFIT";
      if (["NEUTRAL", "MIXED"].includes(raw)) return "NEUTRAL";

      const score = currentFitScore(row);

      if (score >= 70) return "MATCH";
      if (score >= 45) return "WEAK_MATCH";
      if (score >= 20) return "NEUTRAL";
      if (score <= -20) return "MISFIT";

      return "UNKNOWN";
    }

    function marketBiasHaystack(row = {}) {
      return [
        row.currentMarketTrendSide,
        row.marketTrendSide,
        row.trendSide,
        row.dashboardSide,
        row.marketSide,
        row.marketBias,
        row.bias,
        row.direction,
        row.currentRegime,
        row.marketRegime,
        row.regime,
        row.scannerReason,
        row.reason,
        row.currentFitReason,
        Array.isArray(row.currentFitReasons) ? row.currentFitReasons.join("|") : ""
      ]
        .map((value) => upper(value))
        .join(" | ");
    }

    // <<< gewijzigd: currentFitScore met SHORT_MIRRORED_CURRENT_FIT-check
    function currentFitScore(row = {}) {
      const explicitShort = firstFinite(
        row.shortCurrentFit,
        row.bearCurrentFit,
        row.currentFitShort,
        row.currentFitBear,
        row.shortFitScore,
        row.bearFitScore
      );

      if (explicitShort !== null) return explicitShort;

      const explicitLong = firstFinite(
        row.longCurrentFit,
        row.bullCurrentFit,
        row.bullishCurrentFit,
        row.currentFitLong,
        row.currentFitBull,
        row.longFitScore,
        row.bullFitScore
      );

      if (explicitLong !== null) return -Math.abs(explicitLong);

      const direct = firstFinite(
        row.currentFitScore,
        row.entryCurrentFitScore,
        row.currentMarketFitScore,
        row.fitScore
      );

      if (direct !== null) {
        // Eerst checken of het al SHORT-mirrored is
        const definition = upper(row.currentFitDefinition || "");
        const polarity = upper(row.currentFitPolarity || "");
        if (
          definition.includes("SHORT_MIRRORED_CURRENT_FIT") ||
          polarity.includes("BEARISH_POSITIVE_BULLISH_NEGATIVE")
        ) {
          return direct;
        }
        const haystack = marketBiasHaystack(row);

        if (
          haystack.includes("BEAR") ||
          haystack.includes("BEARISH") ||
          haystack.includes("SHORT") ||
          haystack.includes("SELL") ||
          haystack.includes("DOWNSIDE")
        ) {
          return Math.abs(direct);
        }

        if (
          haystack.includes("BULL") ||
          haystack.includes("BULLISH") ||
          haystack.includes("LONG") ||
          haystack.includes("BUY") ||
          haystack.includes("UPSIDE")
        ) {
          return -Math.abs(direct);
        }

        return -direct;
      }

      const numericFit = firstFinite(
        row.currentFit,
        row.entryCurrentFit,
        row.currentMarketFit,
        row.fit,
        row.marketFit
      );

      if (numericFit !== null) {
        const marketTrend = currentMarketTrendForFit();

        if (marketTrend === "SHORT") return Math.abs(numericFit);
        if (marketTrend === "LONG") return -Math.abs(numericFit);

        return -numericFit;
      }

      const fit = upper(
        row.currentFitLabel ||
        row.entryCurrentFitLabel ||
        row.currentFit ||
        row.entryCurrentFit ||
        ""
      );

      if (fit === "MATCH") return 80;
      if (fit === "WEAK_MATCH") return 60;
      if (fit === "NEUTRAL") return 40;
      if (fit === "MISFIT") return 20;

      return fallbackCurrentFitScore(row);
    }

    function currentFitConfidence(row = {}) {
      const direct = firstFinite(
        row.currentFitConfidence,
        row.entryCurrentFitConfidence,
        row.currentMarketFitConfidence,
        row.fitConfidence,
        row.marketFitConfidence,
        row.weatherConfidence,
        row.currentMarketWeatherConfidence
      );

      if (direct !== null) return direct;

      const score = currentFitScore(row);

      if (score >= 70) return 80;
      if (score >= 45) return 60;
      if (score >= 20) return 40;
      if (score <= -20) return 35;

      return 0;
    }

    function currentFitPill(row = {}) {
      const fit = currentFit(row);
      const score = currentFitScore(row);
      const conf = currentFitConfidence(row);

      if (fit === "MATCH") {
        return `<span class="pill fit">FIT ${escapeHtml(fmt(score, 0))}</span>`;
      }

      if (fit === "WEAK_MATCH") {
        return `<span class="pill weakfit">WEAK FIT ${escapeHtml(fmt(score, 0))}</span>`;
      }

      if (fit === "MISFIT") {
        return `<span class="pill misfit">MISFIT ${escapeHtml(fmt(score, 0))}</span>`;
      }

      if (fit === "NEUTRAL") {
        return `<span class="pill neutral">NEUTRAL ${escapeHtml(fmt(conf, 0))}</span>`;
      }

      if (score !== 0) {
        return `<span class="pill neutral">SOFT ${escapeHtml(fmt(score, 0))}</span>`;
      }

      return '<span class="pill raw">UNKNOWN</span>';
    }

    function recentMomentumScore(row = {}) {
      const direct = firstFinite(
        row.recentMomentumScore,
        row.momentumScore,
        row.recentScore,
        row.recentNetRScore
      );

      if (direct !== null) return direct;

      const recentRows = Array.isArray(row.recentOutcomes) ? row.recentOutcomes.slice(-12) : [];

      if (!recentRows.length) return 0;

      const netR = recentRows.reduce((sum, outcome) => {
        return sum + num(outcome.shortNetR ?? outcome.netShortR ?? outcome.netR ?? outcome.exitR ?? outcome.realizedR ?? outcome.r, 0);
      }, 0);

      const directSLPenalty = recentRows.filter((outcome) => outcome.directSL || outcome.directToSL).length * 6;
      const costPenalty = recentRows.reduce((sum, outcome) => sum + Math.max(0, num(outcome.costR, 0)), 0) * 2;

      return clamp(netR * 8 - directSLPenalty - costPenalty, -80, 80);
    }

    function fairWinrate(row = {}) {
      return num(
        row.fairWinrate ??
        row.sampleAdjustedWinrate ??
        row.sampleWilsonLowerBound ??
        row.wilsonLowerBound ??
        row.bayesianWinrate,
        0
      );
    }

    function balancedScore(row = {}) {
      return num(row.dashboardBalancedScore ?? row.balancedScore ?? row.learningQualityRank, 0);
    }

    function netTotalR(row = {}) {
      return num(row.totalR ?? row.netTotalR ?? row.totalNetR, 0);
    }

    function netAvgR(row = {}) {
      return num(row.avgR ?? row.avgNetR ?? row.netAvgR, 0);
    }

    function avgCostR(row = {}) {
      return Math.max(0, num(row.avgCostR ?? row.costR, 0));
    }

    function directSLPct(row = {}) {
      return Math.max(0, num(row.directSLPct, 0));
    }

    function sampleReliability(row = {}) {
      return num(row.sampleReliability, 0);
    }

    // <<< gewijzigd: adaptiveScore zonder fit/momentum
    function adaptiveScore(row = {}) {
      const direct = firstFinite(
        row.adaptiveScore,
        row.selectionScore,
        row.currentAdaptiveScore
      );

      if (direct !== null) return direct;

      const base = balancedScore(row);
      const reliability = sampleReliability(row);
      const directSLPenalty = directSLPct(row) * 35;
      const costPenalty = avgCostR(row) * 8;

      return base + reliability * 10 - directSLPenalty - costPenalty;
    }

    function friendlyApiMessage(error) {
      if (error?.timeout) return "API-timeout: request is afgebroken door de admin UI.";

      const status = Number(error?.status || 0);
      const raw = String(error?.message || error || "");

      if (status === 409 || raw.includes("LOCK")) return "Lock actief. Vorige run is nog bezig.";
      if (status === 504 || raw.includes("504")) return "Backend timeout op deze admin-route.";
      if (status === 500) return "Backend error op deze admin-route. Check server logs.";
      if (status === 404) return "Endpoint niet gevonden.";

      return raw || "Onbekende API fout.";
    }

    function timeoutSignal(timeoutMs = state.apiTimeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);

      return {
        signal: controller.signal,
        clear: () => clearTimeout(timer)
      };
    }

    function noCacheUrl(url) {
      const join = String(url).includes("?") ? "&" : "?";
      return `${url}${join}_ts=${Date.now()}`;
    }

    async function api(url, options = {}) {
      const timeout = timeoutSignal(options.timeoutMs || state.apiTimeoutMs);

      const headers = {
        accept: "application/json",
        ...(options.headers || {})
      };

      if (options.body !== undefined && !headers["content-type"]) {
        headers["content-type"] = "application/json";
      }

      try {
        const response = await fetch(noCacheUrl(url), {
          cache: "no-store",
          ...options,
          headers,
          signal: options.signal || timeout.signal
        });

        const rawText = await response.text();

        let data = {};

        try {
          data = rawText ? JSON.parse(rawText) : {};
        } catch {
          data = { raw: rawText };
        }

        if (!response.ok) {
          throw new ApiError(`${response.status} ${data.error || data.reason || response.statusText}`, {
            status: response.status,
            url,
            data
          });
        }

        return data;
      } catch (error) {
        if (error?.name === "AbortError") {
          throw new ApiError("REQUEST_ABORTED_TIMEOUT", {
            status: 0,
            url,
            timeout: true
          });
        }

        if (error instanceof ApiError) throw error;

        throw new ApiError(error?.message || String(error), {
          status: 0,
          url
        });
      } finally {
        timeout.clear();
      }
    }

    async function optionalApi(url, fallback = null) {
      try {
        return await api(url, { timeoutMs: 12000 });
      } catch {
        return fallback;
      }
    }

    function table(rows, cols, emptyText = "Geen data.") {
      if (!Array.isArray(rows) || rows.length === 0) {

      }

    function extractObjectArrays(data, keys = []) {
      const rows = [];

      for (const key of keys) {
        const value = data?.[key];

        if (Array.isArray(value)) {
          rows.push(...value);
        } else if (value && typeof value === "object") {
          rows.push(...Object.values(value));
        }
      }

      return rows;
    }

    function extractDeepMicroRows(data) {
      const output = [];
      const seenObjects = new Set();
      const seenIds = new Set();

      function add(row) {
        if (!row || typeof row !== "object") return;

        const id = microId(row);

        if (!id || seenIds.has(id)) return;
        if (!isRealAnalyzeMicroRow(row)) return;

        seenIds.add(id);
        output.push(row);
      }

      function walk(value, depth = 0) {
        if (!value || typeof value !== "object" || depth > 7) return;
        if (seenObjects.has(value)) return;

        seenObjects.add(value);

        if (Array.isArray(value)) {
          for (const item of value) {
            if (item && typeof item === "object" && microId(item)) add(item);
            walk(item, depth + 1);
          }
          return;
        }

        if (microId(value)) add(value);

        for (const key of [
          "best75MicroFamilies",
          "top75MicroFamilies",
          "bestMicroFamilies",
          "topMicroFamilies",
          "shortRows",
          "rows",
          "microFamilies",
          "micros",
          "items",
          "data",
          "result",
          "payload",
          "response",
          "activeRotation",
          "active",
          "balanced",
          "adaptive",
          "winrate",
          "totalR",
          "avgR",
          "directSL",
          "observed"
        ]) {
          walk(value[key], depth + 1);
        }
      }

      walk(data, 0);

      return output;
    }

    function extractMicroRowsFromApiPayload(data = {}) {
      const preferred = extractObjectArrays(data, [
        "best75MicroFamilies",
        "top75MicroFamilies",
        "bestMicroFamilies",
        "topMicroFamilies"
      ]);

      const direct = extractObjectArrays(data, [
        "shortRows",
        "rows",
        "microFamilies",
        "micros",
        "items"
      ]);

      const nestedPreferred = [
        ...extractObjectArrays(data.result || {}, ["best75MicroFamilies", "top75MicroFamilies", "bestMicroFamilies", "topMicroFamilies"]),
        ...extractObjectArrays(data.payload || {}, ["best75MicroFamilies", "top75MicroFamilies", "bestMicroFamilies", "topMicroFamilies"])
      ];

      const deep = extractDeepMicroRows(data);

      const source = preferred.length
        ? preferred
        : nestedPreferred.length
          ? nestedPreferred
          : direct.length
            ? direct
            : deep;

      const byId = new Map();

      for (const row of source) {
        if (!row || typeof row !== "object") continue;
        if (!isRealAnalyzeMicroRow(row)) continue;

        const id = microId(row);
        if (!id || byId.has(id)) continue;

        byId.set(id, row);
      }

      if (byId.size === 0) {
        for (const row of deep) {
          const id = microId(row);
          if (!id || byId.has(id)) continue;

          byId.set(id, row);
        }
      }

      return [...byId.values()];
    }

    function compareNumberDesc(a, b) {
      return num(b, 0) - num(a, 0);
    }

    function compareNumberAsc(a, b) {
      return num(a, 0) - num(b, 0);
    }

    function compareMicroIds(a = {}, b = {}) {
      return String(microId(a) || "").localeCompare(String(microId(b) || ""));
    }

    function compareBestDataFirst(a, b) {
      return (
        compareNumberDesc(balancedScore(a), balancedScore(b)) ||
        compareNumberDesc(netTotalR(a), netTotalR(b)) ||
        compareNumberDesc(netAvgR(a), netAvgR(b)) ||
        compareNumberDesc(sampleReliability(a), sampleReliability(b)) ||
        compareNumberDesc(fairWinrate(a), fairWinrate(b)) ||
        compareNumberAsc(avgCostR(a), avgCostR(b)) ||
        compareNumberAsc(directSLPct(a), directSLPct(b)) ||
        compareNumberDesc(observationSample(a), observationSample(b)) ||
        compareNumberDesc(completed(a), completed(b)) ||
        compareMicroIds(a, b)
      );
    }

    function compareMicroRows(a, b, mode = state.microMode) {
      if (mode === "adaptive") {
        return (
          compareNumberDesc(adaptiveScore(a), adaptiveScore(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      if (mode === "currentFit") {
        return (
          compareNumberDesc(currentFitScore(a), currentFitScore(b)) ||
          compareNumberDesc(currentFitConfidence(a), currentFitConfidence(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      if (mode === "cost") {
        return (
          compareNumberAsc(avgCostR(a), avgCostR(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      if (mode === "observed") {
        return (
          compareNumberDesc(observationSample(a), observationSample(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      if (mode === "directSL") {
        return (
          compareNumberAsc(directSLPct(a), directSLPct(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      if (mode === "totalR") {
        return (
          compareNumberDesc(netTotalR(a), netTotalR(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      if (mode === "avgR") {
        return (
          compareNumberDesc(netAvgR(a), netAvgR(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      if (mode === "winrate") {
        return (
          compareNumberDesc(fairWinrate(a), fairWinrate(b)) ||
          compareNumberDesc(a.sampleWilsonLowerBound ?? a.wilsonLowerBound, b.sampleWilsonLowerBound ?? b.wilsonLowerBound) ||
          compareNumberDesc(a.sampleBayesianWinrate ?? a.bayesianWinrate, b.sampleBayesianWinrate ?? b.bayesianWinrate) ||
          compareNumberDesc(completed(a), completed(b)) ||
          compareBestDataFirst(a, b)
        );
      }

      return compareBestDataFirst(a, b);
    }

    function extractMarketData(data = {}) {
      const source =
        data.marketWeather ||
        data.weather ||
        data.currentMarketWeather ||
        data.latest ||
        data.snapshot ||
        data;

      const universe =
        data.marketUniverse ||
        data.universe ||
        source.universe ||
        source.marketUniverse ||
        {};

      const createdAt = num(
        source.createdAt ||
        source.completedAt ||
        source.updatedAt ||
        source.ts ||
        universe.createdAt ||
        universe.updatedAt,
        0
      );

      const regime = upper(
        source.currentRegime ||
        source.regime ||
        source.marketRegime ||
        source.breadthRegime ||
        universe.currentRegime ||
        universe.regime ||
        "UNKNOWN"
      );

      const trendSide = upper(
        source.currentTrendSide ||
        source.trendSide ||
        source.marketSide ||
        source.side ||
        source.direction ||
        source.breadthSide ||
        universe.currentTrendSide ||
        universe.trendSide ||
        "UNKNOWN"
      );

      const bullishPct = firstFinite(
        source.bullishPct,
        source.longPct,
        source.upPct,
        source.breadthBullishPct,
        source.universeBullishPct,
        universe.bullishPct,
        universe.longPct,
        universe.upPct
      );

      const bearishPct = firstFinite(
        source.bearishPct,
        source.shortPct,
        source.downPct,
        source.breadthBearishPct,
        source.universeBearishPct,
        universe.bearishPct,
        universe.shortPct,
        universe.downPct
      );

      const squeezePct = firstFinite(
        source.squeezePct,
        source.compressionPct,
        source.breadthSqueezePct,
        universe.squeezePct,
        universe.compressionPct
      );

      const confidence = firstFinite(
        source.confidence,

    function currentManualSelectionSlots() {
      const active = activeMicroIds()
        .map((id) => String(id || "").trim().toUpperCase())
        .filter(idAllowedInShortOnly)
        .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);
      while (active.length < MAX_ACTIVE_DISCORD_MICRO_FAMILIES) {
        active.push("");
      }
      return active;
    }
    function buildManualSelectionForSlot(slotNumber, id) {
      const slots = currentManualSelectionSlots();
      const cleanId = String(id || "").trim().toUpperCase();
      const index = Number(slotNumber) === 2 ? 1 : 0;
      if (!idAllowedInShortOnly(cleanId)) {
        return slots.filter(Boolean);
      }
      slots[index] = cleanId;
      return uniqueStrings(slots)
        .filter(idAllowedInShortOnly)
        .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);
    }
    function clearManualSelectionSlot(slotNumber) {
      const slots = currentManualSelectionSlots();
      const index = Number(slotNumber) === 2 ? 1 : 0;
      slots[index] = "";
      return uniqueStrings(slots)
        .filter(idAllowedInShortOnly)
        .slice(0, MAX_ACTIVE_DISCORD_MICRO_FAMILIES);
    }
    function bindMicroEvents() {
      document.querySelectorAll("[data-activate-slot]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const slotNumber = Number(btn.dataset.activateSlot || 1);
          const id = btn.dataset.activateId || "";
          const ids = buildManualSelectionForSlot(slotNumber, id);
          activateSelectedMicroFamilies(ids);
        });
      });
      document.querySelectorAll("[data-clear-slot]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const slotNumber = Number(btn.dataset.clearSlot || 2);
          const ids = clearManualSelectionSlot(slotNumber);
          activateSelectedMicroFamilies(ids);
        });
      });
      document.querySelectorAll("[data-copy]").forEach((btn) => {
        btn.addEventListener("click", () => copyText(btn.dataset.copy, "75-child trueMicroFamilyId gekopieerd."));
      });
      document.querySelectorAll("[data-open-micro]").forEach((btn) => {
        btn.addEventListener("click", () => openMicro(btn.dataset.openMicro));
      });
    }

    async function copyText(text, message = "Gekopieerd.") {
      try {
        await navigator.clipboard.writeText(String(text || ""));
        setMessage(message, "ok");
      } catch {
        const area = document.createElement("textarea");
        area.value = String(text || "");
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        setMessage(message, "ok");
      }
    }

    function downloadJson(filename, data) {
      const blob = new Blob([JSON.stringify(data ?? {}, null, 2)], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = filename;
      link.click();

      URL.revokeObjectURL(url);
    }

      const parentIds = uniqueStrings([
