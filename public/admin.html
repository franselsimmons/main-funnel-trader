<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SHORT Micro-Micro Admin</title>
<style>
:root{
  --bg:#f3f5f9;
  --panel:#fff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --dark:#0f172a;
  --red:#dc2626;
  --green:#16a34a;
  --amber:#d97706;
  --purple:#7c3aed;
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

header{
  padding:24px;
  background:linear-gradient(135deg,#0f172a,#111827,#7f1d1d);
  color:white;
}

.wrap{max-width:1500px;margin:auto}

.head{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
}

.title{font-size:24px;font-weight:900}

.sub{
  color:#cbd5e1;
  font-size:14px;
  margin-top:6px;
}

main{
  max-width:1500px;
  margin:auto;
  padding:18px;
}

.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  position:sticky;
  top:0;
  background:rgba(243,245,249,.9);
  backdrop-filter:blur(12px);
  padding:10px 0;
  z-index:3;
}

button,select,input,textarea{font:inherit}

button,select,input{
  border:1px solid #cbd5e1;
  border-radius:12px;
  padding:10px 12px;
  background:white;
  color:var(--text);
}

button{cursor:pointer}

button.primary{background:var(--dark);color:white;border-color:var(--dark)}
button.red{background:var(--red);color:white;border-color:var(--red)}
button.green{background:var(--green);color:white;border-color:var(--green)}
button.warn{background:var(--amber);color:white;border-color:var(--amber)}

.tab.active{
  background:var(--dark);
  color:white;
}

.hidden{display:none}

.msg{
  white-space:pre-wrap;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  background:white;
  margin:12px 0;
}

.ok{background:#dcfce7;color:#166534}
.warnMsg{background:#fef3c7;color:#92400e}
.err{background:#fee2e2;color:#991b1b}

.grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(180px,1fr));
  gap:12px;
}

.card{
  background:white;
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  margin:12px 0;
  box-shadow:0 2px 12px rgba(15,23,42,.06);
}

.k{
  color:var(--muted);
  font-size:12px;
  font-weight:800;
}

.v{
  font-size:24px;
  font-weight:900;
  margin-top:8px;
}

.x{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.pill{
  display:inline-block;
  border-radius:999px;
  padding:4px 8px;
  font-size:11px;
  font-weight:900;
  background:#e2e8f0;
  color:#334155;
  margin:2px;
}

.pill.red{background:#fee2e2;color:#991b1b}
.pill.green{background:#dcfce7;color:#166534}
.pill.purple{background:#ede9fe;color:#5b21b6}
.pill.warn{background:#fef3c7;color:#92400e}
.pill.dark{background:#0f172a;color:white}

.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:12px 0;
  align-items:center;
}

input[type=search]{min-width:360px}

textarea{
  width:100%;
  min-height:120px;
  border:1px solid #cbd5e1;
  border-radius:14px;
  padding:12px;
}

.tablewrap{
  overflow:auto;
  border:1px solid var(--border);
  border-radius:16px;
  background:white;
}

table{
  border-collapse:collapse;
  min-width:1450px;
  width:100%;
}

th,td{
  padding:9px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
  text-align:left;
  font-size:13px;
}

th{background:#f8fafc}

code{
  background:#f1f5f9;
  border-radius:6px;
  padding:3px 5px;
  font-size:12px;
  white-space:normal;
  word-break:break-all;
}

pre{
  background:#0b1020;
  color:#e5e7eb;
  border-radius:14px;
  padding:12px;
  white-space:pre-wrap;
  max-height:480px;
  overflow:auto;
  font-size:12px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr}
  input[type=search]{min-width:100%}
  .head{flex-direction:column}
}
</style>
</head>

<body>
<header>
  <div class="wrap head">
    <div>
      <div class="title">SHORT Micro-Micro Learning Admin</div>
      <div class="sub">
        Parent 15 en 75-child blijven context. Alleen exacte micro-micro IDs zijn selecteerbaar voor Discord.
      </div>
    </div>
    <button id="refresh">Refresh</button>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="micros">Micro-Micro</button>
    <button class="tab" data-tab="rotation">Manual Selection</button>
    <button class="tab" data-tab="trade">Trade</button>
    <button class="tab" data-tab="scanner">Scanner</button>
    <button class="tab" data-tab="reset">Reset</button>
  </div>

  <div id="message"></div>

  <section id="overview"></section>
  <section id="micros" class="hidden"></section>
  <section id="rotation" class="hidden"></section>
  <section id="trade" class="hidden"></section>
  <section id="scanner" class="hidden"></section>
  <section id="reset" class="hidden"></section>
</main>

<script>
const ONLY_SIDE = "SHORT";
const DASHBOARD_SIDE = "bear";
const SHORT_NAMESPACE = "SHORT";
const SHORT_KEY_PREFIX = "SHORT:";
const PERSISTENT_LEARNING_KEY = "SHORT_LIVE";

const MIN_COMPLETED_MM = 35;
const MAX_SELECTED = 2;

const TRUE_MICRO_SCHEMA = "FIXED_TAXONOMY_75";
const PARENT_TRUE_MICRO_SCHEMA = "FIXED_TAXONOMY_15";
const MICRO_MICRO_SCHEMA = "FIXED_TAXONOMY_MICRO_MICRO_V1";

const CHILD75_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_X_CONFIRMATION_V1";
const PARENT_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_V1";
const MM_GRANULARITY = "SHORT_FIXED_TAXONOMY_SETUP_X_REGIME_X_CONFIRMATION_X_EXECUTION_CONTEXT_V1";

const RISK_VERSION = "SHORT_ADAPTIVE_RR_TP_SL_V2";
const COST_VERSION = "POSITION_ENGINE_SHORT_NET_COST_V11";
const MEASURE_VERSION = "SHORT_MEASUREMENT_FIX_CANDLE_FIRST_TOUCH_MICRO_MICRO_V1";
const OBS_DEDUPE = "SHORT_OBS_DEDUPE_SNAPSHOT_SYMBOL_MICRO_ENTRY_V2";
const OUT_DEDUPE = "SHORT_OUTCOME_DEDUPE_CLOSED_POSITION_V3";

const SETUPS = [
  "BREAKOUT",
  "RETEST",
  "SWEEP_REVERSAL",
  "CONTINUATION",
  "COMPRESSION"
];

const REGIMES = [
  "TREND",
  "CHOP",
  "SQUEEZE"
];

const CONFS = [
  "A_STRONG_ALIGN",
  "B_FLOW_ALIGN",
  "C_VOLUME_ALIGN",
  "D_MIXED_OK",
  "E_WEAK_CONTRA"
];

const endpoints = {
  overview: "/api/admin/overview",
  micros: "/api/admin/micro-families",
  rotation: "/api/admin/rotation",
  trade: "/api/admin/trade",
  scanner: "/api/admin/scanner",
  runTrade: "/api/trade/run?force=true&forceProcessSnapshot=true",
  runScanner: "/api/scanner/run?force=true",
  resetLearning: "/api/admin/reset-learning",
  resetRotation: "/api/admin/reset-rotation"
};

const state = {
  tab: "overview",
  micros: null,
  rotation: null,
  trade: null,
  scanner: null,
  mode: "eligible",
  q: ""
};

const $ = (id) => document.getElementById(id);

function esc(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function up(value) {
  return String(value || "").trim().toUpperCase();
}

function num(value, fallback = 0) {
  const n = Number(value);
  return Number.isFinite(n) ? n : fallback;
}

function pct(value) {
  let n = Number(value);
  if (!Number.isFinite(n)) return "-";
  if (Math.abs(n) > 1.5) n = n / 100;
  return `${(n * 100).toFixed(1)}%`;
}

function fmt(value, decimals = 3) {
  const n = Number(value);
  return Number.isFinite(n) ? n.toFixed(decimals) : "-";
}

function msg(text, className = "") {
  $("message").innerHTML = text
    ? `<div class="msg ${className}">${esc(text)}</div>`
    : "";
}

function card(label, value, extra = "") {
  return `
    <div class="card">
      <div class="k">${esc(label)}</div>
      <div class="v">${esc(value)}</div>
      ${extra ? `<div class="x">${esc(extra)}</div>` : ""}
    </div>
  `;
}

function pills(items) {
  return items
    .map(([text, className]) => `<span class="pill ${className || ""}">${esc(text)}</span>`)
    .join("");
}

function hash(value) {
  let h = 2166136261;

  for (const char of String(value)) {
    h ^= char.charCodeAt(0);
    h = Math.imul(h, 16777619);
  }

  return (h >>> 0).toString(36).toUpperCase().padEnd(10, "0").slice(0, 10);
}

function parseId(id = "") {
  const raw = up(id);
  if (!raw) return null;

  if (
    raw.includes("SCANNER") ||
    raw.includes("_XR_") ||
    raw.includes("EXECUTION_FINGERPRINT")
  ) {
    return null;
  }

  let body = "";
  let ctx = "";
  let isMM = false;
  let mode = "";

  if (raw.startsWith("MM_SHORT_")) {
    body = raw.slice(9);
    isMM = true;
    mode = "ALT";
  } else if (raw.startsWith("MICRO_SHORT_")) {
    body = raw.slice(12);

    const index = body.lastIndexOf("_MM_");

    if (index > -1) {
      ctx = body.slice(index + 4);
      body = body.slice(0, index);
      isMM = true;
      mode = "CAN";
    }
  } else {
    return null;
  }

  let parsed = null;

  for (const regime of REGIMES) {
    const marker = `_${regime}`;
    const index = body.indexOf(marker);

    if (index < 0) continue;

    const setup = body.slice(0, index);
    let rest = body.slice(index + marker.length).replace(/^_/, "");

    if (!SETUPS.includes(setup)) continue;

    for (const confirmation of CONFS) {
      if (rest === confirmation || rest.startsWith(`${confirmation}_`)) {
        parsed = {
          setup,
          regime,
          conf: confirmation,
          rest: rest === confirmation ? "" : rest.slice(confirmation.length + 1)
        };
        break;
      }
    }

    if (parsed) break;

    if (!rest) {
      parsed = {
        setup,
        regime,
        conf: "",
        rest: ""
      };
    }
  }

  if (!parsed) return null;

  if (parsed.rest) {
    ctx = parsed.rest;
    isMM = true;
  }

  const parent = `MICRO_SHORT_${parsed.setup}_${parsed.regime}`;
  const child = parsed.conf ? `${parent}_${parsed.conf}` : "";

  let canonical = raw;

  if (isMM && child) {
    canonical = mode === "CAN"
      ? `${child}_MM_${up(ctx).replace(/[^A-Z0-9]/g, "_").slice(0, 10)}`
      : `${child}_MM_${hash(`${child}|${ctx}`)}`;
  } else if (child) {
    canonical = child;
  } else {
    canonical = parent;
  }

  return {
    raw,
    canonical,
    parent,
    child,
    setup: parsed.setup,
    regime: parsed.regime,
    conf: parsed.conf,
    isParent: !parsed.conf && !isMM,
    isChild: Boolean(parsed.conf && !isMM),
    isMM: Boolean(parsed.conf && isMM)
  };
}

function mmId(row) {
  const values = typeof row === "string"
    ? [row]
    : [
        row.microMicroFamilyId,
        row.trueMicroMicroFamilyId,
        row.exactMicroMicroFamilyId,
        row.selectedMicroMicroFamilyId,
        row.learningFamilyId,
        row.learningMicroFamilyId,
        row.analyzeMicroFamilyId,
        row.id,
        row.key
      ];

  for (const value of values) {
    const parsed = parseId(value);
    if (parsed?.isMM) return parsed.canonical;
  }

  return "";
}

function childId(row) {
  return row.childTrueMicroFamilyId ||
    row.base75ChildTrueMicroFamilyId ||
    parseId(mmId(row))?.child ||
    "";
}

function parentId(row) {
  return row.parentTrueMicroFamilyId ||
    row.parentMicroFamilyId ||
    row.coarseMicroFamilyId ||
    parseId(mmId(row))?.parent ||
    "";
}

function isMM(id) {
  return Boolean(parseId(id)?.isMM);
}

function validMM(id) {
  return isMM(id) && String(id).startsWith("MICRO_SHORT_");
}

function completed(row) {
  const virtualAndShadow = num(row.virtualCompleted) + num(row.shadowCompleted);
  if (virtualAndShadow > 0) return virtualAndShadow;

  const explicit = num(row.completed, NaN);
  if (Number.isFinite(explicit) && explicit > 0) return explicit;

  const outcomeSample = num(row.outcomeSample, NaN);
  if (Number.isFinite(outcomeSample) && outcomeSample > 0) return outcomeSample;

  return num(row.wins) + num(row.losses) + num(row.flats);
}

function seen(row) {
  return Math.max(
    num(row.seen),
    num(row.observations),
    num(row.observationSample),
    completed(row)
  );
}

function avgR(row) {
  return num(row.avgR ?? row.avgNetR ?? row.netAvgR);
}

function totalR(row) {
  return num(row.totalR ?? row.netTotalR ?? row.totalNetR);
}

function fairWR(row) {
  let value = Number(
    row.fairWinrate ??
    row.sampleAdjustedWinrate ??
    row.wilsonLowerBound ??
    row.bayesianWinrate
  );

  if (!Number.isFinite(value)) return 0;
  return Math.abs(value) > 1.5 ? value / 100 : value;
}

function costR(row) {
  return Math.max(0, num(row.avgCostR ?? row.costR));
}

function directSL(row) {
  let value = Number(row.directSLPct ?? row.directToSLPct);

  if (!Number.isFinite(value)) return 0;
  return Math.abs(value) > 1.5 ? value / 100 : value;
}

function clean(row) {
  const fix = row.measurementFixVersion || "";
  const risk = row.riskPlanVersion || "";
  const cost = row.costModelVersion || "";
  const obs = row.observationDedupeVersion || "";
  const out = row.outcomeDedupeVersion || "";

  return row.measurementClean === true ||
    row.cleanMeasurement === true ||
    (
      (!fix || fix.includes("CANDLE_FIRST_TOUCH")) &&
      (!risk || risk === RISK_VERSION) &&
      (!cost || cost.includes("POSITION_ENGINE_SHORT_NET_COST")) &&
      (!obs || obs.includes("OBS_DEDUPE")) &&
      (!out || out.includes("OUTCOME_DEDUPE"))
    );
}

function fitScore(row) {
  const value = Number(
    row.currentFitScore ??
    row.entryCurrentFitScore ??
    row.fitScore
  );

  return Number.isFinite(value) ? value : 0;
}

function fit(row) {
  const score = fitScore(row);
  const label = up(row.currentFit || row.entryCurrentFit || row.fitLabel);

  if (["MATCH", "GOOD", "FIT", "ALIGNED"].includes(label)) return "MATCH";
  if (["WEAK_MATCH", "OK", "SOFT_MATCH"].includes(label)) return "WEAK";
  if (["MISFIT", "BAD", "AGAINST"].includes(label)) return "MISFIT";

  if (score >= 70) return "MATCH";
  if (score >= 45) return "WEAK";
  if (score <= -20) return "MISFIT";

  return "NEUTRAL";
}

function status(row) {
  const done = completed(row);

  if (done >= MIN_COMPLETED_MM) return ["ELIGIBLE ≥35", "green"];
  if (done > 0) return [`EARLY ${done}/${MIN_COMPLETED_MM}`, "warn"];

  return ["OBSERVING", "purple"];
}

function eligibleScore(row) {
  return (
    (completed(row) >= MIN_COMPLETED_MM ? 120 : 0) +
    (clean(row) ? 0 : -40) +
    num(row.balancedScore ?? row.dashboardBalancedScore) +
    fairWR(row) * 35 +
    avgR(row) * 30 +
    totalR(row) * 4 -
    costR(row) * 10 -
    directSL(row) * 60 +
    Math.max(0, fitScore(row)) * 0.2
  );
}

function normalizeRow(row) {
  const id = mmId(row);
  if (!id) return null;

  const parsed = parseId(id);

  return {
    ...row,
    microMicroFamilyId: id,
    trueMicroMicroFamilyId: id,
    exactMicroMicroFamilyId: id,
    childTrueMicroFamilyId: childId(row) || parsed.child,
    parentTrueMicroFamilyId: parentId(row) || parsed.parent,
    tradeSide: ONLY_SIDE,
    dashboardSide: DASHBOARD_SIDE,
    selectionGranularity: "EXACT_MICRO_MICRO_ONLY"
  };
}

function extractRows(data) {
  const keys = [
    "bestMicroMicroFamilies",
    "topMicroMicroFamilies",
    "microMicroRows",
    "microMicroFamilies",
    "selectedMicroMicroFamilyRows",
    "activeMicroMicroFamilyRows",
    "shortMicroMicroRows",
    "rows",
    "shortRows"
  ];

  const out = [];
  const seenIds = new Set();
  const seenObjects = new Set();

  function add(value) {
    const row = normalizeRow(value);

    if (!row || seenIds.has(row.microMicroFamilyId)) return;

    seenIds.add(row.microMicroFamilyId);
    out.push(row);
  }

  function walk(value, depth = 0) {
    if (!value || typeof value !== "object" || depth > 8) return;
    if (seenObjects.has(value)) return;

    seenObjects.add(value);

    if (Array.isArray(value)) {
      value.forEach((item) => {
        add(item);
        walk(item, depth + 1);
      });
      return;
    }

    add(value);

    keys.forEach((key) => walk(value[key], depth + 1));

    [
      "data",
      "result",
      "payload",
      "active",
      "activeRotation",
      "summary"
    ].forEach((key) => walk(value[key], depth + 1));
  }

  walk(data);
  return out;
}

function sortRows(rows) {
  return rows
    .sort((a, b) =>
      eligibleScore(b) - eligibleScore(a) ||
      completed(b) - completed(a) ||
      String(a.microMicroFamilyId).localeCompare(b.microMicroFamilyId)
    )
    .map((row, index) => ({
      ...row,
      rank: index + 1
    }));
}

function sideParams() {
  const params = new URLSearchParams();

  const entries = {
    side: ONLY_SIDE,
    tradeSide: ONLY_SIDE,
    targetTradeSide: ONLY_SIDE,
    positionSide: ONLY_SIDE,
    dashboardSide: DASHBOARD_SIDE,
    weekKey: PERSISTENT_LEARNING_KEY,
    persistentLearningKey: PERSISTENT_LEARNING_KEY,
    redisNamespace: SHORT_NAMESPACE,
    redisKeyPrefix: SHORT_KEY_PREFIX,
    trueMicroFamilySchema: TRUE_MICRO_SCHEMA,
    parentTrueMicroFamilySchema: PARENT_TRUE_MICRO_SCHEMA,
    childTrueMicroFamilySchema: TRUE_MICRO_SCHEMA,
    microMicroFamilySchema: MICRO_MICRO_SCHEMA,
    microMicroVersion: "SHORT_PARENT_15_MICRO_75_MICRO_MICRO_ONLY_SELECTION_V1",
    microMicroEnabled: "1",
    onlyMicroMicro: "1",
    selectionGranularity: "EXACT_MICRO_MICRO_ONLY",
    minCompletedMicroMicroEligible: String(MIN_COMPLETED_MM),
    riskPlanVersion: RISK_VERSION,
    costModelVersion: COST_VERSION,
    measurementFixVersion: MEASURE_VERSION,
    observationDedupeVersion: OBS_DEDUPE,
    outcomeDedupeVersion: OUT_DEDUPE
  };

  Object.entries(entries).forEach(([key, value]) => {
    params.set(key, value);
  });

  return params;
}

function noCache(url) {
  return `${url}${url.includes("?") ? "&" : "?"}_ts=${Date.now()}`;
}

async function api(url, options = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), options.timeoutMs || 22000);

  try {
    const response = await fetch(noCache(url), {
      cache: "no-store",
      ...options,
      signal: controller.signal,
      headers: {
        accept: "application/json",
        "content-type": "application/json",
        ...(options.headers || {})
      }
    });

    const text = await response.text();

    let data = {};

    try {
      data = text ? JSON.parse(text) : {};
    } catch {
      data = { raw: text };
    }

    if (!response.ok) {
      throw new Error(`${response.status} ${data.error || data.reason || response.statusText}`);
    }

    return data;
  } finally {
    clearTimeout(timeout);
  }
}

function activeIds() {
  const data = state.rotation || state.micros || {};

  return [
    ...new Set([
      ...(data.activeMicroMicroFamilyIds || []),
      ...(data.selectedMicroMicroFamilyIds || []),
      ...(data.microMicroFamilyIds || []),
      ...(data.activeMicroFamilyIds || []),
      ...((data.activeRotation || {}).activeMicroMicroFamilyIds || []),
      ...((data.activeRotation || {}).selectedMicroMicroFamilyIds || []),
      ...((data.active || {}).activeMicroMicroFamilyIds || []),
      ...((data.active || {}).selectedMicroMicroFamilyIds || [])
    ].map(mmId).filter(validMM))
  ].slice(0, MAX_SELECTED);
}

function tableRows(rows) {
  if (!rows.length) {
    return '<div class="card">Geen micro-micro rows gevonden.</div>';
  }

  const active = new Set(activeIds());

  return `
    <div class="tablewrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Discord</th>
            <th>ID</th>
            <th>Base75</th>
            <th>Parent15</th>
            <th>Status</th>
            <th>Seen</th>
            <th>Completed</th>
            <th>Fair WR</th>
            <th>AvgR</th>
            <th>TotalR</th>
            <th>CostR</th>
            <th>DirectSL</th>
            <th>Fit</th>
            <th>Score</th>
            <th>Actie</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((row) => {
            const rowStatus = status(row);
            const isActive = active.has(row.microMicroFamilyId);

            return `
              <tr>
                <td>${row.rank}</td>
                <td>
                  <span class="pill ${isActive ? "green" : ""}">
                    ${isActive ? "ACTIVE" : "OFF"}
                  </span>
                </td>
                <td><code>${esc(row.microMicroFamilyId)}</code></td>
                <td><code>${esc(childId(row))}</code></td>
                <td><code>${esc(parentId(row))}</code></td>
                <td><span class="pill ${rowStatus[1]}">${esc(rowStatus[0])}</span></td>
                <td>${seen(row)}</td>
                <td>${completed(row)}</td>
                <td>${pct(fairWR(row))}</td>
                <td>${fmt(avgR(row))}</td>
                <td>${fmt(totalR(row))}</td>
                <td>${fmt(costR(row))}</td>
                <td>${pct(directSL(row))}</td>
                <td>${fit(row)} ${fmt(fitScore(row), 0)}</td>
                <td><b>${fmt(eligibleScore(row), 2)}</b></td>
                <td>
                  <button class="red" data-set="${esc(row.microMicroFamilyId)}">Select</button>
                  <button data-copy="${esc(row.microMicroFamilyId)}">Copy</button>
                </td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function bind() {
  document.querySelectorAll("[data-set]").forEach((button) => {
    button.onclick = () => activate([button.dataset.set]);
  });

  document.querySelectorAll("[data-copy]").forEach((button) => {
    button.onclick = () => {
      navigator.clipboard.writeText(button.dataset.copy).then(() => {
        msg("ID gekopieerd", "ok");
      });
    };
  });
}

async function loadMicros() {
  const params = sideParams();

  params.set("includeMicroMicro", "1");
  params.set("onlyMicroMicro", "1");
  params.set("hideChild75Rows", "1");
  params.set("hideParentRows", "1");
  params.set("includeActiveRotation", "1");
  params.set("includeCurrentFit", "1");
  params.set("includeCleanMeasurement", "1");
  params.set("mode", "adaptive");
  params.set("limit", "300");

  const data = await api(`${endpoints.micros}?${params.toString()}`);

  state.micros = {
    ...data,
    rows: sortRows(extractRows(data))
  };

  return state.micros;
}

async function renderOverview() {
  const [overview, micros] = await Promise.all([
    api(endpoints.overview).catch((error) => ({
      ok: false,
      error: String(error)
    })),
    loadMicros().catch((error) => ({
      rows: [],
      error: String(error)
    }))
  ]);

  const rows = micros.rows || [];
  const eligible = rows.filter((row) => completed(row) >= MIN_COMPLETED_MM).length;
  const early = rows.filter((row) => completed(row) > 0 && completed(row) < MIN_COMPLETED_MM).length;
  const observing = rows.filter((row) => completed(row) === 0).length;
  const cleanRows = rows.filter(clean).length;

  $("overview").innerHTML = `
    <div class="grid">
      ${card("Learning key", PERSISTENT_LEARNING_KEY)}
      ${card("Namespace", SHORT_KEY_PREFIX)}
      ${card("Visible MM rows", rows.length, "micro-micro only")}
      ${card("Selected Discord IDs", activeIds().length, "exact match only")}
      ${card("MM eligible", eligible, "completed ≥35")}
      ${card("MM early", early, "completed 1-34")}
      ${card("MM observing", observing, "completed 0")}
      ${card("Clean rows", cleanRows, `${rows.length - cleanRows} legacy`)}
    </div>

    <div class="card">
      <h3>Regels</h3>
      ${pills([
        ["SHORT-only", "red"],
        ["Parent 15 context", "dark"],
        ["75-child context", "dark"],
        ["Micro-micro selectable", "purple"],
        ["CurrentFit blocks Discord only", "warn"],
        ["Real orders disabled", "green"]
      ])}

      <pre>${esc(JSON.stringify({
        versions: {
          TRUE_MICRO_SCHEMA,
          PARENT_TRUE_MICRO_SCHEMA,
          MICRO_MICRO_SCHEMA,
          PARENT_GRANULARITY,
          CHILD75_GRANULARITY,
          MM_GRANULARITY,
          RISK_VERSION,
          COST_VERSION,
          MEASURE_VERSION,
          OBS_DEDUPE,
          OUT_DEDUPE
        },
        risk: {
          shape: "tp < entry < sl",
          tp: "candle.low <= tp",
          sl: "candle.high >= sl",
          sameCandle: "CONSERVATIVE_SL_FIRST"
        },
        overview
      }, null, 2))}</pre>
    </div>
  `;
}

async function renderMicros() {
  const micros = await loadMicros();

  let rows = micros.rows || [];

  if (state.q) {
    rows = rows.filter((row) => {
      return JSON.stringify(row).toLowerCase().includes(state.q.toLowerCase());
    });
  }

  $("micros").innerHTML = `
    <div class="toolbar">
      <input id="q" type="search" value="${esc(state.q)}" placeholder="Zoek micro-micro/base75/parent/setup"/>
      <button class="primary" id="search">Zoek</button>
      <button class="green" id="top2">Select top 2 eligible</button>
      <button id="copyVisible">Copy visible IDs</button>
    </div>

    <div class="grid">
      ${card("Rows", rows.length)}
      ${card("Eligible", rows.filter((row) => completed(row) >= MIN_COMPLETED_MM).length, "completed ≥35")}
      ${card("Active", activeIds().length)}
      ${card("Mode", "eligible", "clean → sample → netR → cost")}
    </div>

    ${tableRows(rows)}
  `;

  $("search").onclick = () => {
    state.q = $("q").value;
    renderMicros();
  };

  $("q").onkeydown = (event) => {
    if (event.key === "Enter") {
      state.q = $("q").value;
      renderMicros();
    }
  };

  $("top2").onclick = () => {
    activate(
      rows
        .filter((row) => clean(row) && completed(row) >= MIN_COMPLETED_MM)
        .slice(0, 2)
        .map((row) => row.microMicroFamilyId)
    );
  };

  $("copyVisible").onclick = () => {
    navigator.clipboard
      .writeText(JSON.stringify(rows.map((row) => row.microMicroFamilyId), null, 2))
      .then(() => msg("Visible IDs gekopieerd", "ok"));
  };

  bind();
}

async function renderRotation() {
  const params = sideParams();

  params.set("includeAvailable", "1");
  params.set("includeMicroMicro", "1");

  const data = await api(`${endpoints.rotation}?${params.toString()}`);

  state.rotation = data;

  const ids = activeIds();

  $("rotation").innerHTML = `
    <div class="grid">
      ${card("Active MM IDs", ids.length)}
      ${card("Selection", "EXACT_MICRO_MICRO_ONLY")}
      ${card("75-child match", "OFF")}
      ${card("Parent match", "OFF")}
    </div>

    <div class="card">
      <h3>Manual selection</h3>
      <textarea id="manual">${ids.join("\n")}</textarea>

      <div class="toolbar">
        <button class="red" id="save">Save max 2 MM IDs</button>
        <button id="clear">Clear</button>
      </div>
    </div>

    <div class="card">
      <h3>Raw</h3>
      <pre>${esc(JSON.stringify(data, null, 2))}</pre>
    </div>
  `;

  $("save").onclick = () => activate($("manual").value.split(/[\n,;\s]+/));
  $("clear").onclick = () => {
    $("manual").value = "";
  };
}

async function activate(ids) {
  const cleanIds = [
    ...new Set(ids.map(mmId).filter(validMM))
  ].slice(0, MAX_SELECTED);

  if (!cleanIds.length) {
    msg("Geen geldige micro-micro ID. 75-child en parent IDs worden geweigerd.", "warnMsg");
    return;
  }

  if (!confirm(`Activeer Discord voor exact deze MM ID(s)?\n\n${cleanIds.join("\n")}`)) {
    return;
  }

  const base75 = [
    ...new Set(cleanIds.map((id) => parseId(id).child))
  ];

  const parents = [
    ...new Set(cleanIds.map((id) => parseId(id).parent))
  ];

  const data = await api(endpoints.rotation, {
    method: "POST",
    timeoutMs: 28000,
    body: JSON.stringify({
      action: "activateSelectedMicroFamilies",

      microFamilyIds: cleanIds,
      activeMicroFamilyIds: cleanIds,
      selectedMicroFamilyIds: cleanIds,
      trueMicroFamilyIds: cleanIds,

      microMicroFamilyIds: cleanIds,
      activeMicroMicroFamilyIds: cleanIds,
      selectedMicroMicroFamilyIds: cleanIds,
      trueMicroMicroFamilyIds: cleanIds,
      exactMicroMicroFamilyIds: cleanIds,

      childTrueMicroFamilyIds: base75,
      base75ChildTrueMicroFamilyIds: base75,
      parentTrueMicroFamilyIds: parents,

      macroFamilyIds: [],
      activeMacroFamilyIds: [],

      side: DASHBOARD_SIDE,
      tradeSide: ONLY_SIDE,
      targetTradeSide: ONLY_SIDE,

      shortOnly: true,
      longDisabled: true,
      manualOnly: true,
      autoRotation: false,

      selectionGranularity: "EXACT_MICRO_MICRO_ONLY",
      adminSelectionLayer: "MICRO_MICRO_ONLY",

      discordOnlyForSelectedMicroFamilies: false,
      discordOnlyForSelectedMicroMicroFamilies: true,
      discordOnlyForExactMicroMicroMatch: true,
      child75MatchDoesNotTriggerDiscord: true,
      parentMacroMatchDoesNotTriggerDiscord: true,

      currentFitBlocksLearning: false,
      currentFitSoftOnly: true,

      persistentLearningKey: PERSISTENT_LEARNING_KEY,
      redisNamespace: SHORT_NAMESPACE,
      redisKeyPrefix: SHORT_KEY_PREFIX
    })
  });

  state.rotation = data;

  msg(`Manual Discord selection opgeslagen:\n${cleanIds.join("\n")}`, "ok");

  if (state.tab === "micros") renderMicros();
  else renderRotation();
}

async function renderTrade() {
  const params = sideParams();

  params.set("includeOpenPositions", "1");
  params.set("includeRunMeta", "1");

  const data = await api(`${endpoints.trade}?${params.toString()}`);

  state.trade = data;

  const positions = (
    data.positions ||
    data.openPositions ||
    data.virtualPositions ||
    []
  ).filter(Boolean);

  $("trade").innerHTML = `
    <div class="toolbar">
      <button class="primary" id="runTrade">Run TradeSystem now</button>
    </div>

    <div class="grid">
      ${card("Open virtual SHORT", positions.length)}
      ${card("Active MM IDs", activeIds().length)}
      ${card("Orders", "0", "exchange disabled")}
      ${card("Last processed", data.lastProcessedSnapshotId || data.lastProcessed?.snapshotId || "-")}
    </div>

    <div class="card">
      <pre>${esc(JSON.stringify(data.runMeta || data, null, 2))}</pre>
    </div>
  `;

  $("runTrade").onclick = runTrade;
}

async function runTrade() {
  const data = await api(endpoints.runTrade, {
    method: "POST",
    timeoutMs: 30000,
    body: JSON.stringify({
      force: true,
      forceProcessSnapshot: true,

      targetTradeSide: ONLY_SIDE,
      tradeSide: ONLY_SIDE,
      side: DASHBOARD_SIDE,

      shortOnly: true,
      longDisabled: true,

      virtualOnly: true,
      realOrdersDisabled: true,
      bitgetOrdersDisabled: true,

      selectionGranularity: "EXACT_MICRO_MICRO_ONLY",

      discordOnlyForSelectedMicroFamilies: false,
      discordOnlyForSelectedMicroMicroFamilies: true,
      discordOnlyForExactMicroMicroMatch: true,

      currentFitBlocksLearning: false,

      persistentLearningKey: PERSISTENT_LEARNING_KEY,
      redisNamespace: SHORT_NAMESPACE,
      redisKeyPrefix: SHORT_KEY_PREFIX
    })
  });

  msg(
    `TradeSystem klaar. entries=${data.entryRows || 0}, waits=${data.waitRows || 0}, exits=${data.virtualExitRows || 0}`,
    "ok"
  );

  renderTrade();
}

async function renderScanner() {
  const params = sideParams();

  params.set("includeSnapshot", "1");
  params.set("includeCandidates", "1");

  const data = await api(`${endpoints.scanner}?${params.toString()}`);

  state.scanner = data;

  const snapshot = data.snapshot || data.latest || {};
  const rows = (snapshot.candidates || data.candidates || []).filter(Boolean);

  $("scanner").innerHTML = `
    <div class="toolbar">
      <button class="primary" id="runScanner">Run Scanner now</button>
    </div>

    <div class="grid">
      ${card("SHORT candidates", rows.length)}
      ${card("Scanner IDs", "metadata only")}
      ${card("Learning identity", "Analyze MM")}
      ${card("Discord", "OFF")}
    </div>

    <div class="card">
      <pre>${esc(JSON.stringify(data, null, 2))}</pre>
    </div>
  `;

  $("runScanner").onclick = async () => {
    const result = await api(endpoints.runScanner, {
      method: "POST",
      timeoutMs: 30000,
      body: JSON.stringify({
        force: true,
        scannerOnly: true,

        shortOnly: true,
        longDisabled: true,

        scannerFingerprintsUsedAsLearningFamily: false,
        noDiscord: true,

        persistentLearningKey: PERSISTENT_LEARNING_KEY,
        redisNamespace: SHORT_NAMESPACE,
        redisKeyPrefix: SHORT_KEY_PREFIX
      })
    });

    msg(`Scanner klaar. candidates=${result.shortCandidatesCount || result.candidatesCount || 0}`, "ok");
    renderScanner();
  };
}

function renderReset() {
  $("reset").innerHTML = `
    <div class="grid">
      ${card("Reset learning", "SHORT only", "manual selection blijft staan")}
      ${card("Reset rotation", "manual MM selection", "learning blijft staan")}
    </div>

    <div class="toolbar">
      <button class="warn" id="resetLearning">Reset learning</button>
      <button class="warn" id="resetRotation">Reset rotation</button>
    </div>

    <pre id="resetOut">Nog geen reset.</pre>
  `;

  $("resetLearning").onclick = async () => {
    if (prompt("Typ RESET_LEARNING_SHORT") !== "RESET_LEARNING_SHORT") return;

    const data = await api(endpoints.resetLearning, {
      method: "POST",
      timeoutMs: 30000,
      body: JSON.stringify({
        confirm: "RESET_LEARNING_SHORT",
        shortOnly: true,
        redisNamespace: SHORT_NAMESPACE,
        redisKeyPrefix: SHORT_KEY_PREFIX
      })
    });

    $("resetOut").textContent = JSON.stringify(data, null, 2);
  };

  $("resetRotation").onclick = async () => {
    if (prompt("Typ RESET_ROTATION_SHORT") !== "RESET_ROTATION_SHORT") return;

    const data = await api(endpoints.resetRotation, {
      method: "POST",
      timeoutMs: 30000,
      body: JSON.stringify({
        confirm: "RESET_ROTATION_SHORT",
        shortOnly: true,
        redisNamespace: SHORT_NAMESPACE,
        redisKeyPrefix: SHORT_KEY_PREFIX
      })
    });

    $("resetOut").textContent = JSON.stringify(data, null, 2);
  };
}

async function refresh(tab = state.tab) {
  msg("");

  try {
    if (tab === "overview") return renderOverview();
    if (tab === "micros") return renderMicros();
    if (tab === "rotation") return renderRotation();
    if (tab === "trade") return renderTrade();
    if (tab === "scanner") return renderScanner();
    if (tab === "reset") return renderReset();
  } catch (error) {
    msg(String(error.message || error), "err");
  }
}

function showTab(tab) {
  state.tab = tab;

  document.querySelectorAll("section").forEach((section) => {
    section.classList.add("hidden");
  });

  $(tab).classList.remove("hidden");

  document.querySelectorAll(".tab").forEach((button) => {
    button.classList.toggle("active", button.dataset.tab === tab);
  });

  location.hash = tab;
  refresh(tab);
}

document.querySelectorAll(".tab").forEach((button) => {
  button.onclick = () => showTab(button.dataset.tab);
});

$("refresh").onclick = () => refresh(state.tab);

window.addEventListener("error", (event) => {
  msg(event.message, "err");
});

window.addEventListener("unhandledrejection", (event) => {
  msg(String(event.reason?.message || event.reason), "err");
});

showTab(location.hash.replace("#", "") || "overview");
</script>
