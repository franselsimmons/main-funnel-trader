<!-- FILE: public/admin.html -->
<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Micro-Family Trading Admin</title>

  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --dark: #0f172a;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --purple: #7c3aed;
      --shadow-soft: 0 2px 10px rgba(15, 23, 42, 0.06);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.10), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    button,
    select,
    input { font: inherit; }

    button {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 14px;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: 0.14s ease;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.10);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    button.primary { background: var(--dark); color: white; border-color: var(--dark); }
    button.success { background: var(--green); color: white; border-color: var(--green); }
    button.warn { background: var(--amber); color: white; border-color: var(--amber); }
    button.danger { background: var(--red); color: white; border-color: var(--red); }
    button.short-action { background: var(--red); color: white; border-color: var(--red); }
    button.long-action { background: var(--green); color: white; border-color: var(--green); }

    button.small {
      padding: 6px 9px;
      border-radius: 9px;
      font-size: 12px;
    }

    select,
    input {
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 10px 12px;
      background: white;
      color: var(--text);
      min-height: 42px;
    }

    input[type="search"] { min-width: 320px; }

    header {
      background: linear-gradient(135deg, #0f172a 0%, #111827 48%, #1e1b4b 100%);
      color: white;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.35);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-title strong {
      display: block;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .brand-subtitle {
      color: #94a3b8;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #cbd5e1;
      font-size: 13px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(243, 245, 249, 0.86);
      backdrop-filter: blur(14px);
      padding: 10px 0;
    }

    .tab {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border-color: rgba(203, 213, 225, 0.9);
    }

    .tab.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    .hidden,
    .panel.hidden { display: none; }

    .message {
      border-radius: 16px;
      padding: 13px 15px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: white;
      box-shadow: var(--shadow-soft);
      white-space: pre-wrap;
    }

    .message.ok { color: #166534; background: #dcfce7; border-color: #bbf7d0; }
    .message.error { color: #991b1b; background: #fee2e2; border-color: #fecaca; }
    .message.warn { color: #92400e; background: #fef3c7; border-color: #fde68a; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 14px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #334155;
    }

    .metric-card {
      min-height: 112px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .metric-value {
      font-size: 26px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .metric-extra {
      color: var(--muted);
      font-size: 12px;
      margin-top: 5px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin: 22px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      align-items: center;
      margin: 12px 0 14px;
    }

    .split-toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0 14px;
    }

    .micro-connect-card {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.96));
      box-shadow: var(--shadow-soft);
      padding: 16px;
    }

    .micro-connect-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 5px;
      background: #94a3b8;
    }

    .micro-connect-card.short::before { background: linear-gradient(90deg, #dc2626, #fb7185); }
    .micro-connect-card.long::before { background: linear-gradient(90deg, #16a34a, #22c55e); }

    .micro-connect-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .micro-connect-title { min-width: 0; }

    .micro-connect-title h3 {
      margin: 0 0 5px;
      font-size: 16px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .micro-connect-title p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .micro-connect-score {
      text-align: right;
      min-width: 88px;
    }

    .micro-connect-score strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .micro-connect-score span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .micro-connect-id {
      display: grid;
      gap: 6px;
      margin: 12px 0;
    }

    .micro-connect-id code {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .micro-performance-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(110px, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .micro-performance-stat {
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 10px;
      background: #ffffff;
    }

    .micro-performance-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .micro-performance-stat strong {
      display: block;
      font-size: 15px;
      letter-spacing: -0.02em;
    }

    .micro-connect-narrative {
      border: 1px solid var(--border);
      background: #f8fafc;
      border-radius: 16px;
      padding: 11px;
      color: #334155;
      font-size: 12px;
      line-height: 1.5;
      margin: 12px 0;
    }

    .micro-connect-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
    }

    .micro-connect-route {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .coin-card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow-soft);
    }

    .coin-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: #94a3b8;
    }

    .coin-card.long::before,
    .coin-card.bull::before { background: linear-gradient(90deg, #16a34a, #22c55e); }

    .coin-card.short::before,
    .coin-card.bear::before { background: linear-gradient(90deg, #dc2626, #fb7185); }

    .coin-card.neutral::before { background: linear-gradient(90deg, #64748b, #94a3b8); }

    .coin-head {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .coin-logo-wrap {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 999px;
      overflow: hidden;
      background: linear-gradient(135deg, #e2e8f0, #f8fafc);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      position: relative;
    }

    .coin-logo-wrap.lg { width: 52px; height: 52px; min-width: 52px; }
    .coin-logo-wrap.sm { width: 30px; height: 30px; min-width: 30px; }

    .coin-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .coin-logo-wrap.fallback::after {
      content: attr(data-initial);
      font-weight: 900;
      font-size: 14px;
      color: #334155;
    }

    .coin-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .coin-symbol {
      font-weight: 850;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .coin-name {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 180px;
    }

    .coin-price {
      margin-left: auto;
      text-align: right;
    }

    .coin-price strong {
      display: block;
      font-size: 15px;
    }

    .coin-price span {
      display: block;
      font-size: 12px;
      color: var(--muted);
    }

    .coin-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .coin-stat {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 9px;
    }

    .coin-stat span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .coin-stat strong { font-size: 13px; }

    .coin-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      overflow: hidden;
    }

    .coin-mini {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 190px;
    }

    .coin-mini .coin-symbol { font-size: 14px; }
    .coin-mini .coin-name { font-size: 11px; max-width: 140px; }

    .id-stack {
      display: grid;
      gap: 4px;
      min-width: 360px;
    }

    .id-stack code {
      display: inline-block;
      max-width: 520px;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    .id-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .pill.active,
    .pill.long,
    .pill.bull { background: #dcfce7; color: #166534; }

    .pill.short,
    .pill.bear,
    .pill.danger { background: #fee2e2; color: #991b1b; }

    .pill.warn { background: #fef3c7; color: #92400e; }
    .pill.info { background: #dbeafe; color: #1d4ed8; }
    .pill.purple { background: #ede9fe; color: #5b21b6; }
    .pill.dark { background: #0f172a; color: white; }
    .pill.soft { background: #e0f2fe; color: #075985; }
    .pill.observation { background: #fef9c3; color: #854d0e; }
    .pill.raw { background: #f1f5f9; color: #475569; }

    .score-bar {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .score-bar > span {
      display: block;
      height: 100%;
      width: var(--w);
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      border-radius: inherit;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      margin-bottom: 14px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1250px;
      background: white;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px;
      font-size: 13px;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #f8fafc;
      color: #334155;
      font-weight: 800;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tr:hover td { background: #f8fafc; }

    code {
      font-size: 12px;
      background: #f1f5f9;
      padding: 3px 5px;
      border-radius: 6px;
      color: #334155;
      white-space: nowrap;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0b1020;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 16px;
      max-height: 520px;
      overflow: auto;
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.48;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: min(860px, 94vw);
      background: white;
      border-left: 1px solid var(--border);
      box-shadow: -12px 0 42px rgba(15, 23, 42, 0.18);
      padding: 20px;
      overflow: auto;
      z-index: 30;
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .drawer h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
    }

    @media (max-width: 1180px) {
      .grid,
      .coin-grid { grid-template-columns: repeat(2, minmax(220px, 1fr)); }

      .grid-3,
      .split-toolbar { grid-template-columns: 1fr; }
    }

    @media (max-width: 720px) {
      header { padding: 18px 14px; }

      .header-inner { flex-direction: column; }

      main { padding: 14px; }

      .grid,
      .coin-grid,
      .two-col { grid-template-columns: 1fr; }

      .tabs { gap: 7px; }

      .tab {
        flex: 1 1 auto;
        padding: 9px 10px;
      }

      .brand-title strong { font-size: 20px; }

      input[type="search"] { min-width: 100%; }

      .coin-stats,
      .micro-performance-grid { grid-template-columns: repeat(2, 1fr); }

      .id-stack { min-width: 260px; }

      .micro-connect-head { flex-direction: column; }

      .micro-connect-score { text-align: left; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div>
        <div class="brand-title">
          <div class="brand-logo">MF</div>
          <div>
            <strong>Micro-Family Trading Admin</strong>
            <div class="brand-subtitle">Scanner → TradeSystem → Analyze → Macro/Micro Rotation → Discord</div>
          </div>
        </div>
      </div>

      <div class="header-actions">
        <div class="live-pill"><span class="live-dot"></span><span id="liveLabel">Live dashboard</span></div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button type="button" class="tab active" data-tab="overview">Overview</button>
      <button type="button" class="tab" data-tab="scanner">Scanner</button>
      <button type="button" class="tab" data-tab="trade">TradeSystem</button>
      <button type="button" class="tab" data-tab="micros">MicroFamilies</button>
      <button type="button" class="tab" data-tab="rotation">Rotation</button>
      <button type="button" class="tab" data-tab="discord">Discord Logs</button>
      <button type="button" class="tab" data-tab="reset">Reset</button>
    </div>

    <div id="message"></div>

    <section id="overview" class="panel"></section>
    <section id="scanner" class="panel hidden"></section>
    <section id="trade" class="panel hidden"></section>
    <section id="micros" class="panel hidden"></section>
    <section id="rotation" class="panel hidden"></section>
    <section id="discord" class="panel hidden"></section>
    <section id="reset" class="panel hidden"></section>
  </main>

  <div id="drawer" class="drawer hidden"></div>

  <script>
    const state = {
      activeTab: "overview",
      overview: null,
      scanner: null,
      trade: null,
      micros: null,
      rotation: null,
      discord: null,

      microMode: "balanced",
      microSearch: "",

      // Hard verlaagd tegen 504.
      microFetchLimit: 160,
      microSideLimit: 25,
      microSideEnsureLimit: 25
    };

    const endpoints = {
      overview: "/api/admin/overview",
      scanner: "/api/admin/scanner",
      trade: "/api/admin/trade",
      micros: "/api/admin/micro-families",
      rotation: "/api/admin/rotation",
      discord: "/api/admin/discord-logs",
      microDetail: "/api/admin/micro-family",
      runScanner: "/api/scanner/run?force=true",
      runTrade: "/api/trade/run?force=true",
      weeklyFreeze: "/api/analyze/weekly-freeze?force=true",
      activateNextRotation: "/api/analyze/activate-rotation?force=true",
      resetLearning: "/api/admin/reset-learning",
      resetRotation: "/api/admin/reset-rotation",
      factoryReset: "/api/admin/factory-reset"
    };

    const tabs = ["overview", "scanner", "trade", "micros", "rotation", "discord", "reset"];

    const COIN_NAMES = {
      BTC: "Bitcoin",
      ETH: "Ethereum",
      SOL: "Solana",
      XRP: "XRP",
      BNB: "BNB",
      DOGE: "Dogecoin",
      ADA: "Cardano",
      AVAX: "Avalanche",
      LINK: "Chainlink",
      DOT: "Polkadot",
      TON: "Toncoin",
      TRX: "TRON",
      LTC: "Litecoin",
      BCH: "Bitcoin Cash",
      NEAR: "NEAR Protocol",
      APT: "Aptos",
      SUI: "Sui",
      ARB: "Arbitrum",
      OP: "Optimism",
      INJ: "Injective",
      ATOM: "Cosmos",
      FIL: "Filecoin",
      RUNE: "THORChain",
      FET: "Fetch.ai",

    function escapeHtml(value) {
      return String(value ?? "")

        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");

    function normalizeSide(side) {
      const s = String(side || "").trim().toUpperCase();

      if (["LONG", "BULL", "BUY"].includes(s)) return "LONG";
      if (["SHORT", "BEAR", "SELL"].includes(s)) return "SHORT";

      return s || "NA";
    }

    function sideFromIds(row = {}) {
      const raw = [
        row.tradeSide,
        row.side,
        row.positionSide,
        row.direction,
        row.signalSide,
        row.scannerSide,
        row.analysisSide,
        row.microFamilyId,
        row.trueMicroFamilyId,
        row.id,
        row.key,
        row.macroFamilyId,
        row.parentMacroFamilyId,
        row.parentMicroFamilyId,
        row.familyId,
        row.family,
        row.definition,
        Array.isArray(row.definitionParts) ? row.definitionParts.join("|") : ""
      ].map((value) => String(value || "").toUpperCase());

      if (raw.some((value) => (
        value === "LONG" ||
        value === "BULL" ||
        value === "BUY" ||
        value.includes("MICRO_LONG_") ||
        value.includes("LONG_") ||
        value.includes("_LONG") ||
        value.includes("TRADESIDE=LONG") ||
        value.includes("TRADE_SIDE=LONG")
      ))) return "LONG";

      if (raw.some((value) => (
        value === "SHORT" ||
        value === "BEAR" ||
        value === "SELL" ||
        value.includes("MICRO_SHORT_") ||
        value.includes("SHORT_") ||
        value.includes("_SHORT") ||
        value.includes("TRADESIDE=SHORT") ||
        value.includes("TRADE_SIDE=SHORT")
      ))) return "SHORT";

      return "NA";
    }

    function rowSide(row = {}) {
      const direct = normalizeSide(row?.tradeSide || row?.side || row?.positionSide || row?.direction);

      if (direct === "LONG" || direct === "SHORT") return direct;

      return sideFromIds(row);
    }

    function sideClass(side) {
      const s = normalizeSide(side);

      if (s === "LONG") return "long";
      if (s === "SHORT") return "short";

      return "neutral";
    }

    function rowSideClass(row = {}) {
      return sideClass(rowSide(row));
    }

    function rowSideLabel(row = {}) {
      return rowSide(row);

    function isSide(row, side) {
      return rowSide(row) === normalizeSide(side);

    function baseSymbol(input) {
      const raw = typeof input === "string"
        ? input
        : input?.symbol || input?.baseSymbol || input?.coin || input?.contractSymbol || "";

      let symbol = String(raw).toUpperCase().replace(/[^A-Z0-9]/g, "");

      const suffixes = [
        "USDTUMCBL",
        "USDCUMCBL",
        "USDTPERP",
        "USDCPERP",
        "USDT",
        "USDC",
        "BUSD",
        "PERP",
        "SWAP",
        "USD"
      ];

      for (const suffix of suffixes) {
        if (symbol.endsWith(suffix) && symbol.length > suffix.length) {
          symbol = symbol.slice(0, -suffix.length);
          break;
        }
      }

      return symbol || "COIN";
    }

    function coinName(row) {
      const symbol = baseSymbol(row);

      return row?.name ||
        row?.coinName ||
        row?.fullName ||
        row?.assetName ||
        COIN_NAMES[symbol] ||
        symbol;
    }

    function coinLogo(row) {
      const direct =
        row?.logo ||
        row?.image ||
        row?.icon ||
        row?.iconUrl ||
        row?.logoUrl ||
        row?.coinLogo ||
        row?.marketData?.image ||
        row?.market?.image;

      if (direct) return direct;

      const symbol = baseSymbol(row).toLowerCase();

      return `https://raw.githubusercontent.com/spothq/cryptocurrency-icons/master/128/color/${symbol}.png`;
    }

    function handleCoinLogoError(img) {
      const parent = img?.parentElement;

      if (!parent) return;

      parent.classList.add("fallback");
      img.remove();

    window.handleCoinLogoError = handleCoinLogoError;

    function coinAvatar(row, size = "") {

    function fmt(value, decimals = 3) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return n.toFixed(decimals);
    }

    function fmtInt(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "0";

      return Math.round(n).toLocaleString();
    }

    function fmtPctRatio(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return `${(n * 100).toFixed(1)}%`;
    }

    function fmtPctRaw(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";

      return `${n.toFixed(2)}%`;
    }

    function fmtPrice(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (n >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
      if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 4 });

      return n.toLocaleString(undefined, { maximumFractionDigits: 8 });
    }

    function fmtMoneyLike(value) {
      const n = Number(value);

      if (!Number.isFinite(n)) return "-";
      if (Math.abs(n) >= 1_000_000_000) return `${(n / 1_000_000_000).toFixed(2)}B`;
      if (Math.abs(n) >= 1_000_000) return `${(n / 1_000_000).toFixed(2)}M`;
      if (Math.abs(n) >= 1_000) return `${(n / 1_000).toFixed(1)}K`;

      return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
    }

    function fmtTs(value) {
      if (!value) return "-";

      const n = Number(value);
      const date = Number.isFinite(n) ? new Date(n) : new Date(value);

      if (Number.isNaN(date.getTime())) return "-";

      return date.toLocaleString();
    }

    function ageText(ts) {
      if (!ts) return "-";

      const n = Number(ts);

      if (!Number.isFinite(n)) return "-";

      const sec = Math.max(0, Math.floor((Date.now() - n) / 1000));

      if (sec < 60) return `${sec}s geleden`;
      if (sec < 3600) return `${Math.floor(sec / 60)}m geleden`;

      return `${Math.floor(sec / 3600)}u geleden`;
    }

    function boolText(value) {
      return value ? "YES" : "NO";

    function getRows(data, keys = []) {
      if (Array.isArray(data)) return data;

      for (const key of keys) {
        if (Array.isArray(data?.[key])) return data[key];
      }

      if (Array.isArray(data?.rows)) return data.rows;
      if (Array.isArray(data?.items)) return data.items;
      if (Array.isArray(data?.data)) return data.data;

      return [];
    }

    function errorReason(data, fallback = "REQUEST_FAILED") {
      const raw = data?.error || data?.reason || data?.message || fallback;

      if (typeof raw === "string") return raw;
      if (raw && typeof raw === "object") return JSON.stringify(raw);

      return String(raw || fallback);
    }

    async function api(url, options = {}) {
      const headers = {
        accept: "application/json",
        ...(options.headers || {})
      };

      if (options.body !== undefined && options.body !== null && !headers["content-type"]) {
        headers["content-type"] = "application/json";
      }

      const response = await fetch(url, {
        cache: "no-store",
        ...options,
        headers
      });

      const rawText = await response.text();

      let data = {};

      try {
        data = rawText ? JSON.parse(rawText) : {};
      } catch {
        data = { raw: rawText };
      }

      if (!response.ok) {
        throw new Error(`${response.status} ${errorReason(data, response.statusText)}\n${JSON.stringify(data, null, 2)}`);
      }

      return data;
    }

    function table(rows, cols, emptyText = "Geen data.") {
      if (!Array.isArray(rows) || rows.length === 0) {
        return `<div class="empty">${escapeHtml(emptyText)}</div>`;

      const head = cols
        .map((column) => `<th>${escapeHtml(column.label)}</th>`)
        .join("");

      const body = rows.map((row, index) => {
        const cells = cols.map((column) => {
          const value = column.render
            ? column.render(row, index)
            : escapeHtml(row?.[column.key]);

          return `<td>${value}</td>`;
        }).join("");

        return `<tr>${cells}</tr>`;
      }).join("");

      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${head}</tr></thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;
    }

    function uniqueStrings(values = []) {
      return [...new Set(
        (Array.isArray(values) ? values : [values])
          .flatMap((value) => {
            if (Array.isArray(value)) return value;

            return String(value || "")
              .split(/[\s,]+/g)
              .map((part) => part.trim());

          .map((value) => String(value || "").trim())
          .filter(Boolean)

        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        setMessage(label, "ok");

    function downloadJson(filename, data) {
      const blob = new Blob([JSON.stringify(data ?? {}, null, 2)], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = filename;
      a.click();

      URL.revokeObjectURL(url);

    function microUrl(extra = {}) {
      const params = new URLSearchParams();

      params.set("mode", extra.mode || state.microMode);
      params.set("limit", String(extra.limit || state.microFetchLimit));
      params.set("sideEnsureLimit", String(extra.sideEnsureLimit || state.microSideEnsureLimit));
      params.set("includeActiveRotation", "0");
      params.set("compact", "1");

      if (extra.side) params.set("side", extra.side);
      if (extra.q) params.set("q", extra.q);

      return `${endpoints.micros}?${params.toString()}`;
    }

    function filterMicroRows(rows = []) {
      const search = state.microSearch.trim().toLowerCase();

      if (!search) return rows;

      return rows.filter((row) => JSON.stringify(row).toLowerCase().includes(search));

    function splitTopMicroRows(rows = []) {
      const allShortRows = rows.filter((row) => isSide(row, "SHORT"));
      const allLongRows = rows.filter((row) => isSide(row, "LONG"));

      const shortRows = allShortRows.slice(0, state.microSideLimit);
      const longRows = allLongRows.slice(0, state.microSideLimit);

      return {
        shortRows,
        longRows,
        visibleRows: [...shortRows, ...longRows],
        totalShortRows: allShortRows.length,
        totalLongRows: allLongRows.length
      };
    }

    function bestMicroRowForSide(rows = [], side = "SHORT") {

    async function ensureMicroRows({ force = false } = {}) {
      const rows = currentMicroRows();

      if (!force && rows.length > 0) return rows;

      const data = await api(microUrl());
      state.micros = data;

      return getRows(data, ["rows", "microFamilies", "micros"]);
    }

    function currentVisibleMicroRows() {
      const rows = filterMicroRows(currentMicroRows());

      return splitTopMicroRows(rows).visibleRows;
    }

    function microTrades(row = {}) {
      return Number(row.winrateSample ?? row.completed ?? 0);
    }

    function microWinrateText(row = {}) {
      return fmtPctRatio(row.winrate);
    }

    function microFairWinrateText(row = {}) {
      return fmtPctRatio(row.fairWinrate ?? row.bayesianWinrate ?? row.wilsonLowerBound);
    }

    function microPnlText(row = {}) {
      const r = Number(row.totalR);

      if (!Number.isFinite(r)) return "-";

      return `${r >= 0 ? "+" : ""}${r.toFixed(2)}R`;
    }

    function microNarrative(row = {}, side = "SHORT") {
      const normalizedSide = normalizeSide(side);
      const trades = microTrades(row);
      const winrate = Number(row.winrate);
      const totalR = Number(row.totalR);
      const avgR = Number(row.avgR);
      const directSL = Number(row.directSLPct);

      const sampleText = trades < 5
        ? "lage sample, dus behandelen als vroege sniper-fingerprint"
        : trades < 15
          ? "bruikbare sample, maar nog niet zwaar bewezen"
          : "sterkere sample met genoeg observaties";

      const winrateText = Number.isFinite(winrate)
        ? `winrate ${(winrate * 100).toFixed(1)}%`
        : "winrate onbekend";

      const pnlText = Number.isFinite(totalR)
        ? `netto ${totalR >= 0 ? "+" : ""}${totalR.toFixed(2)}R`
        : "PnL onbekend";

      const avgText = Number.isFinite(avgR)
        ? `gemiddeld ${avgR.toFixed(2)}R per trade`
        : "gemiddelde R onbekend";

      const slText = Number.isFinite(directSL)
        ? `direct SL ${(directSL * 100).toFixed(1)}%`
        : "direct SL onbekend";

      return `Deze ${normalizedSide} micro-family is momenteel de sterkste execution fingerprint binnen de ${normalizedSide}-kant. De set heeft ${sampleText}: ${winrateText}, ${pnlText}, ${avgText}, ${slText}. Als een nieuwe coin exact op deze true micro-family matched, mag TradeSystem hem doorlaten naar de entry/Discord-flow.`;
    }

    function microConnectCard(row, side = "SHORT", scope = "micros") {
      const normalizedSide = normalizeSide(side);
      const cardClass = normalizedSide === "LONG" ? "long" : "short";
      const buttonClass = normalizedSide === "LONG" ? "long-action" : "short-action";
      const buttonId = scope === "rotation"
        ? `activateBest${normalizedSide === "LONG" ? "Long" : "Short"}RotationBtn`
        : `activateBest${normalizedSide === "LONG" ? "Long" : "Short"}Btn`;

      if (!row) {
        return `
          <div class="micro-connect-card ${escapeAttr(cardClass)}">
            <div class="micro-connect-head">
              <div class="micro-connect-title">
                <h3>Beste ${escapeHtml(normalizedSide)} micro-family</h3>
                <p>Geen ${escapeHtml(normalizedSide)} micro-family gevonden in de huidige analyse.</p>
              </div>
              <span class="pill warn">Niet beschikbaar</span>
            </div>

            <div class="micro-connect-narrative">
              Er is geen actieve kandidaat voor deze kant. De knop blijft uitgeschakeld zodat TradeSystem niet per ongeluk een lege of verkeerde side activeert.
            </div>

            <div class="micro-connect-actions">
              <button type="button" class="${escapeAttr(buttonClass)}" id="${escapeAttr(buttonId)}" disabled>
                Selecteer ${escapeHtml(normalizedSide)} micro-family
              </button>
            </div>
          </div>
        `;
      }

      const micro = microId(row);
      const macro = macroId(row);
      const family = familyId(row);
      const active = activeMicroSet().has(micro);
      const score = row.dashboardBalancedScore ?? row.balancedScore;
      const trades = microTrades(row);
      const tier = tierValue(row);

      return `
        <div class="micro-connect-card ${escapeAttr(cardClass)}">
          <div class="micro-connect-head">
            <div class="micro-connect-title">
              <h3>Beste ${escapeHtml(normalizedSide)} micro-family</h3>
              <p>${active ? "Deze fingerprint staat al actief voor TradeSystem." : "Kandidaat om als actieve TradeSystem-filter te gebruiken."}</p>
            </div>

            <div class="micro-connect-score">
              <strong>${escapeHtml(fmt(score, 2))}</strong>
              <span>Balanced</span>
            </div>
          </div>

          <div class="micro-connect-id">
            <div><span class="id-label">True micro</span><code>${escapeHtml(micro || "NO_MICRO_ID")}</code></div>
            <div><span class="id-label">Macro parent</span><code>${escapeHtml(macro || "NO_MACRO_ID")}</code></div>
            <div><span class="id-label">Family</span><code>${escapeHtml(family || "NO_FAMILY")}</code></div>
          </div>

          <div class="micro-performance-grid">
            <div class="micro-performance-stat"><span>Trades</span><strong>${escapeHtml(fmt(trades, 2))}</strong></div>
            <div class="micro-performance-stat"><span>Winrate</span><strong>${escapeHtml(microWinrateText(row))}</strong></div>
            <div class="micro-performance-stat"><span>Fair WR</span><strong>${escapeHtml(microFairWinrateText(row))}</strong></div>
            <div class="micro-performance-stat"><span>Net PnL</span><strong>${escapeHtml(microPnlText(row))}</strong></div>
            <div class="micro-performance-stat"><span>Avg R</span><strong>${escapeHtml(fmt(row.avgR, 3))}R</strong></div>
            <div class="micro-performance-stat"><span>PF</span><strong>${escapeHtml(fmt(row.profitFactor, 2))}</strong></div>
            <div class="micro-performance-stat"><span>Direct SL</span><strong>${escapeHtml(fmtPctRatio(row.directSLPct))}</strong></div>
            <div class="micro-performance-stat"><span>Cost R</span><strong>${escapeHtml(fmt(row.avgCostR, 3))}</strong></div>
          </div>

          <div class="micro-connect-narrative">${escapeHtml(microNarrative(row, normalizedSide))}</div>

          <div class="micro-connect-actions">
            <span class="pill ${escapeAttr(cardClass)}">${escapeHtml(normalizedSide)}</span>
            ${active ? '<span class="pill active">Actief</span>' : '<span class="pill info">Beschikbaar</span>'}
            ${tier ? tierPill(tier) : ""}
            <button type="button" class="${escapeAttr(buttonClass)}" id="${escapeAttr(buttonId)}">
              ${active ? `Herselecteer ${escapeHtml(normalizedSide)} micro-family` : `Selecteer ${escapeHtml(normalizedSide)} micro-family`}
            </button>
          </div>

          <div class="micro-connect-route">
            Route: scanner coin → TradeSystem fingerprint → active true micro match → Discord melding.
          </div>
        </div>
      `;
    }

    function safeMicroConnectCard(row, side = "SHORT", scope = "micros") {
      try {
        return microConnectCard(row, side, scope);
      } catch (error) {
        const normalizedSide = normalizeSide(side);
        const cardClass = normalizedSide === "LONG" ? "long" : "short";
        const buttonClass = normalizedSide === "LONG" ? "long-action" : "short-action";
        const buttonId = scope === "rotation"
          ? `activateBest${normalizedSide === "LONG" ? "Long" : "Short"}RotationBtn`
          : `activateBest${normalizedSide === "LONG" ? "Long" : "Short"}Btn`;

        return `
          <div class="micro-connect-card ${escapeAttr(cardClass)}">
            <div class="micro-connect-head">
              <div class="micro-connect-title">
                <h3>Beste ${escapeHtml(normalizedSide)} micro-family</h3>
                <p>Kaart kon niet volledig worden opgebouwd. Backend-selectie blijft beschikbaar.</p>
              </div>
              <span class="pill warn">Fallback</span>
            </div>

            <div class="micro-connect-narrative">Render error: ${escapeHtml(error?.message || String(error))}</div>

            <div class="micro-connect-actions">
              <span class="pill ${escapeAttr(cardClass)}">${escapeHtml(normalizedSide)}</span>
              <button type="button" class="${escapeAttr(buttonClass)}" id="${escapeAttr(buttonId)}">
                Selecteer beste ${escapeHtml(normalizedSide)} micro-family
              </button>
            </div>
          </div>
        `;
      }
    }

    function microRowsTable(rows, activeIdsInput = [], activeMacroIdsInput = []) {
      const activeIds = activeIdsInput instanceof Set
        ? activeIdsInput
        : new Set(activeIdsInput || []);

      const activeMacroIds = activeMacroIdsInput instanceof Set
        ? activeMacroIdsInput
        : new Set(activeMacroIdsInput || []);

      return table(rows, [
        { label: "Rank", render: (row, index) => escapeHtml(row.rank ?? index + 1) },
        { label: "Active", render: (row) => {
          const microActive = activeIds.has(microId(row));
          const macroActive = activeMacroIds.has(macroId(row));
          const isActive = Boolean(row.active) || microActive || macroActive;
          const label = microActive ? "MICRO" : macroActive ? "MACRO" : isActive ? "ACTIVE" : "off";

          return `<span class="pill ${isActive ? "active" : ""}">${escapeHtml(label)}</span>`;
        }},
        { label: "IDs", render: idStack },
        { label: "Side", render: (row) => `<span class="pill ${escapeAttr(rowSideClass(row))}">${escapeHtml(rowSideLabel(row))}</span>` },
        { label: "Tier", render: (row) => tierValue(row) ? tierPill(tierValue(row)) : '<span class="pill">NA</span>' },
        { label: "Seen", render: (row) => fmtInt(row.seen) },
        { label: "Completed", render: (row) => fmt(row.completed, 2) },
        { label: "Sample", render: (row) => fmt(row.winrateSample ?? row.completed, 2) },
        { label: "Fair WR", render: (row) => fmtPctRatio(row.fairWinrate ?? row.bayesianWinrate ?? row.wilsonLowerBound) },
        { label: "Winrate", render: (row) => fmtPctRatio(row.winrate) },
        { label: "Net AvgR", render: (row) => fmt(row.avgR, 3) },
        { label: "Net TotalR", render: (row) => fmt(row.totalR, 3) },
        { label: "PF", render: (row) => fmt(row.profitFactor, 2) },
        { label: "DirectSL", render: (row) => fmtPctRatio(row.directSLPct) },
        { label: "CostR", render: (row) => fmt(row.avgCostR, 3) },
        { label: "Balanced", render: (row) => `<strong>${fmt(row.dashboardBalancedScore ?? row.balancedScore, 2)}</strong>` },
        { label: "Copy", render: (row) => `
          <button type="button" class="small" data-copy-micro="${escapeAttr(microId(row))}">Micro</button>
          <button type="button" class="small" data-copy-macro="${escapeAttr(macroId(row))}">Macro</button>
        ` }
      ]);
    }

      });

      $("copyTopMacroIdsBtn")?.addEventListener("click", () => {
        const ids = uniqueStrings(currentVisibleMicroRows().map(macroId));
        copyText(JSON.stringify(ids, null, 2), `Visible ${ids.length} macroFamilyIds gekopieerd.`);
      });

      $("downloadMicrosBtn")?.addEventListener("click", () => {
        downloadJson("micro-families.json", data);
      });
    }

    async function activateBestSideMicro(side) {
      const normalizedSide = normalizeSide(side);

      if (!["LONG", "SHORT"].includes(normalizedSide)) {
        setMessage(`Ongeldige side: ${normalizedSide}.`, "error");
        return;
      }

      let previewRow = null;

      try {
        const rows = await ensureMicroRows();
        previewRow = bestMicroRowForSide(rows, normalizedSide);
      } catch {
        previewRow = null;
      }

      const previewMicroId = previewRow
        ? microId(previewRow)
        : "Backend kiest beste actuele micro-family";

      const previewScore = previewRow
        ? fmt(previewRow.dashboardBalancedScore ?? previewRow.balancedScore, 2)
        : "-";

      if (!confirm(
        `Selecteer beste ${normalizedSide} micro-family voor TradeSystem?\n\n` +
        `${previewMicroId}\n` +
        `Balanced: ${previewScore}\n\n` +
        `De andere side blijft behouden als die actief is.`
      )) {
        return;
      }

      const action = normalizedSide === "LONG"
        ? "activateBestLongMicroFamily"
        : "activateBestShortMicroFamily";

      const data = await api(endpoints.rotation, {
        method: "POST",
        body: JSON.stringify({
          action,
          side: normalizedSide,
          tradeSide: normalizedSide,
          mode: state.microMode,
          preserveOppositeSide: true
        })
      });

      const active = data.activeRotation || data.active || {};
      const activeMicroIds = extractIdsFromRotation(active);
      const activeMacroIds = extractMacroIdsFromRotation(active);
      const selectedTier = data.selectedTier || active.selectedTier || "NA";
      const missing = missingSidesArray(data, active);

      state.rotation = {
        ...(state.rotation || {}),
        active,
        activeRotation: active,
        activeMicroFamilyIds: activeMicroIds,
        activeMacroFamilyIds: activeMacroIds
      };

      if (state.micros) {
        state.micros = {
          ...state.micros,
          activeRotation: active,
          activeMicroFamilyIds: activeMicroIds,
          activeMacroFamilyIds: activeMacroIds
        };
      }

      if (data.skipped) {
        setMessage(
          `Geen ${normalizedSide} micro-family geactiveerd. Reden: ${data.emptyReason || "NO_SIDE_MICRO_FOUND"}.\n` +
          `Side rows=${data.sideCount ?? "-"}, hard=${data.hardCount ?? "-"}, soft=${data.softCount ?? "-"}, obs=${data.observationCount ?? "-"}.\n` +
          `Active true micro=${activeMicroIds.length}, active macro=${activeMacroIds.length}.`,
          "warn"
        );

        if (state.activeTab === "rotation") {
          await renderRotation();
          return;
        }

        await renderMicros(state.microMode);
        return;
      }

      const selectedMicroId =
        data.selectedMicroFamilyId ||
        microId(data.selectedRow || {}) ||
        "UNKNOWN_MICRO";

      const selectedMacroId =
        data.selectedMacroFamilyId ||
        macroId(data.selectedRow || {}) ||
        "UNKNOWN_MACRO";

      setMessage(
        `${normalizedSide} micro-family actief gezet voor TradeSystem.\n` +
        `True micro: ${selectedMicroId}\n` +
        `Macro: ${selectedMacroId}\n` +
        `Selected tier: ${selectedTier}\n` +
        `Side rows=${data.sideCount ?? "-"}, hard=${data.hardCount ?? "-"}, soft=${data.softCount ?? "-"}, obs=${data.observationCount ?? "-"}.\n` +
        `Soft fallback=${boolText(data.usedSoftFallback || active.usedSoftFallback)}, observation fallback=${boolText(data.usedObservationFallback || active.usedObservationFallback)}.\n` +
        `Missing sides=${missing.length ? missing.join(", ") : "NONE"}.\n` +
        `Active true micro=${activeMicroIds.length}, active macro=${activeMacroIds.length}.\n` +
        `Route actief: scanner coin → TradeSystem fingerprint → active true micro match → Discord melding.`,
        "ok"
      );

      if (state.activeTab === "rotation") {
        await renderRotation();
        return;
      }

      await renderMicros(state.microMode);
    }

    async function openMicro(id) {
      if (!id) return;

      const drawer = $("drawer");

      drawer.classList.remove("hidden");
      drawer.innerHTML = `
        <div class="drawer-head">
          <div>
            <h2>${escapeHtml(id)}</h2>
            <div class="metric-extra">Detail wordt geladen...</div>
          </div>
          <button type="button" id="closeDrawerBtn">Close</button>
        </div>
      `;

      $("closeDrawerBtn")?.addEventListener("click", closeDrawer);

      try {
        const data = await api(`${endpoints.microDetail}/${encodeURIComponent(id)}`);
        const row = data.row || data.microFamily || data;

        drawer.innerHTML = `
          <div class="drawer-head">
            <div>
              <h2>${escapeHtml(id)}</h2>
              <div class="metric-extra">
                true micro=${escapeHtml(microId(row))} · macro=${escapeHtml(macroId(row))} · family=${escapeHtml(familyId(row))}
              </div>
            </div>
            <button type="button" id="closeDrawerBtn">Close</button>
          </div>

          <div class="toolbar">
            <button type="button" class="success" id="copyDrawerIdBtn">Copy true micro ID</button>
            <button type="button" class="success" id="copyDrawerMacroBtn">Copy macro ID</button>
            <button type="button" id="copyDrawerJsonBtn">Copy JSON</button>
          </div>

          <div class="grid">
            ${metricCard("Seen", fmtInt(row.seen))}
            ${metricCard("Completed", fmt(row.completed, 2))}
            ${metricCard("Fair WR", fmtPctRatio(row.fairWinrate))}
            ${metricCard("Balanced", fmt(row.dashboardBalancedScore ?? row.balancedScore, 2))}
            ${metricCard("AvgR", fmt(row.avgR, 3))}
            ${metricCard("TotalR", fmt(row.totalR, 3))}
            ${metricCard("DirectSL", fmtPctRatio(row.directSLPct))}
            ${metricCard("CostR", fmt(row.avgCostR, 3))}
          </div>

          <div class="two-col">
            <div class="card">
              <h3>IDs</h3>
              ${jsonBlock({
                microFamilyId: microId(row),
                macroFamilyId: macroId(row),
                familyId: familyId(row),
                active: row.active
              })}
            </div>

            <div class="card">
              <h3>Stats</h3>
              ${jsonBlock({
                seen: row.seen,
                completed: row.completed,
                realCompleted: row.realCompleted,
                shadowCompleted: row.shadowCompleted,
                winrate: row.winrate,
                fairWinrate: row.fairWinrate,
                avgR: row.avgR,
                totalR: row.totalR,
                profitFactor: row.profitFactor,
                directSLPct: row.directSLPct,
                balancedScore: row.balancedScore,
                dashboardBalancedScore: row.dashboardBalancedScore
              })}
            </div>
          </div>

          <div class="two-col">
            <div class="card">
              <h3>True micro definition</h3>
              ${jsonBlock(row.definitionParts || row.microDefinitionParts || row.definition || [])}
            </div>

            <div class="card">
              <h3>Macro definition</h3>
              ${jsonBlock(row.macroDefinitionParts || row.macroDefinition || row.parentDefinitionParts || [])}
            </div>
          </div>

          <div class="card">
            <h3>Raw detail JSON</h3>
            ${jsonBlock(data)}
          </div>
        `;

        $("closeDrawerBtn")?.addEventListener("click", closeDrawer);
        $("copyDrawerIdBtn")?.addEventListener("click", () => copyText(microId(row), "True microFamilyId gekopieerd."));
        $("copyDrawerMacroBtn")?.addEventListener("click", () => copyText(macroId(row), "MacroFamilyId gekopieerd."));
        $("copyDrawerJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(data, null, 2), "MicroFamily JSON gekopieerd."));
      } catch (error) {
        drawer.innerHTML = `
          <div class="drawer-head">
            <div>
              <h2>${escapeHtml(id)}</h2>
              <div class="metric-extra">Detail API error</div>
            </div>
            <button type="button" id="closeDrawerBtn">Close</button>
          </div>
          <div class="message error">${escapeHtml(error.message)}</div>
        `;

        $("closeDrawerBtn")?.addEventListener("click", closeDrawer);
      }
    }

    function closeDrawer() {
      $("drawer").classList.add("hidden");
      $("drawer").innerHTML = "";
    }

    async function renderRotation() {
      showLoading("rotation");

      const data = await api(endpoints.rotation);
      state.rotation = data;

      let rotationMicroRows = currentMicroRows();

      if (rotationMicroRows.length === 0) {
        try {
          rotationMicroRows = await ensureMicroRows();
        } catch {
          rotationMicroRows = [];
        }
      }

      const rotationBestShort = bestMicroRowForSide(rotationMicroRows, "SHORT");
      const rotationBestLong = bestMicroRowForSide(rotationMicroRows, "LONG");

      const active = data.active || data.activeRotation || {};
      const next = data.next || data.nextRotation || {};

      const activeIds = extractIdsFromRotation(active);
      const nextIds = extractIdsFromRotation(next);

      const activeMacroIds = extractMacroIdsFromRotation(active);
      const nextMacroIds = extractMacroIdsFromRotation(next);

      const activeRowsRaw = getRows(data, ["activeRows", "rows", "activeMicroFamilies"]);
      const activeRows = activeRowsRaw.length
        ? activeRowsRaw
        : activeIds.map((id, index) => ({ rank: index + 1, microFamilyId: id }));

      const selectedTier = active.selectedTier || data.selectedTier || "NA";
      const missing = missingSidesArray(data, active);

      $("rotation").innerHTML = `
        <div class="section-title">
          <div>
            <h2>Beste micro-family selectie</h2>
            <p>Activeert alleen de gekozen side. De andere side blijft behouden als die al actief is.</p>
          </div>
        </div>

        <div class="split-toolbar" id="bestRotationMicroCards">
          ${safeMicroConnectCard(rotationBestShort, "SHORT", "rotation")}
          ${safeMicroConnectCard(rotationBestLong, "LONG", "rotation")}
        </div>

        <div class="toolbar">
          <button type="button" class="warn" id="freezeWeeklyBtn">Freeze next rotation</button>
          <button type="button" class="success" id="copyActiveMicroIdsBtn">Copy active true micro IDs</button>
          <button type="button" class="success" id="copyActiveMacroIdsBtn">Copy active macro IDs</button>
          <button type="button" id="downloadRotationBtn">Export rotation JSON</button>
        </div>

        <div class="grid">
          ${metricCard("Active true micro", fmtInt(activeIds.length))}
          ${metricCard("Active macro", fmtInt(activeMacroIds.length))}
          ${metricCard("Next true micro", fmtInt(nextIds.length))}
          ${metricCard("Next macro", fmtInt(nextMacroIds.length))}
          ${metricCard("Active source week", active.sourceWeekKey || data.sourceWeekKey || "NA")}
          ${metricCard("Mode", active.mode || data.mode || "NA")}
          ${metricCard("Eligible", fmtInt(active.eligibleCount || 0))}
          ${metricCard("Rotation ID", active.rotationId || "NA")}
          ${metricCard("Selected tier", selectedTier)}
          ${metricCard("Missing sides", missing.length ? missing.join(", ") : "NONE")}
          ${metricCard("Soft fallback", boolText(active.usedSoftFallback || data.usedSoftFallback))}
          ${metricCard("Observation fallback", boolText(active.usedObservationFallback || data.usedObservationFallback))}
        </div>

        ${rotationDiagnosticsHtml(data, active)}

        <div class="section-title">
          <div>
            <h2>Active rotation</h2>
            <p>Deze true micro-families worden nu door TradeSystem toegestaan. Macro blijft beschikbaar als parent-context.</p>
          </div>
        </div>

        ${table(activeRows, [
          { label: "Rank", render: (row, index) => escapeHtml(row.rank ?? index + 1) },
          { label: "IDs", render: idStack },
          { label: "Side", render: (row) => `<span class="pill ${escapeAttr(rowSideClass(row))}">${escapeHtml(rowSideLabel(row))}</span>` },
          { label: "Tier", render: (row) => tierValue(row) ? tierPill(tierValue(row)) : tierPill(active.selectedTier || "NA") },
          { label: "Completed", render: (row) => fmt(row.completed, 2) },
          { label: "Fair WR", render: (row) => fmtPctRatio(row.fairWinrate ?? row.bayesianWinrate ?? row.wilsonLowerBound) },
          { label: "AvgR", render: (row) => fmt(row.avgR, 3) },
          { label: "TotalR", render: (row) => fmt(row.totalR, 3) },
          { label: "DirectSL", render: (row) => fmtPctRatio(row.directSLPct) },
          { label: "Balanced", render: (row) => fmt(row.dashboardBalancedScore ?? row.balancedScore, 2) }
        ], "Geen actieve rotation gevonden.")}

        <div class="card">
          <h3>Copy block voor TradeSystem</h3>
          <div class="toolbar">
            <button type="button" class="success" id="copyActiveMicroJsonBtn">Copy true micro JSON array</button>
            <button type="button" class="success" id="copyActiveMicroEnvBtn">Copy true micro ENV</button>
            <button type="button" class="success" id="copyActiveMacroJsonBtn">Copy macro JSON array</button>
            <button type="button" class="success" id="copyActiveMacroEnvBtn">Copy macro ENV</button>
          </div>
          <pre>${escapeHtml(JSON.stringify(activeIds, null, 2))}</pre>
          <pre>${escapeHtml(`ACTIVE_MICRO_FAMILY_IDS=${activeIds.join(",")}`)}</pre>
          <pre>${escapeHtml(`ACTIVE_MACRO_FAMILY_IDS=${activeMacroIds.join(",")}`)}</pre>
        </div>

        <div class="card">
          <h3>Next rotation raw</h3>
          ${jsonBlock(next)}
        </div>
      `;

      $("activateBestShortRotationBtn")?.addEventListener("click", () => activateBestSideMicro("SHORT"));
      $("activateBestLongRotationBtn")?.addEventListener("click", () => activateBestSideMicro("LONG"));

      $("freezeWeeklyBtn")?.addEventListener("click", async () => {
        const result = await api(endpoints.weeklyFreeze, {
          method: "POST",
          body: JSON.stringify({ force: true, mode: "balanced" })
        });

        setMessage(`Next rotation frozen. rotationId=${result.rotationId || result.result?.result?.rotationId || "NA"}`, "ok");
        await renderRotation();
      });

      $("copyActiveMicroIdsBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeIds, null, 2), `Copied ${activeIds.length} true micro IDs.`));
      $("copyActiveMacroIdsBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeMacroIds, null, 2), `Copied ${activeMacroIds.length} macro IDs.`));

      $("copyActiveMicroJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeIds, null, 2), `Copied ${activeIds.length} true micro IDs.`));
      $("copyActiveMicroEnvBtn")?.addEventListener("click", () => copyText(`ACTIVE_MICRO_FAMILY_IDS=${activeIds.join(",")}`, "True micro ENV line gekopieerd."));

      $("copyActiveMacroJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(activeMacroIds, null, 2), `Copied ${activeMacroIds.length} macro IDs.`));
      $("copyActiveMacroEnvBtn")?.addEventListener("click", () => copyText(`ACTIVE_MACRO_FAMILY_IDS=${activeMacroIds.join(",")}`, "Macro ENV line gekopieerd."));

      $("downloadRotationBtn")?.addEventListener("click", () => downloadJson("active-rotation.json", data));

      bindMicroTableEvents();
    }

    async function renderDiscord() {
      showLoading("discord");

      const data = await api(`${endpoints.discord}?limit=100`);
      state.discord = data;

      const logs = getRows(data, ["logs", "items"]);

      $("discord").innerHTML = `
        <div class="toolbar">
          <button type="button" id="copyDiscordJsonBtn">Copy Discord JSON</button>
          <button type="button" id="downloadDiscordBtn">Export JSON</button>
        </div>

        <div class="grid">
          ${metricCard("Logs", fmtInt(logs.length))}
          ${metricCard("Last log", fmtTs(logs[0]?.ts || logs[0]?.createdAt))}
        </div>

        ${table(logs, [
          { label: "TS", render: (row) => fmtTs(row.ts || row.createdAt) },
          { label: "Type", render: (row) => escapeHtml(row.type || row.level || "-") },
          { label: "Coin", render: (row) => coinAvatar(row.payload || row, "sm") },
          { label: "Side", render: (row) => `<span class="pill ${escapeAttr(rowSideClass(row.payload || row))}">${escapeHtml(rowSideLabel(row.payload || row))}</span>` },
          { label: "True Micro", render: (row) => `<code>${escapeHtml(microId(row.payload || row))}</code>` },
          { label: "Macro", render: (row) => `<code>${escapeHtml(macroId(row.payload || row))}</code>` },
          { label: "Result", render: (row) => escapeHtml(row.result ? JSON.stringify(row.result) : row.message || row.content || "") }
        ])}
      `;

      $("copyDiscordJsonBtn")?.addEventListener("click", () => copyText(JSON.stringify(data, null, 2), "Discord JSON gekopieerd."));
      $("downloadDiscordBtn")?.addEventListener("click", () => downloadJson("discord-logs.json", data));
    }

    function renderReset() {
      $("reset").innerHTML = `
        <div class="grid-3">
          <div class="card">
            <h3>Reset learning only</h3>
            <p class="metric-extra">Wist observations, outcomes, weekly macro/micro stats en shadow data. Open positions blijven staan.</p>
            <button type="button" class="warn" id="resetLearningBtn">Reset learning</button>
          </div>

          <div class="card">
            <h3>Reset rotation only</h3>
            <p class="metric-extra">Wist active/next rotation. Learning blijft staan.</p>
            <button type="button" class="warn" id="resetRotationBtn">Reset rotation</button>
          </div>

          <div class="card">
            <h3>Factory reset</h3>
            <p class="metric-extra">Wist scanner snapshots, trade memory, open positions, analyze stats, rotations en live cache.</p>
            <input id="factoryConfirm" style="width: 100%; margin-bottom: 8px;" placeholder="FACTORY_RESET_CONFIRMED" />
            <label style="display: block; margin-bottom: 8px;">
              <input id="factoryForce" type="checkbox" />
              force even with open positions
            </label>
            <button type="button" class="danger" id="factoryResetBtn">Factory reset</button>
          </div>
        </div>

        <div class="card">
          <h3>Reset result</h3>
          <pre id="resetResult">Nog geen reset uitgevoerd.</pre>
        </div>
      `;

      $("resetLearningBtn")?.addEventListener("click", postResetLearning);
      $("resetRotationBtn")?.addEventListener("click", postResetRotation);
      $("factoryResetBtn")?.addEventListener("click", postFactoryReset);
    }

    async function postResetLearning() {
      const confirmValue = prompt("Typ RESET_LEARNING om learning te wissen.");

      if (confirmValue !== "RESET_LEARNING") return;

      const data = await api(endpoints.resetLearning, {
        method: "POST",
        body: JSON.stringify({
          confirm: "RESET_LEARNING",
          confirmed: "RESET_LEARNING"
        })
      });

      $("resetResult").textContent = JSON.stringify(data, null, 2);
      setMessage("Learning reset uitgevoerd.", "ok");
    }

    async function postResetRotation() {
      if (!confirm("Reset active/next rotation?")) return;

      const data = await api(endpoints.resetRotation, {
        method: "POST",
        body: JSON.stringify({
          confirm: true,
          confirmed: true
        })
      });

      $("resetResult").textContent = JSON.stringify(data, null, 2);
      setMessage("Rotation reset uitgevoerd.", "ok");
    }

    async function postFactoryReset() {
      const confirmValue = $("factoryConfirm").value.trim();
      const forceValue = $("factoryForce").checked;

      if (confirmValue !== "FACTORY_RESET_CONFIRMED") {
        setMessage("Factory reset geblokkeerd: bevestiging is niet exact FACTORY_RESET_CONFIRMED.", "error");
        return;
      }

      if (!confirm("FACTORY RESET wist alles. Doorgaan?")) return;

      const data = await api(endpoints.factoryReset, {
        method: "POST",
        body: JSON.stringify({
          confirm: "FACTORY_RESET_CONFIRMED",
          confirmed: "FACTORY_RESET_CONFIRMED",
          force: forceValue,
          forceClosePositions: forceValue
        })
      });

      $("resetResult").textContent = JSON.stringify(data, null, 2);
      setMessage("Factory reset uitgevoerd.", "ok");
    }

    function showTab(id) {
      if (!tabs.includes(id)) id = "overview";

      state.activeTab = id;

      document.querySelectorAll(".panel").forEach((panel) => panel.classList.add("hidden"));
      document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));

      $(id).classList.remove("hidden");
      document.querySelector(`[data-tab="${id}"]`)?.classList.add("active");

      location.hash = id;
      refresh(id);
    }

    async function refresh(tab = state.activeTab) {
      setMessage("");
      $("liveLabel").textContent = `Last refresh ${new Date().toLocaleTimeString()}`;

      try {
        if (tab === "overview") return await renderOverview();
        if (tab === "scanner") return await renderScanner();
        if (tab === "trade") return await renderTrade();
        if (tab === "micros") return await renderMicros();
        if (tab === "rotation") return await renderRotation();
        if (tab === "discord") return await renderDiscord();
        if (tab === "reset") return renderReset();
      } catch (error) {
        const message = error?.message || String(error);

        setMessage(message, "error");

        $(tab).innerHTML = `<div class="card"><h3>Error</h3>${jsonBlock({ message })}</div>`;
      }
    }

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => showTab(button.dataset.tab));
    });

    $("refreshBtn").addEventListener("click", () => refresh(state.activeTab));

    window.addEventListener("error", (event) => {
      setMessage(event.message || "Browser error", "error");
    });

    window.addEventListener("unhandledrejection", (event) => {
      setMessage(event.reason?.message || String(event.reason || "Unhandled promise rejection"), "error");
    });

    const initialTab = location.hash.replace("#", "") || "overview";
    showTab(tabs.includes(initialTab) ? initialTab : "overview");
  </script>
</body>
</html>
