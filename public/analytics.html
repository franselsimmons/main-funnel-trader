<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Desk</title>
  <link rel="stylesheet" href="main.css">
  <style>
    /* Analytics specifieke styling (kaarten) */
    .side-title { font-size: 20px; font-weight: 800; margin: 32px 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; letter-spacing: 1px; }
    .analytics-card { background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 16px; }
    .a-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; }
    .a-title { font-size: 16px; font-weight: 800; letter-spacing: 2px; color: var(--muted); }
    .a-total { background: rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: 800; }
    .a-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .a-stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.04); }
    .a-stat-label { color: var(--muted); }
    .a-stat-val { font-weight: 800; font-size: 14px; color: var(--text); }
    .a-stat-val.good { color: var(--green); }
    
    /* Badges voor Strenger / Soepeler */
    .badge-strenger { background: rgba(239, 68, 68, 0.2); color: var(--red); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
    .badge-soepeler { background: rgba(34, 197, 94, 0.2); color: var(--green); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
  </style>
</head>
<body>

  <div class="pageShell">
    
    <div class="header">
      <h1 style="color: #a78bfa;">📊 ANALYTICS DESK</h1>
      <div id="statusLine">Laden...</div>
      
      <div class="nav">
        <a href="index.html" class="btn">Home</a>
        <a href="bull.html" class="btn">Bull</a>
        <a href="bear.html" class="btn">Bear</a>
        <a href="signals.html" class="btn">Trade</a>
        <a href="analytics.html" class="btn active purple">Analyse</a>
      </div>
    </div>

    <div id="analytics">
      <p style="color: var(--muted); text-align: center; margin-top: 40px;">Data ophalen...</p>
    </div>

  </div>

  <script src="analytics.js"></script>
</body>
</html>
