<!-- ================= public/analyse.html ================= -->
<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TradeSystem Analyse Families</title>
  <link rel="stylesheet" href="/analyse.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>TradeSystem Analyse</h1>
      <p>50 LONG families + 50 SHORT families. Broad buckets. Closed/open/shadow gescheiden.</p>
    </div>

    <div class="top-actions">
      <button id="refreshBtn">Refresh</button>
      <a href="/api/analyse" target="_blank">API</a>
    </div>
  </header>

  <section class="cards" id="summaryCards"></section>

  <section class="panel">
    <div class="controls">
      <label>
        Side
        <select id="sideFilter">
          <option value="ALL">ALL</option>
          <option value="LONG">LONG</option>
          <option value="SHORT">SHORT</option>
        </select>
      </label>

      <label>
        Status
        <select id="statusFilter">
          <option value="ALL">ALL</option>
          <option value="EDGE">EDGE ONLY</option>
          <option value="BAD">BAD ONLY</option>
          <option value="COLLECTING">COLLECTING</option>
        </select>
      </label>

      <label>
        Min closed
        <input id="minClosed" type="number" value="0" min="0" />
      </label>

      <label>
        Search
        <input id="searchBox" type="search" placeholder="LONG_4, MID, COUNTER, BAD_EXEC..." />
      </label>

      <label class="check">
        <input id="hideEmpty" type="checkbox" />
        Hide empty
      </label>
    </div>
  </section>

  <section class="panel">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Family</th>
            <th>Definition</th>
            <th>Observed</th>
            <th>Closed</th>
            <th>Open</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Winrate</th>
            <th>Avg R</th>
            <th>Total R</th>
            <th>Avg PnL%</th>
            <th>Total PnL%</th>
            <th>Direct SL</th>
            <th>Near TP</th>
            <th>Conf.</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="familyRows"></tbody>
      </table>
    </div>
  </section>

  <section class="panel">
    <h2>Tracked filters</h2>
    <div id="trackedFilters" class="filter-grid"></div>
  </section>

  <dialog id="detailsDialog">
    <div class="dialog-head">
      <h2 id="detailsTitle"></h2>
      <button id="closeDialog">Close</button>
    </div>
    <pre id="detailsPre"></pre>
  </dialog>

  <script src="/analyse.js"></script>
</body>
</html>
