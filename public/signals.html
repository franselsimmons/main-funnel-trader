<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Signals – Data-Driven Advies</title>
  <style>
    /* ===== BASIS STIJLEN (zoals eerder) ===== */
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #eab308;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
    }
    * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
    body { background: var(--bg); color: var(--text); margin: 0; padding: 20px 16px; transition: filter 0.3s; }
    .bear-mode { filter: hue-rotate(-10deg) brightness(0.9); }
    .pageShell { max-width: 1700px; width: 100%; margin: 0 auto; padding: 24px; background: rgba(2,6,23,0.3); border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    /* ... verdere stijlen zoals eerder (hou je eigen) ... */
    /* (kortheidshalve laat ik de rest van de CSS weg, die blijft hetzelfde) */
  </style>
</head>
<body>
<div class="pageShell">
  <!-- header en metrics etc. (zelfde als eerder) -->
  <div class="header">
    <h1>⚡ TRADE SYSTEM</h1>
    <div id="statusLine">Laden...</div>
    ...
  </div>
  <div class="metrics">
    <div class="metric"><div class="metricLabel">BTC Trend</div><div id="btcTrend" class="metricValue">—</div></div>
    <div class="metric"><div class="metricLabel">Regime</div><div id="regime" class="metricValue">—</div></div>
    <div class="metric"><div class="metricLabel">Funnel Input</div><div id="funnelCount" class="metricValue">0</div></div>
    <div class="metric"><div class="metricLabel">Actieve WAIT</div><div id="waitCount" class="metricValue">0</div></div>
  </div>
  <!-- rest van de secties ... -->
  <div class="trade-section"><h2>✅ ENTRY SIGNALEN</h2><div id="entriesTable"></div></div>
  <div class="trade-section"><h2>🔄 HOLD POSITIES</h2><div id="holdTable"></div></div>
  <div class="trade-section"><h2>📊 WAIT CANDIDATES (nog in analyse)</h2><div id="waitTable"></div></div>
  <div class="trade-section"><h2>❌ EXIT SIGNALEN</h2><div id="exitTable"></div></div>
</div>

<script>
  // ================= HELPER FUNCTIES =================
  const el = id => document.getElementById(id);
  function safeArray(value) {
    // Als het een array is, retourneer het; anders als het een object met actions is, retourneer actions; anders lege array
    if (Array.isArray(value)) return value;
    if (value && Array.isArray(value.actions)) return value.actions;
    return [];
  }
  function toNumber(value){ const n = Number(value); return Number.isFinite(n) ? n : null; }
  function escapeHtml(value){ return String(value ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
  function fmtSign(v){ const n=toNumber(v); if(n===null)return"—"; if(n>0)return`+${n.toFixed(2)}`; if(n<0)return`${n.toFixed(2)}`; return"0"; }

  // ================= MARKT CONTEXT =================
  function updateMarketContext(data){
    const btcTrend = data?.btc?.state || "UNKNOWN";
    const regime = data?.regime || "UNKNOWN";
    const funnelInput = data?.tradeFunnelInputCount ?? 0;
    const trades = safeArray(data?.trades);
    const waitCount = trades.filter(t => String(t.action).toUpperCase() === "WAIT").length;
    if(el("btcTrend")) el("btcTrend").innerText = btcTrend;
    if(el("regime")) el("regime").innerText = regime;
    if(el("funnelCount")) el("funnelCount").innerText = funnelInput;
    if(el("waitCount")) el("waitCount").innerText = waitCount;
    document.body.classList.remove("bear-mode");
    if(btcTrend === "BEARISH") document.body.classList.add("bear-mode");
    return { btcTrend, regime, funnelInput, waitCount, trades };
  }

  function explainMarket(market, bottleneckData, trades){
    const { btcTrend, regime, funnelInput, waitCount } = market;
    let reasons = [];
    if(btcTrend === "BEARISH") reasons.push("🐻 BTC bearish – alleen shorts of geen trades.");
    if(btcTrend === "BULLISH") reasons.push("🐂 BTC bullish – alleen longs of geen trades.");
    if(regime === "HIGH_VOL") reasons.push("⚡ Hoge volatiliteit -> bot is strenger (minder entries).");
    if(regime === "LOW_VOL") reasons.push("⏸ Lage volatiliteit -> weinig duidelijke setups.");
    if(regime === "MID_VOL") reasons.push("⚖️ Normale volatiliteit – standaard filters actief.");
    if(funnelInput < 5) reasons.push("📉 Weinig coins in trade funnel (<5) – te weinig kansen.");
    const hasEntries = trades.some(t => String(t.action).toUpperCase() === "ENTRY");
    if(!hasEntries && waitCount > 0) reasons.push("🚫 Geen entries → filters blokkeren alle setups.");
    if(bottleneckData && bottleneckData.length){
      const top = bottleneckData[0];
      reasons.push(`🚫 Grootste bottleneck: ${top.reason} (${top.impactPct.toFixed(0)}% van top candidates) → ${top.advice}`);
    }
    if(reasons.length === 0) reasons.push("✅ Marktcondities neutraal – bot zou trades moeten genereren.");
    return reasons.join(" · ");
  }

  // ================= BOTTLENECK & ADVIES (zelfde als eerder) =================
  function getAdvice(reason, avg){ /* ... zoals eerder ... */ }
  function getFallbackReasonScore(trade){ /* ... */ }
  function renderRejectOverviewWithAdvice(trades){ /* ... */ }
  function calculateTopCoinStats(trades){ /* ... */ }
  function renderDataDrivenAdvice(trades){ /* ... */ }
  function renderExpectancyTable(trades){ /* ... */ }
  function renderShortfallTable(trades){ /* ... */ }
  function renderActionTable(containerId, trades, action){ /* ... */ }

  // ================= MAIN LOAD =================
  async function load(){
    const statusDiv = el("statusLine");
    if(statusDiv) statusDiv.innerText = "🔄 Data laden...";
    try{
      const res = await fetch(`/api/public-latest?_=${Date.now()}`);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      
      // Veilig uitlezen van trades (array of object met actions)
      const trades = safeArray(data?.trades);
      const market = updateMarketContext(data);
      
      const bottleneckData = renderRejectOverviewWithAdvice(trades);
      if(el("marketExplanation")) el("marketExplanation").innerText = explainMarket(market, bottleneckData, trades);
      
      renderDataDrivenAdvice(trades);
      renderShortfallTable(trades);
      
      const hasRealClosed = trades.some(t => t.result === "WIN" || t.result === "LOSS");
      if(hasRealClosed){
        renderExpectancyTable(trades);
      } else {
        if(el("expectancySection")) el("expectancySection").innerHTML = "<p class='emptyState'>Nog geen echte gesloten trades (WIN/LOSS)</p>";
      }
      
      renderActionTable("entriesTable", trades, "ENTRY");
      renderActionTable("holdTable", trades, "HOLD");
      renderActionTable("waitTable", trades, "WAIT");
      renderActionTable("exitTable", trades, "EXIT");
      
      if(statusDiv) statusDiv.innerText = `✅ Laatste update: ${new Date().toLocaleString("nl-NL")}`;
    }catch(e){
      console.error(e);
      if(el("statusLine")) el("statusLine").innerText = "❌ Fout bij laden";
      // ... foutmeldingen in andere containers
    }
  }
  
  function resetStats(){ alert("Reset functionaliteit nog te koppelen aan backend."); }
  
  document.addEventListener("DOMContentLoaded", () => {
    const refreshBtn = document.getElementById("refreshBtn");
    if(refreshBtn) refreshBtn.addEventListener("click", load);
    const resetBtn = document.getElementById("resetStatsBtn");
    if(resetBtn) resetBtn.addEventListener("click", resetStats);
    load();
  });
  setInterval(load, 15000);
</script>
</body>
</html>
